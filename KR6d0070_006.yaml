body:
  text: 錢塘廣照沙門釋聞達妙法蓮華經壽量品第十六前品之中因文殊請為初心者說安樂法時他方界諸菩薩衆欲於滅後在此弘經世尊止之不須汝等言我弟子自當護持下方空中聞悉奔會衆見此等即生疑心以問於佛為從何來世尊答言是我所化遂疑世尊成佛在近所化者衆非初心人故開壽量以決群疑我久遠來實已成佛今云成者蓋是方便為衆生故現滅不滅實不滅度唱言滅耳爾時佛告諸菩薩及一切大衆當時在會懷疑心者諸善男子汝等當信解如來誠諦之語汝當諦信如來實語勿執方便以疑於佛復告大衆汝等當信解如來誠諦之語再告之者欲堅其信又復告諸大衆汝等當信解如來誠諦之語由法深妙衆生難解如是至三令深信也是時菩薩大衆彌勒為首合掌白佛言彌勒及衆見佛再三如此勤重所以合掌口發誠言對揚於佛世尊惟願說之我等當信受佛語言當信受不敢疑也如是三白已如是三遍白世尊已佛猶默然未蒙肯可復言惟願說之我等當信受佛語至于再四誠極心切爾時世尊知諸菩薩三請不止佛知衆生至三不止而復再四而告之言汝等諦聽佛將欲說誠實之言故敕有衆攝心聽受如來祕密神通之力如來慈悲欲度生故祕妙深密神通之力隱實行權說近成道一切世間天人及阿修羅世間所有一切衆生皆謂今釋迦牟尼佛靈嶽釋迦說法華者出釋氏宮出釋迦氏淨飯王宮去伽耶城不遠去處時節坐於道場得阿耨多羅三藐三菩提坐道樹下示成正覺名坐道場然善男子我實成佛已來實是最初成正覺來無量無邊百千萬億那由他劫言我成佛其實已久譬如五百千萬億那由他阿僧祇西土大數三千大世界譬將無數大千世界假使有人抹為微塵假設譬喻若使有人將諸世界一時細抹悉為微塵過於東方五百千萬億那由他阿僧祇國乃下一塵經過無數僧祇國土方乃下於微塵一點如是東行盡是微塵如是東行迤𨓦而去點盡如上所有微塵諸善男子於意云何汝諸子等於汝之意以為云何是諸世界可得思惟校計知其數不如昔所說東行世界可以思算得其數不彌勒菩薩等俱白佛言衆承佛問俱時回答世尊是諸世界無量無邊非算數所知亦非心力所及世界多故算數計校皆不可知一切聲聞辟支佛二乘之人以無漏智以盡煩惱無漏智慧不能思惟知其限數限量數目思惟莫及我等住阿惟越致地諸大菩薩皆悉住於不退轉地於是事中亦所不達於是微塵限數事中亦不能了世尊如是諸世界無量無邊言無邊量不可得知爾時佛告大菩薩衆彌勒等衆諸善男子今當分明宣語汝等在昔祕密未敢說實今當分明顯露而說是諸世界若著微塵及不著者若曾點著及不點者盡以為塵一塵一劫盡將東行所有世界抹為微塵以一微塵為一劫我成佛已來復過於此百千萬億那由他阿僧祇劫成佛劫數復過塵劫無量僧祇自從是來我常在此娑婆世界說法教化言常化此無休息也亦於餘處百千萬億那由他阿僧祇國導利衆生若但化此其功不博非大慈悲故於餘處亦皆導利一切衆生諸善男子於是中間我說然燈佛等方便大乘說三僧祇修行成佛故說昔名善慧菩薩遇然燈佛得授記莂汝於來世當得作佛號釋迦牟尼皆中間事又復言其入於涅槃又說然燈入般涅槃如是皆以方便分別非實爾也諸善男子若有衆生來至我所若復有人至於佛所我以佛眼以佛慈悲清淨天眼觀其信等諸根利鈍信進念定慧名五善根觀其根性利之與鈍隨所應度應以何法而度脫之處處自說名字不同年紀大小處處自稱應身名號各各不同及以年紀大小亦異亦復現言當入涅槃佛真法身猶若虗空本無終始言涅槃者悉是為生方便示現又以種種方便說微妙法為令衆生得妙法故假諸方便而為演說能令衆生發歡喜心能令前機聞法解悟發歡喜心諸善男子如來見諸衆生佛眼觀見樂於小法德薄垢重者由根鈍故樂小乘法福德淺薄障垢重者為是人說我少出家得阿耨多羅三藐三菩提為如是等鈍根障重說云少年出家成道然我實成佛已來久遠若斯劫數無量但以方便教化衆生令入佛道作如是說但為鈍根方便設化說壽長短諸善男子如來所演經典皆為度脫衆生佛之說法但欲應機如醫用藥除病為先或說己身說自本身在昔因地或說他身說餘人身因地之時或示己身或示他身以自他身過去宿世所受之報開示於人或示己事或示他事以過去世自他所作種種之事開示於人諸所言說皆實不虗一一稱實無有虗妄所以者何為何如此如來如實知見三界之相如來智慧稱如實理明見三界不遷之相無有生死若退若出本惟空寂如太虗空實無有生及以老死若退轉來若出去者亦無在世及滅度者本自不生故無在世亦無有滅故無滅度非實非虗非實故不同凡夫執迷取相非虗故不同小聖滅色取空非如非異非一相非異相不如三界見於三界不如三界之人見三界有不如二乘之人見三界空空有不二名如實相如斯之事如斯三界真實之事如來明見無有錯謬如來智慧明了知見無有一切錯謬之處以諸衆生有種種性根性不同種種欲樂欲不同種種行履踐不同種種憶想分別故種種憶度種種思想種種分別各不同故欲令生諸善根如來欲令發生一切諸善根本以若干因緣言若干者不定之辭諸善惡因及善惡緣譬喻言辭種種說法說惡因緣欲令改過說善因緣令修正行所作佛事未曾暫廢諸有所作雖開方便本欲皆令成得佛道故云佛事從始至今中間未曾暫時廢弛如是我成佛已來甚大久遠言成佛道其實已久壽命無量阿僧祇劫常住不滅衆生成佛如礦成金一純之後不復成雜此說如來自受用門智度大海報身壽量有生無滅故云常住諸善男子我本行菩薩道所成壽命我昔本時修菩薩行所成就得智慧壽命今猶未盡復倍上數因既成果與法身齊云何有盡非數可知然今非實滅度然今靈山亦非實滅而便唱言當取滅度方便唱言我當滅度如來以是方便教化衆生如來以此示生唱滅而為方便化導衆生所以者何云何如此若佛久住於世若使世尊久住世間薄德之人不種善根薄德無福鈍根之人不肯修種菩提善種貧窮下賤貪著五欲不修福業名曰貧窮狎習惡者名為下賤貪著世間五欲之樂入於憶想妄見網中入於憶度種種思想虗妄知覺見愛網中若見如來常在不滅斯等之人見佛不滅便起憍恣而懷厭怠視以為常生憍縱心而懷輕易厭倦懈怠不能生於難遭之想恭敬之心不能生於難遭遇想而起恭敬信仰之心是故如來以方便說言有生滅比丘當知諸佛出世難可值遇久遠一出難可得見所以者何為何之故作如是說諸薄德人諸世間中薄德之人過無量百千萬億劫經過多劫或有見佛或不見者或有得見或全不見以此事故我作是言以是之故我方便說諸比丘如來難可得見因其不見故此語之斯衆生等聞如是語斯不見者聞我此語必當生於難遭之想必當生起難遭逢想心懷戀慕渴仰於佛其心懷仰欲見於佛便種善根便種見佛衆善之根是故如來雖不實滅而言滅度為衆生故於無生滅示生滅耳又善男子諸佛如來法皆如是恐疑今佛創立此門所以示言諸佛皆爾為度衆生皆實不虗佛本無心方便度生非同世間不善虗誑有益無損故云皆實譬如良醫智慧聰達佛如醫王智慧明了善知病源明練方藥善治衆病明識諳練方書藥性善能治療衆生之病其人多諸子息喻佛教化五道衆生若十二十乃至百數若十即菩薩二十即二乘乃至百數即十法界以有事緣遠至餘國佛先化此結大乘緣餘方機熟名有事緣捨此趣彼名至餘國諸子於後飲他毒藥如來滅後弟子隨邪名飲毒藥藥發悶亂宛轉于地邪毒交攻心神悶亂流浪諸趣名為宛轉生而復死不離下地是時其父還來歸家喻此緣熟佛還出現諸子飲毒或失本心或不失者見諸衆生或入邪毒喪大受輪或有本心而不失者遙見其父皆大歡喜以凡望佛名為遙見衆生見佛如子見父子見父歡父見子喜拜跪問訊善安隱歸屈身作禮問訊起居唱滅還源如離家去入垂手名安隱歸我等愚癡誤服毒藥自悔過咎誤入邪流願見救療更賜壽命願佛見憐方便攝化更復賜與智慧壽齡父見子等苦惱如是佛見衆生於三界中受如是等種種衆苦依諸經方求好藥草佛隨諸佛所行方便名順方書察其病深如理調伏名求好藥色香美味皆悉具足行色道香法音美味藥料盡足搗篩和合與子令服摧服剛暴名為舂搗退惡進善猶如篩簸定慧均融名為和合付與受持名為服藥而作是言此大良藥良善大藥色香美味皆悉具足材料皆全非僞藥也汝等可服速除苦惱無復衆患汝可服此疾除一切身心苦惱無復發生其諸子中不失心者不失本有大乘心者見此良藥色香俱好聞法信解善知義味即便服之病盡除愈如法修行得度生死餘失心者喻無正信樂善之心見其父來遇佛出興雖亦歡喜問訊雖見佛喜來相請問求索治病願求脫苦然與其藥而不肯服然授以法而不肯修所以者何何故來求而不肯服毒氣深入失本心故邪毒習氣深入其心壞善根故於此好色香藥而謂不美於正直法不能知味父作是念此子可愍見子有疾所以深憐為毒所中心皆顛倒被毒所中心無正念而皆顛倒雖見我喜求索救療雖見佛喜求為救護如是好藥而不肯服如是正法而不奉行我今當設方便令服此藥唱言涅槃而為方便令思正法即作是言汝等當知汝等諸子當知此意我今衰老死時已至謂將入滅是好良藥大藏經卷今留在此流布世間汝可取服汝可取則依法修行勿憂不差勿得憂疑苦不能脫作是教已復至他國囑付子已更應餘方遣使還告汝父已死使即菩薩承佛付囑荷法流通名為還告示言世尊今已入滅是時諸子若十二十乃至百數聞父背喪心大憂惱聞知佛滅其心憂悶而作是念作是念言若父在者慈愍我等能見救護若佛在世憐念我等能為方便而作救護今者捨我遠喪他國今者棄我於方便土而現寂滅自惟孤露無復恃怙自思孤幼窮露無依慈父既喪無復恃怙常懷悲感心遂醒悟常懷悲戚有以感動遂得本心復還醒悟乃知此藥色味香美乃知佛法理味深長即取服之毒病皆愈即取教法依而奉行漏業悉盡其父聞子悉已得差佛居真寂聞諸機緣妄心已覺尋便來歸咸使見之即便起應復見世間咸令有緣而得覩現諸善男子於意云何於汝意中以為如何頗有人能說此良醫虗妄罪不醫人方便假言已死而救其子頗有人能說其不應虗妄過不不也世尊此彌勒答父雖不死本是好意無虗妄也佛言我亦如是佛之所為亦如醫者成佛已來無量無邊百千萬億那由他阿僧祇劫成佛實久得無生滅已經無量阿僧祇劫為衆生故如醫為子以方便力言當滅度說滅度者是方便智亦無有能如法說我虗妄過者亦無有人能如法說我之所行虗妄罪也爾時世尊欲重宣此義而說偈言自我得佛來所經諸劫數自從我得成道已來所經劫數無量百千萬億載阿僧祗如是長久常說法教化無數億衆生說法度生未曾暫廢令入於佛道令其得入佛無上道爾來無量劫自從爾來經無量劫為度衆生故方便現涅槃中間數數示生唱滅而實不滅度常住此說法據佛法報實無滅時常住世間演說諸法我常住於此佛既常住世間衆生云何不見以諸神通力以諸神通方便之力令轉倒衆生雖近而不見人人身中有佛世尊結加趺坐德相具足只為昏迷生顛倒想雖則至近而不得見衆見我滅度廣供養舍利衆見如來色身入滅廣興供養遺體舍利咸皆懷戀慕而生渴仰心衆皆戀慕生心渴仰衆生既信伏質直意柔軟衆生既然深信降伏質實正直意中柔軟一心欲見佛不自惜身命一心樂欲得見如來於身命財無所吝惜時我及衆僧俱出靈鷲山佛及僧衆俱時出現我時語衆生常在此不滅我於是時語諸衆生常住於此不曾有滅以方便力故現有滅不滅佛以方便智慧之力為衆生故現滅不滅餘國有衆生恭敬信樂者餘方國土有能敬樂信佛法者我復於彼中為說無上法機興則說無有定處汝等不聞此但謂我滅度汝等未聞如是方便但謂處來實是滅度我見諸衆生沒在於苦海佛見衆生沉溺生死故不為現身令其生渴仰故即隱去不與現身欲令其心而生渴仰因其心戀慕乃出為說法因其心中生於戀慕乃即出現與之說法神通力如是此乃如來神通之力其事如是於阿僧祇劫從成佛來經歷許久常在靈鷲山說法華處及餘諸住處諸方國土說法之處衆生見劫盡大火所燒時衆生眼見劫末之時大火熾然俱時焚蕩我此土安隱天人常充滿正性名佛緣了二性名為人天當於瞋火熾焰之時一念正覺事用皆如貼然無礙名土安隱一切善相皆悉現前名為充滿園林諸堂閣種種寶莊嚴七覺茂林道品樓閣咸以衆善珍寶莊嚴寶樹多華果衆生所遊樂菩提願王名為寶樹善業名華善報名果念念善心名為衆生常在其中名為遊樂諸天擊天鼓常作衆妓樂一念淨心名曰諸天四大交擊從身發聲名擊天鼓以和雅音四攝利生名作伎樂雨曼陀羅華散佛及大衆作衆善事名雨寶華莊嚴佛境及眷屬衆我淨土不毀而衆見燒盡佛之淨土具諸快樂業苦衆生瞋火起處玉石俱焚不可撲滅憂怖諸苦惱如是悉充滿憂愁怖畏種種苦惱如是諸難悉皆充滿是諸罪衆生以惡業因緣是諸界內罪苦衆生以久遠來作諸不善惡因緣故過阿僧祇劫不聞三寶名過於無量阿僧祇劫不得獲聞三寶名字諸有修功德柔和質直者有諸衆生修習善行柔軟和順質朴正直如是之者則皆見我身在此而說法則皆見佛常在於此寂滅之處而與說法或時為此衆說佛壽無量或時為衆說佛壽長令生歡喜敬慕於佛久乃見佛者為說佛難值經歷久劫乃見佛者與說難者令生至重我智力如是如來智力說易說難或促或延巧更如是慧光照無量由性發光因光見道慧光無量洞徹無遺壽命無數劫所成智身報得壽命無有限量不可計劫久修業所得如是福德皆由因地久修淨業之所得成汝等有智者勿於此生疑汝等菩薩是有智者當以理會於此勿疑當斷令永盡當斷疑網令永不生佛語實不虗如醫善方便佛語真實不誑衆生譬如良醫善施方便為治狂子故實在而言死為治失心狂子之故實不入滅而唱涅槃無能說虗妄據相似虗而心實善無有人能說為虗妄我亦為世父救諸苦患者佛亦為諸世間之父是救衆生諸苦難者為凡夫轉倒實在而言滅為諸凡夫心想顛倒執非是感是為非佛雖實在而滅度以常見我故而生憍恣心以其心愚若常見佛而生憍慢恣縱之心放逸著五欲墮於惡道中放蕩狂逸耽著五欲隨業隨於三惡道中我常知衆生行道不行道佛常了知衆生之心或復行道及不行道隨所應可度為說種種法觀機逗教如醫用藥隨以何法而得度者即為說之令得歡喜每自作是念以何令衆生每自心中作如是念以何方便令彼衆生得入無上道速成就佛身得入如來無上智慧速得成就圓滿報身妙法蓮華經分別功德品第十七因前品中聞世尊說本時所成壽長遠利生方便智慧難量諸菩薩衆咸悉開解量其所入得益不同如來一一約人分別功德淺深為衆隨而說爾時大會聞佛說壽命劫數長遠如是衆聞佛說報身壽命如是長久無量無邊阿僧祇衆生得大饒益聞佛壽長開近顯遠得久修益於時世尊告彌勒菩薩摩訶薩佛見大衆各得饒益語彌勒知阿逸多彌勒名也我說是如來壽命長遠時佛於前品說壽永時六百八十萬億那由他恆河沙衆生得無生法忍六百者表六根八十者表八識衆生即是念念之心那由他恆河沙者說其心念數量若是妄念消殞生法本空徹見自性了了分明一切逆順不能傾動證此理者法眼清淨是則名為得無生忍復有千倍菩薩摩訶薩得聞持陀羅尼門言千倍者謂菩薩數倍前千倍陀羅尼者此云總持隨所聞法悉能受持一切諸法由此出故名總持門復有一世界微塵數菩薩摩訶薩得樂說無礙辨才以一世界抹為微塵以一點塵為一菩薩得大辨才樂說諸法無所滯礙復有一世界微塵數菩薩摩訶薩得百千萬億無量旋陀羅尼旋轉曉解諸總持門於一法中出生無量無邊句義復有三千大千世界微塵數菩薩摩訶薩能轉不退法輪智慧甚深住不退地能為衆生轉不退輪復有二千中國土微塵數菩薩摩訶薩能轉清淨法輪凡一小千名一中千一千中千名一大千今二中千即是兩箇大千世界悉抹為塵譬菩薩數悟法性空住清淨地能為衆等轉清淨輪復有小千國土微塵數菩薩摩訶薩一千四天下名為一小千八生當得阿耨多羅三藐三菩提言八生者即是二地數至妙覺名為八生當得無上佛果菩提復有四四天下微塵數菩薩摩訶薩四箇四天下微塵數量四生當得阿耨多羅三藐三菩提言四生者即第八地過四生已得佛菩提復有三四天下微塵數菩薩摩訶薩三生當得阿耨多羅三藐三菩提即第九地三生成佛復有二四天下微塵數菩薩摩訶薩二生當得阿耨多羅三藐三菩提即第十地二生成佛復有一四天下四大部洲名一天下微塵數菩薩摩訶薩一生當得阿耨多羅三藐三菩提即等覺地一生成佛復有八世界微塵數衆生皆發阿耨多羅三藐三菩提心有八世界微塵數衆皆發如來無上道心佛說是諸菩薩摩訶薩得大法利時如前所列諸菩薩衆於佛妙法得大增進利益之時於虗空中雨曼陀羅華下小白華摩訶曼陀羅華大白華也諸天仙衆聞法歡喜於空雨華以散無量百千萬億寶樹下師子座上諸佛即供十方坐寶樹下分身諸佛并散七寶塔中師子座上釋迦牟尼佛多寶分座命令坐者此土教主釋迦世尊及久滅度多寶如來在寶塔中同證法者亦散一切諸大菩薩他方此土會中菩薩及四部衆在會聽法僧尼士女又雨細末旃檀沉水香等前散寶華表真實行此陳香供表真實德於虗空中天鼓自鳴妙聲深遠虗空中者表法性空天上之鼓自然鳴者表無作偈無問自說梵音美妙其義深遠又雨千種天衣天衣散者大約云千表無生理忍辱之衣垂諸瓔珞垂瓔珞者表以智珠而為嚴飾真珠瓔珞蚌螺之珠喻小智也摩尼珠瓔珞大寶珠也表大智慧如意珠瓔珞如意珠王即能出生一切珍寶表於中道佛之智慧圓妙明心遍於九方遍九方者從天散下充滿四方及以四維并中央也即表六凡及以三聖同嚴佛果衆寶香爐燒無價香爐即心寶香即道韻以智修德名曰燒香自然周至供養大會一念既遍一塵亦遍出乎誠心初非作意故曰自然其心普故無有缺處故云周至即是十法界心熏惡成善名為供養一一佛上一一覺了善性之上有諸菩薩執持幡蓋菩薩即是行因之心執法莊嚴名為幡蓋次第而上至于梵天次第升上離欲清淨到無欲處名為梵天是諸菩薩以妙音聲光音天上以光表音智光發現名為妙音歌無量頌讚歎諸佛此妙歌讚供養佛者非耳所聞唯須眼見爾時彌勒菩薩從座而起偏袒右肩合掌向佛而說偈言彌勒菩薩大衆之首見已心喜出衆讚佛佛說希有法昔所未曾聞此法希有佛成道來未曾聞說世尊有大力壽命不可量世尊有大智慧神力壽命長遠不可稱量無數諸佛子今此會中無數佛子聞世尊分別說得法利者歡喜充遍身聞佛世尊如上分別會衆之人所得法利獲大歡喜充滿其身或住不退地登不退地或得陀羅尼入總持門或無礙樂說獲無礙辨樂說無窮萬億旋總持得千萬億旋陀羅尼或有大千界微塵數菩薩各各皆能轉不退之法輪如前復有中千界微塵數菩薩各各皆能轉清淨之法輪如前復有小千界微塵數菩薩餘各八生在當得成佛道如前復有四三二如此四天下即前四四天下三四天下二四天下一四天下微塵數菩薩隨數生成佛言隨數者或四生或三生或二生次第修證然後成佛或一四天下微塵數菩薩餘有一生在等覺菩薩尚有一生當得一切智當得成就一切種智如是等衆生如上等衆聞佛壽長遠聞佛開示壽命長遠得無量無漏清淨之果報如上所說分別菩薩各各所得智慧果報復有八世界微塵數衆生八大千界聞佛說壽命皆發無上心聞佛開示法壽長遠皆發道心願得如佛世尊說無量不可思議法佛說壽量不思議法多有所饒益如虗空無邊利益廣大如空無邊雨天曼陀羅摩訶曼陀羅諸天歡喜空中雨華釋梵如恆沙無數佛土來帝釋梵王數如恆沙從無量土來此娑婆雨旃檀沉水繽紛而亂墜雨於細末旃檀沉水妙香繽紛從空飄下如鳥飛空下供散於諸佛譬如飛鳥從空而下供散多寶釋迦諸佛天鼓虗空中自然出妙聲虗空之中不因人擊天鼓自響出妙音聲天衣千萬億旋轉而來下天上妙衣千萬億種於虗空中旋轉而下衆寶妙香爐燒無價之香寶爐之中爇衆妙香自然悉周遍供養諸世尊妙音普熏周遍法界供諸世尊其大菩薩衆執七寶幡蓋衆執七寶幡蓋之者謂表七善功德莊嚴高妙萬億種高勝妙好有萬億種次第至梵天自下次第至于梵天一一諸佛前遍於一一諸佛之前寶幢懸勝幡於寶幢上念勝妙幡亦以千萬偈歌詠諸如來菩薩亦以偈讚諸佛如是種種事昔所未曾有此衆美事昔所未有聞佛壽無量一切皆歡喜聞佛壽長知佛德妙一切大衆心皆歡喜佛名聞十方廣饒益衆生佛之名字傳聞十方廣大饒益一切衆生一切具善根以助無上心令一切衆具足善根悉以資助無上道心爾時佛告彌勒菩薩摩訶薩彌勒菩薩說上偈已佛復告之阿逸多其有衆生聞佛壽命長遠如是不可計數乃至能生一念信解下至一念生信解心所得功德無有限量一念信心功德無限何況具足深心信解若有善男子善女人為阿耨多羅三藐三菩提故有善男女為求道故於八十萬億那由他劫行五波羅蜜八十萬億即表八識五波羅蜜除去般若檀波羅蜜此云布施尸羅波羅蜜此云持戒羼提波羅蜜此云忍辱毗黎耶波羅蜜此云精進禪波羅蜜此云入定除般若波羅蜜此云智慧般若真智是諸佛母經舉功德校量信解故除般若以是功德以是五度所獲功德比前功德此前一念信解功德百分千分百千萬億分不及其一百分之中不及其一以至千萬亦不及一萬分中一億分中一亦皆不及乃至算數譬喻所不能知乃至算師計算一切譬喻所不能知若善男子善女人有如是功德若有如是信解功德於阿耨多羅三藐三菩提退者無有是處無信心者易得退道有是信心而於菩提生退轉者無有是處爾時世尊欲重宣此義而說偈言若人求佛慧若復有人求佛智慧於八十萬億那由他劫數行五波羅蜜經歷多劫修行五度於是諸劫中布施供養佛及緣覺弟子并諸菩薩衆多劫供養佛及緣覺并菩薩衆珍異之飲食珍奇飲饌上服與臥具上服即寶衣臥具即床褥旃檀立精舍以旃檀木建立精舍而作僧坊以園林莊嚴施以園林莊嚴勝境如是等布施飲食衣服房舍臥具即以四事而行施也種種皆微妙其有種種所施之物精意微妙盡此諸劫數八十萬億那由他劫以回向佛道回此施福向於佛道若復持禁戒持佛淨戒清淨無缺漏戒行清淨無有缺失及以滲漏求於無上道諸佛之所歎求於正道佛所歎行若復行忍辱住於調柔地能行忍辱住調柔位設衆惡來加其心不傾動言或衆惡加臨其身其身安忍終不傾動諸有得法者懷於增上慢諸有修行得法趣者內懷自得增上慢心為此所輕惱如是亦能忍被此等人之所輕惱如是亦能安然忍受若復勤精進志念常堅固若復有人勤行精進志願正念常時堅固於無量億劫一心不懈息經歷久劫常爾一心不懈不怠又於無數劫住於空間處又經多劫在空靜處若坐若經行若或坐禪及以經行除睡常攝心唯除睡時常攝其心以是因緣故能生諸禪定以是空間攝靜因緣故能發生諸禪定力八十億萬劫安住心不亂住第八識安隱心中持此一心福願求無上道持此一心修禪定福願求如來無上之道我得一切智盡諸禪定際自謂我得一切空智盡諸禪定所有邊際是人於百千萬億劫數中行此諸功德如上之所說指上所說五度功德有善男女等聞我說壽命聞如來說壽命久長乃至一念信其福過於彼一念信解所得功德勝歷久劫行於五度良由五度是福福是有為慧出生死以福此念云何能及若人悉無有一切諸疑悔若人悉無諸疑悔心深心須臾信其福為如此信佛妙乘願求佛道名為深心若復有人於須臾間起大信心其所得福過於五度其有諸菩薩無量劫行道其有菩薩多劫行道聞我說壽命是則能信受上上根器久植善因聞佛所說壽命長久是智慧人則能信受如是諸人等頂受此經典如上所說諸有智人聞此經典頂戴受持願我於未來長壽度衆生願我得於未來之世久復長壽度脫衆生如今日世尊諸釋中之王一如今日釋迦世尊諸釋種中無上法王道場師子吼說法無所畏於道場中作師子吼為衆說法無所怖畏我等未來世一切所尊敬我等未來得證道時為一切衆之所尊敬坐於道場時說壽亦如是坐於道場說壽量時亦如今日釋迦世尊若有深心者清淨而質直若有深心清淨無染而心質直多聞能總持隨義解佛語聞見廣博能總憶持隨經意義善解佛語如是諸人等於此無有疑如是人等則於此經深心信解無有疑惑又阿逸多若有聞佛壽命長遠解其言趣善能解了語言義趣是人所得功德無有限量功益深也能起如來無上之慧經所明者佛之知見信解則發無上智慧何況廣聞是經前文但云乃至一念信解功德如是況復廣聞功益轉勝不言可知若教人聞若教訓人令其得聞若自持自身受持若教人持若或教化令他受持若自書親手自書若教人書若教他人書寫是經若以華香瓔珞幢幡繒蓋香油蘇燈供養經卷華香表德瓔珞等具用嚴法身然燈續明表智光也不離事供用顯真常是人功德無量無邊能生一切種智因心起行因行入道能生如來一切種智阿逸多若善男子善女人聞我說壽命長遠聞世尊說佛壽長遠深心信解以清淨心深生信解則為見佛常在耆闍崛山經者即是如來法身信解是經則是見佛常在靈山不曾隱沒共大菩薩諸聲聞衆圍繞說法此經具載諸大菩薩及聲聞衆深心信解如從佛口親聞無異則見大衆一時圍繞又見此娑婆世界其地琉璃坦然平正經談實相其體瑩潔故如琉璃心無異念所以坦然絶無艱險故曰平正閻浮檀金以界八道堅固正法名曰金繩閻浮檀河所産之金其色最上以金為繩分八正道令知齊限見八正時名見法體寶樹行列寶樹即是菩提願王次第分布名為行列諸臺樓觀皆悉寶成臺觀等相即喻道品次第層級嚴顯可觀皆善所積名曰寶成其菩薩衆咸處其中諸大菩薩皆修道品是故大衆咸處其中若有能如是觀者若有人能如是諦觀當知是為深信解相此是得見實報莊嚴所以名為深信解相又復如來滅後於佛滅後濁世之時若聞是經而不毀訾起隨喜心聞經不毀又能起於隨喜之心當知已為深信解相此等亦名深信之相何況讀誦受持之者何況有能讀誦受持斯人則為頂戴如來經顯佛智如來法體頂受是法名戴如來阿逸多是善男子善女人不須為我復起塔寺有是經處則為是塔所以不須更造塔也及作僧坊以四事供養衆僧念念善心不可計算心與法合其心不二名之為僧深心謹奉是真供養所以不須更造僧坊及辦四事供養僧也所以者何是善男子善女人受持讀誦是經典者若善男女讀持此經為已起塔是已起造佛之寶塔造立僧坊供養衆僧既開顯已菩薩聲聞同一實道根無大小皆住其中即是僧坊念念修敬即是供僧則為以佛舍利起七寶塔經是法身名佛舍利依經起行修七善法是以七寶建舍利塔高廣漸小至于梵天竪窮三際名之為高橫遍十方名之為廣轉廣轉高愈精愈妙名為漸小極本天真清淨妙理名至梵天懸諸幡蓋及衆寶鈴鼓舞名幡覆庇名蓋無情說法名曰寶鈴華香瓔珞抹香塗香燒香華即善心香即善德瓔珞妙嚴即忍辱衣末香即細行塗香嚴身莊令妙好燒香熏炙轉惡為善衆鼓伎樂簫笛箜篌晝夜常作和樂之樂身即樂器言即樂音令諸聞者悅耳清心種種戲舞以四攝法鼓舞一切猶如戲處以誘於人以妙音聲歌唄讚頌以佛之心誦佛之言名妙音聲歌詠梵唄讚佛法身名為頌德則為已於無量千萬億劫作是供養已過去久遠塵劫中事悉於此經宣示顯說誦經一遍即是廣遊諸佛剎土經於無量千萬億劫作供養已阿逸多若我滅後聞是經典滅後得聞是法華經有能受持若自書若教人書自作教人其功一等則為起立僧坊則是書持便為起寺以赤栴檀即赤骨也作諸殿堂即身體也三十有二即身相也高八多羅樹堂堂八尺即身量也若就事相一多羅樹是長七尺總五丈餘高廣嚴好一身之中包含造化竪高橫廣等於虗空相好莊嚴無不具足百千比丘於其中止覺性名佛軌則名法佛法不二和合名僧百千正念聚在一身名為中止園林浴池園林即是七覺支林戒名為池群聖所浴經行禪窟終日履踐名曰經行動而常靜名為禪窟衣服飲食柔和忍辱名為衣服禪悅法喜名為飲食床褥湯藥法空之座名為床褥療治心病名為湯藥一切樂具充滿其中衆寶音樂悅目快心諸餘樂事悉滿其中如是僧坊堂閣若干百千萬億其數無量三十七品重重森布名為樓閣一念一行是一去處名曰若干以此現前供養於我如經所說依之起行隨順佛語名供養佛及比丘僧三業如法住於善念名為供僧是故我說如來滅後所以佛說滅度之後若有受持讀誦為他人說持讀經典是自利行為人解說即利他也若自書若教人書自書教人傳寫經典有益見聞所以功大供養經卷華香幡蓋種種供養由敬法故則能見佛不須復起塔寺及造僧坊供養衆僧一心在道率身行之即法供養不在事緣況復有人能持是經兼行布施持戒忍辱精進一心智慧況能持經兼行六度一心即定慧即般若其德最勝無量無邊內修理觀外以事助所獲功德不可計量譬如虗空東西南北四維上下無量無邊虗空廣大不可度量無有終始莫知邊際是人功德亦復如是無量無邊與虗空等疾至一切種智修理觀故成一切智修事行故名道種智理事如如是故速得一切種智若人讀誦受持是經為他人說若自書若教人書前但持經今為人說及以書寫復能起塔及造僧坊又復善能起塔造寺供養讚歎聲聞衆僧供養衆僧讚歎其經亦以百千萬億讚歎之法讚歎菩薩功德菩薩即是大乘僧也等是讚歎要須合法讚所當讚能生功德苟非其人而輒讚歎尚不免罪何況得福又為他人種種因緣隨義解說此法華經以諸因緣隨其義理為他衆生解說是經布施行也復能清淨持戒戒聖行也與柔和者而共同止忍辱無瞋忍辱行也志念堅固常貴坐禪得諸深定志願堅固常重修禪得諸菩薩深妙之定禪定行也精進勇猛攝諸善法常勤精進勇捍多力以諸善法修攝其心精進行也利根智慧善答問難以利根故智慧高明隨有所問答今歡喜信伏隨從名曰善答般若行也阿逸多若我滅後諸善男子善女人受持讀誦是經典者若善男女滅後弘經復有如是諸善功德謂弘經外又行六度修習如上諸善功德當知是人已趣道場當知如是弘經修福菩薩行人已向道場近阿耨多羅三藐三菩提去佛不遠得近菩提坐道樹下一切時中心常在道不曾動移名之為坐菩薩所發大菩提心名為道樹阿逸多是善男子善女人若坐若立若經行處是人平昔遊處之地此中便應起塔有是經處即為有佛故應起塔一切天人皆應供養如佛之塔敬持說者則是敬法其敬法者則知有佛以信佛故即脫生死故令敬人如佛之塔爾時世尊欲重宣此義而說偈言若我滅度後能奉持此經於佛滅後能持是經斯人福無量如上之所說已近道場當坐道樹是則為具足一切諸供養供佛法僧一切具足以舍利起塔七寶而莊嚴持經即是起舍利塔七支修善名寶莊嚴表剎甚高廣漸小至梵天發心修行如同起塔漸進漸高背向細名為漸小至涅槃樂名為梵天寶鈴千萬億風動出妙音以妙音聲演說諸法如撼寶鈴念起之時名為風動唇舌發響名出妙音又於無量劫而供養此塔一念之中敬古佛經名無量劫供養法塔華香諸瓔珞天衣衆妓樂華是善因香是信心瓔珞即具智慧明珠衣即忍辱伎樂即是法喜之樂然香油蘇燈周匝常照明油是智水燈是慧光遍照無遺名為周匝惡世末法時能持是經者滅後惡世末法之時則為已如上具足諸供養能持是經則是如上具諸供養若能持此經則如佛現在此經在世與佛無殊以牛頭旃檀起僧坊供養以身荷法攝持正念名旃檀木起寺供僧堂有三十二高八多羅樹現身佛堂具三十二大人相好高長八尺圓滿端直如多羅樹上饌妙衣服床臥皆具足法喜之食名為上饌忍辱之衣名為妙服法空為座行住坐臥常在其中百千衆住處六度萬行是諸菩薩所住之處園林諸浴池經行及禪窟坐七覺林澡八德池經行正道坐寂滅床種種皆嚴好種種受用悉皆嚴好若有信解心受持讀誦書有信解心讀誦書持若復教人書及供養經卷教人書寫及供經卷散華香抹香此以色香供養法寶以須曼薝蔔須曼那此云稱意其華黃白而香極美薝蔔此云金色華細而香阿提目多伽即胡麻也華赤葉青子可作油薰油常然之薰香草也子可作油謂以香油然燈供養如是供養者得無量功德如是供經得福無量如虗空無邊其福亦如是如大虗空無有邊際是供經人福亦如是況復持此經兼布施持戒忍辱樂禪定但能持經福已無量況復兼修六度之行不瞋不惡口心不瞋怒口無惡言恭敬於塔廟見塔廟時起恭敬心謙下諸比丘遠離自高心見比丘時謙恭下禮遠離自大高傲之心常思惟智慧有問難不瞋隨順為解說心常思惟甚深智慧有來難問不起瞋心隨順其意而為解說若能行是行功德不可量若能行此如法之行福不可量若見此法師成就如是德若見此等弘經之師成就如上諸善功德應以天華散天衣覆其身應以天上寶華散之諸天寶衣以覆其身頭面接足禮生心如佛想頭面接足歸命頂禮生恭敬心如固佛想又應作是念不久詣道場又當心地作是念言此人不久行詣道場坐寶樹下得無漏無為廣利諸天人當得無漏無為之果廣博利益一切人天其所住止處經行若坐臥乃至說一偈其弘法師行住坐臥乃至說經一偈之處是中應起塔莊嚴令妙好種種以供養是處所中應當起塔莊嚴光飾極令妙好以種種供而供法塔佛子住此地則是佛受用後世佛子住此心地是人則得佛之受用常在於其中經行若坐臥行住坐臥身四威儀不離道場於中履踐妙法蓮華經隨喜功德品第十八彌勒菩薩於前品中聞世尊說受持讀誦解說書寫是法華經功德無量勝於造塔起寺供僧又聞若能兼行六度及以正修功德尤勝故問如來有初機人若聞是經但能隨喜是人為復得幾許福爾時彌勒菩薩摩訶薩白佛言彌勒既為唱導之師於所當問故白佛言世尊若有善男子善女人聞是法華經有善男女聞是妙經隨喜者於法生信起隨喜心得幾所福若得之福為有幾許而說偈言先述意已復以偈問世尊滅度後於佛世尊滅度之後其有聞是經其有聞是妙法華經若能隨喜者若能一念隨喜心者為得幾所福是人為得幾許福報爾時佛告彌勒菩薩摩訶薩此二句文是阿難敘阿逸多如來滅後若比丘比丘尼出家僧尼受大戒者優婆塞優婆夷在家士女受持五戒及八戒者及餘智者除四種外餘不受戒有智解者若長若幼入道之要悟解為先無論長幼聞是經隨喜已得聞是經起隨喜已從法會出出於法會至於餘處到餘處所若在僧坊僧寺之中若空間地寂靜之處若城邑巷陌若在城邑巷陌之中聚落田里人民聚會坐落之處田園地里如其所聞如其法會之所得聞為父母宗親生身父母宗族親戚善友知識樂善之友平時知識隨力演說隨己智力為人演說是諸人等聞已隨喜諸人聞已亦皆隨喜復行轉教又復如聞展轉相教餘人聞已亦隨喜轉教餘聞說者復隨力轉教他人如是展轉至第五十如是展布次第轉教人傳一人至第五十阿逸多其第五十善男子善女人隨喜功德正取末後第五十人但聞隨喜未能轉教我今說之汝當善聽佛欲顯示最末後人隨喜功德語彌勒知若四百萬億阿僧祇世界假設為喻六趣四生衆生卵生胎生濕生化生六趣者天人修羅地獄餓鬼畜生如此六者隨其所作各趣一路四生者卵生胎生此二易解因於蒸濕而正性命名曰濕生如蟲蟻等轉蛻飛行名為化生若有形六道之中除無色界餘皆有形色也無形即無色界但有四陰受想行識有想除癡輪回及無想天餘皆有想無想如無想天入定之時心想不行世間癡物顛倒見故精神化為土木金石名為無想非有想世間相罔回互亂想如螉等異質相成螟蛉本無蜾螺之想名非有想非無想如土梟等附塊為兒由殺顛倒附無情物而為有想子成之日反害父母名非無想無足如蛇蚓等全無足者二足一切情類有二足者四足如諸畜生有四足者多足其類不等通收一切足多之者如是等在衆生數者在前六道十類衆生數中之者有人求福有人欲得求於福報隨其所欲娛樂之具皆給與之隨其所樂悉給與之一一衆生與滿閻浮提即滿此方南贍部洲金銀琉璃硨磲碼瑙珊瑚琥珀此七寶義如方便品諸妙珍寶珍玩之具及象馬車乘所乘之器七寶所成宮殿樓閣等所住之處是大施主如是布施滿八十年已八十年者謂依有漏八識行施而作是念我已施衆生娛樂之具隨意所欲隨其心意之所樂欲一一與之然此衆生皆已衰老謂受施者皆已衰老年過八十髮白面皺將死不久衰相現前死時將至我當以佛法而訓導之作念更以佛法訓化即集此衆生所施之衆宣布法化示教利喜宣演敷布以法教化利益令喜一時皆得須陀洹道此云預流初登道果預流初登道果預聖人流斯陀含道此云一來證二果已更來欲界一反受生酬還宿債阿那含道此云不來證三果已住於四禪更不復來欲界受生阿羅漢道此云無學斷見思惑證入四果梵行已圓無法可學盡諸有漏盡諸世間三界有為一切漏業於深禪定皆得自在於無學位諸禪定樂善入無礙名為自在具八解脫即八背捨背粗向細捨惡從善名八解脫於汝意云何於汝之意以為如何是大施主所得功德寧為多不不者不定之辭所得福利為多不多彌勒白佛言因世尊問彌勒答之世尊是人功德甚多無量無邊言福多也若是施主但施衆生一切樂具功德無量出福多意但施樂具福已無邊何況令得阿羅漢果況以法化令得無學如是功德不可計量佛告彌勒我今分明語汝欲顯露說故曰分明是人以一切樂具施於四百萬億阿僧祇世界四百萬億即喻四生一一衆生各各自有一種世界六趣衆生德施此等又令得阿羅漢果又令證入四果羅漢所得功德如上所行財法二施所得功德不如是第五十人聞法華經一偈隨喜功德如是布施所獲功德百分千分百千萬億分不及其一次第減少至於億分之中亦不及一乃至算數譬喻所不能知言隨喜者功德勝也阿逸多如是第五十人展轉聞法華經次第傳聞隨喜功德尚無量無邊阿僧祇言功德多無限數也何況最初於會中聞而隨喜者最初一人於法會聞展轉傳至第五十人其福復勝無量無邊阿僧祇不可得比舉最後人所得功德以後望前初人倍增故云復勝不可得比又阿逸多若人為是經故為欲聞是法華經故往詣僧坊若坐若立須臾聽受至僧寺之或坐或立須臾之間至心聽受緣是功德緣是至誠聽經功德轉身所生捨報轉得所生之處得好上妙象馬車乘珍寶輦輿及乘天宮象馬妙車富貴者用珍寶輦輿王者之器諸天行時則有宮殿以乘其身若復有人於講法處坐身預法莚更有人來勸令坐聽勸來者同聽法音若分座令坐若無坐處分座與之是人功德是勸化所獲功德轉身得帝釋坐處捨此身已轉生天上得忉利主所坐之處若梵天王坐處轉身得生色界初禪坐梵王處若轉輪聖王所坐之處金銀銅鐵四轉輪王王四天下所坐之處阿逸多若復有人語餘人言若有法師說法之處語他令知有經名法華可共往聽歎同往聽即受其教乃至須臾間聞前人聞得受教同往乃至霎時得聞說法是人功德是勸聽人所獲功德轉身得與陀羅尼菩薩共生一處陀羅尼菩薩即獲總持開法大士與是同生彰報勝也利根智慧根勝聰利智慧明了百千萬世終不瘖啞為人瘖啞謗毀人故以善勸化教示於人世世無有瘖啞之疾口氣不臭由念發氣由氣發聲口氣善故所以不臭舌常無病毀謗他者舌則卷縮今因讚善所以無病口亦無病妄言綺語兩舌惡口是大惡業真實教人離此四過口則無病齒不垢黑出語不善齒則垢黑教人以善齒則潔白不黃不疏好談鄙事齒所以黃非實相也疏因虗妄實則齊密亦不缺落說不正語誑惑於人齒則缺落不差不曲語不次第齒則參差語不質直齒則屈曲今此讚經勸人聰受口無諸過故皆美好唇不下垂唇下垂者如吹火狀由善語故不下垂也亦不褰縮唇褰縮者夭亡之相今以經力不褰縮也不粗澀唇粗則語澀唇好則則利不瘡疹不生瘡疹是善語報亦不缺壞唇吻不善所以缺壞善則無矣亦不喎邪語不正者唇則喎斜今正直語唇則端正不厚不大若厚若大不稱其形無過不及則得其中亦不黧黑語脉惡者唇則黧黑以善訓人唇色赤好無諸可惡無有一切可惡見相鼻不匾𠥶鼻是氣息出入之門因樂善故準隆鼻好故不匾𠥶亦不曲戾其心不正鼻則邪曲今以善報鼻則圓直面色不黑為善之人面貌潔白故不醜黑亦不狹長以刀照面則見狹長心藏劒棘面則如然今心方正面則端嚴亦不窊曲心不平正面則窊曲由心坦夷面亦平滿無有一切不可喜相面貌圓滿無不美者唇舌牙齒悉皆嚴好鼻修高直面貌圓滿色色與前一倍相反鼻欲修長山振不陷餘義易解眉高而長眉低者鈍眉短者促眉高則貴眉長則俊額廣平正額狹者賤額側者偏額廣則貴額平則安額正則直人相具足人倫之相悉皆具足世世所生世世受報生之處見佛聞法信受教誨由今善因獲未來報故得見佛及以聞法信聽領受佛之教誨阿逸多汝且觀是汝且觀是心不可得樂善之人勸於一人令往聽法功德如此但勸一人功德若此何況一心聽說讀誦何況始終一心念道聽法師說受持讀誦而於大衆為人分別於大衆中分別解說是利他也如說修行如經所說以修其心前人如此順教奉行勸者得益何可校量爾時世尊欲重宣此義而說偈言若人於法會得聞是經典預會聞經乃至於一偈隨喜為他說下至解得一句之義心中隨喜為人解說如是展轉教至於第五十始自一人轉至五十最後人獲福今當分別之約第五十舉末比初如有大施主供給無量衆具滿八十歲隨意之所欲給無量衆其事大也滿八十歲其時長也隨其所欲皆施之其功多也見彼衰老相髮白而面皺齒疏形枯竭念其死不久見彼前人年衰髮白面皺形枯开齒疏脫處世非久死時將至我今應當教令得於道果思以法訓令修得道即為方便說涅槃真實法尋即方便為說寂滅出世實法世皆不牢固如水沫泡焰一切世間皆非堅固譬如聚沫水泡陽𦦨汝等咸應當疾生厭離心世相如是應疾遠離諸人聞是法皆得阿羅漢諸人聞法如說修行皆得四果具足六神通三明八解脫天眼天耳他心宿命神境漏盡六皆無擁名之為通天眼知未來宿命知過去漏盡脫生死故曰三明四禪四定發智斷惑名八解脫最後第五十聞一偈隨喜是人福勝彼不可為譬喻聞經一偈隨喜功德勝教衆多證四果者如是展轉聞其福尚無量何況於法會初聞隨喜者舉末後人以比最初隨喜教他功曷勝紀若有勸一人將引聽法華言此經深妙千萬劫難遇有勸一人引聽法華為說是經深妙難遇即受教往聽乃至須臾聞斯人之福報今當分別說前人受教往得略聞如此福報當分別說世世無口患齒不疏黃黑唇不厚褰缺無有可惡相如前已解舌不乾黑短鼻高修且直額廣而平正面目悉端嚴如前已解為人所喜見口氣無臭穢由不可得為人喜見以口善故無有穢氣優鉢華之香常從其口出口中常作青蓮華香若故詣僧坊欲聽法華經須臾聞歡喜今當說其福詣寺聽經略聞歡喜今說其福後生天人中得妙象馬車珍寶之輦輿及乘天宮殿後生人中得象馬輿若生天上得乘天宮若於講法處勸人坐聽經是福因緣得釋梵轉輪座勸人坐聽其福所感帝釋梵王及轉輪王所坐之處何況一心聽解說其義趣如說而修行其福不可限定心靜聽解說義理如經所說依而行之其所得福不可限量妙法蓮華經法師功德品第十九法師有五一受持二讀三誦四解說五書寫前隨喜品略聞是經乃至為他說一偈義功德甚多不可限量若人受持讀誦解說及以書寫緣既殊勝所感必多故次當說法師功德爾時佛告常精進菩薩摩訶薩功德之成由於精進故寄斯人以告大衆若善男子善女人受持是法華經憶持在心若讀若誦若解說若書寫作上五事是人當得八百眼功德以眼觀時百事但見對於四方約三世論三四十二名千二百前方全見則具三百後方不明缺了三百左右兩邊但得二分之餘又缺一百正得八百之數可論功德千二百耳功德以耳聽時百耳俱聞三世四方無不了了則具千二百功德八百鼻功德以鼻嗅時百種俱聞三世四方唯出入息各具四百共成八百功德以息論之不無出入所缺四百千二百舌功德以舌嘗時百事俱別三世四方無不了了則具千二百功德八百身功德以身觸時百事都覺三世四方合則能有違順二緣各具四百共成八百功德離時不覺故缺四百千二百意功德以意思時百種俱可三世四方悉能含攝則具千二百功德以是功德莊嚴六根皆令清淨凡人之身六根具者皆有六千功能德用但以善惡而分異耳隨有染著名為濁穢無善功德令持經者於六塵境悉能遠離故獲六千清淨功德以為莊嚴是善男子善女人父母所生清淨肉眼眼有五種所謂肉眼慧眼天眼法眼佛眼約眼無異隨用分五偈云天眼通非礙肉眼礙非通法眼唯觀俗慧眼了知空佛眼如千日照異體還同經云父母所生則肉眼也又云清淨則是四大清淨造色勝義根眼非浮塵根肉團眼也見於三千大千世界能見娑婆一化之境內外所有山林河海內外即指依正兩報內身如山毛髮為林血脉如河腹臟為海外相四義不言可知由持經力眼根清淨故得見之下至阿鼻地獄上至有頂阿鼻此云無間獄囚受苦無間歇故非非想天名為有頂是於三界有漏世間極頂之故經舉上下遍攝中間無不徹見亦見其中一切衆生上云地獄天宮即依報也今云一切衆生即正報也及業因緣果報生處及見善惡二因善惡二緣善惡果報所生之處悉見悉知見是心眼知是心慧由持經故悉能見知善惡二種業緣果報爾時世尊欲重宣此義而說偈言若於大衆中以無所畏心說是法華經汝聽其功德若復有人於大衆中以解法智無所畏心為衆演經汝今諦聽說其功德是人得八百功德殊勝眼以是莊嚴故其目甚清淨以是功德莊嚴之故得殊勝眼甚是清淨父母所生眼悉見三千界肉眼本是只見目前今由經力見三千界內外彌樓山內外者即是依正彌樓者此云光明即七金山也須彌及鐵圍須彌此云妙高出水八萬四千由旬鐵圍即大千界外鐵圍山也并諸餘山林大海江河水如經開解總在目前下至阿鼻獄上至有頂天下見地獄上見天宮橫見一切無不明了其中諸衆生一切皆悉見大千界內所有衆生由經力故皆悉得見雖不動身遍遊法界雖未得天眼肉眼力如是天眼名同所證各異聲聞天眼見大千界初地菩薩見百佛界二地已去倍倍增多佛之天眼十方虗空微塵剎土無不了了今持經者雖是凡夫由經之故肉眼之力所見如是復次常精進若善男子善女人受持此經若讀若誦若解說若書寫即五種法師也得千二百耳功德義如前解以是清淨耳清淨之義亦如前說聞三千大千世界下至阿鼻地獄上至有頂其中內外云其中者指大千界種種所有語言音聲象聲馬聲牛聲車聲啼哭聲愁歎聲螺聲鼓聲鍾聲鈴聲笑聲語聲男聲女聲童子聲童女聲法聲非法聲苦聲樂聲凡夫聲聖人聲喜聲不喜聲天聲龍聲夜叉聲乾闥婆聲阿修羅聲迦樓羅聲緊那羅聲摩睺羅伽聲火聲水聲風聲地獄聲畜生聲餓鬼聲比丘聲比丘尼聲聲聞聲辟支佛聲菩薩聲佛聲以要言之三千大千世界中一切內外所有諸聲如偈所列雖未得天耳體是凡夫未得天耳以肉耳聞具清淨用以父母所生清淨常耳皆悉聞知言常耳者指勝義根非是生滅無常肉質如是分別種種音聲而不壞耳根聞而起著則耳根壞分別無礙不壞耳根爾時世尊欲重宣此義而說偈言父母所生耳清淨無濁穢雖是肉耳清淨明了無所染著以此常耳聞三千世界聲此句總標象馬車牛聲鍾鈴螺鼓聲琴瑟箜篌聲簫笛之音聲清淨好歌聲聽之而不著象馬牛及好歌聲內報聲也鐘鈴螺鼓箜篌簫笛外報聲也雖聞無著不壞清耳無數種人聲聞悉能解了以智識明善解人意聞其語音即知其德又聞諸天聲微妙之歌音十善五戒得生欲天四禪四定生色無色解此義者是聞天聲生天上者受天五欲歌樂等事解此義者是則名為聞天歌樂及聞男女聲童子童女聲男女聲者夫婦之聲童男女者天真之聲山川險谷中迦陵頻伽聲山川險谷幽靜處也迦陵是仙禽美妙聲也靜處聞妙名得是聲命命等諸鳥悉聞其音聲命命鳥者亦云共命一身二頭曰共命鳥若表法者聞經善解事理不二同一圓常獲此慧命名為聞也地獄衆苦痛種種楚毒聲瞋心之故墮地獄中刀山劒樹鐵磨火坑灰河沸屎其數無量痛毒辛酸不可堪忍因聞如是發菩提心是真聞也餓鬼飢渴逼求索飲食聲貪心之故墮餓鬼中一切時中不聞漿飲飢火燒身哀聲動地聞如是者名聞鬼聲諸阿修羅等居在大海邊自共言語時出于大音聲孚強好勝吞併為心名曰修羅住於有漏生死海邊貪瞋勍敵癡愛交煎兩強相遇戰鬪之時自共言語發大音聲如是說法者安住於此間遙聞是衆聲而不壞耳根說法之人住於清淨慈忍之地名為此間遠聞四惡不善之聲益堅正念寧壞耳根十方世界中禽獸鳴相呼惡友相親狎習造惡如惡禽獸共相呼喚善人相愛同修衆善如飛走者美意相呼其說法之人於此悉聞之說法之人即以此驗善惡音聲如其所聞無不決了其諸梵天上光音及遍淨乃至有頂天言語之音聲色界四禪總名梵天光音即二禪遍淨即三禪有頂即四空在有為頂離欲修禪生於色界十八梵天修空寂定厭色趣空即生無色四空天處聞此音者名聞諸天言語音聲法師住於此悉皆得聞之說法之師住於此地色無色義悉得聞之一切比丘衆及諸比丘尼若讀誦經典若為他人說出家之衆若讀誦經有持經德若為人說有說法才見禮知政聞樂知德一見便了不俟再聞法師住於此悉皆得聞之說法之師此智明了遐邇之事無不聞之復有諸菩薩讀誦於經法若為他人說撰集解其義言菩薩者不以形分但發大心利益一切四衆皆得名為菩薩若讀誦經若為人說撰集疏鈔解釋其義如是諸音聲悉皆得聞之隨其所作菩薩之行進修六度如是等聲法師悉得於此聞之諸佛大聖尊教化衆生者於諸大會中演說微妙法一切諸佛大聖世尊愍念教化諸衆生者於諸大會說微妙法示生唱滅權實二門一切智慧悉載此經持此法華者悉皆得聞之但持法華諸佛之事無不得聞三千大千界內外諸音聲下至阿鼻獄上至有頂天大千世界內外兩報善及不善一切音聲下至阿鼻上窮有頂皆聞其音聲而不壞耳根雖聞種種善惡之聲以無染故不壞耳根其耳聰利故悉能分別知由持經故耳根聰利悉能如上善分別知持是法華者雖未得天耳得天耳者方能遙聞今在九地由持經力但用所生耳功德已如是但用父母所生之體清淨耳根已能遍聞功德如是復次常精進若善男子善女人受持是經若讀若誦若解說若書寫成就八百鼻功德並如前解以是清淨鼻根即勝義根聞於三千大千世界上下內外種種諸香大千世界上至有頂下極阿鼻諸香即指內外二報內則男女身香外則草木等香須曼那華香此云稱意草色黃白而香極美闍提華香此云金錢華末利華香此方有者瞻蔔華香此云黃華亦云金色波羅羅華香此云重生華赤蓮華香青蓮華香白蓮華香華樹香華開時香果樹香果熟時香旃檀香出海此岸牛頭山中沉水香香體重故見水則沉多摩羅跋香此云性無垢或云藿香多伽羅香此云根香木香樹也及千萬種和香以千萬種雜和為香若抹若丸細末香及圓子香也若塗香塗於身上及塗地香持是經者於此間住悉能分別如散一心而為萬善即末香也如合萬善而嚴一身即丸香也莊嚴內報即塗身香也莊嚴依報即塗地香也無善不修以成其德即千萬種和香如是分別無有錯謬名悉能也又復別知衆生之香即身中氣名之為香象香馬香牛羊等香知其氣象名為聞香男香女香童子香童女香男女即夫婦之氣童男女即赤子之氣象及草木叢林香華有香氣人則愛之人有善德世則敬之若近若遠所有諸香悉皆得聞分別不錯近則世報六凡之香超出三界又次遠也脫離二死究竟涅槃名極遠也持是經者雖住於此是持經者雖住此地亦聞天上諸天之香諸天界中受用之香波利質多羅即帝釋園天樹王也香無周遍五十由旬拘陀羅樹香此云大遊戲即樹香也及曼陀羅華香小白華香摩訶曼陀羅華香大白華香曼殊沙華香小赤華香摩訶曼殊沙華香大赤華香旃檀沉水種種末香諸雜華香諸天所修萬善之行其類不一名雜華香如是等天香和合所出之香無不聞知和合萬善報得天身名為和合所出之香又聞諸天身香各各諸天身分之香釋提桓因此云天帝即帝釋也在勝殿上五欲娛樂嬉戲時香報為天主處天宮殿受天五欲娛樂時香即十善報也若在妙法堂上為忉利諸天說法時香帝釋天主於善法堂為諸天衆說妙法即十善法若於諸園遊戲時香以五通力分身遊戲諸天宮殿受諸快樂及餘天等男女身香男尚陽剛女好陰靜修男因者則為天男修女因者則為天女皆悉遙聞如上香等悉能聞知此句總結住此聞彼故曰遙聞如是展轉乃至梵天從忉利天展轉上去至于梵天上至有頂又從梵天至無色界諸天身香亦皆聞之一切天衆所感身報道德之香亦皆得聞且無色界既無色身云何有香但無身色非無空界定果之香并聞諸天所燒之香諸天若修次第升上譬如燒香熏以成德及聲聞香四諦道香辟支佛香十二緣香菩薩香六度萬行功德妙香諸佛身香究竟解脫菩提果香亦皆遙聞知其所在今在人中望於諸天及四聖位故曰遙聞達其因果名識所在雖聞此香然於鼻根不壞不錯雖聞天香所受之樂聞而不著是故不壞清淨鼻根悉能別了所知見相是故不錯若欲分別為他人說憶念不謬上是自聞若欲以此鼻根所得為他說時憶念分明無有錯謬爾時世尊欲重宣此義而說偈言是人鼻清淨於此世界中若香若臭物種種悉聞知以香比善以臭比惡須曼那闍提多摩羅旃檀沉水及桂香種種華果香種種因華種種報果及知衆生香男子女人香有情果報身分之香說法者遠住聞香知所在說法之人遠離世情住於正念名為遠住而悉聞知衆生所在大勢轉轉王四輪王也小轉輪及子粟散小王及諸王子群臣諸宮人群臣百官及宮中人聞香知所在聞諸香時知其落處修如是因獲如是果身所著珍寶及地中寶藏轉輪王寶女聞香知所在身著寶衣忍辱福也地中寶藏衆生心地如來藏也輪王寶女即寶媛也輪王七寶中有寶女欲愛心也是人聞香悉知來處諸人嚴身具衣服及瓔珞種種所塗香聞則知其身善惡二相皆名莊嚴從其善者則獲善報衣服禮也瓔珞智也塗香淨身也聞是香氣知其本身諸天若行坐遊戲及神變持是法華者聞香悉能知行即運用坐即沉靜遍歷一切名為遊戲因修事定獲五神通持經聞香悉知所自諸樹華果實及蘇油香氣持經者住此悉知其所在如是等事經中具明持經解義知其所因諸山深嶮處旃檀樹華敷衆生在中者聞香悉能知樂道之者窮處深山如旃檀香生於幽谷聞悉能知鐵圍山大海地中諸衆生持經者聞香悉知其所在外則由圍大海下方地中有衆生居內則皮囊褁身藏諸氣血有於識神依色身住善持經者悉得其源阿修羅男女及其諸眷屬鬪諍遊戲時聞香皆能知修羅即是強狼之心男女即是動靜二念一念起處衆念相從本念為主餘名眷屬善名諸天惡名修羅善惡相敵名為鬪戰以此為樂名為遊戲曠野嶮隘處師子象虎狼野牛水牛等聞香知所在生死曠野險難狹隘難度之處師子虎狼殘害心也野牛水牛但念水草頑鈍心也聞經悉知若有懷妊者未辨其男女無根及非人聞香悉能知有人懷意造作諸事未辨好惡動靜之相或無根性心疑不決及非人者如懷鬼胎持經解義善惡無謬即能決了以聞香力故知其初懷妊成就不成就安樂産福子以聞香力故知其初時所發之念進則成就退則不成惡則險危善則安樂善念善種則生福子以聞香力故知男女所念染欲癡恚心亦知修善者前說有胎此明生已男女即是動靜二心男陽女陰陽動陰靜觀其所為即知其念染欲即貪恚癡即瞋癡有三毒者則非修善無此三毒者是修行人地中衆伏藏金銀諸珍寶銅器之所盛聞香悉能知衆生心中具有如來功德藏性迷故不覺名為伏藏其中所有金銀珍寶即是六度功德智慧無漏淨心名為銅器由聞法華知此伏藏種種諸瓔珞無能識其價聞香知貴賤出處及所在五乘三乘及以一乘種種智慧各各不同如衆寶珠結為瓔珞無智解者孰能知之是不識價持經解義一一分別人天十善聲聞四諦緣覺因緣菩薩六度佛展妙覺拈起便知貴賤差等出處不同得其所在天上諸華等曼陀曼殊華波利質多樹聞香悉能知並如前解天上諸宮殿上中下差別衆寶華莊嚴聞香悉能知等是諸天修因不等因有高下果位亦殊寶華即是因所修行攬因成果故曰莊嚴天園林勝殿諸觀妙法堂在中而娛樂聞香悉能知禪支為林身為宮殿面門說法名為法堂依止其中而自娛樂是人聞香悉能知之諸天若聽法或受五欲時來往行坐臥聞香悉能知諸天之衆若聽法音則不退墮名之為行若受五欲福盡即墜名之為來人間修善得生天上名之為往靜心住善不進不退名之為坐放心棄善名之為臥天女所著衣好華香莊嚴周旋遊戲時聞香悉能知人中修善得生欲天以著色故而受女身華香及衣即有漏善受用善報名為遊戲如是展轉上乃至於梵天入禪出禪者聞香悉能知自從欲界至於梵世名為轉上攝念向定名之為入從禪定起名之為出光音遍淨天乃至于有頂初生及退沒聞香悉能知二禪光音三禪遍淨跨過四禪及空識處便說有頂故云乃至初生天上及退墮者聞香悉知諸比丘衆等於法常精進若坐若經行及讀誦經典出家衆等於是法中常行精進若靜坐若經行及讀誦經能如是者皆是宿緣以果驗因知其來處若現種善根以因驗果知後生處必勝今生或在林樹下專精而坐禪持經者聞香悉知其所在或處空間林樹之下專一其心精進禪定知其所住樂於空靜寂滅樂也菩薩志堅固坐禪若讀誦或為人說法聞香悉能知若菩薩人志願堅固坐禪辦道若讀誦經若於大衆為人講說聞此香時知是道心大菩薩也在在方世尊一切所恭敬愍衆而說法聞香悉能知在在之處諸佛世尊一切衆生之所尊敬愍衆生故而為說法聞此經中說於三世十方諸佛功德妙香因持經故悉能知之衆生在佛前聞經皆歡喜如法而修行聞香悉能知此經中說十方衆生在於佛前聞法歡喜如法修行因聞是經知十方事雖未得菩薩無漏法生鼻而是持經者先得此鼻相從無漏法生於菩薩清淨鼻者即地上聖人今持經人體是凡夫藉經力故有此功用復次常精進若善男子善女人受持是經若讀若誦若解說若書寫得千二百舌功德舌能圓談故有是德若好若醜若美若不美鮮好醜惡甘美惡味及諸苦澀物味苦與澀不中食者在其舌根皆變成上味持經之人一心在道而於世味無所揀擇苦澀翻成真美味也如天甘露無不美者天甘露者乃是諸天不死之藥入此法門如飲甘露無不美者若以舌根於大衆中有所演說舌根於衆演說之時出深妙聲能入其心皆令歡喜快樂所談之理徹法源底名之為深能令聞者達佛見知名之為妙法味入神皆歡樂也又諸天子天女釋梵諸天前說人喜此明諸天聞是深妙音聲有所演說言論次第皆悉來聽演法之時言語義論說釋條流而有次序故得諸天皆來聽受及諸龍龍女夜叉夜叉女乾闥婆乾闥婆女阿修羅阿修羅女迦樓羅迦樓羅女緊那羅緊那羅女摩睺羅伽摩睺羅伽女即八部衆解釋名義如序品中是中不言八部男者當位即是為聽法故皆來親近恭敬供養由所說法深妙次第故來近聽起供養心及比丘比丘尼優婆塞優婆夷佛會四衆國王王子群臣眷屬王與王子百官群臣及王眷屬小轉輪王於諸衆生轉輪界中而為王者名轉輪王粟散王衆名小轉輪大轉輪王鐵輪王者王一天下除東西北銅輪王者王二天下除却東北銀輪王者王三天下唯除北洲金輪王者王四天下七寶千子七寶者位寶輪寶智寶女寶兵寶象寶馬寶千子者有子千人也內外眷屬內則父母兄弟后妃婇女外則宗族群臣人民等衆乘其宮殿俱來聽法所乘宮殿即是車輿為於法故皆來聽受以是菩薩善說法故以是持經道心菩薩善能解說深妙法故婆羅門居士國內人民盡其形壽隨侍供養婆羅門者即淨行種由敬法故終身隨侍供養不輟又諸聲聞辟支佛菩薩諸佛常樂見之此明四聖之所樂見是人所在方面是持經人所住方所諸佛皆向其處說法於佛經典眼視手持口中讀誦心地解了如同佛口親聞無異何時諸佛不向說法黃卷即是對聖賢也悉能受持一切佛法一切諸佛所有之事皆於此經宣示顯說持是經者即是受持一切佛法又能出於深妙法音由解佛意能依經典出於深妙清淨法音爾時世尊欲重宣此義而說偈言是人舌根淨終不受惡味以根淨故惡味不入其有所食噉悉皆成甘露一切惡味入此人口皆成甘露以深淨妙聲於大衆說法以諸深遠清淨妙音於大衆中演說諸法以諸因緣喻引導衆生心以諸一切善惡因緣譬喻解說引導所聽衆生之心聞者皆歡喜設諸上供養所說深妙聞者入神心皆歡喜設諸淨供諸天龍夜叉及阿修羅等皆以恭敬心而共來聽法說若不妙誰來聽受由深妙故龍鬼欽崇是說法之人若欲以妙音遍滿三千界隨意即能至說法之人雖住於此欲以妙音遍大千者由心遍故音亦隨遍又復當知三千之境即是五陰國土假名不離一念介爾之心所以隨意能遍至也大小轉輪王及千子眷屬合掌恭敬心常來聽受法王及眷屬亦以法妙而來恭敬合掌聽受諸天龍夜叉羅剎毗舍闍羅剎者此云暴惡鬼毗舍闍者此云噉精氣鬼亦以歡喜心常樂來供養即前八部為法心喜樂興供養梵天王魔王梵天王色界主也魔王居欲天頂權實不同實即天魔真邪見者權即菩薩變化現身欲試行人令堅道力自在大自在自在者即化樂天以力化現而自受樂名為自在大自在者即他化自在天化由他力名為他化而於其中得大自在又色究竟亦名大自在即摩醯首羅也如是諸天衆常來至其所如上所現欲色無色三界諸天常為法故至法師所諸佛及弟子諸佛即是妙覺世尊弟子即是三乘聖衆聞其說法音常念而守護聞法音時常來護念或時為現身現身有一切現即是見佛色身理現即是解佛法音名見法身復次常精進若善男子善女人受持是經若讀若誦若解說若書寫得八百身功德八百之數如前已解得清淨身如淨琉璃衆生喜見由持經力得勝義根身清淨猶如琉璃衆生見者無不愛樂其身淨故三千大千世界衆生生時死時上下好醜生善處惡處悉於中現三千世界通內外報內則自心一身之中具三千界色陰國土也受想行識衆生也種種名字如五陰十二入十八界等假名也外則無情國土有情衆生世間種種一切名字理而為言念起名生念息名死善名上好惡名下醜善生善道惡墮三途但就身觀昭然可見就事上說國土衆生稱呼名字衆生之類誰無生死及以高下好醜等事善惡之報具載典文目前顯應其事非一所以佛云悉於中現及鐵圍山大鐵圍山彌樓山摩訶彌樓山等諸山王此等名義如前已說鐵圍等喻亦如前解及其中衆生悉於中現及大千界所有衆生亦於身中而現其相下至阿鼻地獄極苦處也上至有頂極樂處也所有及衆生悉於中現其中所有山河國土苦樂之境及以六道所有衆生悉於身現若聲聞辟支佛菩薩諸佛說法若見空理是聲聞說若見如幻是支佛說若見妙有是菩薩說若見妙覺是諸佛說一身之法其義如是一人善聽皆於身中現其色像相逐心生身由業感一切色像豈外一身爾時世尊欲重宣此義而說偈言若持法華經其身甚清淨持經之人心不向惡內無過失甚是清淨如彼淨琉璃衆生皆喜見猶如琉璃內外映徹衆生見者無不善樂又如淨明鏡悉見諸色像心見淨故無不明了知於鏡中現諸色相菩薩於淨身皆見世所有持經菩薩身心淨故皆見世間所有之事唯獨自明了餘人所不見唯自具眼見得分明餘不學者所不能見三千世界中一切諸群萌群萌即是三界衆生善惡念起名曰萌芽天人阿修羅地獄鬼畜生如是諸色像皆於身中現六道之衆各有一身非從外來唯心所造作此觀者悉於身現諸天等宮殿乃至於有頂從欲界天至無色界宮殿樓閣鐵圍及彌樓摩訶彌樓山諸大海水等皆於身中現正眼觀之何得不爾諸佛及聲聞佛子菩薩等若獨若在衆說法悉皆現佛菩薩等即前四聖若獨處身若在大衆說種種法悉現身中雖未得無漏法性之妙身是持經人雖然未得本有法性無妙身以清淨常體一切於中現以勝義根清淨常體於一身中如實諦觀若善若惡若聖若凡一切色像無不悉現復次常精進若善男子善女人如來滅後受持是經於佛滅後末世持經若讀若誦若解說若書寫得千二百意功德數如前解以是清淨意根簡去浮塵四大肉團正取清淨勝義根也乃至聞一偈一句通達無量無邊之義佛法深妙一句之中具含多義善解偈句旋轉通達則得無量無邊之義解是義已能演說一句一偈自既解已能為他人演說一句一偈之義至於一月四月乃至一歲從於一刻一時一日乃至一月或有國土一年三時每時四月一歲則是十二月也諸所說法隨其義趣見理之人諸有所說隨其文義之所趣向皆與實相不相違背不見理人舉口成病未嘗不與正理相違其見法者一出正心任運自與修多羅合若說俗間經書世俗文典治世語言治理世間一切言語資生業等資助營生一切事業皆順正法治世之言無非訓導懲惡勸善資生之業無非善事禁諸邪惡如是而說與佛正法常相協順三千大世界六趣衆生即六道也心之所行心念所行若善若惡心所動作動轉施為心所戲論心所虗妄論諸法皆悉知之持經菩薩以法格範悉知其心之所運用雖未得無漏智慧而其意根清淨如此雖是凡夫未得聖人無漏解脫真實智慧意根清淨自能如此如鋭鑑像豈有心哉是人有所思惟籌量言說是持經人心有所思籌度解說皆是佛法無不真實由心正故思忖言談句句合法無不真實亦是先佛經中所說其心意語亦是先佛經中所說真實之語爾時世尊欲重宣此義而說偈言是人意清淨明利無濁穢是持經人意地清淨明了聰利無有穢濁以此妙意根知上中下法由意妙故通達佛理知三乘教是方便法乃至聞一偈通達無量義百致一慮解一千從次第如法說月四月至歲隨義次第稱理而說始自一句一偈至於一月四月及以一歲言有次第理無窮盡是世界內外一切諸衆生世界內外即是自他依正二報諸衆生有六道三乘四衆八部若天龍及人夜叉鬼神等此八部也其在六趣中所念若干種然諸衆生在六道中心之所念有若干種持法華之報一時皆悉知持經之人以經印心即法華經實相之印印諸衆生心地之法一時明了無不知之十方無數佛百福莊嚴相為衆生說法悉聞能受持十方諸佛種種相好百種勝福以為莊嚴皆由功德及智慧生佛為衆生所說之法隨有所得悉能受持思惟無量義心中思惟無量義趣說法亦無量所說之法亦有無量終始不忘錯終始記憶無有遺忘及心顛錯以持法華故悉知諸法相法華經者諸經之王解法華義即是解了一切諸法隨義識次第隨其文義善識次第達名字語言了達法相種種名字如經所說一切語言如所知演說如其所應善能了知而為演說此人有所說皆是先佛法此持經人若有所說亦是先佛經中之法以演此法故以演如此知機合理微妙法故於衆無所畏於大衆中安詳而說無有所畏持法華經者意根淨若斯由持經力意根清淨若此明了雖未得無漏雖然未得無漏淨心先有如是相先有如是應驗之相是人持此經安住希有地是人心淨能持此經安住法性希有之地為一切衆生歡喜而愛敬得諸衆生見之歡喜心生愛敬能以千萬種善巧之語言分別而演說持法華經故能以千萬善巧語言分別解說如來法藏功由持此法華經故
