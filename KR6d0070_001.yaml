body:
  text: 妙法蓮華經弘傳序解錢塘廣照沙門釋聞達妙法蓮華經弘傳序妙法蓮華經五字是本經題弘傳序三字南山所立弘傳者恢弘傳授也序者蓋述斯經弘傳來由及採經中妙義開明大旨冠在經初發誓弘通傳流濁出等與衆生登無上覺之謂也妙法者所謂佛之知見本覺妙心也此之知見法界平等佛與衆生本無二致故曰妙心本具如如意珠心佛衆生三無差別又復當知性雖平等迷悟有殊佛以悟故安住其中終日受用無非四德衆生迷故背覺合塵長劫輪回無非八倒佛憫群迷出現於世種種方便調伏其心無非為令得佛智慧故經曰如來所以出為説佛慧故由斯妙法唯心本具所以佛令開示悟入革凡成聖證妙法身故經曰若有聞法者無一不成佛法義如是豈不妙哉蓮華者上根觀之即是自性法華三昧更非他物中下之機則作引物譬喻本有覺心清淨妙理也故經曰欲令衆生開佛知見使得清淨故出現於世復有三義一者為鈍根故不堪受大權設三乘而為誘掖故經曰衆生根鈍云何可度我今得道當説三乘所以説小逗會權機正為大乘而作方便如為蓮實而生蓮華二者調停既久根器純熟點昔方便悉是佛乘召傭作人即是親子即經云汝等所行是菩薩道諸君當知此是我子譬如華開得見蓮實三者為彼大機廢前方便假名字説但説一乘無上道教即經云正直捨方便但説無上道十方佛土唯一佛乘譬如華落蓮實獨存上據迹門下本門中亦有三義經云我少出家得阿耨菩提為本施迹也我實成佛已來壽命無量阿僧祇劫開迹顯本也為衆生故有滅不滅實不滅度廢迹立本也具上諸義法喻雙舉故曰妙法蓮華也妙玄云問蓮華定是法華三昧之蓮華定是華草之蓮華答定是法蓮華法蓮華難解故華草為喻利根即名解理不假譬喻但作法華之解中下未悟須譬乃知以易解之華草蓮華喻難解之三昧蓮華故有三周説法逗會三根約上根是法名約中下是譬名三根合論雙標法喻所言經者訓法訓常妙蓮華王佛知見道三世同遵始終不易故云常也軌則攝持化令成佛故云法也弘傳者此有四意文中首明結集翻傳次古佛傳通三此方受持四今師弘贊詞義甚明尋文可見所明諸意欲使學者恢弘義路傳通心法承襲有宗無致虗托序者門首之墻如登堂奧必由墻序欲探經文須明序致終南山釋道宣述終南者山名也在京兆府長安城南其山自遠而來勢終於此京城之南秀氣蟠結聖王所都祖師平昔居此山中釋者具云釋迦此翻能仁以能仁育化衆生故即如來先祖之姓也出家之士以佛為師還隨師姓即阿含經云四河入海無復本名四姓出家同稱釋氏宣者師之諱也從佛出家修行直道宣布法華利益衆生故有是稱也述者敘述來致欲人之開解也妙法蓮華經者統諸佛降靈之本致也初句標經次句總判一經大意罄無不盡十方三世諸佛如來降靈本意唯以一大事因緣故所謂開示悟入衆生佛之知見佛之知見者即一佛乘平等大慧特欲簡異三乘五乘諸知見也別而言之在心曰知在眼曰見又復須分自他受用於自分上則真實慧心洞然明白清淨慧目照五蘊空於他分上則佛知衆生法性平等佛見衆生是所應度故經曰知諸衆生心之所念又曰我以佛眼見諸衆生是故方便以佛知見開示一切悉令悟入佛為説此出現於世故曰為一大事因緣唯此一實餘二非真故曰開方便門示真實相所以多寶歎言善哉善哉如所説者皆是真實此之一法是佛所證諸佛心中常所護念以慈悲故轉示衆生故曰以平等大慧教菩薩法佛所護念妙法華經為大衆説衆生獲聞於一佛乘生大勇猛名信法華由信力故心珠顯耀名開法華於一切處皆遍示現名示法華了了得見決定無疑名悟法華見處深遠與佛無殊名入法華步步不離實際理地名證法華又復應知知見二字語略義含具足應云見聞覺知則對六根義方整足何以知然準經明德具有六千眼見耳聞鼻舌身三通名為覺在意曰知經舉初後心眼兩根不言餘四耳鼻舌身及論功德缺於四千顯是文略問佛之知見豈同衆生答心佛衆生三本無異又況佛為凡開非為佛也故楞嚴云十方諸佛異口同音告阿難言汝欲識知俱生無明使汝流轉生死結根唯汝六根更無他物汝復欲知無上菩提令汝速證安樂解脫寂靜妙常亦汝六根更非他物是知六根清淨等同於佛始得名為佛之知見良由一切衆生本有佛性與佛無殊無始沉迷不知不覺長流生死無解脫期諸佛世尊道眼觀見不忍沉淪從真起應出現世間故曰降靈種種方便言詞譬喻演説諸法蓋為衆生迷惑障重佛性蒙蔽而為開之俾旁生界中龍女成佛地獄道中提婆受記邪見鬼業嚴王得度法師品內修羅八部皆與通記當得菩提人倫治生即是實相施戒禪誦彈指散華本是天業皆成佛道告聲聞衆及緣覺乘於佛所説當生大信決聲聞法是諸經王以佛道聲令一切聞唯一實道無二無三菩薩開法疑網皆除分別品中微塵菩薩世尊悉記成等正覺開前九道即是佛乘法界平等無異無偏成一圓融清淨妙體妙音觀音證此三昧是則名為普現色身喻之以高廣大輦衆寶莊嚴示之以衣內明珠真如至寶矧乃未開之前諸乘隔別實為權隱譬如明珠隱王頂髻在王頂者極果所宗根器既純開權顯實一切皆當成得佛道如彼勇將有大功勳王解髻中明珠賜之既開之已廣明諸佛所修行處無量無數三昧功德而示諭之既示之已勉令修進勿廢寸陰欲令明悟既悟之已彌須涵養勿廢前功進趣菩提入佛知見等與衆生同成佛道故經曰諸佛欲令一切衆生開示悟入佛之知見故出現於世所以祖師述云統諸佛降靈之本致當知此法義趣圓融位位各攝一切諸位説有次第理無前後重重互現如帝珠網蘊結大夏出彼千齡大夏指西域也如來滅後阿難尊者蘊積妙義結集成章流傳彼土出過千載也東傳震旦三百餘載法自西至故曰東傳震旦亦云真丹梵音少異此云神洲以地勝故多産神靈東華之地方五千里乃大海中一水洲耳亦云赤縣以在南故近於離明之盛西晉永康蓮經傳此迄于大唐餘三百載或云自漢至晉三百餘載者非以西晉之前法華未至亦猶四分譯在姚秦祖文序云蘊結中天千有餘載譯傳東夏將四百年但據此土有經已來爾許時也感通傳云自晉至唐三百載餘意亦同此西晉惠帝永康年中長安青門燉煌菩薩竺法護者初翻此經名正法華惠帝都洛陽故云西晉長安即古咸陽青門都之東南門燉煌地名在隴西郡菩薩具云摩訶菩提質帝薩埵此云大道心成衆生師姓竺名法護平居燉煌化行京邑人尊其德故號燉煌菩薩初翻梵本名正法華十卷成文東晉安帝隆安年中後秦弘始丘慈沙門鳩摩羅什次翻此經名妙法蓮華中原擾攘元帝東渡都於建業故云東晉後秦者姚氏僭號姓姚名萇簡異前秦弘始者秦之年號晉為正統法師譯經在秦故兼稱之丘慈西域國名沙門此云勤息出家行道勤修衆善息滅諸惡師姓鳩摩羅名什此云童壽天姿頴悟清才超絶童子之年有壽者智德盛彼方聲飛此土前秦篤敬遣將呂光西使戎國舉師以來後奉繼興於古長安逍遙園中譯出此經七卷成文隋氏仁壽大興善寺北天竺沙門闍那笈多後所翻者同名妙法主姓楊氏國號大隋年稱仁壽寺名大興善天竺或云身毒賢豆印土等梵音少異此翻為月氏其地靈故多産聖賢如月之明清涼照世西域之境周九萬里約東西南北中列為五土今標北者簡異餘四闍那具云闍那掘多此云至德笈多具云達磨笈多此云法藏南天竺人此二法師仁壽年間自彼西梵東達隋朝於興善寺後譯此經亦同羅什名妙法華八卷成文但於秦晉二本頗有添削罕聞持誦三經重沓文旨互陳時所宗尚皆弘奉本三度翻譯文詞旨趣互有不同時所尊尚皆傳秦本欲披尋者經在藏中白在樹三函自餘支品別偈不無其流具如序曆故所非述晉譯二十八品秦譯二十八品隋譯二十八品三譯增減支分品目異文別偈其相極多非無流類序曆具載故此不明夫以靈嶽降靈非大聖無由開化梵音耆闍掘此云靈鷲鷲聚此山其性靈故名靈鷲山或云山形似鷲即佛世尊説法華處王舍城東北十五里許今云靈嶽以山靈故降誕群靈才識俊敏拔萃超倫自非大聖孰能啓之大聖者究竟果滿大覺聖人謂如來也若表法者山即法身靈即般若鷲即解脫山有其靈靈生於鷲鷲依於山如性有智智生於行行顯於性山不動搖性無遷改以山表性性即法身雖無動靜不昧靈知以靈表智智即般若靈生於鷲智起於行以鷲表行行即解脫三德圓融不可思議方稱妙觀所以爾者欲於日用見境明心從聞入道不離名相而證法身一法既爾法法皆然則十界十如無邊妙境於毫端上一時普現行之久久三昧精純出乎自然匪由作意所以導手不執卷常讀是經口無言音遍誦衆典若不然者春禽晝啼秋蛩夜吟風氣使然曾無意味先德明訓諄諄若是得不思之適化所及非昔緣無以導心適時之化被及衆生宿植深者方能悟入若本無緣何由啓導如迹門中大通佛時十六王子為四部衆覆講法華即經云爾時所化無量恆河沙等衆生者汝等諸比丘及我滅度後未來世中聲聞弟子是也如本門中威音佛時不輕菩薩為諸四衆下大乘種即經云爾時常輕是菩薩者豈異人乎今此會中五百比丘等於阿耨菩提不退轉者是妙玄云逢值有三若相逢遇常受大乘此輩中間皆已成就不至于今若相逢遇遇其退大仍接以小此輩中間猶故未盡今得還聞大乘之教若但論遇小不論遇大則中間未度于今不亦盡方始受大乃至滅後得道者是也所以仙苑告成機分小大之別金河顧命道殊半滿之科仙苑者昔有二仙居此園中一名阿羅羅迦摩羅得無所有定一名陀羅羅摩子得非想定如來初時曾師其法修習得已知非究竟乃往尼連河邊修涅槃道不起于座得成正覺亦云鹿苑此園昔時群鹿競處有二鹿主而統攝之一善一惡其一善者身七寶色爾時有王名梵摩達因遊獵次欲射群鹿時善鹿主以情告王乞垂哀愍王感其言誓不食肉於是群鹿得全生命善鹿主者今如來是惡鹿主者今調達是廣如智論亦云奈苑從樹為名告成者從昔已來修慈忍行於最後身得成為佛既證道已即詣此園為衆説法用報此恩或云仙苑應改云道樹以佛成道在道樹故今謂告厥成功雖在道樹正論説法機悟有差須云仙苑則一句之中兼明兩意若云道樹則仙苑機差義不顯也機分小大者提謂經云初在鹿苑説生滅法五拘鄰等得阿羅漢八萬諸天發大道心金河者如來示疾拘尸城西娑羅林間其地近於閻浮檀河閻浮檀即樹名樹上果熟墮在河中染沙成金顧命者如來欲滅顧示將來命諸弟子囑以後事道殊半滿者半謂小乘義未圓故滿謂大乘義圓滿故涅槃會上本説大乘須跋陀羅乃證小果餘諸聞者咸悟法身佛意雖融機緣自異特舉仙苑及金河者標其始末義攝中間豈非教被乘時無足核其高會約教被機時機不等知見劣者所乘法異何足核窮高勝之會即經云少智樂小法不自信作佛是知五千退席為進增慢之儔斯等劣機增上修行於小利中自以為足聞佛稱歎如來智慧甚深難解自生退屈不覺抽身佛亦默然而不制止蓋有五義一者若留在座小機昧劣力不自勝二者聞説妙法必生疑謗墮落生死三者俟其去已然後説之顯佛知機四者寄言訶斥欲其自悔進趣佛乘五者亦欲餘人知過必改免生上慢五百授記俱崇密化之迹如來昔於威音佛所而作比丘凡見四衆咸悉唱言我不輕汝汝當作佛時諸聞者不能信受反生輕謗以不信故久沉生死謗經業盡得生人中以宿曾聞大乘法故智勝佛來常隨佛化雖復中間退大習小今蒙佛記當得菩提耶不輕品云爾時常輕是菩薩者今此會中五百比丘是化城品云我及汝等宿世因緣我諸弟子其數五百皆當授記準知今蒙開發皆是昔時崇佛密化事迹顯然如經中云諸弟子等內祕外現方便非一我若具説衆必生疑益顯大通佛世猶是近緣究其本也實自威王故下結云並智勝之遺塵俱威王之餘績所以放光現瑞開發請之教源入定放光雨華動地四衆咸疑彌勒請決文殊引答是説法華發起衆心益加勤請乃知現瑞起教來源出定揚德暢佛慧之宏略佛知時至從三昧起歎揚諸佛甚深智慧欲暢本懷發明大事開顯衆生佛之知見復示三世道同慈悲一等所以出現無非為令得佛慧故大略如此朽宅通入大之文軌朽宅遭焚諸子不覺父意憐愍巧設三車車實本無引令出宅既知出己等賜大車滿境無安衆生染著佛慈愍故巧説三乘乘實本無意存引出既證小己等以大化宅以車通機以乘接正行文教如車之軌所以接小為入大乘化城引昔緣之不墜昔以大化佛意欲令一切衆生咸登正覺衆生根鈍中間退墮佛知機故而於中道説有涅槃暫令止息既知息已引入佛慧譬如商主欲導衆人同出險道至於寶所衆等力倦思欲退還商主知機而於中路化作一城為之止息既得安隱復令前進化彰權設城喻涅槃引小入大不墜昔緣繫珠明理性之常在出家之士以法為親師友之訓理若圓珠貧無福慧如彼窮子求師指教如謁親知訓誨入耳如衣繫珠中間迷故如醉不覺今蒙開示如睡忽醒方知昔日性珠常在或云理性二字應改云宿種理是本有那喻繫珠今謂理雖性具非開不顯開為顯性性即是理理非事外事不越理由性起修全修即性當求深致勿事氷情故楞嚴云忽逢智者指示其珠所願從心致大饒富方悟神珠不從外得鑿井顯示悟之多方心無法潤如渴乏者學教明心譬如穿井留心佛境如鑿高源心不易悟如井費工須多方便乃可得成詞義宛然喻陳惟遠結歎上引八段經文言義顯了宛而成章譬喻敷陳惟極深遠自非大哀曠濟拔滯溺之沉流一極悲心拯昏迷之失性大哀一極皆佛異名如斯妙典若非大聖哀憐廣行慈濟一志不倦極盡悲心豈能拔滯溺者出生死流拯昏迷者復元明性然則慈能與樂悲能拔苦若準今經出世本懷拔二死苦與三德樂六道業惑未忘生死全在二乘唯出分段尚有變易況沉空寂未證圓常小菩薩者伏惑行因未能無過今悉與拔令證涅槃即經云佛見衆生貧無福慧入於險道故説是經菩薩聞法疑網皆除其諸羅漢皆當作佛自漢至唐六百餘載總歷群籍四千餘軸受持盛者無出此經自昔已來漢唐之間餘經雖衆傳授者稀唯此蓮經尤多誦習良由教妙罄佛淵微復以時機緣種熟故將非機教相扣並智勝之遺塵聞而深敬俱威王之餘績教為機興機由教悟合教投機隨聞起敬悉是大通佛世遺下之機塵威音王所化流之餘力將非是耶謂實爾也輒於經首序而綜之圓頓上乘詎容輕議今於經首綜織來由故曰輒於庶得早淨六根仰慈尊之嘉會速成四德趣樂土之玄猷吾祖此願正依藥王普賢二品經文六根取境能生諸過今持妙典蕩滌諸塵信仰慈尊參承嘉會生兜率也願速圓成常樂我淨四種實德上品超升生安養也悟真常故不變不遷安住不動如須彌山常德也得安樂故永離衆苦如器中鍠聲出于外樂德也證真我故得大自在如風於空無有障礙我德也復本淨故光明通達觀諸世間如夢中事淨德也趣樂土者入無生忍證常寂光常即法身光即般若寂即解脫隨舉一身皆具四德趣舉一德皆具三身若以四德別對三身常即法身淨不住相樂滅受想即般若智對報身也我約自在即是解脫對應身也佛身無為不墮諸數一四四三圓融自在無有恐怖寂滅為樂玄猷者玄遠也猷法也是法深遠微妙難思唯佛與佛乃能究盡然雖如是不離日用介爾心中宛然具足一念圓明即遠而近背此馳求失之千里有人云南山序文多談迹義不説本門如前所引藥王普賢不輕威王壽量等義迹耶本耶請自思之弘贊莫窮佛旨深微智淵如海已今當説而於此經最為第一弘通贊輔莫能窮盡永貽諸後云爾永長也貽贈也諸後即來學也以謂今述此序弘贊法華歷塵點劫不可窮盡誓與群生同成正覺序中所云意若斯爾妙法蓮華經卷第一心法妙明因中具果蓮華香潔蘂中有蓮佛性在迷塵不能染蓮華在水濁不能侵以華表因以蓮表果煩惱心地有如來身卑濕淤泥有蓮華種性由智顯蓮對日開因淨果明華開蓮現因圓果滿華落蓮成法性元真蓮華本淨文詮此義名曰妙經卷可卷舒第標篇次下文凡言妙法蓮華及經卷第號例此説之更不重釋姚秦三藏法師鳩摩羅什奉詔譯爾時世主姓姚名萇建國關輔名曰大秦佛經律論名為三藏藏者藏也藏心性識及戒定慧佛之所修真常大義能通法性為世所師故曰法師鳩摩羅什此云童壽本丘慈人師性明敏童子之年有壽者智奉秦王詔譯梵成華妙法蓮華經序品第一序者述也述此法華生起之意品即章也如是我聞阿難自謂如是妙經所説妙義我從佛聞一時佛始自發端終至説竟名曰一時佛翻覺者謂是覺了性相之者住王舍城如來住於摩竭提國頻婆羅王所舍之城耆闍崛山中此云靈鷲鷲有靈性聚此山中與大比丘衆比丘此云乞士乞食資體乞法濟心萬二千人俱俱同聚也皆是阿羅漢此云無生斷見思惑出輪回苦不生三界諸漏已盡諸惡常流名為滲漏羅漢悉離名為已盡無復煩惱三毒已盡不復更生逮得己利離老病死得出三界僅能自利未得利他盡諸有結三有結業一時已盡心得自在不為三界生死所縛心遊空寂名為自在其名曰上是歎德下顯姓名阿若憍陳如此云解本際見法本性故摩訶迦葉此云大飲光姓也光吞衆類令餘人光不得現故名畢撥羅即樹名也禱此樹神得生子故優樓頻螺迦葉優樓頻螺此云木瓜林從住處為名伽耶迦葉伽耶此云江祈禱江神得此子故那提迦葉此云城祈禱城神得此子故舍利弗此云身子母好身儀是身之子大目犍連此云採菽即祖姓也名尼拘律陀此云白楊樹祈禱樹神因得子故摩訶迦旃延此云扇繩幼喪乃尊母為子故不復事人子纏於母如繩繫扇阿䨲樓馱或云阿那律此翻無貧因以稗飯施辟支佛九十一劫果報充足劫賓那此云房宿因禱房星得此子故憍梵波提此云牛呞宿曾為牛餘習尚存食已轉噍離婆多此云室宿祈禱室星得此子故畢陵伽婆蹉此云餘習五百世來為婆羅門餘習不除為人多傲薄拘羅此云善容形容美故摩訶拘絺羅此云大膝蓋從相貌以為名難陀此云欣樂本牧牛人以牧牛事請問世尊佛答心解欣樂出家孫陀羅難陀孫陀羅此云好愛即妻名難陀此云欣樂即佛親弟欲心重故欣樂其妻富樓那彌多羅尼子富樓那此云滿禱神得子滿心願故彌多羅此云慈尼字此云女指滿所出是慈女子子母合稱名滿慈子須菩提此云空生初在母胎便知空寂又云善現尊者生時善相現故阿難此云慶喜尊者生時諸慶大集舉國欣慶羅睺羅此云覆障佛之子也佛欲出家父王告言若得子已當從汝志為子所障不即出家如是衆所知識知圓識妙名崇德重衆人所善曰善知識大阿羅漢等萬二千衆舉二十一餘不提名故云等也復有學無學二千人此二千人亦比丘衆但舉其數不談名德初二三果思惑未盡名為學人四果聖人見思永盡所作已辦名為無學摩訶波闍波提比丘尼波闍波提此云愛道即佛姨母與眷屬六千人俱六千尼衆皆是眷屬羅睺羅母耶輸陀羅比丘尼耶輸陀羅此云華色即羅睺羅母六與眷屬俱眷屬之稱亦尼衆也菩薩摩訶薩八萬人菩薩此云道心摩訶薩此云大衆生皆於阿耨多羅三藐三菩提不退轉阿耨多羅此云無上三藐此云正等正以簡邪等謂平等佛與衆生其性無二三菩提此云正覺正能覺了一切諸法不退轉有三一位次不退減二功行不退怯三正念不退失皆得陀羅尼此云總持護善令生遮惡不起總攝持故樂説辨才才智辨捷樂説無窮轉不退轉法輪利根菩薩是能轉之智人不退法輪是所轉之妙法供養無量百千諸佛深心承順名供養佛於諸佛所植衆德本廣種善因名植德本常為諸佛之所稱歎以德重故常得諸佛稱名歎德以慈修身慈能與樂以此修身善入佛慧佛之心者大慈悲是能修大慈則是善入佛之智慧通達大智於諸智中佛智最上達大智者即佛見知到於彼岸究竟至於菩提彼岸名稱普聞無量世界名字稱呼遠聞諸國能度無數百千衆生所證至深所化至衆其名曰上是歎德下出其名文殊師利菩薩此云妙德思益經云雖説諸法而不取法相名為妙德觀世音菩薩楞嚴經云由我不自觀音以觀觀者是故能令十方世界苦惱衆生聞其音聲皆得解脫得大勢菩薩亦名大勢至無量壽經云此菩薩行時十方世界皆悉震動坐時七寶國土一時動搖是故號此菩薩名大勢至常精進菩薩大寶積經云是菩薩為一衆生經無量劫隨逐不捨或不受化而此菩薩亦無一念棄捨之心名常精進不休息菩薩思益經云恆河沙劫為一日夜是三十日為一月十二月為年經無量劫值無數佛修諸梵行然後受記名不休息上二菩薩於義似同各有主意常精進者為衆生故若親若疏終不棄捨不休息者為梵行故久習善因心不廢弛寶掌菩薩普超經云常以實心通諸慧性為人講宣於諸珍寶無所貪惜垂手為人故名寶掌藥王菩薩悲華經云無始劫來作大醫王救諸苦惱於賢劫中後當成佛名曰樓至勇施菩薩義約菩薩發勇猛心開大施門普利一切寶月菩薩義約菩薩懷於至寶饒益衆生如月清涼能除熱惱月光菩薩義約菩薩具大智慧如月光明清涼照世滿月菩薩義約菩薩久修梵行垢盡慧明如淨滿月大力菩薩義約菩薩具諸功德有大力量能拔濟他無量力菩薩義約菩薩深大慈悲力量無邊不可稱計越三界菩薩義約菩薩福德深厚有大智慧超越世間跋陀婆羅菩薩此云善守思益經云善能守護一切衆生若聞其名是人必定得三菩提彌勒菩薩此云慈氏思益經云若有衆生見此菩薩應時即獲慈心三昧寶積菩薩義約菩薩歷劫勤苦修諸三昧法寶充積西竺經文其數甚多傳來此方十無一二是以釋名多無所出導師菩薩思益經云於邪見者生大悲心令入正道名曰導師如是等菩薩摩訶薩八萬人俱八萬之衆略舉十八是故結云如是等俱爾時釋提桓因此云天帝或云帝釋即是華梵雙標欲界第二忉利天王言忉利者此云三十三由須彌頂有其四峯每峰八天帝釋居中總名三十三天與其眷屬二萬天子俱眷屬二萬即忉利天諸天子也復有名此一名字通指下文諸天子也月天子月宮天子也普香天子或云即星宮天子北辰處中衆星拱之寶光天子或云即日宮天子光明寶焰照臨下士故云寶光光明經云日王赫焰放千光光明此三天子即帝釋內臣如今宰輔也四大天王東方持國南方增長西方廣目北方多聞四大天王各領部屬居於四方即帝釋外臣如今制閫也與其眷屬萬天子俱即上三天子四天王眷屬之衆諸天子也自在天子欲界第五化樂天主也以己神力化現境界隨心受用故云自在大自在天子欲界第六他化自在天主也凡諸勝妙皆他所化現成愛用自不費力勝前第五化樂天宮故云大自在天與其眷屬三萬天子俱即上化樂他化二處天主眷屬之衆諸天子也娑婆世界主梵天王娑婆此云堪忍堪能忍愛一切苦惱不知出離世為遷流即過現未名三世也界為方位東西南北四維上下名為界也三世十方堪忍之境屬梵天王之所統御故云王也此標王位下文方始指出王名尸棄大梵梵語樹提尸棄此翻為火大梵尊天修火光定出離欲境為梵天王即大千世界娑婆主也光明大梵等光明即二禪已上少光天無量光天光音天等色界梵天是諸天王及以天衆果報殊勝身有光明故曰光明大梵等及色界天頂摩醯首羅於梵天中得自在故亦名大自在與其眷屬萬二千天子俱即諸梵天王眷屬之衆諸天子也有八龍王難陀龍王此云歡喜護摩竭國人聞其名皆悉歡喜跋難陀龍王此云善與上難陀兄弟也娑伽羅龍王此云醎海龍居海中從處為名和修吉龍王此云多頭於一身上示現多頭表一法中出無量法德叉迦龍王此云現毒示現毒相以化於人阿那婆達多龍王此云無熱雪山頂有無熱惱池龍居其中摩那斯龍王此云大身以太善心現大神力護法利生優鉢羅龍王等此云黛色蓮華池也龍居池中以蓮顯德各與若干百千眷屬俱八大龍王所部之衆有四緊那羅王此云歌神天帝歌樂用此神也法緊那羅王佛説法時諸天弦歌以讚於佛妙法緊那羅王作妙法樂以讚於佛大法緊那羅王讚詠大乘清淨法也持法緊那羅王任持正法播於音樂各與若干百千眷屬俱四種歌神所部之衆有四乾闥婆王此云嗅香以香為食天帝作樂即用此神樂乾闥婆王樂者橦也宅江切倒伎也即緣竿倒擲之類樂音乾闥婆王即奏鼓樂者美乾闥婆王作橦倒伎最美觀者美音乾闥婆王即奏音樂最美妙者各與若干百千眷屬俱四種樂王所部之衆有四阿修羅王此云無端正形貌醜惡故婆稚阿修羅王此云最勝能勝一切情欲境故佉羅騫馱阿修羅王此云廣肩脾以能荷法故毗摩質多羅阿修羅王此云淨心帝釋夫人舍脂父也羅睺阿修羅王此云障持其身長廣手持日月障覆光明各與若干百千眷屬俱四種修羅眷屬衆也有四迦樓羅王此云金翅鳥羽毛金色故大威德迦樓羅王威德最大勝諸同類大身迦樓羅王居四天下大樹之上兩翅展開相去三百三十六萬里大滿迦樓羅王翅扇水開入海噉龍大滿其意如意迦樓羅王此鳥頸上有如意珠各與若干百千眷屬俱四金翅鳥眷屬之衆韋提希子阿闍世王韋提希此云思惟阿闍世此云折指小指折故此折指王是思惟子子母合稱與若干百千眷屬俱與人王衆諸眷屬也各禮佛足以手接足禮拜於佛退坐一面禮已退身就一而坐爾時世尊四衆圍繞僧尼士女周圍旋繞或就經説因佛放光身子與衆騰疑致請發起衆也文殊彌勒助佛揚化如影隨形如谷答響影響衆也學無學人從佛聞法得道受記當機衆也餘雖預聞心未明了用為遠因結緣衆也供養恭敬奉供事養肅恭致敬義通三業及以六塵合掌頂禮翹勤跪足身供養也敘述功德發言讚歎口供養也念佛恩德無暫忘時心供養也六塵奉上事供養也一性契如理供養也理事圓妙實相供也尊重讚歎極誠崇奉尊也感德深尊重也談其道德讚也嗟吁莫及嘆也為諸菩薩所為衆也説大乘經言出佛口名之為説經談實相名之為大力能運載名之為乘名無量義於一法中出無量義經云二法三道四果也二法即漸頓也三道即三乘也四果即聲聞緣覺菩薩及佛四位聖果教菩薩法以上諸法大乘之義教示菩薩佛所護念一切諸佛為能護念無量義經教菩薩法是所護念佛説此經已説無量義經已結加趺坐趺足背也先以右足壓左足上次以左足壓右足上名曰加趺入於無量義處三昧三昧此云正定若但虗言而不履踐無量義海諸三昧門豈能成就故佛入定為人作則身心不動身不動色定也心不動性定也是時天雨曼陀羅華雨去聲從天下也曼陀羅此云適意亦名小白華摩訶曼陀羅華此云大適意亦名大白華曼殊沙華小赤華也摩訶曼殊沙華大赤華也天雨四華表住行向地四十位也而散佛上散佛上者表於佛境修功德因及諸大衆表供一切悉令成佛普佛世界普遍十方三世佛境六種震動地表心體善念動時六情諸根悉轉為善爾時會中無量義會比丘比丘尼如上優婆塞此云清信男優婆夷此云清信女天龍夜叉諸天王等及天眷屬諸龍王等及龍眷屬夜叉此云勇健鬼乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽並如上解人世間之人非人大仙修羅地獄餓鬼等及諸小王世間粟散諸小王也轉輪聖王金銀銅鐵四輪王也是諸大衆指上所列得未曾有雨華動地昔未曾見今得見之云未曾有歡喜合掌覩相歡喜合掌致敬一心觀佛專注一心瞻仰於佛爾時佛放眉間白毫相光佛眉中間有一白毫長一丈五尺色如珂雪宛轉眉間外有八稜中空如筒放大光明從中而出兩眉即表空有二邊毫表中道照東方萬八千世界東方為動之主萬八千者表十八界靡不周遍其光大盛無不遍滿下至阿鼻地獄阿鼻此云無間地獄衆生常受衆苦無有間斷上至阿迦尼吒天此云色究竟下至地獄上至色頂中間所有無不遍照於此世界上諸世界盡見彼土欲色之境六趣衆生天人修羅地獄餓鬼畜生約業分六各自趣向又見彼土萬八千土現在諸佛現在説法諸佛世尊及聞諸佛耳聽曰聞所説經法佛為能説法是所説并見彼諸比丘比丘尼他方世界出家僧尼優婆塞優婆夷他方世界在家士女諸修行得道者修攝其心行於聖行得入道者復見諸菩薩摩訶薩大乘衆也種種因緣因即善心緣即善境心境非一故曰種種種種信解於諸法上起信解心種種相貌法門無量相貌不同行菩薩道六度萬行是菩薩道踐履名行復見諸佛他方諸佛般涅槃者此云寂滅機薪既盡應火云亡名為寂滅復見諸佛亦他方佛般涅槃後滅度之後以佛舍利此云骨身起七寶塔梵語塔婆此云高顯處七種珍寶為佛起塔爾時彌勒菩薩作是念因光見土所以作念今者世尊釋迦如來現神變相化現神通變淨土相以何因緣何因何緣而有此瑞有此所現奇瑞之相今佛世尊謂釋迦佛入于三昧説經之後入于正定是不可思議是之瑞相不可心思及以口議現希有事現希奇事非世所有當以問誰心自思擇當問何人誰能答者又復思求能答之者復作此念又復念言是文殊師利衆中上首大菩薩也法王之子佛名法王菩薩師佛名法王子已曾親近供養菩薩久已親炙近傍身心恭敬供養奉事過去無量諸佛所親近境必應見此希有之相事佛既多必然曾見此奇瑞相我今當問我今當問能知此者爾時比丘比丘尼優婆塞優婆夷及諸天龍鬼神等咸作此念是諸人等亦同作念是佛光明佛所放光神通之相神力通變發用之相今當問誰思欲請問爾時彌勒菩薩欲自決疑彌勒菩薩位居等覺所見瑞相心猶疑暗欲求開決又觀四衆比丘比丘尼優婆塞優婆夷即四衆也及諸天龍鬼神等八部衆也衆會之心即如上説今當問誰而問文殊師利言為己及衆問文殊也以何因緣問佛現瑞為何因緣而有此瑞謂放光明神通之相指上所現放大光明指上白毫照于東方萬八千土所照境也悉見彼佛見彼諸佛國界莊嚴依報嚴飾於是彌勒菩薩欲重宣此義前已具述自他疑念今復以偈重宣前意以偈問曰文殊師利導師何故頌以何因緣眉間白毫頌前白毫大光普照頌照萬八千普遍世果雨曼陀羅頌雨二白華曼殊沙華頌雨二赤華旃檀香風前無此有悅可衆心所現之相悅懌稱可大衆之心以是因緣指上所現心境之相地皆嚴淨由神變故莊嚴清淨而此世界此娑婆界六種震動所謂一動二遍動三等遍動只動一處名之為動動四天下名為遍動動大千界名為等遍動二起三涌四震五吼六覺每一字中各具三義時四部衆指上四衆咸皆歡喜覩瑞心喜身意快然身中如前暢快喜悅得未曾有如此之事昔所未有眉間光明中道毫光照于東方光本普遍先照東方萬八千土所照之境皆如金色如來毫光所照如是從阿鼻獄上至有頂諸世界中獨舉上下中間普遍六道衆生如上生死所趣死此趣彼善惡業緣衆生所作善惡因緣受報好醜隨業受報好妙醜惡於此悉見於毫光中皆悉得見又覩諸佛又復覩見萬八千土其中諸佛聖主師子如來世尊衆聖中主譬如師子百獸中主演説經典流演解説經文典法微妙第一義理第一微妙深遠其聲清淨所説法音清潔白淨出柔軟音音出慈悲柔和善軟教諸菩薩一一諸佛所教之衆無數億萬數目衆多不可稱計梵音深妙梵淨也意深語妙令人樂聞使人願聞各於世界萬八千土講説正法講明解脫正真之法種種因緣無數方便成佛因緣以無量喻引無數事以為譬喻照明佛法以智明法如光照物開悟衆生開發悟明一切衆類若人遭苦遇世苦厄厭老病死厭棄四相周而復始為説涅槃為説出世寂滅之樂盡諸苦際四果聖人出離三界名盡苦際若人有福有諸福量曾供養佛宿曾修供於佛有緣志求勝法立志欲求殊勝之法為説緣覺與此等説十二緣法令觀世緣覺了法性若有佛子菩薩習大名為佛子修種種行發心修習六度萬行求無上慧求於無上佛之智慧為説淨道為是等説清淨佛道文殊師利所對告人我住於此住此娑婆見聞若斯眼見佛境耳聞佛音其相如此及千億事及諸事相如是衆多指所見聞其相甚多今當略説今難具陳當簡略説我見彼土我眼見彼諸佛淨土恆沙菩薩如恆河沙衆多菩薩種種因緣種種衆善心因境緣而求佛道修習佛因求成佛道或有行施或行捨施金銀珊瑚海中有寶秀氣結成其色紅潤如樹之形名曰珊瑚真珠摩尼蚌螺之類採於月華結成真珠摩尼此云能聖即如意珠硨磲碼瑙海中大貝如車之渠即大海螺石中秀氣其色紅潤如馬之腦金剛諸珍堅利金剛及諸珍寶奴婢車乘給使婢僕運載車乘寶飾輦輿牽挽曰輦肩荷曰輿以寶嚴飾歡喜布施以歡喜心布散施與回向佛道回所修福趣向佛道願得是乘願欲得是大寶真乘三界第一於三界中為最第一諸佛所歎常為諸佛所讚嘆者或有菩薩能行施者駟馬寶車四馬牽車以寶為飾欄楯華蓋橫者曰欄豎者曰楯即車欄也寶車頂上華飾之蓋軒飾布施即今軒車此等行施復見菩薩復見施者身肉手足己財為施及妻子施內財為施求無上道為求佛道又見菩薩頭目身體前捨手足今施頭目欣樂施與欣喜願樂施與衆生求佛智慧所以施者為求佛慧文殊師利對告文殊我見諸王見彼世界諸人王等往詣佛所各往詣彼諸佛之所問無上道請問諸佛無上道教便捨樂土捨五欲樂受用之土宮殿臣妾宮殿是所依臣妾是所愛剃除鬚髮鬚髮至愛亦復剃除而被法服出家稟具披三法衣或見菩薩而作比丘出家為僧獨處間靜獨自間居空靜之處樂誦經典心樂讀誦大乘經典又見菩薩勇猛精進果敢名勇力行名猛精而不雜進而不退入於深山遠離囂塵深居山谷思惟佛道正念思惟佛所行處觀照禪也又見離欲又見有人厭離五欲常處空間常居空靜安間之處深修禪定梵語禪那此云寂滅深入定門住於禪寂體真禪也得五神通天眼天耳他心宿命及以神境除却漏盡名五神通又見菩薩安禪合掌安住禪定端心合掌以千萬偈千萬大數也偈此云頌也讚諸法王既云禪寂又讚法王非禪不智非説不了安禪讚法默而説也讚法安禪説而默也復見菩薩智深志固智慧深遠志操堅固能問諸佛智慧堅深善問諸佛聞悉受持隨聞強記能盡受持又見佛子佛子菩薩互換稱耳定慧具足定以攝散慧以破昏定慧等持名為具足以無量喻用無數事以為譬喻為衆講法以所得法為人講明欣樂説法所得深法樂説無厭化諸菩薩誘化一切諸菩薩衆破魔兵衆背違正法引誤一切名曰魔兵以正法眼爍去群邪名破魔也而擊法鼓四大交擊於中發聲演大法義名擊法鼓又見菩薩寂然宴默寂默宴坐天龍恭敬諸天龍王皆來敬奉不以為喜大龍來敬順情境也菩薩住空初不為喜即捨禪也又見菩薩處林放光安處林下放清淨光濟地獄苦以大悲心濟拔獄苦即悲禪也令入佛道轉苦道身入於佛道略困曰睡熟睡曰眠佛子精進未嘗如是又見佛子未嘗睡眠經行林中行道林中如經之直勤求佛道以不懈怠求入佛道又見具戒具足受持清淨大戒威儀無缺戒禁身口名曰威儀志誠謹潔無所缺犯淨如寶珠持戒清潔如淨寶珠以求佛道以持戒功求於佛道又見佛子住忍辱力住忍力中能耐耻辱增上慢人增上修行輕慢人者惡罵捶打口出惡言手行捶打皆悉能忍惡人惱己悉能忍之以求佛道以忍辱力求於佛道又見菩薩離諸戲笑戲笑心散離則寂靜及癡眷屬撥無因果名癡眷屬親近智者親附近傍有智慧者一心除亂昏亂障道一心除之攝念山林修攝正念住於山林億千萬歲言其久也以求佛道以離癡亂智慧之行求成佛道或見菩薩肴膳飲食雜食曰肴美食曰膳飲如諸漿食即米百種湯藥百乃總名非定一百湯如术參藥即圓散施佛及僧供佛施僧名衣上服有名之衣上色之服價直千萬價直貴也或無價衣或至貴衣世間無價施佛及僧所供境也千萬億種通下諸物旃檀寶舍旃檀香木寶莊嚴舍衆妙臥具衆多妙好朱臥之具施佛及僧施與佛僧清淨園林園以遊觀林以蔭覆華果茂盛園林所有流泉浴池泉可飲用池可澡浴施佛及僧所施境也如是等施總該如上種種之物種種微妙一一之物精微美妙歡喜無厭勇施則歡無厭則久求無上道喜捨無厭為求至道或有菩薩説寂滅法寂滅之法本不可説以慈悲故方便説之種種教詔説種種法教訓詔告無數衆生所化之衆或見菩薩觀諸法性以智觀察諸法體性無有二相元無異相一等空寂猶如虗空法性本寂如太虗空又見佛子心無所著心於諸緣無所染著以此妙慧無著淨心名為妙慧求無上道以妙慧求無上之道文殊師利又有菩薩佛滅度後彼諸土中佛滅之後供養舍利此云骨身戒定內熏砧杵不碎一心敬仰如佛現在又見佛子造諸塔廟中有舍利名之為塔但供影像名之為廟無數恆沙言其多也嚴飾國界建造塔舍莊嚴國土寶塔高妙寶為佛塔高聳勝妙五千由旬此云驛程約四十里寶塔表身高五千者表五分法縱廣正等竪縱橫廣數正相等二千由旬此寶塔基方八萬里一一塔廟於諸一一無數塔廟各千幢幡各懸一千寶幢寶幡珠交露幔以珠交羅作露塔幔寶鈴和鳴風動寶鈴其音和雅諸天龍神人及非人八部衆也香華伎樂伎藝音樂常以供養無時不然文殊師利告文殊言諸佛子等能供人也為供舍利為舍利故嚴飾塔廟莊嚴處所國界自然國妙境界出乎自然殊特妙好殊大也特獨也美妙善好如天樹王帝釋天園有大樹王枝葉遍覆五十由旬其華開敷塔廟嚴國如樹華開佛放一光佛指釋迦光即白毫我及衆會我即彌勒衆即大會見此國界萬八千土種種殊妙依正妙好諸佛神力彼土諸佛神通之力智慧希有智慧深遠世間罕有放一淨光一白毫光照無量國遍照東方無數國土我等見此指上所見得未曾有自佛成道未曾有此佛子文殊願決衆疑勸請文殊與衆決疑四衆欣仰僧尼士女欣然仰慕瞻仁及我望君與我為之決通世尊何故佛以何緣放斯光明問放光因佛子時答勸請文殊應時即答決疑令喜為衆決疑令生歡喜何所饒益有何所以饒潤利益演斯光明流演此光佛坐道場佛在摩竭坐於道場所得妙法心所證得微妙之法為欲説此是欲説此無上妙法為當授記是欲為衆授菩提記心疑不決故此雙問示諸佛土光中示現諸佛國土衆寶嚴淨是衆寶土莊嚴清淨及見諸佛及於光中見彼諸佛此非小緣現此瑞相非小因緣文殊當知惟願文殊當知此意四衆龍神僧尼士女龍天八部瞻察仁者瞻仰觀察仁者文殊為説何等上問二事是説那件爾時文殊師利當彌勒問求決之時語彌勒菩薩摩訶薩語即告也及諸大士在會之衆善男子等稱美大衆為慈善男如我惟忖如我文殊思惟忖度今佛世尊今釋迦尊欲説大法正欲説大雨大法雨下大法雨潤大衆生吹大法螺改大法令號召衆生擊大法鼓震大法雷肅大法衆演大法義演昔未説大乘法義諸善男子告諸會衆我於過去諸佛言於往世諸佛之所曾見此瑞曾見諸佛現此瑞相放斯光已放白光已即説大法諸大乘法是故當知以是之故當知今意今佛現光今釋迦佛現大光明亦復如是與昔是同欲令衆生佛意欲令諸衆生等咸得聞知咸皆得聞如實知解一切世間欲界色界及無色界名三世間難信之法世所難信圓頓法門故現斯瑞為説妙經先現瑞相諸善男子指現在衆如過去無量無邊舉往世時不可思議時節長遠心思口議不可得及阿僧祇劫此云無數時爾時有佛謂往劫時有佛出世號日月燈明日表慧光洞明法界月表定性遊畢竟空燈表戒智照了諸緣三學備修三身圓證三德圓具三智圓明如來一切諸佛皆有通別二種之號日月燈明即別號也如來乃至世尊此十種名諸佛皆同名通號也般若經云無所從來亦無所去此即不生不滅法身如來也法華經云慧光照無量壽命無數劫久修業所得此即五分修成有生無滅報身如來也成實論云乘如實道來成正覺此即有生有滅應身如來也應供如來世尊體具萬德應受人天恭敬供養正遍知亦云等正覺佛正覺性與衆生等世出世法正能覺了無不遍知號正遍知明行足明白梵行皆悉具足善逝善能也逝往也善從迷鄉往於智地世間解善解世間諸衆生意無上士諸菩薩等無明未盡有佛在上名有上士如來極證名無上士調御丈夫調停制御人天象馬慈悲方便名大丈夫天人師若天若人咸蒙開發為世師範佛梵語佛陀此云覺者世出世法悉能覺了世尊具上十號為諸世間之所尊敬演説正法演説正真無上之法初善中善後善從初發心修行於道名為初善自爾之後中間起行名為中善後際究竟成無上道名為後善其義深遠所説法義從初至終深固幽遠其語巧妙語言善巧所説微妙令人樂聞純一無雜一乘純淨無二無三具足清白備具滿足清潔白淨梵行之相約相起修名事梵行照體空寂名理梵行為求聲聞者與厭苦果求聲聞者説應四諦法佛所説法與苦集滅道四諦相應度生老病死修上四諦度出生死究竟涅槃究盡脫離三界苦果入無餘樂為求辟支佛者辟支佛此云緣覺觀十二緣得入道故亦云獨覺出無佛世不因師匠觀物變易獨能覺了説應十二因緣法佛所説法與十二緣一一相應言十二者一無明二行業三情識四名色五六入六相觸七領受八愛樂九取著十有業十一招生十二老死展轉相生謂之因互相由藉謂之緣為諸菩薩大根衆生説應六波羅蜜此云到彼岸生死如此岸煩惱為中流涅槃為彼岸修布施持戒忍辱精進禪定智慧六種梵行度於生死煩惱大海到於菩提涅槃彼岸如所説者機教相應令得阿耨多羅三藐三菩提令此大根菩薩行人證得無上正等正覺成一切種智言智有三一切智空智也道種智假智也一切種智空假不二中智也圓證曰成次復有佛初佛之後復有佛出亦名日月燈明名同初佛次復有佛亦名日月燈明亦同初佛如是二萬佛次第出世總二萬佛皆同一字字即名也號日月燈明二萬諸佛同一名字又同一姓姓亦同也姓頗羅墮此云利根思惟勝故彌勒當知文殊告言慈氏當知初佛後佛最初一佛直至末後二萬尊佛皆同一字名也名日月燈明十號具足如前已解所可説法所有可曾容易而説不可思議寂滅之法初中後善如前已解其最後佛二萬最末未出家時初在俗時有八王子王有八子一名有意有大道意二名善意善大道意三名無量意有大智慧解無量意四名寶意善解寶性具真實道五名增意增修上行有大道意六名除疑意智慧增勝除疑惑意七名響意解法性空如谷答響八名法意於甚深法善解其意是八王子上之八子威德自在威神德用得大自在各領四天下各自領職王四天下是諸王子八人王子聞父出家聞父輪王棄國出家得阿耨多羅三藐三菩提如前已解悉捨王位八子悉棄人王之位亦隨出家亦隨父王出家行道發大乘意勇發大乘菩提道意常修梵行常時修習清白梵行皆為法師八子皆為大乘法師已於千萬佛所先已承事千萬億佛植諸善本種植善根是時日月燈明佛最後如來説大乘經所説之法名無量義從所詮義以立其名教菩薩法教導大根菩薩之法佛所護念是大乘法常為諸佛之所護念説是經已説無量義大乘經已即於大衆中於大法會衆人之中結加趺坐以足相結加趺而坐入於無量義處三昧依經入定身心不動身靜心定是時天雨入是定時諸天雨華曼陀羅華小白華摩訶曼陀羅華大白華曼殊沙華小赤華摩訶曼殊沙華大赤華而散佛上散日月燈頂門之上及諸大衆及諸在會聞法大衆普佛世界普遍十方佛之境界六種震動如前已解爾時會中無量義會比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人及諸小王轉輪聖王等是諸大衆得未曾有歡喜合掌一心觀佛如是等義並如前解爾時如來放眉間白毫相光照東方萬八千佛土靡無也不周遍如今所見是諸佛土並如前解彌勒當知文殊告言慈氏當知爾時會中日月燈佛無量義會有二十億菩薩十萬為億樂欲聽法願樂欲聽所未聞法是諸菩薩二十億衆見此光明見燈明佛白毫相光普照佛土普照東方萬八千土得未曾有得見未有欲知此光欲得知此白毫光明所為因緣光明遠照有何所為因由緣事時有菩薩名曰妙光妙光即是文殊前身有八百弟子皆師妙光是時日月燈明佛從三昧起入於無量義處定已從座而起因妙光菩薩法不孤起起必因人説大乘經所説之法名妙法蓮華如前教菩薩法教授菩薩佛所護念諸佛之所愛護敬念六十小劫器界一增減名為一小劫不起于座於如許時不起此座時會聽者聽法之者亦坐一處不離法席六十小劫聽衆時分亦同如來身心不動內外安然聽佛所説歷耳諦聽佛説法音謂如食頃專心為法不覺時長六十小劫如一飯頃是時衆中時會聽衆無有一人更無一人若身若心身心一如而生懈倦而未嘗生懈倦之心日月燈明佛於六十小劫説是經已説法華已即於梵魔諸梵天王及於魔王沙門此云勤息婆羅門此云淨行及天人諸天及人阿修羅衆中會衆之中而宣此言如下如來於今日中夜如來之道尚於中正至于入滅亦當中夜當入無餘涅槃此云寂滅三惑已盡尚有色身名為有餘機盡應亡名入無餘時有菩薩當佛滅時名曰德藏具足功德如世寶藏日月燈明佛即授其記付授懸記告諸比丘時諸會衆是德藏菩薩次當作佛如今彌勒繼釋迦尊號曰淨身清淨妙身多陀阿伽度此云如來阿羅訶此云應供三藐三佛陀此云正遍知本具十號文略舉三佛授記已佛授德藏淨身記已便於中夜日中降生夜中入滅日陽夜陰諸佛皆爾入無餘涅槃入於寂滅佛滅度後入寂之後妙光菩薩月燈弟子持妙法蓮華經持此法藏滿八十小劫經歷許時為人演説與人講説日月燈明佛八子佛未出家有子八人皆師妙光從妙光學妙光教化教訓化導令其堅固令八王子堅持固守阿耨多羅三藐三菩提如前是諸王子王之八子供養無量百千萬億佛已供養承事無量佛已後方證真皆成佛道本修佛因故皆成佛其最後成佛者法意王子最後成佛名曰然燈因名法意果號然燈法王破有如燈續明八百弟子妙光所化八百徒衆中有一人衆中一人號曰求名未忘世相欲求名稱貪著利養貪著是心利養是物雖復讀誦衆經雖貪利養亦復誦經而不通利為著世緣心非純一故不通利多所忘失不精之過故號求名名由斯得是人亦以此人亦因種諸善根因緣故讀誦衆經修諸福業種善為根以是善因成勝緣故得值無量獲遇無數百千萬億諸佛由昔善緣遇衆多佛供養恭敬奉事謹畏尊重讚歎推尊崇重褒讚稱歎彌勒當知告彌勒言汝當知之爾時妙光菩薩時月燈所妙光菩薩豈異人乎即非他人我身是也文殊自謂是我前身求名菩薩亦非他人汝身是也即汝身是今見此瑞今日見此奇瑞之相與本無異與本月燈瑞相無異是故惟忖是故我今思惟忖度今日如來今則釋迦當説大乘經諸佛既爾今佛亦然名妙法蓮華教菩薩法佛所護念此上十二字即蓮經廣題爾時文殊師利於大衆中欲重宣此義前説後頌故曰重宣而説偈言偈字如前我念過去世文殊思念已往佛世無量無數劫經爾許時有佛人中尊有佛出世為人中尊號日月燈明彼佛名號世尊演説法成佛之後演説諸法度無量衆生無量衆生蒙佛化度無數億菩薩大乘之衆念入佛智慧令諸菩薩入於佛慧佛未出家時佛昔在家為輪王時所生八王子即有意等見大聖出家見父出家成大聖人亦隨修梵行子亦隨父修諸淨行時佛説大乘時月燈説經名無量義無量義經於諸大衆中於大會中而為廣分別為諸會衆廣分別説佛説此經已無量義已即於法座上於無量義法座之上加趺坐三昧結加趺坐入無量定名無量義處三昧之名天雨曼陀華即前四華天鼓自然鳴天鼓空中自然而鳴諸天龍鬼神八部之衆供養人中尊即月燈佛一切諸佛土月燈入定時諸佛土即時大震動如今釋迦地搖六動佛放眉間光放白毫光現諸希有事見諸未有種種異事此光照東方首照東方萬八千佛土表十八界示一切衆生示六道衆生死業報處死此生彼善惡報處有見諸佛土或有得見諸佛淨土以衆寶莊嚴百寶嚴飾琉璃頗梨色琉璃出波羅奈國其色瑩淨頗梨此方有之其色不定佛光照土色如諸寶斯由佛光照所見諸相因佛光照又見諸天人諸天世人龍神夜叉衆乾闥緊那羅即八部衆各供養其佛各各供養其土之佛又見諸如來光所現土諸佛如來自然成佛道佛道清淨本非造作契理悟真即登正覺曰自然成身色如金山身色勝妙如紫金山端嚴甚微妙端正嚴飾精微妙好如淨琉璃中琉璃色淨內外瑩徹內現真金像身如金像性如琉璃色身微妙現於性中世尊在大衆他土諸佛在於衆中敷演深法義敷揚演説深法妙義一一諸佛土萬八千土聲聞衆無數諸土各有無數聲聞因佛光所照由月燈佛光明所照悉見彼大衆盡見他土彼諸大衆或有諸比丘二乘衆也在於山林中間居靜處精進持淨戒精持不犯戒體清淨猶如護明珠如龍護珠又見諸菩薩大乘之衆行施忍辱等修六度也其數如恆沙菩薩之數如恆河沙斯由佛光照因月燈光照見諸相又見諸菩薩深入諸禪定菩薩妙定其數非一故云諸也攝心住寂名為入也身心寂不動內外寂然身心不動以求無上道入於深定求無上道又見諸菩薩知法寂滅相了知諸法寂滅相理各於其國土各於本國説法求佛道諸國菩薩各於其土説法求道爾時四部衆光現土時在會四衆見日月燈佛時四衆見現大神通力所現之相皆佛神力其心皆歡喜其四衆心皆悉歡喜各各自相問互相請問是事何因緣現土之事是何因緣天人所奉尊天人所奉月燈世尊適從三昧起適然月燈從定而起讚妙光菩薩燈明入定放白毫光妙光菩薩教諸弟子故佛出定讚歎妙光汝為世間眼汝是世間人天眼目一切所歸信一切人天歸依信奉能奉持法藏善能奉持如來法藏如我所説法如我所説一切諸法唯汝能證知獨汝能證知解義味世尊既讚嘆燈明世尊讚妙光已令妙光歡喜讚妙光者欲令心喜説是法華經定起乃説滿六十小劫經爾許時不起于此座不起于此法華座席所説上妙法所説最上勝妙之法是妙光法師悉皆能受持能信故受能解故持佛説是法華燈明佛説是法華經令衆歡喜已令大衆聞得歡喜已尋即於是日法華畢日告於天人衆天人四衆諸法實相義諸法之中實相妙義已為汝等説已為汝等如實演説我今於中夜燈明欲於中宵夜分當入於涅槃化畢當入寂滅涅槃汝一心精進囑纍妙光精專進行當離於放逸應當遠離懈怠放逸諸佛甚難值説佛難值令生敬謹億劫時一遇億劫之中時或一遇世尊諸子等燈明八子及諸衆等聞佛入涅槃聞燈明佛欲入涅槃各各懷悲惱各各心懷憂悲苦惱佛滅一何速佛入滅度一何疾哉聖主法之王聖主世尊諸法之王安慰無量衆佛憫衆憂安悉慰喻我若滅度時我若緣盡示寂之時汝等勿憂怖汝等勿得心懷憂怖是德藏菩薩補處菩薩於無漏實相於無漏法實相解脫心已得通達其心已得通暢了達其次當作佛德藏菩薩次當作佛號曰為淨身佛為授記名淨身佛亦度無量衆亦如燈明度生無量佛此夜滅度授記傳法即入涅槃如薪盡火滅機薪既盡應火亦亡分布諸舍利火化之後舍利分布而起無量塔梵語塔婆此云高顯處言衆建塔供佛舍利比丘比丘尼出家二衆其數如恆沙言其多也倍復加精進見佛入滅己事未辦倍復更加精勤修進以求無上道所以進行為求佛道是妙光法師燈明如來付法弟子奉持佛法藏持燈明佛法寶之藏八十小劫中佛滅度後正像法中廣宣法華經廣大宣演妙法華經是諸八王子燈明八子妙光所開化開誘化導堅固無上道小乘教相是生滅法圓頓大乘名無上道不生不滅名堅固法當見無數佛當於來世見無量佛供養諸佛已供養承事無數佛已隨順行大道隨順諸佛行無上道相繼得成佛次第相繼得成佛道轉次而授記展轉依次授補處記最後天中天其最後佛於人天中極為尊勝名天中天號曰然燈佛應身佛號諸仙之導師諸天仙中化導之師度脫無量衆化度衆多令悉解脫是妙光法師是傳法師時有一弟子彼時妙光一人弟子心常懷懈怠其心常懷懈慢怠惰貪著於名利貪心取著名稱財利求名利無厭貪求求心無有厭足多遊族姓家為名利故多去遊歷大族貴姓豪富之家棄捨所習誦心中多事學業荒疏廢忘不通利廢棄忘失不能通利以是因緣故因貪名利廢業之緣號之為求名名不虗得從習而生亦行衆善業雖則貪求亦能修行衆多善業得見無數佛以修善故得見諸佛供養於諸佛因值多佛修法供養隨順行大道隨須諸佛行大乘道具六波羅蜜具足修習六度之行今見釋師子今於賢劫見釋迦尊其後當作佛其求名者於釋迦尊末法之後次當作佛號名曰彌勒此云慈氏廣度諸衆生龍華樹下三會説法度人無量其數無有量不可稱數彼佛滅度後彼燈明佛入滅之後懈怠者汝是彼時求名即今彌勒妙光法師者燈明佛時妙光師者今則我身是彼時妙光即我文殊我見燈明佛我昔見彼燈明如來本光瑞如此本時光明瑞相如此以是知今佛以是昔緣驗知今佛欲説法華經是欲演説妙法華經今相如本瑞今佛瑞相如本燈明是諸佛方便現瑞乃是諸佛方便今佛放光明今釋迦佛放大光明助發實相義扶助開發實相義門諸人今當知在會諸人今當得知合掌一心待合十指掌一心佇待佛當雨法雨釋迦當澍大法之雨充足求道者衆生念法如渴思飲如來法施如雨普沾百穀草木充足無遺諸求三乘人聲聞緣覺及諸菩薩求三乘人若有疑悔者若有疑惑掉悔之者佛當為除斷釋迦當與拔斷疑根𭃖除見網令盡無有餘三惑究盡令無有餘妙法蓮華經方便品第二佛成道已四十餘年為機未堪祕此此經不務速説最後靈山時説之是佛方便爾時世尊文殊説偈答彌勒時從三昧安詳而起從無量義三昧正受安穩詳審起於妙定告舍利弗諸弟子中身子智慧最為第一所以告之諸佛智慧所謂一切智道種智一切種智佛之智也常住實相平等大慧佛之慧也甚深無量諸佛所證徹法源底餘無知者故曰甚深其智慧門上歎實智無有邊量此説慧門非智莫入難解難入深故不易解妙故不易入一切聲聞小乘之人聞佛音聲悟明四諦故曰聲聞辟支佛此云緣覺觀十二緣覺真諦故亦名獨覺匪因師授獨能覺故所不能知二乘小智見解淺劣佛所證妙非彼能知所以者何徵問所以何緣不知佛曾親近緣佛曾經親炙附近百千萬億十萬日億無數諸佛久劫之中所親近者盡行諸佛諸佛行處盡皆行之無量道法無數佛道修行之法勇猛精進敢為曰勇竭智曰猛心一名精趣果曰進名稱普聞令名美稱普遍熏聞成就甚深造作名成圓備曰就成就處妙故曰甚深未曾有法六道三乘未有之法隨宜所説佛雖方便隨其所宜演説諸法意趣難解意思旨趣唯佛究盡餘難曉解舍利弗呼名而告吾從成佛以來我自寂場證果已來種種因緣為鈍根者説過現未種種善惡因心緣種種種譬喻為中根者引種種物譬類比喻廣演言教廣濶演説言説教誨無數方便無數巧妙方法利便引導衆生誘引化導令離諸著衆生頑迷事事貪著佛與方便令其遠離所以者何徵起前意何緣能是如來方便大覺如來慈悲演説法譬因緣是方便義知見波羅蜜達法源底名佛之知了法本空名佛之見到於彼岸名波羅蜜皆已具足解行皆已具備滿足舍利弗如來知見正知正見廣大深遠遍了諸法名之曰廣出諸聖表名之曰大窮實際地名之曰深無人能到名之曰遠無量無礙非算所知故無數量性本空寂故無罣礙力無所畏佛之十力四無所畏禪定解脫三昧禪定是因解脫是果三昧梵語此云云定深入無際如上盡行諸佛行處戒定慧力一一正入無有邊際成就一切未曾有法如上舍利弗如來能種種分別如五陰十二處十八界四諦十二緣六度萬行以種種智廣分別説巧説諸法所説機名巧法義非一名諸言詞柔軟所出言句柔和細軟悅可衆心悅樂稱可衆人之心舍利弗取要言之取撮要妙為汝言之無量無邊未曾有法如上諸法佛悉成就謂佛盡證止舍利弗法既深妙人難信解只宜止之不須復説不必更説所以者何何因緣故止不須説佛所成就由佛世尊所成就者第一希有唯佛獨證故云第一昔所未聞故云希有難解之法理深法妙所以難曉唯佛與佛唯獨諸佛與釋迦尊乃能究盡窮究盡底諸法實相微妙深法因妄有相了法性空名為實相所謂諸法十如是者一經之要為顯實相令得開解如是相相謂相貌有真有妄真即常住無生無滅真如實相即經云唯佛與佛乃能究盡諸法實相妄即無明有生有滅虗幻之相即經云見諸衆生為生老病死憂悲苦惱之所燒煮等如來明見無有錯繆如理真實名如是相因佛説故衆生得聞即經云諸法實相義已為汝等説如是性業不自生實由性起心本具有善惡之性隨時因緣種種差別如竹木中有於火性若非遇緣無由得發必須鑽截火相方生為善而發則名智光成就善事為惡而發則名毒火成就妄緣性本空寂隨緣轉變即楞嚴云火性無我寄於諸緣如是體體有三義聖凡平等名理為體五分修成名無漏體五陰幻軀名有漏體如是力指業體上所有功力十界依正業力所成如是作作是運造各隨其力進善得福為惡招殃如是因因上因由正指心地一切善惡唯心所現譬諸草木因地所生如是緣緣即時事本非善惡其必由心相貌方顯如燥就火勢則蔓莚如氷見日凍則消融如是果行始為因行終為果善惡悉是攬因成果如是報業果既成隨業受報悟成四聖迷號六凡如是本末究竟等迷悟兩途從本至末因果不二究竟平等爾時世尊説是法時欲重宣此義而説偈言為未了者重括前義以偈説之世雄不可量大雄猛世尊智慧不可量諸天及世人人天二道一切衆生類遍該九道無能知佛者六道三乘莫知佛意佛力無所畏十力四無所畏解脫諸三昧不可思議微妙解脫百千萬億諸大三昧及佛諸餘法言佛餘法指權三乘無能測量者唯除世尊餘無能測本從無數佛由佛本來從無數佛具足行諸道具足修行諸佛道法甚深微妙法即上力無畏等佛所行處無上甚深微妙之法難見難可了理體義趣二俱深妙非眼所見非心能了於無量億劫曾於無數億千時分行此諸道已具行如上諸聖道已道場得成果修道之處名曰道場得最正覺名曰成果我已悉知見佛已於法盡知盡見如是大果報無上正覺名為大果圓滿報身名為大報種種性相義即指十如性相之義我及十方佛唯佛與佛乃能知是事言是事者即微妙法是法不可示如是妙法本非言説不可以語開示於人言詞相寂滅出言相表體性寂滅諸餘衆生類六道三乘衆生等類無有能得解非其智力之所能了除諸菩薩衆唯除信力大菩薩衆信力堅固者法門深妙非信不入除力堅實牢固之者諸佛弟子衆諸佛會中三乘弟子曾供養諸佛緣覺之人兼修福分曾供諸佛一切漏已盡三界漏業已得悉盡住是最後身於最後身得成緣覺如是諸人等於如是等緣覺之人其力所不堪力雖超生不堪聞妙假使滿世間假使滿於十方世間皆如舍利弗盡如身子智慧第一盡思共度量竭其神思忖度籌量不能測佛智莫能測知佛之智慧正使滿十方滿十方界皆如舍利弗皆如身子有大智慧及餘諸弟子及餘諸人大弟子等亦滿十方剎亦滿十方無數剎土盡思共度量亦復不能知前但引智如諸弟子亦不能測辟支佛利智緣覺獨覺其智稍利過於聲聞無漏最後身已無諸漏最後覺身亦滿十方界亦如聲聞滿十方界其數如竹林狀其多也斯等共一心是等支佛同一心念於億無量劫於是許時欲思佛實智欲思如來真實智慧莫能知少分欲知小分亦不能得新發意菩薩新發道意諸菩薩等供養無數佛已曾供養無數諸佛了達諸義趣解了通達諸法義趣又能善説法又復善能為他説法如稻麻竹葦舉此四物以況數多充滿十方剎初心菩薩滿十方界一心以妙智皆共一心以勝妙智於恆河沙劫經劫之多如恆河沙咸皆共思量是諸人等皆共忖度不能知佛智不能了知佛之智慧不退諸菩薩前約初心此不退位諸菩薩等其數如恆沙不退深位如恆沙多一心共思求亦復不能知登位不退慧力雖深不能知佛又告舍利弗無漏不思議法性清淨離諸漏染不可心思及以口議甚深微妙法法性甚深微密玄妙我今已具得佛今已皆具足證得唯我知是相唯佛能知如是法相十方佛亦然十方果佛亦復如然舍利弗當知告舍利弗汝當知之諸佛語無異諸佛語同今生信也於佛所説法於佛所説大同之法當生大信力當生廣大深信之力世尊法久後世尊説法過四十年故云久後要當説真實四十年前説方便教久後機熟要當説真告諸聲聞衆在會聲聞及求緣覺乘在會支佛我令脫苦縛佛昔教化令得脫離生死苦縛逮得涅槃者逮及得證寂滅樂者佛以方便力如來隨機用方便力示以三乘教開示方便聲聞緣覺及以菩薩三乘之教衆生處處著衆生在迷無境不著引之令得出佛方便引令得出離爾時大衆中有諸聲聞漏盡阿羅漢阿若憍陳如等千二百人並如經初及發聲聞辟支佛心比丘比丘尼優婆塞優婆夷各作是念因佛稱歎法深難解故興疑念今者世尊何故殷勤殷實勤重稱歎方便妙乘引接是佛方便而作是言佛所得法佛於道場所證得法甚深難解法義深故淺機難解有所言説佛已有説意趣難知意思義趣難可得知一切聲聞辟支佛所不能及二乘智力所不能及佛説一解脫義佛説一種小乘解脫寂滅之義我等亦得此法得此真空解脫之法到於涅槃證寂滅樂而今不知而今所歎我不能知是義所趣是大乘義之所趣向爾時舍利弗知四衆心疑知諸四衆心中疑惑自亦未了自於此法亦未明了而白佛言白釋迦佛世尊何因何緣以何因由有何緣故殷勤稱歎殷勤其心稱揚讚歎諸佛第一方便常途方便接引三乘諸佛第一甚深方便不知何法甚深微妙深奧之甚微密勝妙難解之法三乘不知故曰難解我自昔來我從昔日鹿苑已來未曾從佛未曾得從聞如是説聞佛如是稱歎之法今者四衆咸皆有疑衆皆不曉咸有疑心惟願世尊思願如來敷演斯事敷布演説所疑此事世尊何故何因緣故殷勤稱歎甚深微妙難解之法爾時舍利弗欲重宣此義而説偈言慧日大聖尊佛之智慧如日普照大覺聖主萬德世尊久乃説是法成道久後乃説是法自説得如是佛自説得如是第一難解之法力無畏三昧十力四無所畏諸正定聚禪定解脫等禪那寂定諸解脫等不可思議法是法微妙不可思議道場所得法於道場中所得之法無能發問者無有人能發問之者我意難可測佛意微妙難可測度亦無能問者非獨難測亦無能問無問而自説無人請問佛自宣説稱歎所行道歎己所行無上之道智慧甚微妙其智甚是微密奇妙諸佛之所得如是深智諸佛所得無漏諸羅漢無漏聖道諸四果人及求涅槃者即前發於聲聞緣覺二種之心求寂滅者今皆墮疑網已證小果及求證者今皆墮於疑惑之網佛何故説是世尊何故而説是言其求緣覺者其有求證緣覺之者比丘比丘尼出家二衆諸天龍鬼神及乾闥婆等八部之衆相視懷猶豫衆各相視猶豫不決瞻仰兩足尊瞻視攀仰福慧具足萬德世尊是事為云何此事是如何願佛為解説願佛慈悲與衆解説於諸聲聞衆於聲聞乘弟子衆中佛説我第一佛常説我智慧第一我今自於智我於佛智今自不曉疑惑不能了心懷疑惑不能決了為是究竟法為復是説果上所證究竟大法為是所行道為復是説因地所行清淨之道佛口所生子從佛口聞四諦之法得入聖道名所生子合掌瞻仰待合十指掌瞻仰於佛以俟開發願出微妙音願佛出於微妙法音時為如實説一時與衆稱實而説諸天龍神等八部之衆其數如恆沙言其多也求佛諸菩薩求成佛道諸多菩薩大數有八萬大約之數有八萬衆又諸萬億國世間諸國轉輪聖王至諸轉輪王咸至佛所合掌以敬心合掌瞻侍以表敬心欲聞具足道願業欲聞具足妙道爾時佛告舍利弗當舍利弗説是偈時止止不須復説重言止止不須説得若説是事言是事者即上妙法上但云止下顯止意一切世間三世間也諸天及人三界諸天及以世人皆當驚疑世間淺識乍聞深法皆當驚恐生疑惑心舍利弗重白佛言先已蒙止今重白言世尊惟願説之惟願説之求佛為説所以者何所以請説其意云何是會無數百千萬億阿僧祇衆生阿僧祇此云無數曾見諸佛已曾得見衆多諸佛諸根猛利六根清淨勇猛聰利智慧明了聰明了達聞佛所説聞佛世尊所説深妙則能敬信佛恐驚疑所以不説今説慧明心能敬信爾時舍利弗欲重宣此義而説偈言法王無上尊佛王三界為大法王於世間中為無上尊惟説願勿慮惟願説之願勿有慮是會無量衆今此會中無數大衆有能敬信者有能敬法佛復止舍利弗身子再請佛復止之若説是事若還演説是妙法事一切世間天人阿修羅皆當驚疑天修驚疑説之無益增上慢比丘增上修行下視一切謂他不及起傲慢心將墜於大坑將使傲慢無知之人墜於生死大我慢坑爾時世尊重説偈言止止不須説再止之也我法妙難思所以不説為難思故諸增上慢者諸增上行傲慢之人聞必不敬信此等若聞必不敬信爾時舍利弗重白佛言佛已重止身子又復至於再三世尊惟願説之惟願説之重言願説誠之切也今此會中今此靈山大會之中如我等比似己之衆百千萬億衆數如是世世已曾從昔世世已曾見佛從佛受化從佛世尊聞法受化如此人等如上諸人必能敬信久從佛化必能信法長夜安穩無明黑暗名為長夜若能敬信必出生死名為安穩多所饒益多有所得饒潤利益爾時舍利弗欲重宣此義而説偈言無上兩足尊福慧兩足無上慈尊願説第一法願説第一微妙之法我為佛長子我是世尊得法長子惟垂分別説惟願垂慈分別而説是會無量衆是法會中無數大衆能敬信此法言此衆人能敬信法佛已曾世世佛於過去世世已曾教化如是等教訓化道如是等衆皆一心合掌衆皆一心恭敬合掌欲聽受佛語意欲聽聞信受佛語我等千二百千二百人大阿羅漢及餘求佛者如序中列諸弟子等願為此衆故願為此等諸大衆故惟垂分別説思垂大慈分別演説是等聞此法是等大衆得聞妙法則生大歡喜則能敬信生大喜悅爾時世尊告舍利弗汝已殷勤三請言舍利弗已伸三請豈得不説請既勤重何得不説汝今諦聽將欲為説先戒攝耳至心諦聽善思念之善自思惟而敬念之吾當為汝許為衆等分別解説如下文中法説譬説及因緣説説此語時吾佛世尊作是説時會中有比丘比丘尼優婆塞優婆夷五千人等出家在家總五千人即從座起從法會起禮佛而退作禮世尊合掌而退所以者何佛欲説法而衆退席其意何此輩罪根深重此等五千無明妄念能生諸過名為罪根業深障重及增上慢增上修行輕懈怠者未得謂得未有所得自謂有得未證謂證未有所證自謂已證有如此失有此過失是以不住所以退席不住法筵世尊默然佛但緘默而不制止而不制約止遏令住爾時佛告舍利弗我今此衆上慢既去佛告身子我今現前此諸大衆無復枝葉上慢人去如去枝葉純有貞實純有樹身貞固堅實舍利弗如是增上慢人即五千衆退亦佳矣昔止不説為上慢故今得退去甚為佳矣汝今善聽汝今善自攝心諦聽當為汝説許為衆説舍利弗言唯然世尊唯然者應諾之詞願樂欲聞心願愛樂欲得聽聞佛告舍利弗如是妙法如是當説微妙之法諸佛如來時乃説之妙法難思須得其時機與緣熟方乃敢説如優曇鉢華此云瑞應華時一現耳譬瑞應華待時方現舍利弗汝等當信汝等當起大信心佛之所説信佛世尊所説妙法言不虗妄佛言真實無有虗妄舍利弗諸佛隨宜説法隨諸衆生之所宜樂而為説法意趣難解意思義趣深妙難解所以者何云何難解我以無數方便佛以種種方便智慧種種因緣及以種種心因境緣譬喻言詞引物譬類比喻而説演説諸法流演講説一切諸法是法非思量分別法性空寂離諸名相非心所思非口分別之所能解思議莫及唯有諸佛唯佛與佛乃能知之乃能得知所以者何有何所以如此難解諸佛世尊三世諸佛世間之尊唯以一大事因緣故獨以開示悟入衆生本有佛之知見出離生死一件大事正因善緣之故出現於世示現神變出於世間舍利弗云何名諸佛世尊唯以一大事因緣故出現於世此乃問起答見下文諸佛世尊欲令衆生開佛知見知即佛心見即佛眼未聞法前心常蒙蔽欲為敷演令得心開使得清淨故使除穢染復本清淨出現於世為是故現欲示衆生佛之知見故出現於世上云開者譬如啓關今云示者如以室中所有之物而點示之欲令衆生悟佛知見故出現於世所以開示實知實見欲令省悟知心是佛欲令衆生入佛知見道故出現於世前雖省悟具佛見知今欲證入得佛智慧舍利弗是為諸佛以一大事因緣故出現於世此四句者結示上文開示悟入名一大事因緣佛告舍利弗諸佛如來但教化菩薩此明佛出本意但為教諸菩薩令入佛道諸有所作始從成佛來至法華凡有施為作諸方便常為一事常常只是為一大事唯以佛之知見示悟衆生所謂一事即斯是也舍利弗如來但以一佛乘故雖説三乘其實為一為衆生説法為衆生説令得一乘無有餘乘若二若三唯一佛乘無有其餘若大小二乘及聲聞緣覺菩薩三乘舍利弗一切十方諸佛法亦如是非獨今佛説一乘法一切十方諸佛亦爾舍利弗過去諸佛已往之佛以無量無數方便謂諸度門善巧方便種種因緣善惡報應一切因緣譬喻言詞譬類比喻語言詞句而為衆生為衆生故演説諸法諸方便法是法皆為一佛乘故雖説諸法為入一乘是諸衆生聞法之衆從諸佛聞法從諸佛所獲聞妙法究竟皆得初雖説三畢竟皆令得一乘道一切種智言智有三一切即空智二乘人所證也種即道種智方便菩薩所證也一切種者雙收空假即是中道佛之智也舍利弗未來諸佛於未來時當出於世當出世者亦以無量無數方便種種因緣譬喻言詞而為衆生演説諸法是法皆為一佛乘故示一切佛心法俱同是諸衆生從佛聞法究竟皆得一切種智示令衆生所證皆等舍利弗現在十方無量百千萬億佛土中前明過未此説現在十方一切諸佛土中諸佛世尊現在説法住世慈尊多所饒益多所方便饒潤利益安樂衆生安穩快樂一切衆生是諸佛是十方佛亦以無量無數方便種種因緣譬喻言詞而為衆生演説諸法是法皆為一佛乘故引現在佛所為同也是諸衆生從佛聞法究竟皆得一切種智示諸衆生得益同也舍利弗是諸佛是三世佛但教化菩薩但為菩薩無有餘乘欲以佛之知見示衆生故欲以二字即佛心也知見二字即佛慧也欲以佛之知見悟衆生故欲令衆生入佛之知見故示悟入者佛權智也會此理者衆生即佛舍利弗我今亦復如是會同三世知諸衆生佛智所知有種種欲衆生心中種種情欲深心所著於諸塵境極生愛樂隨其本性隨諸迷者根本習性以種種因緣譬喻言詞方便力一切方便智慧之力而為説法與之演説舍利弗如此皆為得一佛乘一切種智故如此種種無數方便皆為衆生令得一乘舍利弗十方世界中十方一切諸佛土中尚無二乘尚無大小兩乘何況有三何況更有聲聞緣覺及以菩薩三乘之教舍利弗諸佛出於五濁惡世如以土塵投於清水汩然昏亂名之為濁以虗妄念惑本淨心翻成靉昧名為濁惡所謂劫濁時世惡也煩惱濁心常愁惱不能清也衆生濁衆念生起常昏亂也見濁心眼所見不離塵緣命濁一期報命常在濁中如是舍利弗如是二字指上五濁劫濁亂時末劫濁世昏亂之時衆生垢重世間衆生障垢深重慳貪嫉妬吝財曰慳過取曰貪害賢曰嫉害色曰妬成就諸不善根故無明所覆作諸惡業名不善根諸佛以方便力衆生迷故佛興方便於一佛乘於一實道無上佛乘分別説三善巧分別作三乘説舍利弗若我弟子若我釋迦座下弟子自謂阿羅漢辟支佛者若二乘人自謂我是聲聞及緣覺者不聞不知耳不能聞心不能知諸佛如來但教化菩薩事不知如來但為菩薩執有三乘此非佛弟子非是菩薩非阿羅漢但是小乘羅漢非大乘阿羅漢非辟支佛但是小緣覺非大緣覺也又舍利弗是諸比丘比丘尼小乘二衆自謂已得阿羅漢如入第四禪無聞見比丘本是凡夫妄言證聖自謂已得阿羅漢果是最後身是出三界最末後身究竟涅槃於有漏天計無漏果便不復志求阿耨多羅三藐三菩提於小利中自以為足不求大利成三菩提當知此輩皆是增上慢人但以勤故增上修行得小歡喜無深聞見其實未得一切聖果未得謂得名上慢人所以者何何以見得未曾證入若有比丘實得阿羅漢若有實證無緣不信若不信此法無有是處若實有證自當信法證而不信無有是處除佛滅度後唯除如來滅度之後現前無佛現前無佛住世之時所以者何何故除此佛滅度後世無明師如是等經如是大乘諸經典等受持讀誦解義者言正信人是人難得如是之人世所難得若遇餘佛若得逢遇餘佛出世於此法中於此大乘微妙法中便得決了大乘深義遇佛方決舍利弗汝等當一心信解心無異念名之為一受持佛語因信故受因受故持諸佛如來言無虗妄佛語真實決無虗妄無有餘乘無二無三唯一佛乘唯只有佛一乘實道爾時世尊欲重宣此義而説偈言比丘比丘尼有懷增上慢懷抱增上侮慢之心優婆塞我慢恃己凌他優婆夷不信如前四衆無正信心如是四衆等僧尼士女及八部等其數有五千總如許人不自見其過不能自知上慢之失於戒有缺漏持守小精缺失滲漏護惜其瑕疵玉病曰瑕人病曰疵汙本受體名曰瑕疵是小智已出樂著小法名為小智幸已出去衆中之糟粳解在皮膚無正體用如酒之糟如米之粳佛威德故去佛威德勝畏難故去斯人鮮福德斯等五千福緣德行皆悉鮮少不堪受是法力不堪任受是大法此衆無枝葉今此大衆見思枝葉皆已雕喪唯有諸貞實獨有貞堅恪實根𠏉舍利弗善聽告舍利弗汝善聽受諸佛所得法諸佛世尊道場所得無量方便力方便善巧權智之力而為衆生説為利根者如實而説衆生心所念而諸衆生心中所念種種所行道即方便教五乘之道若干諸欲性若干之數諸樂欲性先世善惡業過去所作善惡之業佛悉知是已佛悉知彼諸根器已以諸緣譬喻以諸因緣及以譬喻言詞方便力語言方便智慧之力令一切歡喜令一切衆皆得歡悅或説修多羅此云契經諸佛所説契理合機伽陀及本事伽陀或云偈他此翻孤起謂無長行直説偈也本事者説本宿世所行之事本生未曾有本生者説本宿世所生之身未曾有者即説希有未聞之法亦説於因緣善惡等因及善惡緣譬喻并祇夜譬喻者引譬喻説祇夜者即是重頌括前長行而作偈説優波提舍經此云論議通前九部名方便法鈍根樂小法鈍劣根器樂著小法貪著於生死貪心愛著生死境上有為之法於諸無量佛於諸佛所不行深妙道不能受行深妙之道衆苦所惱亂常為生老病死冤憎會苦愛別離苦求不得苦五盛陰苦惱亂其心為是説涅槃與此厭苦求小之機説於有餘及以無餘二種涅槃我設是方便佛施如是方便之教令得入佛慧令得漸漸入佛智慧未曾説汝等但未曾説汝等聲聞當得成佛道亦復當得成就佛道所以未曾説所以從昔未曾説者説時未至故為機鈍劣時節未至今正是其時今此正是當説之時決定説大乘昔方便教有開有廢非決定説今説妙乘名為決定我此九部法我昔所説九部方法隨順衆生説皆是隨機順情而説入大乘為本入於大乘一實境界方是根本以故説是經以是之故説此妙乘有佛子心淨若有佛子心地清淨柔軟亦利根調柔和軟又復利根即大機也無量諸佛所於諸佛所而行深妙道修大乘行為此諸佛子為此大機諸佛子等説是大乘經説是大乘圓妙之法我記如是人我即授記如是等機來世成佛道於當來世成就佛道以深心念佛二乘之機但樂小果其心淺近大乘菩薩直欲究竟成就佛果其心遠大名曰深心以此之心緣想於佛名之為念修持淨戒故三學之中以戒為首戒淨定明得入佛慧此等聞得佛此等大機聞得成佛大喜充遍身心大歡喜充滿其身佛知彼心行佛知彼機所有心行故為説大乘故為斯等説最上乘聲聞若菩薩一切聲聞若或菩薩聞我所説法聞佛所説微妙之法乃至於一偈下至聞得一四句偈皆成佛無疑皆得成佛決定無疑十方佛土中十方世界佛國土中唯有一乘法唯有一乘圓妙之法無二亦無三即無大小二乘亦無聲聞緣覺菩薩三乘除佛方便説除佛慈悲方便説三但以假名字若二若三悉是假名引導於衆生以方便力引導衆生説佛智慧故所以説小引入佛慧諸佛出於世諸佛世尊出現於世唯此一事實唯此妙乘是圓實法餘二則非真餘之二乘三乘但是方便而非真實終不以小乘初雖説二終但用大濟度於衆生拯濟救度於諸衆生佛自住大乘佛自住於究竟大乘如其所得法如佛所證道場得法定慧力莊嚴禪定智慧十力莊嚴以此度衆生以此自證度他衆生自證無上道佛自證得無上之道大乘平等法生佛不二平等之法若以小乘化若佛證大以小化他乃至於一人下至以小化於一人我則墮慳貪佛若隱大為之説小則墮貪心慳吝於法此事為不可此之一事為不可也若人信歸佛若人信心歸依於佛如來不欺誑如來誠實決無欺誑亦無貪嫉意亦無貪嫉妬之意斷諸法中惡斷諸法中所有惡業故佛於十方故佛世尊於十方界而獨無所畏惑業未盡不能無怖佛惑究盡獨無畏懼我以相嚴身我以相好莊嚴之身光明照世間智慧光明普照世間無量衆所尊無量大衆之所敬尊為説實相印為是衆生説於實相正法之印舍利弗當知汝舍利弗當知我意我本立誓願我於本因立大誓願欲令一切衆欲令一切諸衆生等如我等無異如佛世尊等無有異如我昔所願如我昔時所發誓願今者已滿足今已滿願得成佛道化一切衆生化誘一切在迷衆生皆令入佛道皆令入於佛之正道若我遇衆生我若逢遇一切衆生盡教以佛道盡以佛道而教化之無智者錯亂無大智者心錯倒亂迷惑不受教迷昧疑惑不能受教我知此衆生我知此等迷惑衆生未曾修善本未曾修學大乘善本堅著於五欲堅心取著色聲香味觸五欲之境癡愛故生惱愚癡愛戀故生煩惱以諸欲因緣以貪諸欲惡因緣故墜墮三惡道趺墜陷墮地獄餓鬼畜生三種惡道輪回六趣中業果相酬如輪之轉趣入三善三惡六道之中備受諸苦毒備具受納諸苦毒報受胎之微形受胞胎生微末之形世世常增長世世積業增長苦報薄德少福人德微福鮮下劣之人衆苦所逼迫常為諸苦之所逼迫入邪見稠林入於邪見生死稠林若有若無等若有即執有者若無即執空者等諸邪見依止此諸見依附止住此有無等諸不正見具足六十二諸外道等及以凡夫於五陰境起四種見或云色大我小我在色中或云色小我大色在我中或云色即是我或云離色是我色陰既爾餘之四陰受想行識亦各四句總成二十若約三世過現未來各二十句共成六十兼於根本斷常二見總六十二深著虗妄法深重愛著世間妄見虗偽之法堅受不可捨堅心取著不肯棄捨我慢自矜高生大我慢矜誇高傲自重輕他諂曲心不實諂妄邪曲心不直實於千萬億劫經爾許時不聞佛名字不聞諸佛萬德名字亦不聞正法亦復不聞如來正法如是人難度如是之人以無緣故難可度脫是故舍利弗以是之故我為設方便我為施設三乘方便説諸盡苦道説諸法門盡苦之道示之以涅槃示以涅槃寂滅之法我雖説涅槃我雖為説寂滅之法是亦非真滅是乃方便非是究竟寂滅之法諸法從本來一切諸法從本以來常自寂滅相法性清淨本自寂滅名為實相佛子行道已佛子行此佛之道已來世得作佛於未來世當得作佛我有方便力我有度生方便之力開示三乘法開通列示三乘之法一切諸世尊一切世間諸佛世尊皆説一乘道佛佛皆説一乘之道今此諸大衆今此會中現前大衆皆應除疑惑皆應深信於圓頓教勿生疑慮以自迷惑諸佛語無異十方諸佛同一圓乘無有異語唯一無二乘唯有一乘更無二法過去無數劫已往之世無數劫中無量滅度佛百千萬億種是等諸佛其數不可量其數甚多不可量度如是諸世尊種種緣譬喻種種因緣及以譬喻無數方便力以無數種善巧方便演説諸法相世出世間一切法相是諸世尊等億萬無量佛皆説一乘法皆説一乘實相之道化無量衆生化度無量有緣衆生令入於佛道令入一乘無上佛道又諸大聖主又復諸大聖明法主知一切世間佛智察知世間之中天人群生類諸天世人及諸世間衆生之類深心之所欲深著妄心之所樂欲更以異方便三乘權道名異方便助顯第一義以權助實顯第一義若有衆生類若有一切衆生之類值諸過去佛或曾值遇過去諸佛若聞法布施若或聞法及以布施或持戒忍辱或能持戒及以忍辱精進禪智等精進不懈禪定智慧等即六度萬行種種修福慧種種修習福慧二嚴如是諸人等皆已成佛道是等諸人於過去世修梵行者皆已成佛諸佛滅度後前據佛世此明滅後若人善軟心若復有人善和細軟如是諸衆生皆已成佛道皆已成佛知無異乘諸佛滅度已於佛滅後供養舍利者恭敬供養佛舍利者起萬億種塔起造萬億種種之塔奉安舍利金銀及頗梨即水晶也硨磲與瑪瑙如前玫瑰琉璃珠玫瑰石奇美者名玫圓淨者名瑰琉璃如前珠即真珠清淨廣嚴飾以諸清淨種種好物而為嚴飾莊校於諸塔莊嚴鉸鏈於諸寶塔或有起石廟或復有人以石起廟旃檀及沉水或栴檀木及沉水香木櫁并餘材木樒即香木長安有之可以造像及餘諸材植也甎瓦泥土等以是等物起造殿塔若於曠野中積土成佛廟於空曠野積土成廟如土擊之類乃至童子戲以至孩兒童子戲笑之間聚沙為佛塔雖云嬉戲聚沙為塔亦是善因如是諸人等皆已成佛道此舉過去行諸善因已成就者勸令生信若人為佛故若復有人為佛之故建立諸形像前説造塔及以殿宇此下明造佛菩薩像刻雕成衆相皆已成佛道或石或木刻鑿雕鐫成諸佛像及餘聖像或以七寶成或以寶物若鑄若裝及雕琢成鍮鉐赤白銅鍮鉐似金白鑞及鉛錫鉛軟錫堅其色帶青鐵木及與泥鐵鑄木雕及以泥塑或以膠漆布膠漆布即三物嚴飾作佛像用嚴聖像如是諸人等皆已成佛道如是過去造像之人皆已成佛示得果也彩畫作佛像彩色繪畫百福莊嚴相作佛世尊百種福德莊嚴之相自作若使人皆已成佛道若自造像若使人造乃至童子戲下至兒童作戲若草木及筆若用草木及以筆墨或以指爪甲或但用指爪甲而畫作佛像已上多種作佛形像如是諸人等漸漸積功德漸漸積聚無邊功德具足大悲心具足成就大慈悲心皆已成佛道昔如是者皆已果證但化諸菩薩言過去佛無別異乘但有一乘教菩薩法度脫無量衆救度解脫無量衆生若人於塔廟有舍利者名之為塔奉貌像處名之為廟寶像及畫像衆寶以成或彩畫像以華香幡蓋華表善因香表善德幡表善身蓋表善果敬心而供養以恭敬心而修供養若使人作樂若或使人作衆音樂擊鼓吹角貝以桴擊鼓或吹長角及以貝螺簫笛琴箜篌編竹為簫刳竹為笛舜琴五絃周琴七絃箜篌亦竹為之漢之樂也琵琶鐃銅鈸琵琶以木為之而有三絃鐃與銅鈸如世所有如是衆妙音如是等樂衆妙音聲盡持以供養盡世所有持以供養或以歡喜心或因見佛生歡喜心歌唄頌佛德永言曰歌唄即梵音讚德曰頌乃至一小音下至最低一小音聲皆已成佛道舉古勸今若人散亂心若復有人散亂心中乃至以一華舉少況多供養於畫像所畫佛像漸見無數佛以是緣故漸漸得見無數諸佛或有人禮拜以頭至地名之為拜或復但合掌兩掌相合以表敬儀乃至舉一手下至略爾舉手加額或復小低頭或復小小低頭致敬以此供養像以此禮儀供養佛像漸見無量佛以此善緣漸見諸佛自成無上道積功纍德自行成也廣度無數衆廣博度脫無數衆生入無餘涅槃此是利他令得究竟無上涅槃如薪盡火滅衆生如薪草聖應如爐火機薪既盡應火云亡若人散亂心若復有人以散亂心入於塔廟中入於塔廟或復殿內一稱南無佛發一念心稱歸敬佛皆已成佛道云何一念便得成佛若不發心終不證悟千里之行始於初步萬德功勳始於一念舉過去世所習微因皆已成佛驗非虗唱於諸過去佛於過去世無數諸佛在世或滅後或佛在世或滅度後若有聞是法若有聞是一乘妙法皆已成佛道此舉聞法得成佛道未來諸世尊往佛既爾未來亦然其數無有量佛之名數無有限量是諸如來等是等未來諸世尊等亦方便説法亦以方便演説諸法一切諸如來未來一切諸佛如來以無量方便一切教法皆佛方便度脫諸衆生度脫一切未來衆生入佛無漏智入於佛乘無漏智慧若有聞法者若有聞佛所説妙法無一不成佛無有一人不得成佛諸佛本誓願衆生聞法皆不退轉得成佛者由佛願力我所行佛道我之所行入佛之道普欲令衆生普欲令彼法界衆生亦同得此道亦同得此無上佛道未來世諸佛未來之世所有諸佛雖説百千億雖則演説百千億種無數諸法門無數方便諸法度門其實為一乘稱實而言皆為一乘諸佛兩足尊福慧俱足知法常無性諸佛了知一切諸法常住不遷由來空寂本無自性佛種從緣起佛性種子五分功德從緣而起成就報身是故説一乘以是之故説一佛乘是法住法位是一切法本性空寂如如不動名住法位世間相常住世間妄相生滅法也常住實相不生滅也了法無生相即無相如水中月虗而可見無心鑑像照而常空於道場知已佛於道場證知此已導師方便説為世導師因衆生故假以言詞方便而説天人所供養一切天人之所供養現在十方佛前明往佛自行化他此説現在亦復如是其數如恆沙佛數之多如彼河沙出現於世間諸佛慈悲出現於世安穩衆生故為欲安穩諸衆生故亦説如是法亦如往佛説諸實相寂滅之法知第一寂滅佛知諸法清淨第一常自寂滅以方便力故法本無言以方便故為諸衆生種種解説雖示種種道雖則開示種種道門其實為佛乘據其實意皆為佛乘知衆生諸行知諸衆生種種心行深心之所念於何法中深生愛念過去所習業於過去世所習何業欲性精進力種種樂欲種種習性於何法中而能精進有於何等清淨道力及諸根利鈍根器不同有上中下利為上根鈍即中下以種種因緣如本生本事無數種因緣譬喻亦言詞引物比喻言詞演説隨應方便説隨其所當方便為説今我亦如是諸佛既然今我亦爾安穩衆生故為令衆生得安樂故以種種法門以種種法為入道門宣示於佛道宣通示教於佛之道我以智慧力我以佛智方便之力知衆生性欲知諸衆生種種根性種種欲樂方便説諸法説於三乘方便之法皆令得歡喜隨根説法故皆歡喜舍利弗當知汝舍利弗當知此意我以佛眼觀我以佛證圓通之眼觀彼法界見六道衆生鑑見六道在迷衆生貧窮無福慧乏少曰貧窘極曰窮慳故不施所以無福愚故不學所以無慧入生死險道生死可畏名險惡道相續苦不斷由過去業感現在身於現身中不知出要起惑造業招未來苦遞相接續無間斷時深著於五欲於五欲境深生愛著如𤛆牛愛尾𤛆牛之性酷愛其尾以貪愛自蔽以貪愛故自蔽妙明盲瞑無所見無目曰盲黑暗曰暝於一切法無有所見不求大勢佛為無見故不能進求大勢力佛及與斷苦法及與斷苦寂滅之法深入諸邪見深入生死邪見稠林以苦欲捨苦妄習苦業欲捨苦報為是衆生故為此邪見諸衆生故而起大慈心而佛起於大悲憫心我始坐道場我於摩竭始坐道場觀樹亦經行觀菩提樹往昔因緣亦於樹下寂靜經行於三七日中既成道已攝靜三七思惟如是事思量忖度如是化事我所得智慧佛所證得無上智慧微妙最第一微密圓妙最為第一衆生諸根鈍而諸衆生根性昏鈍著樂癡所盲以著世樂為癡所蔽如斯之等類如此等衆一類衆生云何而可度云何説法而可度脫爾時諸梵王佛作爾思時諸色界諸梵天王及諸天帝釋佛一化境有三千界百億須彌一一須彌各一帝釋故云諸也護世四天王守護世界四天門王及大自在天欲界第六天於欲界中名為自在色頂摩醯於色界中名大自在并餘諸天衆并餘在會諸天仙衆眷屬百千萬一一諸天各與眷屬百千萬衆恭敬合掌禮一心恭敬合掌頂禮請我轉法輪請佛為衆轉大法輪我即自思惟我即於座自心思惟若但讚佛乘若獨讚嘆一佛乘道衆生沒在苦而諸衆生沒於苦海不能信是法終不能得信是妙法破法不信故破毀正教不能信故墜於三惡道因破法故必墮惡道非為無益而又害之我寧不説法我則寧可不如莫説疾入於涅槃疾速入於寂滅涅槃尋念過去佛尋復思念過去諸佛所行方便力所行化事方便之力我今所得道我於今世所得之道亦應説三乘亦當如彼方便説三作是思惟時佛正作此思量之時十方佛皆現十方諸佛皆現在前梵音慰喻我以梵音聲安慰於我善哉釋迦文善哉善哉釋迦文佛第一之導師善思方便導利衆生於導師中最為第一得是無上法得是無上正真之法隨諸一切佛又能隨順一切諸佛而用方便力而用三乘方便之力我等亦皆得我等諸佛亦皆證得最妙第一法最上微妙第一之法為諸衆生類為諸一切衆生之類分別説三乘於一佛乘分別説三少智樂小法有少智慧樂著小法不自信作佛不能自信當得作佛是故以方便以是之故用諸方便分別説諸果廣分別説聲聞緣覺及菩薩乘所證之果雖復説三乘雖復分別説於三乘但為教菩薩究其本意但是為教菩薩之機令成佛道舍利弗當知汝舍利弗當知爾時我聞聖師子佛聞諸佛聖主師子深淨微妙音深遠清淨微妙之音稱南無諸佛口稱歸敬十方諸佛復作如是念又復作意如是念言我出濁惡世佛出末劫濁惡世時如諸佛所説如過現佛所説儀式我亦隨順行我亦隨順諸佛所行思惟是事已思惟三乘方便事已即趣波羅奈即從摩竭至波羅奈諸法寂滅相諸法性空寂滅之相不可以言宣可以理會不可言説以方便力故但以如來方便力故為五比丘説為五拘鄰假名字説是名轉法輪是名鹿苑初轉法輪便有涅槃音便有方便涅槃之音及以阿羅漢五比丘等皆證四果法僧差別名四諦名法羅漢名僧從久遠劫來佛從因地久遠時來讚示涅槃法讚歎開示寂滅之法生死苦永盡遠離生死諸苦永盡我常如是説佛從久劫常如是説舍利弗當知汝舍利弗當知佛意我見佛子等我見現前諸佛子等志求佛道者立志願求佛之道者無量千萬億無量大衆咸以恭敬心一時咸以恭敬之心皆來至佛所皆悉來至佛所住處曾從諸佛聞已曾從於諸佛所聞方便所説法方便善巧所説之法我即作是念佛觀時至即作念言如來所以出如來所以出現於世為説佛慧故本為演説佛之智慧今正是其時于今正是説佛慧時舍利弗當知汝當知我説大之意鈍根小智人下等鈍根小智見人著相憍慢者貪著世相自憍慢者不能信是法不能信是大乘之法所以不説今我喜無畏今我喜無此之憂畏於諸菩薩中於諸菩薩大衆之中正直捨方便昔為小機未免迂曲作方便説今既純熟捨前方便正直而説但説無上道但説一乘無上道教菩薩聞是法若菩薩根聞如是法疑網皆已除疑惑不決如在網中今聞妙教裂諸見網千二百羅漢即佛初化五拘鄰三迦葉目犍連舍利弗師徒總有千二百人五百弟子及以上首諸無學者悉亦當作佛羅漢聞大即偏而圓悉亦當得作究竟佛如三世諸佛如彼十方三世諸佛説法之儀式所説化法方便儀式我今亦如是我今所得無上之道亦當如是説無分別法三乘之道名分別説唯説一乘即無分別諸佛興出世十方諸佛興慈出世懸遠值遇難懸隔長遠值遇是難正使出于世正使諸佛出現於世説是法復難説一乘法亦復是難無量無數劫經無數時聞是法亦難得聞是法亦不容易能聽是法者能於法會聽受此法斯人亦復難此等之人亦不易得譬如優曇華般泥洹經翻為瑞應此華生時佛即出世以譬如來難可得見一切皆愛樂一切衆生皆悉愛樂天人所希有天上人間之所罕有時時乃一出非有道時優曇不現機興時至方乃得聞聞法歡喜讚若聞是法歡喜讚歎乃至發一言乃至略爾發一言音則為已供養則為已能修法供養一切三世佛十方三世一切諸佛是人甚希有是信法人甚為罕有過於優曇華過於曇華難可得見汝等勿有疑汝等於法勿得有疑我為諸法王我為世尊諸法之王普告諸大衆普告在會一切大衆但以一乘道但以一乘無上之道教化諸菩薩教訓化導於諸菩薩無聲聞弟子初説三乘終歸一實汝等舍利弗汝等會衆及舍利弗聲聞及菩薩小乘聲聞權教菩薩當知是妙法當知如是上妙之法諸佛之祕要是諸世尊祕密要妙以五濁惡出為五濁世末劫之時但樂著諸欲但是愛樂貪著五欲如是等衆生如是濁惡著欲衆生終不求佛道終不肯求無上佛道當來世惡人當未來世濁惡之人聞佛説一乘聞佛演説一佛乘道迷惑不信受心中迷惑不能信受破法墮惡道毀破正法墮於惡道有慚愧清淨有慚有愧發清淨心志求佛道者並志求於佛之道者當為如是等當為如是正信人等廣讚一乘道廣讚一乘無上佛道舍利弗當知汝舍利弗須當知之諸佛法如是諸佛之法其義如是以萬億方便以千萬億無數方便隨宜而説法隨其所宜而為説法其不習學者其有愚癡不習學者不能曉了此則不能得曉了此義汝等既已知汝等大衆既已得知諸佛世之師一切諸佛世間之師隨宜方便事隨順機宜説法之事無復諸疑惑無復同彼有諸疑惑心生大歡喜聞法信解心大喜悅自知當作佛自知未來必當作佛
