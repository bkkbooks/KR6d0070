body:
  text: 錢塘廣照沙門釋聞達妙法蓮華經藥草喻品第五如來大慈普為法界不令一人獨得滅度皆以如來滅度而滅度之前信解品大迦葉波但約自類聲聞之機從漸入圓開解佛意而於大義有所未周所以世尊復說此品三草二木皆悉滋榮如雨普潤無不浹洽以彰圓教統被群機爾時世尊示信解品說竟之時告摩訶迦葉因其信解有所未周故佛告之及諸大弟子即須菩提迦旃延大目犍連等善哉善哉重歎善哉美其能解迦葉善說如來真實功德語契佛意稱為善說如來功德者簡異三乘方便之道真實者簡非權教假名之說誠如所言實如汝之信解所說如來復有無量無邊阿僧祇功德如來功德具足一切信解所領但為聲聞不及餘衆故云復有汝等若於無量億劫說不能盡以二乘智說佛功德縱經塵劫說不可盡迦葉當知如來是諸法之王王者之稱自在為義如來於法得最自在若有所說皆不虗也若於時中有所說法皆是真實無有虗妄於一切法世出世法名為一切以智方便而演說之以善巧智而為方便其所說法其方便智所說之法皆悉到於一切智地一切智者即空智也法相雖別悉到智位如來觀知以如來智觀察了知一切諸法之所歸趣一切諸法皆趣空寂亦知一切衆生深心所行衆生性欲各有所重其所行處佛皆知之通達無礙佛皆通達無有障礙又於諸法究盡明了非但生心亦於法性究竟了達示諸衆生一切智慧以法開示一切衆生令趣智地入於佛慧迦葉譬如三千大千世界大千世界即佛化境一千小千一千中千合成大千各一世界山川溪谷世界喻境量山川溪谷喻境界土地所生卉木叢林及諸藥草土地為能生草木是所生卉即上中下三草木即大小二樹叢生曰林種類若干各各有於種子氣類若干之數名色各異名字色目各自別異喻於衆生根性各別密雲彌布雲喻佛身密喻妙應身喻三千如雲大布遍覆三千大世界佛身普應知雲遍覆一時等澍佛應一切如雨等下其澤普洽澤喻法味普皆浹洽卉木叢林及諸藥草卉即上中下三草木即大小二樹叢生曰林小根小莖小枝小葉人天二道名小根莖中根中莖中枝中葉聲聞緣覺名中藥草大根大莖大枝大葉根喻善種莖喻善願枝喻善門葉喻善行世間之木根莖大者枝葉亦多喻菩薩人智願大故行解亦深諸樹大小就菩薩中又自分二習漸名小習頓名大隨上中下各有所受各隨其量所受不同一雲所雨以一大雲喻如來身遍澍甘雨喻如來教種其種性稱其所稟根種習性而得生長華果敷實雨潤物生開華結果法潤智明成因感報雖一地所生一地喻性本自平等百物喻心所欲各異一雨所潤一雨喻法普利一切而諸草木各有差別衆生根性各各不同如彼草木所稟各異迦葉當知如來亦復如是前約喻說此乃法合出現於世如大雲起佛現雲起事義相類以大音聲佛音說法如雷之震普遍世界天人阿修羅世界所有若天若人及修羅等皆悉得聞如彼大雲遍覆三千大千國土佛身遍應如雲普覆於大衆中即上衆等而唱是言我是如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊此上十號如序品解未度者令度即衆生無邊誓願度未解者令解即煩惱無數誓願斷未安者令安即法門無量誓願學未涅槃者令得涅槃即佛道無上誓願成今世後世今即現世後即未來如實知之一一稱實知其因果我是一切知者於一切法悉能了知一切見者正見明白徹法源底知道者善知一切通塞之相開道者善能開示佛之道者說道者為衆生說無上道者汝等天人阿修羅衆召所化機皆應到此令集法會為聽法故所以集者為令聽法爾時無數千萬億種衆生常途但說十類衆生今千萬億約根性說來至佛所而聽法雲集佛所為欲聽法如來于時佛當衆生集會之時觀是衆生一一觀察是諸衆生諸根利鈍上中下根聰利昏鈍精進懈怠精純進道懈慢怠惰隨其所堪方便之教隨順物宜而為說法隨所應說而為說之種種無量機既多種教亦無量皆令歡喜皆令得聞心各歡喜快得善利精神爽快得大善益是諸衆生是來之衆無量衆生聞是法已聞如來說是諸法已現世安穩現在世間如法修進所得安穩後生善處捨苦報後托生善處以道受樂以今行道後受快樂亦得聞法亦得聞佛所說正法既聞法已離諸障礙以宿緣故聞已思修遠離三障及諸罣礙於諸法中於如來說人天三乘諸法之中任力所能任其力量隨其堪能漸得入道離四惡處轉生人天從人天身入三乘道故云漸入如彼大雲合如來身雨於一切合如來法卉木叢林及諸藥草三草二木如其種性一一如其種子習性具足蒙潤物蒙法潤隨分皆足各得生長各遂物性而得生長如來說法如雲澍雨一相一味等觀衆生故云一相普潤一切故云一味所謂解脫相解三界縛令脫生死離相遠離一切塵勞煩惱滅相達真空理證寂滅樂究竟至於一切種智始用方便暫接初機終歸究竟一切種智其有衆生其有世間諸衆生類聞如來法聞於如來所說之法若持讀誦若或受持兼以讀誦如說修行如佛所說依之修行所得功德隨其起修所獲功德不自覺知以心迷故自不能知應學何法所以者何所以如來現於世者其意云何唯有如來知此衆生獨佛一人知此法界種種衆生種相體性種子相貌本體根性念何事心中繫念何等之事思何事心中思惟何等之事修何事其性所了修何等事云何念當云何念云何思當云何思云何修當云何修以何法念用何法令繫念以何法思用何法令思惟以何法修用何法令起修以何法以何種法得何法可得何法衆生住於種種之地性本是一習氣不同隨所依止名之為住各取自位名種種地唯有如來知實見之三乘聖人分見真理唯佛大聖如實覺知明了無礙分明覺了無有障礙如彼卉木叢林諸藥草等以諸根性合前草木而不自知上中下性草木受潤各取沾足而不自知力量大小如來知是一相一味之法如前所謂解脫相離相滅相究竟涅槃前云一切智即智德也此云涅槃即斷德也常寂滅相常住涅槃寂滅之理無相之相名為常寂終歸於空此云空者即上常寂大般涅槃非是斷空及以偏空非但即空空中具假空假不二名究竟空佛知是已佛知如是真實義空觀衆生心欲以慈眼觀衆生樂欲而將護之而乃將理調護曲順機情是故不即為說一切種智一切種智者乃佛所證中道正智以是之故為機未堪不敢即說汝等迦葉甚為希有美其信解善達佛意人莫及之甚為鮮有能知如來隨宜說法歎希有者以能如是能信能受能知故通曉能信故不疑能受故不忘所以者何所以歎者其意云何諸佛世尊隨宜說法一切諸佛隨順物宜稱機而說無有定法難解難知衆生機雜諸佛意深隱密故難解差別故難知爾時世尊欲重宣此義而說偈言欲以前事重為證明故說偈言破有法王出現世間佛為法王出現於世為破衆生著有之見隨衆生欲種種說法知衆生意隨其所宜以種種緣而為說法如來尊重佛具威德位尊貌重智慧深遠佛之智慧深遠無際久默斯要此法華經乃是諸佛祕要之事成道已來四十餘年未嘗拈出故云久默不務速說前說不談故云不務速說有智若聞則能信解所以未說正為待機欲能信解然後說之無智疑悔則為永失於無智前說此妙經非特不信兼起謗言則是永失背覺合塵是故迦葉告迦葉言以是之故隨力為說隨其機力而為說之以種種緣或說五乘或說三乘皆方便緣令得正見令作方便得於正見迦葉當知譬如大雲喻佛應身起於世間從真起應如雲之生遍覆一切普化群機如雲遍覆慧雲含潤智慧身雲含藏利潤電光晃耀智如電掣光明晃耀雷聲遠震法音圓應如電遠震令衆悅豫能令衆心悅懌安豫日光掩蔽地上清涼日光炎熾喻諸熱惱慈雲覆故心地清涼靉靆垂布靉靆濃雲之貌慈心濃重俯為含生如雲低垂遍布一切如可承攬頭戴曰承手攬曰攬佛雖尊勝下應群機以慈悲故易可親近如雲垂下似可戴攬其雨普等說法如雨普皆平等四方俱下四方即喻住行向地流澍無量流澍廣濶不可計量率土充洽衆生性地無不沾濡如率土中皆悉充洽山川險谷山喻靜性川喻動性險谷即喻衆生惡性幽邃所生幽隱深邃所産之物卉木藥草人天聲聞緣覺上中下根如衆卉木藥草之類大小諸樹頓教菩薩名為大樹漸教菩薩名為小樹攝機無量故云諸樹百穀苗稼百種善念菩提心苗穀能養命善可證真甘蔗蒲萄甘蔗味美喻佛種性蒲萄蔓筵喻諸種族雨之所潤法雨等施物悉均沾無不豐足無有一物不豐足者乾地普洽入法衆生欲習初乾未與如來法流水接名為乾地今蒙法潤亦普浹洽藥木並茂群機受潤如物等茂其雲所出身雲所出一味之水如來一味利益衆生更無別念如雲澍雨水無別味草木叢林隨分受潤水味雖一而諸草木受潤不同法味雖一而諸根器得益不同一切諸樹以類攝之但分大小約機衆多故云諸樹上中下等此約三草以喻三乘稱其大小此喻漸頓大小菩薩各得生長各遂其性生成長育根莖枝葉如前華果光色華喻善因果喻善報光喻善智色喻善事一雨所及皆得鮮澤蒙一味雨之所潤及一一皆得鮮明肥澤如其體相稱其體質及以相貌性分大小種性自分若大若小所潤是一法無異味而各滋茂受潤不同佛亦如是合上喻也出現於世從真起應譬如大雲以大身雲普覆一切遍應群機既出于世初降生時如雲之生及轉法輪如雲澍雨為諸衆生受道之機分別演說三乘五乘各分別說諸法之實雖說方便實為佛乘大聖世尊三乘所證名小聖人如來圓極名為大聖於諸天人一切衆中求法之衆而宣是言宣布此言我為如來我是究竟果德如來兩足之尊久修梵行福慧俱足出于世間為衆生故不住涅槃猶如大雲充潤一切身雲法雨充潤一切枯槁衆生無法雨潤名枯槁者皆令離苦離惡道苦及二死苦得安隱樂得於安隱身心快樂世間之樂人天二報五欲樂也及涅槃樂三乘一乘寂滅之樂諸天人衆諸天及人一切衆等一心善聽齊其一心善聽我說皆應到此到佛會中覲無上尊覲見無上大覺世尊我為世尊我是一切世間之尊無能及者自餘聖賢無有一人能及我者安隱衆生故現於世為令衆生得安隱故出現世間為大衆說甘露淨法如來為衆演說諸法其法清淨如天甘露無不美者其法一味解脫涅槃機情雖異佛意常融一味令得無上解脫究竟涅槃以一妙音演暢斯義據相似異約意名一說權為實名曰妙音流演通暢斯之妙義常為大乘而作因緣所以說小意引入大小智是因小善是緣我觀一切普皆平等佛心無礙等視衆生無有彼此愛憎之心衆生則有彼此憎愛佛心平等一切無也我無貪著亦無限礙如來無有貪愛取著慳吝之心亦無限隔滯礙之相恆為一切平等說法常為一切以平等心說無相法如為一人衆多亦然為衆如一一多皆然常演說法曾無他事常爾一心為之演法曾無別事以縈其懷去來坐立終不疲厭四威儀中常爾精勤終不見有疲極厭倦充足世間如雨普潤以法潤世悉令充足猶如時雨普潤一切貴賤上下貴族賤類上智下愚持戒毀戒持戒之人一向清淨毀戒之人一向染污威儀具足威儀即是諸輕戒也具足受持無有缺犯及不具足謂於諸戒雖則受持不能全淨正見邪見知因識果名正見人背理迷真名邪見者利根鈍根諸乘之中第分優劣望前為鈍望後為利等雨法雨平等雨於一味法雨而無懈倦為物慈深終無厭倦一切衆生聞我法者衆生聞佛所說法者隨力所受住於諸地隨其根力住五乘位或處人天人及天乘轉輪聖王輪王有四謂福所感金銀銅鐵四輪各異皆人王也釋梵諸王釋謂帝釋忉利天主梵即梵王色界天主及三界中諸餘天王是小藥草人天兩乘自跡言之名小藥草就本為言彼諸天王皆是菩薩遊三摩提所修行處知無漏法能得涅槃善知無漏智慧之法能得小乘偏空涅槃起六神通即天眼天耳他心宿命神境漏盡六種通相由發智故得有神通故云起也及得三明天眼宿命漏盡三種通明獨處山林常行禪定獨自居處山間林下常行三昧住於禪寂得緣覺證從緣省覺證辟支果是中藥草勝於人天故名中草求世尊處我當作佛求佛世尊所證之處我當修行作於佛果行精進定修行精進寂滅勝定是上藥草此期成佛又勝二乘名上藥草又諸佛子言佛子者異於聲聞專心佛道專注一心求於佛道常行慈悲二乘之人不起大化菩薩根者行大慈悲自知作佛決定無疑心中自知決定成佛無復疑情是名小樹定力轉增心志愈大勝前上草故云少樹此位菩薩如般若中初發心者安住神通安然住於菩薩神通轉不退輪能轉諸佛不退法輪度無量億百千衆生此即頓教登位不退諸大菩薩故能廣度無量諸生如是菩薩名為大樹力量既大蔭覆益廣故云大樹佛平等說如一味雨佛慈悲心平等而說如時雨降一味平等隨衆生性所受不同法雖平等隨彼衆生所稟根性得益不同如彼草木所稟各異衆生之性如諸草木隨其大小稟受不同佛以此喻方便開示佛以草木喻諸衆生而為方便開示迷者種種言辭演說一法假諸言辭共明一法於佛智慧如海一滴佛之性體具足智慧今說一法如海一渧我雨法雨佛下法雨充滿世間充滿三界一切世間一味之法法味本一隨力修行隨其智力修習奉行如彼叢林藥草諸樹以法合喻隨其大小漸增茂好隨根受道漸漸增茂諸佛之法常以一味一切諸佛常用一味平等大法令諸世間普得具足令三世間法味咸足漸次修行皆得道果三乘之人漸漸次第修行於道皆令得果聲聞緣覺處於山林二乘樂靜故居山林住最後身得羅漢果名最後身永脫三界更不復生聞法得果聞佛說法心能解了得於羅漢及辟支果是名藥草各得增長引喻合法即中藥草若諸菩薩智慧堅固菩薩之人智力堅固終不退墮了達三界了了通達三界之中非堅固法求最上乘三乘之中菩薩最上是名小樹而得增長雖求佛道從漸門入非是頓證故名小樹復有住禪得神通力復有大機住於禪定發得神通智慧之力聞諸法空心大歡喜聞說諸法本性空寂心中明悟得大歡喜放無數光度諸衆生光表智慧用智攝生名為放光智明不一名為無數是名大樹而得增長此喻頓教大菩薩也如是迦葉如是二字指上五乘以告迦葉佛所說法如來所說方便之法譬如大雲以一味雨佛身普應佛法普被如一味雨無有差別潤於人華各得成實潤於五乘善人心華令各增長結成果實迦葉當知由前信解所說未敷今此遍攝故令當知以諸因緣以諸宿世善惡業報因緣之事種種譬喻引諸世間種種事物而為譬喻開示佛道開示演說成佛之道是我方便此等皆是諸佛方便諸佛亦然佛之方便亦復如然今為汝等說最實事初說三乘破諸魔外名為真實今復引漸入於一乘名最真實諸聲聞衆皆非滅度二乘之人但離虗妄名為滅度皆非一乘究竟寂滅無上涅槃汝等所行是菩薩道汝等二乘所行之道即是大乘菩薩之道漸漸修學悉當成佛從漸入圓唯一佛道無別三乘妙法蓮華經授記品第六言授記者修行得到理應如是佛為印成如世爵命隨其資力大迦葉等聞如來說法譬兩品心得開悟引窮子喻說所信解但止領得二乘之人從漸入圓一種法義於如來法如海一渧佛復廣說山川草木法雨普潤一切皆當得成佛道諸人聞得法義方周故於此時為四弟子授應身記當來成佛爾時世尊說是偈已爾藥草品偈竟之時告諸大衆唱如是言白在會衆作是說言我此弟子摩訶迦葉如前於未來世當得奉覲從是已去未來當得奉敬覲見三百萬億諸佛世尊所見之數供養恭敬修法供養身心恭敬尊重讚歎尊重於佛發言讚歎廣宣諸佛無量大法廣博宣演十方諸佛無有限量大乘之法於最後身得成為佛等覺菩薩名最後身所證妙覺名為成佛名曰光明因以智光照明佛法所以得果號曰光明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如序品解國名光德光明盛德以為國名劫名大莊嚴其時清淨以大菩薩而為莊嚴佛壽十二小劫應身壽量正法住世二十小劫人根勝故如佛在時名為正法像法亦住二十小劫人根漸劣像正法時名為像法國界嚴飾依報清淨無諸穢惡離諸惡相瓦礫荊棘瓦礫坑坎荊榛棘刺便利不淨大小便利及諸不淨一切皆無其土平正無有高下坑坎堆阜心地平正無高下相故至感果地亦如是琉璃為地因心明了內外映徹所以果上琉璃為地寶樹行列因修寶行長菩提樹故至果上寶樹行列黃金為繩以界道側因持正戒遵依繩墨常行中道故至果上金繩界道散諸寶華周遍清淨因地之時遍修梵行故至果上寶華散地在處嚴潔其國菩薩無量千億國中大行其數甚多諸聲聞衆亦復無數小乘之人其數亦爾無有魔事無有邪見魔障之事雖有魔及魔民皆護佛法梵語魔波旬此云殺者殺害之主名為魔王隨王所作名為魔民若王若民雖不斷殺而於佛法皆能愛護爾時世尊欲重宣此義而說偈言告諸比丘在會之衆我以佛眼以佛天眼見是迦葉於未來世見大迦葉於當來世過無數劫當得作佛佛眼明見本有時限非是衆生心力所知名無數劫而於來世供養奉覲三百萬億諸佛世尊如前已解為佛智慧為欲成就佛智慧故淨修梵行清淨身心修諸梵行供養最上二足尊已心為能供福慧兩足最上世尊是所供境修習一切無上之慧久在迷故自壞善心今始覺知復本性體名之為修漸漸增進名之為習一切諸佛所證之智名無上慧於最後身得成為佛等覺後身得成正覺其土清淨無穢惡相琉璃為地心地明了多諸寶樹行列道側表菩提樹成行森列入正道側金繩界道堅固道法名曰金繩分列界則令行正道見者歡喜以境勝故所見歡喜常出好香香有三種一者身毛孔中常出牛頭旃檀無價之香二者口中常出青蓮華香三者寶樹華果常出種種之香散衆名華散於衆多名色之華表行無量正真之善種種奇妙以為莊嚴如上種種奇異莊嚴其地平正無有丘坑表心平坦諸菩薩衆不可稱計大乘弟子其數衆多其心調柔調伏柔順即定心也逮大神通聲聞之人名小神通菩薩逮得大乘神通奉持諸佛大乘經典崇奉持誦大乘方等一切經典是諸佛教諸聲聞衆無漏後身小乘聲聞阿羅漢果名最後身法王之子亦不可計佛為法王菩薩為子數亦難計乃以天眼不能數知天眼名同唯除如來餘諸聖人所得天眼不能知數其佛當壽十二小劫器界一增減名為一小劫正法住世二十小劫像法亦住二十小劫如上已解光明世尊其事如是結歸上文爾時大目揵連須菩提摩訶迦旃延等義如序品皆悉悚栗三人弟子見大迦葉得授道記而身不預所以未安驚悚戰栗一心合掌齊一其心合十指掌瞻仰尊顏瞻視敬仰世尊顏容目不暫捨正意求佛目睛不瞬即共同聲而說偈言即共舉意同聲白佛大雄猛世尊英雄猛烈能斷見愛降伏塵勞名大雄猛諸釋之法王諸釋種中佛為最上哀愍我等故慈哀憐愍我等之故而賜佛音聲願垂賜與佛之音聲若知我深心若蒙如來知我深心願求作佛見為授記者見我之心與授記者如以甘露灑除熱得清涼如天甘露之所沾灑除去熱惱心得清凉如從飢國來忽遇大王膳心願得記如飢思食聞佛說圓如遇王膳心猶懷疑懼未敢即便食雖蒙佛許未聞記莂如遇設食不蒙降賜心尚懷疑未敢輒取若復得王教然後乃敢食須得王旨方敢受食我等亦如是每惟小乘過我等弟子如彼飢人每因思惟習小乘過不知當云何得佛無上慧心中不知當云何修能得無上佛之智慧雖聞佛音聲言我等作佛佛音聲者即法譬二品聞聲聞人皆令作佛心尚懷憂懼如未敢便食合上心疑若蒙佛授記爾乃快安樂若蒙如來與授記莂爾乃心快得大安樂大雄猛世尊常欲安世間世尊本懷常欲安悉世間衆生願賜我等記如飢須教食此法合也爾時世尊知諸大弟子心之所念即前偈云深心所念告諸比丘普告時會是須菩提於當來世奉覲三百萬億那由他佛供養恭敬尊重讚歎常修梵行具菩薩道於最後身得成為佛那由他者西域大數之名餘如前解號曰名相尊者悟空了一切法但有名相號名相佛如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如前已解劫名有寶有空寂法名為有寶國名寶生其國清淨有是寶生其土平正由平心地則世界地自然平正頗梨為地頗梨此云水玉亦表內外映徹寶樹莊嚴表菩提樹衆善莊嚴無諸丘坑丘陵坑坎表不平心沙礫荊棘砂鑠隱腳荊棘刺入表惡毒念殺害於他便利之穢便利穢地惡毒害心其土悉無寶華覆地周遍清淨以衆善因莊嚴佛國如諸寶華遍覆其地其土人民國中所有人民之衆皆處寶臺所居之處以寶為臺珍妙樓閣珍奇妙好種種樓閣臺及樓閣層層級級即喻道諦三十七品聲聞弟子無量無邊小衆多故莫知邊量算數譬喻所不能知以數算計以物譬喻皆不能及諸菩薩衆無數千萬億那由他大乘衆多其數若是佛壽十二小劫應身壽量正法住世二十小劫像法亦住二十小劫如前已解其佛常處虗空悟空入道果住法空為衆說法以空寂法為衆而說度脫無量菩薩大空圓空度諸菩薩及聲聞衆遍空真如度聲聞衆爾時世尊欲重宣此義而說偈言以前長行重宣偈頌諸比丘衆現前僧衆今告汝等誡衆令知皆當一心當息雜念皆一其心聽我所說攝耳諦聽我之所說我大弟子言大弟子簡異餘小眷屬弟子須菩提者當得作佛號曰名相如前當供無數萬億諸佛所敬境也隨佛所行漸具大道隨順諸佛之所修行漸漸具足大菩薩道最後身得三十二相等覺後身成應身佛具諸相好端正姝妙猶如寶山端嚴方正姝大妙好如寶山王其佛國土嚴淨第一比餘佛土此最第一衆生見者無不愛樂由依正妙見者樂之佛於其中度無量衆於此淨剎度無量人其佛法中多諸菩薩法中猶多諸大菩薩皆悉利根轉不退輪根皆聰利能轉諸佛不退法輪彼國常以菩薩莊嚴常以菩薩莊嚴其國諸聲聞衆不可稱數其數亦多皆得三明具六神通聲聞果也住八解脫即八背捨背惡向善背粗向細名八解脫有大威德善能降伏內外怨魔有威可畏有德可敬其佛說法其佛世尊說法之時現於無量神通變化有信心者但須法說為無信者現起神通令生敬信後為說法不可思議此乃佛之無作妙能豈容心思及以口議諸天人民數如恆沙法衆數多皆共合掌聽受佛語衆合掌聽信受佛語其佛當壽十二小劫應身壽也正法住世二十小劫像法亦住二十小劫如前爾時世尊復告諸比丘衆我今語汝告衆通知是大迦旃延欲異餘小故標曰大於當來世以諸供具能供器也供養奉事八千億佛所供境也恭敬尊重能供心也上約如來在世之時下明滅後供養塔廟諸佛滅後各起塔廟高千由旬表千如也縱廣正等五百由旬竪縱橫廣量正相等五百由旬表五分法以金銀琉璃硨磲碼瑙真珠玫瑰如序品解七寶合成七支功德名為寶也衆華瓔珞以衆寶華及寶瓔珞塗香塗身香也末香細末香也燒香所燒香也繒蓋幢幡繒帛為蓋及以幢幡供養塔廟過是已後當復供養二萬億佛亦復如是於佛生前及以滅後所修供養如前無異供養是諸佛已具菩薩道供心是智供事是福具修諸行是菩薩道當得作佛號曰閻浮那提金光閻浮樹名那提此云洲即是南洲河邊有樹果熟落水染沙成金其色最上大迦旃延論議第一性如金體不可變壞智如金光無能過勝故名閻浮金光如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如序品解其土平正菩薩心地無有不平故所感土悉皆平正頗梨為地體上寶潔也寶樹莊嚴菩提願行也黃金為繩中正堅剛以為繩墨以界道側於道之側界分為八妙華覆地德嚴法體如華覆地周遍清淨遍斷諸惡遍修淨行無處不周故云遍淨見者歡喜衆生見者無不歡喜無四惡道地獄餓鬼畜生阿修羅道嗔心墮獄貪以墮鬼癡心墮畜強勝心墮於修羅菩薩因中無此諸過所以果上無四惡道多有天人諸天及人皆是善類諸聲聞衆及諸菩薩大小二乘聞法之衆無量萬億莊嚴其國以諸無量聲聞菩薩而為莊嚴佛壽十二小劫正法住世二十小劫像法亦住二十小劫如前爾時世尊欲重宣此義而說偈言頌成佛義諸比丘衆皆一心聽誡善聽也如我所說真實無異佛語真實勸令信受是迦旃延當以種種妙好供具供養諸佛當佛在世修供養也諸佛滅後起七寶塔亦以華香供養舍利於佛滅後修供養也其最後身等覺後身得佛智慧惑盡解圓成等正覺成應身佛國土清淨依報勝也度脫無量萬億衆生度生多也皆為十方之所供養皆得十方一切人天之所供養佛之光明無能勝者光明表智無與等者其佛號曰閻浮金光如前菩薩聲聞斷一切有大小雖異皆悉破有無量無數莊嚴其國其佛國中以諸菩薩及聲聞衆而為大寶爾時世尊復告大衆我今語汝復告大衆語衆令知是大目犍連如序品解當以種種供具能供之器供養八千諸佛所供境也恭敬尊重能供心也上約佛世下明滅後諸佛滅後各起塔廟高千由旬縱廣正等五百由旬以金銀琉璃硨磲碼瑙真珠玫瑰七寶合成如前衆華瓔珞塗香抹香燒香繒蓋幢幡以用供養所供事也過是已後當復供養二百萬億諸佛亦復如是生前滅後所修供事亦如八千等無有異當得成佛號曰多摩羅跋旃檀香多摩羅跋此云性無垢賢栴檀即海岸牛頭旃檀神通智慧功德妙香充滿法界故以為名如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如序品解劫名喜滿時分好故歡喜充滿國名意樂國土清淨見者意樂其土平正頗梨為地寶樹莊嚴散真珠華周遍清淨見者歡喜多諸天人菩薩聲聞其數無量並如前解佛壽二十四小劫前三尊者壽十二劫今二十四一倍增多正法住世四十小劫像法亦住四十小劫正像劫數亦倍於前爾時世尊欲重宣此義而說偈言我此弟子大目犍連如前捨是身已捨今靈山羅漢後身得見八千二百萬億諸佛世尊先供八千後復供養二百萬億為佛道故為求成佛無上道故供養恭敬以事供養以心恭敬於諸佛所常修梵行修於諸佛所起之行於無量劫奉持佛法歷年滋久崇奉受持佛之正法諸佛滅後上明佛前今明佛後起七寶塔以七珍寶建舍利塔長表金剎表明剎竿欲今迷者之所歸趣以金為剎莊嚴堂舍華香伎樂若香若華伎藝音樂而以供養諸佛塔廟舍利寶塔像設廟宇漸漸具足菩薩道已既曰圓宗本無次第何言漸漸此是圓漸非漸圓也理可頓悟事須漸修以漸修故始得具足於意樂國而得作佛由如意通之所化現故名意樂號多摩羅旃檀之香神通妙香普薰法界故號旃檀其佛壽命二十四劫住壽許時常為天人演說佛道為天人說佛之大道聲聞無量如恆河沙比丘數多三明六通有大威德羅漢所證有如是等大威德力菩薩無數志固精進菩薩衆多志願堅固道業精勤於佛智慧皆不退轉於佛所證甚深智慧皆能進趣得不退轉佛滅度後正法當住四十小劫像法亦爾像法住世亦四十劫我諸弟子威德具足上首弟子具威德者其數五百皆當授記即五百羅漢如羅漢名經說於未來世咸得成佛五百授記同號普明我及汝等宿世因緣即化城品十六王子覆講法華結緣之事吾今當說許為說也汝等善聽誡令攝心妙法蓮華經化城喻品第七上等之機方便品中直是法說身子得記中等之機譬喻藥草分別而說四大弟子各得授記下等之機聞而未悟復以化城引緣而說五百弟子一時授記佛告諸比丘五百羅漢等乃往過去無量無邊不可思議阿僧祇劫歷劫滋久心思口議不可得及過去之世爾時有佛名大通智勝大通佛名未見所出義約大通者羅漢神通逆順知八萬劫橫見三千界初地菩薩能知百佛世界逆順知無量劫自二地已去所知所見倍倍增勝佛神通者橫遍十方竪窮三際悉知悉見無不通徹故曰大通言智勝者二乘之智能斷見思出於三界菩薩之智雖斷界外無明塵沙至於等覺尚有一品微細無明唯佛之智究竟覺了三惑淨盡二死俱亡勝彼三乘故曰智勝如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如序品解其國名好成佛名大通通由定發所應之國禪定為城故名好城劫名大相大通佛壽五百四十萬億那由他劫佛壽尚爾其劫又長時相事相佛菩薩相一一廣大故曰大相諸比丘告諸會衆彼佛滅度已來甚大久遠彼大通佛過去已久譬如三千大千世界所有地種積塵成土積土成地一切微塵是地大種欲譬劫久故舉大千所有地種假使有人磨以為墨設為譬喻故云假使如人磨地以為墨水過於東方千國土從東過去千佛化境千箇三千大千世界乃下一點大如微塵過爾許國方下一點如微塵大又過千國土復下一點一點之墨點千國土如是展轉盡地種墨如是次第過一千國又過千國點盡一化三千世界所磨墨水於汝等意云何於汝現前諸比丘等意謂如何是諸國土是諸經過所點國土若算師計算之師若算師弟子上云算師止是一人今云弟子其數衆多能得邊除還有能得世界邊除知其數不知其所點國土數不不也世尊大衆答佛弗可知也諸比丘佛語大衆是人所經國土是點塵人所經由處若點不點若下點處若不點處盡抹為塵盡皆細末而為微塵一塵一劫以一點塵而為一劫彼佛滅度已來彼大通佛從滅度來復過是數又復過是微塵之數無量無邊百千萬億阿僧祇劫多如微塵言其劫數我以如來知見力故以佛自證知見力故觀彼久遠猶若今日視昔如今佛宿命通爾時世尊欲重宣此義而說偈言欲宣遠意故重說言我念過去世佛自思念過去世時無量無邊劫經歷多劫有佛兩足尊有佛世尊福慧兩足名大通智勝如前如人以力磨三千大千土如人以力磨三千界盡此諸地種皆悉以為墨盡三千界所有地體皆磨為墨過於千國土乃下一塵點過千佛土下一點塵如是展轉點盡此諸塵墨從千佛土至千佛土又下一點如是點盡三千地體所有塵墨如是諸國土點與不點等如是經過千千國土若曾著點及不點者是等無數微塵世界復盡抹為塵一塵為一劫復以諸界盡抹為塵以一微塵而為一劫此諸微塵數其劫復過是盡上如是地種種已其所經劫復過此數彼佛滅度來如是無量劫合上塵數如來無礙智知彼佛滅度釋迦如來以無礙智知彼大通滅度之相及聲聞菩薩及見彼佛所化聲聞及菩薩衆如見今滅度猶如今日所見無異諸比丘當知告諸比丘當知是事佛智淨微妙無漏無所礙佛之智慧清淨微妙無有滲漏亦無滯礙通達無量劫善能通達無量劫前所有之事佛告諸比丘說偈言已復告大衆大通智勝佛如前壽五百四十萬億那由他劫彼佛應身住世之壽若表法者五百即五道四十即四生佛所以出為欲度脫五道四生住壽如是緣盡入滅其佛本坐道場其佛本時坐於道場破魔軍已諸大魔王受多眷屬其佛大通道果將成以威德力震動世界魔及魔民悉來戰鬪故用破魔俟魔退已後方成道垂得阿耨多羅三藐三菩提垂者臨也餘如序品而諸佛法不現在前以悟道故見諸佛法現在目前名為得道今將欲得故未現前如是一小劫乃至十小劫破魔之後經如許時結跏趺坐兩足相結加趺而坐身心不動身不動威儀寂靜也心不動妄念寂滅也而諸佛法猶不在前攝靜雖久猶未得成正遍知覺故未現前爾時忉利諸天爾大通佛將得道時三十三天先為彼佛預為先彼大通如來於菩提樹下諸佛應身皆在樹下成菩提者蓋由因中發菩提心修菩提行如樹種子根莖枝葉漸漸增長所以果上樹下成道敷師子座高一由旬佛身大故所設之座亦復廣大高四十里佛於此座當得阿耨多羅三藐三菩提諸天設座意欲奉佛請於此處當得菩提適坐此座適往坐此菩提之座時諸梵天王諸梵天上諸梵天王雨衆天華下於四色天上之華面百由旬一一方面名百由旬香風時來吹去萎華復時之間有香風來吹去所散已萎之華更雨新者更復別雨新鮮之華如是不絶滿十小劫供養於佛為佛未現佛坐十劫諸天常爾散華供養乃至滅度常雨此華從成佛去至于滅度經歷多劫常以華供四王諸天為供養佛常擊天鼓四天門王及以諸天常為供佛擊於天鼓其餘諸天作天伎樂自餘欲色諸天仙衆各作天上伎藝歌樂滿十小劫擊鼓作樂皆滿十劫至于滅度亦復如是從初十劫至于滅度五百四十萬億那由他劫亦是如此諸比丘大通智勝佛過十小劫未成之前一坐十劫諸佛之法乃現在前十劫之後道果方成諸佛之法悉現其前成阿耨多羅三藐三菩提即無上等正覺其佛未出家時佛初在家未出俗時有十六子所生王子有十六人其第一者名曰智積第一太子智慧深厚故名智積諸子各有種種珍異玩好之具其諸王子平昔之間各有受用珍玩之物聞父得成阿耨多羅三藐三菩提聞其父王得成正覺皆捨所珍皆悉棄捨常所玩好往詣佛所往至父王成佛之所諸母涕泣而隨送之是諸王子所生之母見子棄俗從父出家所以涕泣各隨其子而往送之其祖轉輪聖王大通之父因孫名祖轉輪聖王即是菩薩修行之位與一百大臣同輔佐者大臣百官及餘百千萬億人民國中所有人民之衆皆共圍繞隨至道場諸王子祖及所生母國中大臣人民之衆皆悉周圍環繞王子隨逐至於大通如來道場之所咸欲親近大通智勝如來大衆皆欲親近於佛供養恭敬尊重讚歎陳設供養盡心恭敬倍加尊重發言稱讚到已頭面禮足到佛所已以頭至地面禮佛足繞佛畢已繞佛表敬一心合掌息諸妄念端謹一心合十指掌瞻仰世尊以偈頌曰以目瞻仰以偈讚頌大威德世尊有大威德大覺世尊為度衆生故為欲度脫諸衆生故於無量億歲修行許久爾乃得成佛爾乃得成究竟果佛諸願已具足在昔因地願成佛道今得正覺俱滿諸願善哉吉無上讚言善哉吉祥無上世尊甚希有世間之尊甚為希有一坐十小劫身體及手足靜然安不動歎身定也其心常憺怕未曾有散亂其心常常憺怕無為未曾昏散歎心定也究竟永寂滅究竟永斷無明惑根證大寂滅安住無漏法安隱住於無漏妙法今者見世尊安隱成佛道我等今者得見世尊安然隱寂成就佛道我等得善利稱慶大歡喜我等遇佛聞法信解得大善益交相稱慶心大歡喜衆生常苦惱衆生在迷常懷苦惱盲瞑無導師如生盲人瞑然莫親以無緣故不遇導師不識苦盡道不能識別滅盡諸苦究竟之道不知求解脫不知求覔出離解脫長夜增惡趣長如夜間迷瞑造業增長惡報減損諸天衆以業惑果生惡趣多天衆轉減從冥入於冥從冥昧心造冥昧業受冥昧苦從於迷冥入於迷冥永不聞佛名永不獲聞佛之名字今佛得最上安隱無漏道今佛世尊得成無上安隱寂滅無漏聖道我等及天人為得最大利我等諸人及餘一切天人之衆是得最上廣大利益是故咸稽首歸命無上尊是故咸皆稽首歸命無上世尊爾時十六王子偈讚佛已說如上偈讚歎佛已勸請世尊轉於法輪佛雖已成未曾聞法故加勸請咸作是言世尊說法多所安隱佛若說法多有所益令得安隱憐愍饒益諸天人民矜憐哀愍饒潤利益諸天仙衆及以人民重說偈言復述前意勸請世尊世雄無等倫世尊大雄無與等倫百福自莊嚴以百種福而自莊嚴得無上智慧證得無上真實智慧願為世間說願與世間諸衆生說度脫於我等願賜救脫我等之輩及諸衆生類及諸一切衆生之類為分別顯示與之分別顯了開示令得是智慧令得如是真實智慧若我等得佛若或我等得成佛道衆生亦復然餘衆生類亦復當然世尊知衆生世尊大慈能知衆生深心之所念發志求佛名曰深心而此心中之所思念亦知所行道亦知衆生宿世之因所行何道又知智慧力又知衆生智慧之力欲樂及修福心所欲樂及所修福宿命所行業衆生過去所有宿命及其所行善惡業行世尊悉知已世尊既已悉知衆生所有之事當轉無上輪當為轉於無上法輪佛告諸比丘大通智勝佛得阿耨多羅三藐三菩提時如前十方各五百萬億諸佛世界六種震動六種之相如序品解五百萬億者表佛出世震動一切十方五道蒙光利益其國中間幽冥之處其諸國中幽暗之處日月威光所不能照而皆大明尋常之間日月光明照不到處今佛如來慈悲慧光悉照明了其中衆生各得相見其幽冥中雖有衆生各不相見因佛光明悉見明了咸作是言衆生咸作如是念言此中云何忽生衆生此幽暗中云何忽然有諸衆生又其國界又大通佛所有國界諸天宮殿欲界諸天所居宮殿乃至梵宮乃至色界十八梵宮六種震動如序品解大光普照遍滿世界有大光明普照一切遍滿化境所有世界勝諸天光佛之光明出過一切豈與天光之所等倫爾時東方五百萬億諸國土中梵天宮殿所震動處梵天之宮光明照曜倍於常明佛光所照倍勝餘光諸梵天王即上五百各作是念今者宮殿光明昔所未有諸宮殿光昔未曾見以何因緣而現此相不知何緣有此瑞相是時諸梵天王即各相詣共議此事諸天互相共論瑞相時彼衆中有一大梵天王名救一切大梵王者諸梵中尊以慈悲故名救一切為諸梵衆而說偈言我等諸宮殿光明昔未有此是何因緣宜各共求之見所希有勸衆同求為大德天生為佛出世間為復大德諸天降生為復是佛出現於世而此大光明遍照於十方此後二句言光所照必有聖仙出生於世爾時五百萬億國土諸梵天王與宮殿俱諸天行處宮殿隨身各以衣裓以衣段為盛香之器盛諸天華盛貯天上所有妙華共詣西方推尋是相佛光東來天從西詣見大通智勝如來處于道場菩提樹下坐師子座佛成道處名為於寶樹下得成菩提名菩提樹諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞如常所解及見十六王子請佛轉法輪見請世尊轉於法輪即時諸梵天王頭面禮佛繞百千匝表敬儀也即以天華而散佛上散華共佛表布善因其所散華如須彌山梵語須彌盧此云妙高峯華積如山言其多也並以供養佛菩提樹並以道樹而獻於佛其菩提樹高十由旬高四百里華供養已各以宮殿奉上彼佛各以所乘天仙宮殿奉上大通而作是言惟見哀愍饒益我等願佛見憐利益我等所獻宮殿願垂納處如我所獻寶飾宮殿願佛垂慈為之納受時諸梵天王即於佛前一心同聲以偈頌曰專秉一心異口同音世尊甚希有難可得值遇佛智佛德及以相好世所希有過久遠劫時乃出現難可遭逢具無量功德明行足也能救護一切善能普度一切衆生天人之大師哀愍於世間慈哀憐愍世間衆生十方諸衆生普皆蒙饒益十方世界三乘九道皆蒙利益我等所從來五百萬億國所過之土五百萬億其來遠也捨深禪定樂為供養佛故諸梵天王皆住禪定寂靜之樂因佛光照捨禪定樂自遠而來為供養佛言意勤也我等先世福宮殿甚嚴飾我等之輩以先世時修禪定福今生梵天所感宮殿甚是嚴好今以奉世尊唯願哀納受今以所乘天寶宮殿奉獻世尊惟願哀愍而納受之爾時諸梵天王偈讚佛已先伸供養表行施也以偈讚歎表歸敬也各作是言惟願世尊轉於法輪勸請世尊願為大衆轉妙法輪度說衆生開涅槃道救度解脫一切衆生開示無漏涅槃之道時諸梵天王一心同聲而說偈言衆皆一心說偈勸請世雄兩足尊惟願演說法世間威雄福慧兩足無上之尊惟願為衆演說諸法以大慈悲力度苦惱衆生用大慈力與一切樂用大悲力拔一切苦令諸衆生皆得度於煩惱苦海爾時大通智勝如來默然許之佛許之相多種不同或時點頭此身許也或云當為汝說此口許也今但默然此心許也或云止止此不許也又諸比丘東南方五百萬億國土諸大梵王各自見宮殿光明照曜昔所未有歡喜踊躍生希有心即各相詣共議此事共議宮殿瑞光之事時彼衆中有一大梵天王名曰大悲悲濟一切名曰大悲為諸梵衆而說偈言是事何因緣而現如此相是妙光明照宮殿事不知何緣而現此相我等諸宮殿光明昔未有是宮殿光昔所未有為大德天生為佛出世間為是大德天仙降生為是諸佛出現於世未曾見此相當共一心求見所未見勸共推求過千萬億土尋光共推之經過遠土隨光共求多是佛出世度脫苦衆生多分是佛出現於世度脫一切苦惱衆生爾時五百萬億諸梵天王與宮殿俱與所宮殿俱時發來各以衣裓盛諸天華衣為囊裓用盛寶華共詣西北方推尋是相天自東南來西北土為欲推尋光瑞之相見大通智勝如來處于道場菩提樹下坐師子座初見如來坐道樹下諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞次具八部圍繞於佛及見十六王子請佛轉法輪三見王子請佛說法時諸梵天王頭面禮佛繞百千匝諸梵見佛致敬旋繞即以天華而散佛上散華供佛表於佛境植衆善因所散之華如須彌山積聚多也并以供養佛菩提樹以樹奉佛表覺支林華供養已各以宮殿奉上彼佛捨所乘來天寶宮殿以奉世尊行大施也而作是言惟見哀愍饒益我等願佛見我生慈憫心以功德利饒益於我所獻宮殿願垂納受如我等獻天寶宮殿願佛慈悲持垂納受爾時諸梵天王即於佛前一心同聲以偈頌曰聖主天中天佛大聖主諸天中王迦陵頻伽聲迦陵頻伽此云妙音佛音美妙如頻伽聲哀愍衆生者我等今敬禮哀愍衆生大覺聖者我等今日恭敬作禮世尊甚希有久遠乃一現世尊慈悲甚是罕有經歷久遠乃一出現一百八十劫空過無有佛百八十劫無佛出興表十八界佛性隱也三惡道充滿諸天衆減少不遇佛化作業者多惡趣充塞以不修善福盡沉淪天衆減少今佛出於世為衆生作眼不識是非如無目者佛出化導如盲得眼世間所歸趣救護於一切世間之所歸依趣向救度覆護一切衆生為衆生之父哀愍饒益者世間之父能生色身佛為法父從法化生清淨法身哀憐饒益世間之者我等宿福慶今得值世尊我等宿福今生慶幸得值世尊爾時諸梵天王偈讚佛已各作是言唯願世尊哀愍一切願興慈也轉於法輪度脫衆生勸說法也時諸梵天王一心同聲而說偈言大聖轉法輪顯示諸法相法運無窮如輪之轉顯示一切善惡之相度苦惱衆生令得大歡喜脫苦與樂令得歡悅衆生聞此法得道若生天衆生聞此佛法之故或得聖道或生天中諸惡道減少忍善者增益惡道之衆漸漸減少忍耐之人修習善者轉得增益爾時大通智勝如來默然許之佛聞所請既不辭却以默表許又諸比丘南方五百萬億國土諸大梵王各自見宮殿光明照曜昔所未有歡喜踊躍生希有心各心中各生希有想即各相詣共議此事會衆口議以何因緣我等宮殿有此光耀推思是光何緣而有而彼衆中有一大梵天王名曰妙法善為諸天演說妙法故立是名為諸梵衆而說偈言我等諸宮殿光明甚威耀威德光耀此非無因緣是相宜求之此瑞光相非無因生衆宜一心皆共求之過於百千劫未曾見是相久劫未見甚為希有不可易也為大德天生為佛出世間為是大德天仙降生為是如來出現於世爾時五百萬億梵天王與宮殿俱各乘宮殿從空而來各以衣裓盛諸天華共詣北方自南至北推尋是相推求尋覔瑞應之相見大通智勝如來處于道場菩提樹下坐師子座得見佛也諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞見八部衆及見十六王子請佛轉法輪見諸王子請轉法輪時諸梵天王頭面佛繞百千匝如恭敬也即以天華而散佛上獻妙供也所散之華如須彌山所積高也并以供養佛菩提樹請於樹下轉法輪也華供養已各以宮殿奉上彼佛以己受用施於佛也而作是言惟見哀愍饒益我等願佛攝受求福報也所獻宮殿願垂納受我等所獻願佛垂納爾時諸梵天王即於佛前一心同聲以偈頌曰世尊甚難見久遠一遇難得見也破諸煩惱者是破一切煩惱業者過百三十劫今乃得一見前云過百千劫今云百三十劫所見異也即經云久乃見佛者為說佛難值又百三十者十二輪回是衆生境出過十二即見佛也諸飢渴衆生以法雨充滿於無法潤飢渴衆生以大法雨悉令充足昔所未曾覩無量智慧者從昔未見無量甚深大智慧者如優曇鉢羅今日乃值遇佛難得見如瑞應華始於今日乃得值遇我等諸宮殿蒙光故嚴飾覩見希有割捨供養世尊大慈愍惟願垂納受求佛納受願生福也爾時諸梵天王偈讚佛已各作是言唯願世尊轉於法輪先伸供讚次加勸請令一切世間諸天魔梵魔王梵王沙門出家學者婆羅門在家淨行皆獲安穩而得度脫未聞法前心不自在聞已心安得度生死時諸梵天王一心同聲以偈頌曰唯願天人尊願諸天人所尊敬者轉無上法輪流運無窮名之為轉佛之法輪為無有上擊于大法鼓四大交擊發出音聲演說諸法名大法鼓而吹大法螺螺聲改號佛無定法隨機改轉名吹法螺普雨大法雨佛之說法如雨普潤度無量衆生擊鼓吹螺轉輪雨雨總願度脫一切衆生我等咸歸請當演深遠音我等咸共依歸勸請當為衆演深遠法音爾時大通智勝如來默然許之西南方乃至下方亦復如是方位有十經中但明東方東南方南方上方餘之西南方西方西北方北方東北方下方存略故云乃至其諸天王見光共議各隨方來禮佛散華獻宮勸請一一皆然爾時上方五百萬億國土諸大梵王皆悉自覩所止宮殿光明威曜昔所未有歡喜踊躍生希有心見奇瑞相所以心喜即各相詣共議此事以何因緣我等宮殿有斯光明推所以也時彼衆中有一大梵天王名曰尸棄此云火梵天之王以禪定故化多淫心成智慧火故曰尸棄為諸梵衆而說偈言今以何因緣我等諸宮殿今者不知何因緣故我等所居宮殿之中威德光明耀嚴飾未曾有威德光耀種種嚴飾昔所未有如是之妙相昔所未聞見此之妙相昔所未見為大德天生為佛出世間為是天仙降生世上為是果佛出現人間爾時五百萬億諸梵天王與宮殿俱各乘宮殿從空而來各以衣裓盛諸天華衣裓盛華擬散佛也共詣下方推尋是相自上至下尋奇瑞相見大通智勝如來處于道場菩提樹下坐師子座得見佛也諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞見四衆也及見十六王子請佛轉法輪見諸王子請佛說法時諸梵天王頭面禮佛繞百千匝表勤重也即以天華而散佛上散華供佛表於佛境修淨福也所散之華如須彌山所積之因高而大也並以供養佛菩提樹以樹獻佛請佛於此而成正覺華供養已各以宮殿奉上彼佛獻華奉宮修福分也而作是言唯見哀愍饒益我等願佛見我生哀憫心受施興福利益我等所獻宮殿願垂納處我等所獻隨身宮殿願佛垂慈為我納受時諸梵天王即於佛前一心同聲以偈頌曰善哉見諸佛救世之聖尊善哉正見諸佛如來救護世間大聖世尊能於三界獄勉出諸衆生能於三界生死獄中勸勉衆生令得出離普智天人尊哀愍群萌類普佛智慧天人中尊哀愍群生善芽之類能開甘露門廣度於一切甘露是諸天不死之藥佛開法施令脫生死名為甘露平等救護一切衆生名為廣度於昔無量劫空過無有佛於往昔時無量劫數悉皆空過無有佛出世尊未出時十方常暗暝諸佛世尊未出世時十方國土常如暗昧三惡道增長阿修羅亦盛世間無師衆生迷惑增長惡報及修羅類諸天衆轉減死多墮惡道諸天縱欲福盡退墮死時多生惡道之中不從佛聞法常行不善事由不從佛聞於正法常行世間不善之事色力及智慧斯等皆減少顏色氣力及與智慧悉皆減少罪業因緣故失樂及樂想以諸罪業惡因緣故失於樂報及以樂想住於邪見法不識善儀則住於外道邪見法中不識修善威儀法則不蒙佛所化常墮於惡道不蒙如來所化道常常墮落惡道之中佛為世間眼久遠時乃出佛作世間人天眼目經久遠劫時乃出現哀愍諸衆生故現於世間為愍衆生所以出世超出成正覺超出一切三乘六道成就無上正等正覺我等甚欣慶我等甚是欣喜慶賀及餘一切衆喜歎未曾有及餘四衆天龍八部歡喜讚歎昔所未有我等諸宮殿蒙光故嚴飾我等乘來天宮寶殿蒙佛光故嚴飾妙好今以奉世尊唯垂哀納受今以宮殿奉上世尊惟願垂哀為我納受願以此功德願用此之禮拜恭敬散華奉殿所有功德普及於一切普皆遍及利益一切我等與衆生我等及與法界衆生皆共成佛道自他共利同成佛道爾時五百萬億諸梵天王偈讚佛已各白佛言唯願世尊轉於法輪勸請世尊轉大法輪多所安隱心所未安令得安隱多所度脫身未得度令脫生死時諸梵天王而說偈言世尊轉法輪佛轉法輪摧滅煩惱擊甘露法鼓能除焦熱名為甘露䇿警昏迷名擊法鼓度苦惱衆生轉輪擊鼓皆為度生開示涅槃道開示天人寂滅之路唯願受我請惟願世尊受我勸請以大微妙音以諸廣大微妙之音哀愍而敷演哀憐我等而為敷宣無量劫習法無量劫來所習之法爾時大通智勝如來受十方諸梵天王及十六王子請佛受衆人群勤勸請即時三轉十二行法輪言三轉者一示相轉明四諦緣是因果法二勸修轉明四諦法是所當學三引證轉明四諦輪我已修證三轉四諦故成十二其行法相周而復始如輪之運故曰法輪若沙門出家僧衆婆羅門在家淨行若天魔梵若諸天若魔王若梵王也及餘世間及餘一切世間之人所不能轉出世之法唯佛能轉非世所能謂是苦言世間法悉皆是苦念念遷謝無時暫安是苦集業惑二種集在其身能招苦報是苦滅無漏涅槃是滅苦法是苦滅道三學八正是滅苦道知苦斷集為滅修道即世出世間四諦法也苦果集因世間因果也滅果道因出世間因果也及廣說十二因緣法無明緣行以無明緣而生於行行緣識以行為緣而生於識識緣名色以識為緣而有名色受想行識四陰是心但有其名唯色一陰是可觸對即四大也名色合論名五陰法名色緣六入以五陰緣生於六根能入諸塵六入緣觸緣六根門觸於六塵觸緣受緣相觸故起受領心受緣愛緣領納故生愛樂心愛緣取緣愛樂故生取索心取緣有緣取索故即有業生有緣生緣集業故生起報形生緣老死憂悲苦惱緣出生故遂有老死憂悲苦惱常隨其身是中無明行過去因也識名色六入觸受現在果也愛取有未來因也生老死未來果也又無明行愛取有此五支屬集諦識名色六入觸受生老死此七支屬苦諦也無明滅則行滅若無無明諸過不生則惡行滅行滅則識滅惡行不行則妄識滅識滅則名色滅因識投胎遂有名色妄識不生則名色滅名色滅則六入滅從名色上生於六入名色不生六入則滅六入滅則觸滅因有六入觸於外塵六入不生觸相則滅觸滅則受滅觸既不生受相則滅受滅則愛滅無受領心愛相則滅愛滅則取滅無愛樂心取相則滅取滅則有滅無取著心安得有業則有滅也有滅則生滅因業招生有業既亡則生相滅生滅則老死憂悲苦惱滅因於生故則有老死既不受生欲誰老死則老死滅無生老死憂悲苦惱一時滅也前明生法則苦生為緣相因而起今明滅法則道滅為緣因於道諦滅十二緣證寂滅樂然則四諦與十二緣開合異耳十二生法即苦集二諦十二滅法即道滅二諦佛於天人大衆之中說是法時其大通佛於大衆中說此四諦十二緣時六百萬億那由他人當機之數以不受一切法故一切煩惱因受而生因不受故物不礙心而於諸漏心得解脫而於世間諸有漏境解縛得脫心中自在皆得深妙禪定四禪四空世間凡夫所修事定但伏煩惱不能斷除名為粗淺果位聖人斷見思惑見真諦理名為深妙禪寂之樂三明六通具八解脫如前序品第二第三第四說法時二三四者說法時會千萬億恆河沙那由他等衆生聞法之衆亦以不受一切法故自第二會至于第四亦如初會於法不受心中空寂不見所有而於諸漏心得解脫而於三界諸有漏法心得自在解脫生死從是已後從第四會至于末後諸聲聞衆諸得道者聲聞之衆無量無邊不可稱數言其多也爾時十六王子佛未出家有十六子皆以童子出家以童真身從父出家而為沙彌此云息慈初心出家息滅諸惡勤修慈善諸根通利於六根門通達鋭利智慧明了有大智慧心地明了已曾供養百千萬億諸佛過去已曾供多諸佛淨修梵行以清淨修習梵行求阿耨多羅三藐三菩提供佛修行深種善根志求菩提成等正覺俱白佛言世尊同聲白佛是諸無量千萬億大德聲聞諸有威德大聲聞衆皆已成就即前六百萬億等於法不受得羅漢者名已成就世尊亦當為我等願佛亦為我等王子說阿耨多羅三藐三菩提法無上正等覺修行之法即是菩薩六度萬行我等聞已我等若得聞此法已皆共修學皆共於中修行習學世尊我等志願我等王子立志發願如來知見為求如來無上知見深心所念志求佛道名為深心所念在佛求不餘乘佛自證知佛神通力自知我心為作證明爾時轉輪聖王王子之祖大通之父所將衆中八萬億人王詣佛所所將帶衆見十六王子出家因見心喜亦求出家亦白其王欲求出家王即聽許時轉輪王即便容許爾時彼佛大通如來受沙彌請受十六子沙彌之請過二萬劫已初說三乘後方說妙乃於四衆之中佛處衆中師子之座說是大乘經言大乘者簡異小教名妙法蓮華教菩薩法佛所護念如序品解說是經已說蓮經已十六沙彌為阿耨多羅三藐三菩提故為欲成就正等覺故皆共受持信力故受念力故持諷誦通利緩聲曰諷直聲曰誦說是經時大通佛說是蓮經時十六菩薩沙彌沙彌但受十戒本是小乘今求佛道修大乘行故曰菩薩沙彌皆悉信受皆於法華信心受領聲聞衆中亦有信解雖是聲聞遇說法華其中亦有生信解者其餘衆生千萬億種常途但說十種衆生或十二類今經中云千萬億種乃約衆生差別根性其類不一皆生疑惑是等初機根力淺故聞說深妙不能解了所以其疑將非魔說惱亂我耶如今靈山退席之類佛說是經是法華經於八千劫未曾休廢大通佛世人壽長遠說妙法華滿八千劫中間未嘗有休息時釋迦佛世人壽短促說於妙法但止八年修短隨緣法無異味說此經已說法華已即入靜室經明定學勸諸衆生在於間靜修攝其心佛出世間為人作則故說經已即入靜室住於禪定梵語禪那此云寂滅方便之定有入住出上云靜室即入定也今云住於即住定也又下文云從三昧起即出定也若據如來自受用門那伽大定本無出入今入住出乃是權智他受用身八萬四千劫在定之身經如是劫若表法者為欲攝靜八萬四千塵勞煩惱是時十六菩薩沙彌知佛入室知如來入寂靜之室寂然禪定凝心寂然住於正定各升法座各人升於說法之座亦於八萬四千劫沙彌升座亦經許久若表法者如來即性住定不動沙彌即心隨緣應化寂是止義說是觀義說法亦是為欲照破八萬四千塵勞煩惱為四部衆僧尼士女廣說分別為大衆故廣分別說妙法華經代大通佛覆講法華一一皆度一一沙彌皆悉度脫六百萬億那由他恆河沙等衆生那由他者大數之名恆河沙者喻數之多六百萬億表淨六根示教利喜開示教誨利益生喜令發阿耨多羅三藐三菩提心勸發無上大道之心大通智勝佛過八萬四千劫已從三昧起前云禪定今云三昧即禪定也佛久住定今從定起往詣法座自靜室出往法座處安詳而坐安隱詳審離諸輕動卒暴之過具修威儀然後乃坐普告大衆出大音聲遍告四衆是十六菩薩沙彌甚為希有以能說法歎言希有諸根通利六根通曉而復鋭利智慧明了有大智慧心中明了已曾供養無量千萬億數諸佛久供諸佛宿福深也於諸佛所如上佛所常修梵行常時修習清淨梵行受持佛智經中所明佛之智慧是諸菩薩悉能受持開示衆生令入其中以己所得開示於他令其得入佛道之中汝等皆當數數親近而供養之數近則親密供養則生福所以者何有何所以勸令近供菩薩沙彌若聲聞小乘之人辟支佛緣覺之人及諸菩薩大乘之人能信是十六菩薩所說經法妙法華經受持不毀者至心受持不毀謗者是人皆當得阿耨多羅三藐三菩提如來之慧是持經人皆當得佛無上智慧佛告諸比丘是十六菩薩常樂說是妙法蓮華經是諸菩薩不說餘法心常樂說妙法華經一一菩薩所化六百萬億那由他恆河沙等衆生所化之機有如是數世世所生與菩薩俱以宿緣故常相值遇從其聞法悉皆信解耳根熟故易得入神以此因緣得值四萬億諸佛世尊于今不盡以此聞法善根因緣中間得值二萬億威音王佛如不輕品二萬億日月燈明佛如序品中直至于今猶未能盡於未來世當得度脫諸比丘我今語汝語汝王子今皆成佛彼佛弟子十六沙彌彼大通佛覆講沙彌今皆得阿耨多羅三藐三菩提皆已成就正等正覺於十方國土現在說法言現在者簡異過去及以未來言說法者簡異成佛未轉法輪有無量百千萬億菩薩聲聞以為眷屬各有無量三乘之衆其二沙彌東方作佛十六數中第一第二一名阿閦此云不動尊在歡喜國即是東方妙喜世界二名須彌頂佛之功德出過一切如須彌盧居衆山頂東南方二佛一名師子音世尊威猛龍鬼欽崇如師子吼百獸皆畏二名師子相進止威儀如師子相南方二佛一名虗空住遠離諸有住法性空二名常滅不妄流動常居寂滅西南方二佛一名帝相威德尊嚴現天帝相二名梵相具清淨行現梵天相西方二佛一名阿彌陀此云無量壽亦云無量光二名度一切世間苦惱以大慈悲能度世間一切苦厄西北方二佛一名多摩羅跋旃檀香神通多摩羅跋此云性無垢賢旃檀香即牛頭旃檀佛之神通功德妙香充滿法界無能勝者故得是名二名須彌相身量雄相好具足如須彌山顯于大海北方二佛一名雲自在以大身雲遍布一切於諸法中得大自在二名雲自在王如雲自在去來無礙成最正覺為法中王東北方佛名壞一切世間怖畏世間衆生由愛色身故多恐怖佛為衆生破壞巢窟令離一切怖畏之相第十六我釋迦牟尼佛釋迦此云能仁以能仁育化衆生故即應身也牟尼此云寂默即是如來常寂法身真應泯合名釋迦牟尼佛於娑婆國土即佛所化大千之境娑婆此云堪忍有二義約菩薩說以其堪能忍諸違惱不倦利生名為堪忍約衆生說以其在迷堪能忍苦不知出離成阿耨多羅三藐三菩提謂成無上正遍知覺諸比丘我等為沙彌時從本地因各各教化無量百千萬億恆河沙等衆生所度之衆從我聞法從佛聞說大乘之法為阿耨多羅三藐三菩提為欲成就無上菩提此諸衆生昔時所化恆沙之衆于今有住聲聞地者至于今生尚有退大住於小乘聲聞位者我常教化阿耨多羅三藐三菩提為機緣故說種種法然如來意但為佛乘即經云諸有所作常為一事故曰我常教化是諸人等謂諸聲聞應以是法聲聞之法漸入佛道從漸入頓所以者何何故從漸由佛理深難解之故如來智慧佛之知見名為智慧難信難解一念心明即成佛道功高難信圓頓大教說佛知見義深難解爾時所化無量恆河沙等衆生者爾大通時十六菩薩沙彌所化河沙衆生汝等諸比丘靈山會上諸比丘衆及我滅度後正像末法諸比丘衆未來世中佛復化身於彼得度聲聞弟子是也如是等人聲聞弟子皆昔所化度未了者我滅度後如來此世入滅度後復有弟子不聞是經即方便品云除佛滅度後現前無佛時妙經難解說者甚希聞者亦少不知不覺菩薩所行以不信故無由知之以不修故何緣覺了是以迷於一切菩薩所依所行自於所得功德自於小乘聲聞之行所得功德生滅度想當入涅槃於方便果生心起想即以羅漢遍空涅槃名究竟度我於餘國作佛餘國即應化土更有異名如來應身異名無量是人雖生滅度之想入於涅槃是聲聞人雖則生於入涅槃想而於彼土求佛智慧得聞是經不定性人聞說大義轉小入大定性之人雖於當世不能回心而於餘國求學佛道得聞如是一乘妙法唯以佛乘而得滅度更無餘乘獨以無上一佛乘法進趣修行而得度脫更無大小及以三乘除諸如來方便說法除却諸方應身如來為機宜故方便說三諸比丘若如來自知涅槃時到若佛自知機緣既盡化緣將畢入滅時至衆又清淨又所化衆行業清淨信解堅固聞佛說大正信善解其心堅固了達空法於第一義空寂之法明了通達深入禪定深入大乘禪定之法便集諸菩薩及聲聞衆為說是經說是蓮經化諸菩薩及以聲聞皆入一乘世間無有二乘而得滅度世間無有大小二乘得滅度者唯一佛乘得滅度耳但有一乘寂滅之道比丘當知恐諸比丘聞佛所說心中生疑既唯一乘何故復說三乘之法欲顯權意解除疑惑故曰當知如來方便諸佛如來慈悲方便深入衆生之性善知一切衆生之性諸根行業深入無際知其志樂小法知其心志樂於小法深著五欲深心樂著色聲香味觸五欲之境為是等故說於涅槃為於是等小機之故說於中道方便涅槃是人若聞則便信受是淺根人若聞說小即便稱機而能信受譬如五百由旬險難惡道險難即喻三界衆苦惡道即是五道輪回五百由旬者一百欲界二百色界三百無色界五道衆生住於三界羅漢超出三界苦輪名為行過三百由旬到法性土界外菩薩伏破塵沙到方便有餘名為四百破無明惑到實報土名為五百如來三惑一時究盡證大涅槃名為寶所到常寂光曠絶無人怖畏之處人喻於佛衆生在迷去佛隔遠名為曠絶生死險難是可怖處若有多衆喻五道衆欲求法者欲過此道喻欲過此生死險道至珍寶處如來所有功德智慧名為珍寶從凡入聖名為至處有一導師喻佛各一導引之師聰慧明達聰利智慧明了通達善知險道善能了知險難苦道通塞之相入邪墮苦名為塞相超凡入聖名為通相將導衆人將帶引導在迷之衆欲過此難擬欲過此生死險難所將人衆中路懈退人衆喻於二乘中路喻小涅槃雖從佛化怖大樂小名為懈退白導師言喻衆白佛我等疲極而復怖畏我等小機疲倦困極而復於大生怖畏心不能復進不能起修復進於大前路猶遠今欲退還凡愚望佛隔絶五道故云猶遠力所不及故欲退還導師多諸方便喻佛權巧多方便慧而作是念愍衆退心所以作念此等可愍此諸小機甚可憐愍云何捨大珍寶而欲退還為何棄捨佛乘大寶於中路間而欲退轉作是念已佛作如是心思念已以方便力權以三乘方便之力於險道中五險道中過三百由旬到於三界外方便聖居土化作一城方便假設名為化作一城即是小教涅槃告衆人言告諸小衆作如是言汝等勿怖莫得退還汝等小機勿於大教生怖畏心莫得疲厭中路退還今此大城今此空寂涅槃大城可於中止可於此中安心止息隨意所作隨小機意知苦斷集纂果修因名為所作若入是城若入如是涅槃之城快得安隱以得小果快利其心離分段生名為安隱若能前至寶所若能更進前到如來寂光寶所亦可得去亦可得有前去之理是時疲極之衆是時小機於大乘法疲極之衆心大歡喜所聞稱心故大歡喜歎未曾有嗟歎快意昔所未有我等今者免斯惡道今者免得三界惡道快得安隱快得涅槃安隱之處於是衆人前入化城從聞起修入於權化涅槃之城生已度想心下自生已得度想謂出三界到於涅槃生安隱想心下自生安隱之想謂已出離險難惡道爾時導師喻法華時佛大導師知此人衆既得止息知此小衆既得入於化城止息無復疲倦無復更有未到此時疲倦之心即滅化城即廢小教說一佛乘語衆人言告小衆言汝等去來汝等勿得樂於小法入於佛道大教去來寶處在近五百由旬今已過半如來寶所方且在近向者大城向者中路涅槃大城我所化作我見汝疲方便化作為止息耳為汝等故非是究竟暫止息耳諸比丘如來亦復如是合前導師顯示佛意今為汝等為汝諸人聲聞衆等作大導師導出三界名小導師導成佛道名大導師知諸生死知諸衆生三界生死煩惱惡道見思無明諸煩惱賊怖畏毒害種種惡道險難長遠凶險患難曠劫輪回故云長遠應去應度當去煩惱當度生死若衆生但聞一佛乘者若彼小根不為說淺但使得聞一佛妙乘則不欲見佛則心不樂見佛世尊不欲親近以高峻故不欲親近便作是念則其心中即作念言佛道長遠歷塵點劫修修萬行乃成佛道故云長遠久受勤苦如斯之久忍苦疲勞乃可得成乃可證悟得成正覺佛知是心佛智深知是等之心怯弱下劣怯退懦弱見處卑劣以方便力佛以慈悲方便之力而於中道而於佛道中路之間為止息故為令暫時止息之故說二涅槃諸小乘人已斷見思尚有身在名曰有餘化火焚身身智俱滅同大虗空名曰無餘佛為小機方便演說有餘無餘名二涅槃若衆生住於二地若有衆生住於小教有餘無餘二種地位如來爾時如來見爾住涅槃時即便為說即便發言為之演說汝等所作未辦汝等所作小乘名辦而於佛乘未能辦也汝所住地汝所住位已行三百由旬出於三界到法性土涅槃大城近於佛慧小乘羅漢望佛果地位但隔二百由旬故云近也當觀察籌量汝當觀察籌度思量所得涅槃非真實也汝所證得偏空寂滅非是真實大般涅槃但是如來方便之力但是如來隨汝等機方便之力於一佛乘分別說三於一佛乘究竟之道權巧分別作三乘說如彼導師即如險道指教之師為止息故化作大城為息疲倦權作大城既知息已既知衆等得安息已而告之言寶處在近復䇿前進言寶處近此城非實我化作耳此涅槃城一期權設故云非實無中說有故云化作爾時世尊欲重宣此義而說偈言佛欲重宣先權後實善巧之義而說偈言大通智勝佛十劫坐道場先降魔已坐於道場佛法不現前不得成佛道無漏聖法不現在前未成無上正遍知佛諸天神龍王諸天鬼神及諸龍王阿修羅衆等阿修羅王八部衆等常雨於天華以供養彼佛常散天上衆妙寶華以供養彼大通如來諸天擊天鼓並作衆妓樂諸天擊於天上之鼓并作天上伎藝音歌香風吹萎華更雨新好者香風時來吹去萎華更復別散新好之者過十小劫已乃得成佛道十小劫後佛法現前乃得成就佛果菩提諸天及世人心皆懷踊躍諸天八部及世間人見佛成道心皆踊躍彼佛十六子皆與其眷屬十六王子及諸眷屬千萬億圍繞俱行至佛所千萬億衆圍繞王子行至佛所頭面禮佛足而請轉法輪以頭至地面覆足趺作禮於佛發言勸請轉大法輪聖師子法雨充我及一切願聖師子雨大法雨充潤我等及餘一切世尊甚難值久遠時一世世尊覺父甚難值遇過久遠劫時乃一現為覺悟群生震動於一切為欲覺悟一切群生故先震動十方世界東方諸世界五百萬億國東方屬震為動之主故先照東五百億國梵宮殿光曜昔所未曾有梵天宮殿光明照耀昔未有之諸梵見此相尋來至佛所諸梵見此光耀之相故至佛所散華以供養并奉上宮殿先散寶華次奉宮殿請佛轉法輪以偈而讚歎請佛轉於不退法輪復以偈言而共讚歎佛知時未至受請默然坐佛知化緣時節未至受衆人請默然而坐三方及四維上下亦復爾西南北方四維上下九方諸天亦如東方勸請世尊散華奉宮殿請佛轉法輪所作供事等無有異世尊甚難值願以大慈悲佛難得值願以本來因地之中大慈悲心廣開甘露門轉無上法輪天上甘露是不死藥佛之法道是甘露門願佛廣開轉大法輪令諸衆生食甘露味無量慧世尊受彼衆人請無量智慧萬德世尊受衆人請默然許可為宣種種法四諦十二緣聲聞四諦緣覺十二因緣無明至老死皆從生緣有始自無明終至老死皆從緣生而有諸苦如是衆過患汝等應當知如是四諦及十二緣衆多過患汝等應知宣暢是法時宣暢如是法門之時六百萬億姟十萬為億十億為兆十兆為姟即是千萬也得盡諸苦際得盡世間生死苦際皆成阿羅漢如是衆多皆證四果第二說法時當第二會說法之時千萬恆沙衆有如是衆於諸法不受於諸世間五欲之法悉皆不受亦得阿羅漢亦如初會得證四果從是後得道從第二後餘會得道其數無有量而其數自無有限量萬億劫算數不能得其邊縱使經歷萬億劫數亦不能得知其邊際時十六王子出家作沙彌捨俗出家未受大戒尚作沙彌皆共請彼佛演說大乘法皆同發心共請大通說大乘法我等及營從皆當成佛道我等王子及諸侍從皆願當得成就佛道願得如世尊慧眼第一淨願得如佛大智慧眼第一清淨佛知童子心宿世之所行佛知童真諸王子心過去宿世所作行業以無量因緣種種諸譬喻用無量數過去因緣世間事物種種譬喻說六波羅蜜及諸神通事波羅蜜此云到彼岸即六度也諸神通事即十力四無畏六通等分別真實法菩薩所行道分別演說真實妙法一切菩薩所行之道說是法華經如恆河沙偈說是大乘妙法華經如恆河沙無數偈頌彼佛說經已靜室入禪定彼佛經於八千小劫說法華已即入靜室住於禪定一心一處坐八萬四千劫齊其一心於一處坐經於八萬四千小劫是諸沙彌等知佛禪未出諸沙彌等知佛坐禪未曾出定為無量億衆說佛無上慧為諸大衆說於如來無上智慧各各坐法座說是大乘經各各坐於方廣之座為大衆說妙法華經於佛宴寂後宣揚助法化於佛入室宴默之後宣揚助道妙法之化一一沙彌等所度諸衆生諸沙彌等分頭行化所度衆生有六百萬億恆河沙等衆以何因緣各各說法所度之衆不多不少當知衆生即是妄念六百萬億表淨六根彼佛滅度後彼大通佛滅度之後是諸聞法者是諸沙彌聞法之者在在諸佛土常與師俱生以宿願力在在國土常與法師共住一處是十六沙彌具足行佛道是諸沙彌具足修行諸佛之道今現在十方各得成正覺于今現在十方世界各各得成無上正覺爾時聞法者各在諸佛所爾覆講時聞妙法者各在其師成佛之處其有住聲聞漸教以佛道其有力弱在聲聞者漸漸開誘教以佛道我在十六數曾亦為汝說釋迦亦在十六數中曾亦為汝說法華經是故以方便引汝趣佛慧由汝樂小故以方便引汝趣於佛之智慧以是本因緣今說法華經以是本時因緣之故今為汝說妙法華經令汝入佛道慎勿懷驚懼令汝入於無上佛道謹勿懷於驚懼之心譬如險惡道逈絶多毒獸譬三界中如險惡道孤逈隔絶多諸毒獸言毒獸者如火宅品又復無水草人所怖畏處又無水草喻缺資糧生死大苦人所怕處無數千萬衆欲過此險道無量億人怕怖三界欲出險道到安隱處其路甚曠遠經五百由旬其所由路甚是空曠又復長遠望於佛地五百由旬時有一導師強識有智慧導師喻佛強學博識有大智慧明了心決定於事明了心中決定無有狐疑在險濟衆難喻佛垂應在險惡道濟拔衆人生死苦難衆人皆疲倦而白導師言衆畏道遠生疲倦心俱發聲言白於導師我等今頓乏於此欲退還我等今者困頓疲乏於此中途欲得退轉導師作是念此輩甚可愍導師爾時而作是念此輩劣機甚可憐愍如何欲退還而失大珍寶如何中路而欲退歸失於如來大價珍寶尋時思方便當設神通力即時思惟善巧方便當為施設神通之力化作大城郭莊嚴諸舍宅非本實有方便施為故云化作禪定為城以戒為郭戒定慧力莊嚴道品名為舍宅周匝有園林園可遊戲林可棲泊喻諸慧學及覺支林渠流及浴池理水通流如於渠道戒名為池群聖所浴重門高樓閣三十七道品名高樓閣次第登進名曰重門男女皆充滿男喻慧性以動為用女喻定性以靜為用諸道品中定慧具足如樓閣中男女充滿即作是化已慰衆言勿懼即依方便說涅槃已慰喻衆人勿得怖懼汝等入此城各可隨所樂汝等入此涅槃之城各可隨汝之所樂欲諸人既入城心皆大歡喜諸人既入涅槃之城心皆大喜皆生安隱想自謂已得度皆於小果便生無怖安隱之想自謂已得度於三界煩惱大海導師知息已集衆而告言佛知小機證涅槃樂得休息已乃集大衆諸聲聞等而語之曰汝等當前進此是化城耳汝等諸人當須前進入於大乘此小涅槃為息疲倦我化作耳我見汝疲極中路欲退還佛見小機於大乘行生疲極想中途之間而欲退轉故以方便力權化作此城以是之故用方便智權時強立涅槃之城汝今勤精進當共至寶所汝既證小今當精進皆共至於如來寶所我亦復如是為一切導師合導師喻佛亦如是為諸衆生引導之師見諸求道者中路而懈廢見諸從佛求道之者中途懈廢退大學小不能度生死煩惱諸險道不能度於生死苦海諸煩惱賊險難惡道故以方便力為息說涅槃故以方便智慧之力為止息故說二涅槃言汝等苦滅所作皆已辦告言汝等諸苦已滅所修道業皆悉了辦既知到涅槃皆得阿羅漢既知諸人已證涅槃一時皆得阿羅漢果爾乃集大衆為說真實法於法華會集諸聲聞為說一乘真實之道諸佛方便力分別說三乘一切諸佛以方便力於一佛乘分別說三唯有一佛乘息處故說二其實唯有一佛妙乘為息疲勞說有大小今為汝說實汝所得非滅佛今為汝說於實道汝告所得阿羅漢果但是權施非真實滅為佛一切智當發大精進為求佛道一切智慧當發大心修精進行汝證一切智十方等佛法汝當證於一切種智十力無畏不共等法具三十二相乃是真實滅諸小乘人厭老病死為求涅槃不起化導利益衆生缺於福分故無相好佛之道者福慧雙修先人後己自利利他究竟滅度具諸相好名真實滅諸佛之導師為息說涅槃一切諸佛為世導師為暫息故說二涅槃既知是息已引入於佛慧既知證小得安息已乃說大乘引入佛慧
