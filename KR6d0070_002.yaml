body:
  text: 錢塘廣照沙門釋聞達妙法蓮華經譬喻品第三前方便品開方便門示真實相依法直說唯舍利弗隨聞悟解餘諸大眾雖則預聞尚未決了身子知機請佛為說令離疑悔佛即許可今當復以譬喻更明此義故名譬喻品也就中分二從卷初至盡迴向佛道身子領解如來述成與授記莂眾見歡喜是法說也次從爾時云云我今無復疑悔直至品終其中引物譬類欲令開解是譬說也爾時舍利弗聞方便品說法竟時踊躍歡喜手足踊躍心大歡喜即起合掌避席起身合掌具禮瞻仰尊顏瞻視仰望佛之尊顏而白佛言如上五句經家敘也今從世尊聞此法音聞方便品法說之音心懷踊躍心懷暢悅喜形於外得未曾有得聞妙法昔所未有所以者何出未聞意我昔從佛我於昔時從佛世尊聞如是法聞說大乘菩薩之法見諸菩薩目見大乘菩薩之機受記作佛受應身記八相成佛而我等不預斯事我等不預受記之事甚自感傷甚覺自愧有所感傷失於如來無量知見以樂小故失如來乘無量甚深佛之知見世尊我常獨處常時獨處山林樹下叢樹曰林獨木曰樹若坐若行若端坐若經行每作是念每以是事作念在懷我等同入法性我與菩薩同師如來入於法性云何如來因何之故而吾如來以小乘法用小乘教生滅之法而見濟度方便見示拯濟救度是我等咎是我等失不堪受大非世尊也非是世尊有所慳悋所以者何徵起來意若我等待說所因若是我輩等待如來說諸菩薩所修大因成就阿耨多羅此云無上三藐三菩提者此云正等正覺必以大乘必用菩薩圓頓大乘而得度脫而令我得大乘度脫然我等不解方便然則我等不能曉解如來方便隨宜所說隨我所宜說方便法初聞佛法初於鹿苑聞四諦法遇便信受遇說小乘便即信受思惟取證用心思惟取證小果世尊我從昔來我自昔日方等已來終日竟夜盡日徹旦每自尅責每自追悔尅己責心而今從佛而於今日從佛所聞聞所未聞得聞昔日之所未聞未曾有法即方便品昔未有法斷諸疑悔未聞此前疑惑追悔今悉斷除身意泰然身安意定所以貼泰快得安隱身意爽快安樂隱密今日乃知真是佛子從前自謂體是聲聞今日方知是佛親子從佛口生從佛口說生於聞慧從法化生從法所化生於思慧得佛法分得於佛法有自己分爾時舍利弗欲重宣此義重欲宣通長行中義而說偈言我聞是法音我今得聞是法說音得所未曾有得於昔日未曾有法心懷大歡喜心懷清淨生大喜悅疑網皆已除疑惑不解如網之悉已斷除昔來蒙佛教自從昔來蒙佛教誡不失於大乘於大得聞名為不失佛音甚希有佛妙法音甚為罕有能除眾生惱善能除滅眾生熱惱我已得漏盡我已得果三界漏盡聞亦除憂惱聞大乘義亦能除惱我處於山谷我居山林幽谷之中或在林樹下或在叢林獨樹之下若坐若經行行坐之間常思惟是事常常思量大乘之事嗚呼深自責嗚呼歎息深自剋責云何而自欺以何之故而自欺瞞我等亦佛子我等聲聞亦是佛子同入無漏法三乘之人同斷漏業入於法性空寂之理不能於未來不能有力於未來世演說無上道但知樂小不能說大金色三十二佛金色身三十二相十力諸解脫如來十力及三解脫同共一法中同住如來一法之中而不得此事但證小果而不得於無上道中法身之事八十種妙好無八十種微妙相好十八不共法十八種法不共三乘唯佛獨證如是等功德如上所舉是等功德而我皆已失而我於大皆已失之我獨經行時我或居靜獨經行時見佛在大眾見佛世尊在大眾中名聞滿十方名稱聞望徧滿十方廣饒益眾生廣博利益法界眾生自惟失此利自思失此大功德利我為自欺誑我由鈍劣欺誑自心我常於日夜常於時中日夜思量每思惟是事每每思惟如是大事欲以問世尊欲以此事問於世尊為失為不失為復是失為復不失我常見世尊我於常時見佛世尊稱讚諸菩薩稱名讚歎諸大菩薩以是於日夜以此之故於晝夜間籌量如是事籌度思量如是之事今聞佛音聲今聞吾佛微妙音聲隨宜而說法隨順機宜而說諸法無漏難思議無漏聖道不可思議令眾至道場令三乘眾悉登道場我本著邪見我本外道著邪見者為諸梵志師外道出家名為梵志身子初時為梵志師世尊知我心世尊道眼知我本心拔邪說涅槃拔除邪見說涅槃理我悉除邪見我悉斷除邪僻之見於空法得證於空寂法得獲證入爾時心自謂爾證小時心下自謂得至於滅度得小涅槃為究竟度而今乃自覺而於今日乃自省覺非是實滅度非是真實究竟滅度若得作佛時若果是得作真佛時具三十二相具三十二大人相好天人夜叉眾龍神等恭敬若天及人龍鬼八部皆來恭敬是時乃可謂如是之時方乃可謂永盡滅無餘諸漏永盡更無有餘佛於大眾中佛於天人大眾之中說我當作佛說我未來當得作佛聞如是法音聞佛如是授記之音疑悔悉已除疑惑掉悔皆悉已除初聞佛所說初聞佛說法妙難思心中大驚疑心中大故驚恐疑惑將非魔作佛將非魔王現身作佛惱亂我心耶特來相惱亂我心耶佛以種種緣如方便品說諸因緣譬喻巧言說引物譬類善巧言說其心安如海其時我心安靜如海我聞疑網斷我聞佛音裂斷疑網佛說過去世佛說往時過去之世無量滅度佛無邊數量已滅度佛安住方便中安穩住於方便教中亦皆說是法彼佛亦皆說方便法現在未來佛現在住世及未來佛其數無有量其佛之數無有限量亦以諸方便亦以三乘諸方便教演說如是法假諸方便說大乘法如今者世尊如於今日釋迦世尊從生及出家自從降生及以出家得道轉法輪得成聖道轉大法輪亦以方便說亦用方便說於大乘世尊說實道世尊所說真實之道波旬無此事外道波旬無如是事以是我定知以實道故我必定知非是魔作佛非是魔王化作佛也我墮疑網故我以迷心墮疑網故謂是魔所為謂是魔王化身為佛聞佛柔軟音聞佛前品柔軟圓音深遠甚微妙其音深遠義趣微妙演說清淨法流演敷暢清淨妙法我心大歡喜昔迷故疑今悟生喜疑悔永已盡驚疑掉悔已永滅盡安住實智中安心住於真實智中我定當作佛我今定當八相作佛為天人所敬得諸天人龍鬼所敬轉無上法輪轉於無上清淨法輪教化諸菩薩如佛世尊方便雖多但為菩薩爾時佛告舍利弗吾今於天人沙門婆羅門等大眾中說沙門此云勤息婆羅門此云淨行我昔曾於釋迦自謂曾於過去二萬億佛所二萬億數日月燈明諸佛之所為無上道故為欲成就無上道故常教化汝常以大乘教化於汝汝亦長夜未破無明名為長夜隨我受學隨侍於我受經學道我以方便我用慈悲而為方便引導汝故誘引化導為汝之故生我法中生身於我清淨法中舍利弗我昔教汝我於往昔訓教於汝志願佛道立志願求無上佛道汝今悉忘汝以力微今悉遺忘而便自謂汝便於小而自謂言已得滅度已得無上究竟滅度我今還欲令汝我於今者復欲令汝憶念本願憶想思念本時志願所行道故昔世所行無上道故為諸聲聞與諸在會諸大聲聞說是大乘經為小說大欲引入實名妙法蓮華教菩薩法佛所護念如前已解舍利弗汝於未來世當來之世過無量無邊不可思議劫從今日去經過無邊非心思口議無數之劫供養若干千萬億佛言若干者即前無量無邊不可思議奉持正法敬奉受持正真之法具足菩薩具足修習大乘菩薩所行之道平昔所行無上之道當得作佛因圓果滿當成佛道號曰華光如來以智慧華光嚴果海故號華光應供正徧知明行足善逝世間解無上士調御丈夫天人師佛世尊如前品解國名離垢國土清淨遠離塵垢其土平正因無諂曲果地平正清淨嚴飾清淨上妙嚴飾其土安隱豐樂境安歲豐多諸快樂天人熾盛正報勝也琉璃為地心因映徹地成琉璃有八交道八道交通表八正道黃金為繩約事即街線約理即法繩以界其側用繩界側不容邪曲其傍各有路道之傍七寶行樹七寶為樹列而成行常有華果其樹常有種種華果華光如來亦以三乘教化眾生亦同諸佛說三乘法化諸眾生舍利弗彼佛出時彼華光佛出世之時雖非惡世土勝人奇壽命長遠故非惡世以本願故以因地時本願力故說三乘法而說三乘以為方便其劫名大寶莊嚴下文自解何故名曰大寶莊嚴問立名意其國中以菩薩為大寶故此答通也彼諸菩薩彼寶嚴土諸大菩薩無量無邊數目多也不可思議心思口議不可得知算數譬喻算思計數他物譬喻所不能及是諸巧便皆不及知非佛智力非佛如來智慧之力無能知者自餘一切無能知者若欲行時寶華承足行動之時足躡寶華此諸菩薩非初發意非是初發無上道意皆久植德本皆已久種德善之本於無量百千萬億佛所徧皆承事如是諸佛淨修梵行淨心修習清白梵行恒為諸佛常得諸佛之所稱歎稱名讚歎常修佛慧常常修習佛之智慧具大神通備有變化廣大神通善知一切善能了知法界一切諸法之門諸修行法入道之門質直無偽質實正直無有虗偽志念堅固建立志願堅實牢固如是菩薩如是正行諸大菩薩充滿其國充滿三千一化之國舍利弗華光佛壽十二小劫一期應化壽量如是除為王子除却在家為王太子未作佛時及出家後未成佛時其國人民壽八小劫國中人民華光如來過十二小劫佛壽過了十二劫已授堅滿菩薩補處菩薩行堅願滿故得授記阿耨多羅三藐三菩提記懸先授記當得成佛告諸比丘華光告白會上諸人是堅滿菩薩次當作佛次第作佛繼華光後號曰華足安行彼佛行時寶華承足多陀阿伽度此云如來阿羅訶此云應供三藐三佛陀此云正徧知其佛國土其安行佛應身國土亦復如是亦復清淨如華光佛舍利弗是華光佛滅度之後化緣已畢入滅之後正法住世三十二小劫正化流行如佛在時名為正法像法住世亦三十二小劫人根漸劣像正法時爾時世尊釋迦牟尼欲重宣此義重宣華光此應化義而說偈言括前長行而為偈頌舍利弗來世是舍利弗於未來世成佛普智尊成就佛道普徧智尊號名曰華光應身佛也當度無量眾當得度脫無量眾生供養無數佛恭敬供養無數諸佛具足菩薩行具足修習菩薩大行十力等功德如來十力及四無畏十八不共種種功德故云等也證於無上道功德滿足證入佛道過無量劫已從今日去過無量劫劫名大寶嚴華光佛時菩薩大寶而為莊嚴世界名離垢世界清淨名曰離垢清淨無瑕穢無穢故清無瑕故以瑠璃為地心地瑩徹名為瑠璃金繩界其道黃金為繩以界道側七寶雜色樹七寶行樹名色不一常有華果實其菩薩樹常有華果彼國諸菩薩彼華光國諸大菩薩志念常堅固志願善念無有退怯神通波羅蜜六種神通諸波羅蜜皆已悉具足功行深固無法不備於無數佛所已於無數諸佛之所善學菩薩道善能修學菩薩之道如是等大士如上無數諸大士等華光佛所化皆是華光積劫所化佛為王子時彼華光佛為王子時棄國捨世榮棄嗣國位捨世榮華於最末後身於等覺後名最後身出家成佛道出塵俗家成就佛道華光佛住世佛住於世壽十二小劫一期壽量其國人民眾國中所有人民之眾壽命八小劫壽量如是佛滅度之後華光如來入滅之後正法住於世三十二小劫廣度諸眾生正法住世廣度眾生正法滅盡已像法三十二像法亦住三十二劫舍利廣流布佛滅度後所有舍利廣博流布天人普供養令諸天人普得供養華光佛所為其華光佛應身所作其事皆如是所有化事牽皆如是其兩足聖尊其福慧足大聖之尊最勝無倫匹最為殊勝無與等倫不可匹配彼即是汝身彼華光佛即汝之身宜應自欣慶宜當欣喜自為慶幸爾時四部眾僧尼士女比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿脩羅迦樓羅緊那羅摩睺羅伽等即八部眾如前序品大眾見舍利弗於佛前受阿耨多羅三藐三菩提記眾見身子面於佛前受菩提記心大歡喜見是勝事心大歡喜踊躍無量足踊身躍喜相無量各各脫身各脫自身所著上衣現所著用上妙之衣以供養佛供法華會所集諸佛釋提桓因梵天王等與無數天子即前序中所列天眾亦以天妙衣天上妙衣天曼陀羅華小白華摩訶曼陀羅華等大白華等供養於佛奉衣散華供釋迦佛所散天衣諸天所散若衣若華住虗空中表無相施住於法空而自迴轉自於空中周迴旋轉諸天伎樂伎藝音樂百千萬種於虗空中一時俱作空中伎樂同時並作雨眾天華散諸天上所有之華如四華等而作是言佛昔於波羅柰佛於昔時波羅柰國鹿野園中初轉法輪為拘鄰等初轉四諦清淨法輪今乃復轉今於鷲峯又復再轉無上最大法輪無上道教最妙極大究竟法輪爾時諸天子欲重宣此義宣再轉義而說偈言昔於波羅柰此云鹿苑轉四諦法輪三轉苦集滅道小乘生滅四諦法輪分別說諸法如陰界入戒定慧種種諸法五眾之生滅色受想行識五陰和聚成生滅身今復轉最妙今法華會復轉圓妙無上法輪無上大法輪最為尊極更無有上大妙法輪是法甚深奧是圓妙法甚深幽奧少有能信者少有利根能信受者我等從昔來我等諸天從昔鹿苑聞法已來數聞世尊說四十餘年數數聞得世尊說法未曾聞如是但未曾得聞於如是深妙之上法深遠微妙最上之法世尊說是法世尊說是微妙之法我等皆隨喜我等悉皆隨順歡喜大智舍利弗其大智慧上首弟子今得受尊記今日得授世尊之記我等亦如是我等天仙亦當如是必當得作佛必定當得作成佛果於一切世間於諸世間天人之中最尊無有上最為尊極更無有上佛道叵思議諸佛之道不可思議方便隨宜說昔說三乘今說一實皆是如來隨宜方便我所有福業我身所有修行福業今世若過世今世現修過去世作及見佛功德及得見佛種種功德盡迴向佛道盡迴此善不向餘乘皆成佛道上是法說此後請佛以譬喻說爾時舍利弗諸天獻供說偈之時白佛言世尊我今無復疑悔昔日未悟疑佛是魔今佛開示疑悔悉除親於佛前得受阿耨多羅三藐三菩提記面承佛記是諸千二百即前品云二百羅漢心自在者已破見思得脫三界心無垢累名自在者昔住學地羅漢破結本已無學昔未破結尚住學位佛常教化佛常慈悲教訓化導言我法言我所說四諦之法能離生老病死力能遠離世間四相究竟涅槃小乘無餘究竟滅度是學無學人是千二百有學無學小果聖人亦各自以離我見亦各自用離我執見及有無見等有即常見無即斷見等餘三世六十二見謂得涅槃謂斷見思得真寂滅而今於世尊前今日靈山於世尊前聞所未聞得聞前日所未聞法皆墮疑惑皆悉墮於疑惑之網善哉世尊讚美世尊稱言善哉願為四眾先言道眾今兼士女說其因緣說其所因緣何昔小今復說大令離疑悔令得聞知遠離疑惑掉悔之心爾時佛告舍利弗因身子問所以告之我先不言我於前品先豈不言諸佛世尊三世十方諸來化佛以種種因緣用於種種正因善緣譬喻言辭引物譬喻或以言詞方便說法三乘方便而說諸法皆為阿耨多羅三藐三菩提耶皆為無上正等覺耶即前品云諸有所作常唯一事唯以佛之知見示悟眾生豈不聞耶是諸所說是諸方便所說之法皆為化菩薩故皆是為化菩薩之故然舍利弗然既於前法說未曉今當復以譬喻今則復當以譬喻說更明此義更以喻明於妙法義諸有智者今諸會中有智慧者以譬喻得解由譬喻故而得解了舍利弗若國邑聚落如國土縣邑村聚坐落有大長者有於大富長者之人其年衰邁其之年事衰老高邁財富無量家財豐富無有限量多有田宅多有田園居止屋宅及諸僮僕童子人僕其家廣大家居富故處所廣大唯有一門長者喻佛年邁謂將涅槃財富謂法財豐足田可種植謂多福德宅可居止謂住寂滅僮僕使令以喻五根方便動作家廣喻佛法界一門即是喻一佛乘出離之處多諸人眾五道眾生同居三界一百二百一百喻諸天二百喻人道乃至五百人三百喻地獄四百喻餓鬼五百喻畜生脩羅不言徧在五道止住其中五道同居堂閣朽故堂閣喻首面朽故喻衰老墻壁隤落墻壁喻皮膚壁隤泥落喻皮膚損動柱根腐敗以壽言之命為柱根以身言之足為柱根年事衰老脚足顫掉名為腐敗梁棟傾危梁栿棟桁以喻脊骨人老背傴傾垂危險周匝俱時周遭四圍喻心即貪嗔癡及等分三毒四不善念喻身即生老病死四不善相一時相惱歘然火起歘忽之間內外毒發焚燒舍宅識神依身名為舍宅於諸境上惡念起時火從內發先自燒身長者諸子三乘眾生悉是佛子若十二十若十喻聲聞二十喻緣覺或至三十喻菩薩乘在此宅中三乘根性在五陰中長者見是大火如來見此熾然業火從四面起四毒四相一時俱作即大驚怖即時心大驚恐怖畏而作是念喻如來心作是念言我雖能於此佛雖修行於此三界所燒之門為火所燒舍宅門戶安隱得出安心隱審得出三界而諸子等而此三乘諸子息等於火宅內於業火燒舍宅之內樂著嬉戲愛樂貪著五欲嬉戲不覺不知不能省覺亦不了知不驚不怖迷故不驚癡故不怖火來逼身業火之來逼近其身苦痛切己三界之苦痛切己身心不厭患心但癡迷曾不厭離知是病患無求出意無有求覓出離之意舍利弗是長者是時如來作是思惟見可怜者起救護心我身手有力身喻神通手喻智慧方便提携是佛之力當以衣裓衣裓喻佛忍辱知見若以几案几案喻佛力無所畏可以憑據從舍出之佛欲以此戒忍等法從於火宅而令出離復更思惟又復思忖是舍唯有一門是大火宅諸門皆燒唯有一門不被火灾而復狹小妙教之門性不容惡故云狹小諸子幼穉諸三乘子年尚幼穉喻根力微未有所識未有老成之所見識戀著戲處戀著五欲嬉戲之處或當墮落或復當墮火宅之內為火所燒被大業火之所燒炙我當為說佛當與說怖畏之事三界火宅可怖畏事此舍已燒今此舍宅已彼火燒宜時疾出宜當一時疾速而出無令為火勿使被火之所燒害火為能燒身是所害作是念已如來爾時作是念已如所思惟如其心中之所思忖具告諸子備告三乘汝等速出汝等諸子速出火宅父雖憐愍佛雖憐念善言誘諭以善巧言化誘開諭而諸子等而此諸子樂著嬉戲貪樂愛著嬉遊作戲不肯信受不能心肯信解領受不驚不畏迷而不驚癡而不畏了無出心了然無有出離之心亦復不知亦復迷昧無所知覺何者是火三毒是火何者為舍五陰為舍云何為失墮落為失但東西走戲東西二字即喻空有日夕奔馳故云走戲視父而已目視其父岡然而已自下明用車譬爾時長者爾遭火時門外長者即作是念即時又作如是念言此舍已為此五陰舍已被五濁大火所燒三毒大火之所燒害我及諸子長者及子若不時出若還不能一時出去必為所焚必被大火之所焚燒我今當設方便我於今日當設假名三乘方便令諸子等令此舍中三十子等得免斯害令得免於三界此害父知諸子如來得知三十之子先心各有所好樂欲不同種種珍玩一切種種珍異玩好奇異之物奇特異妙可愛之物情必樂著諸子之情必然貪樂而告之言思惟是已而告之言汝等所可玩好汝等所可玩好之物希有難得世間希有甚為難得汝若不取汝於今日若不取受後必憂悔今後必然憂惱追悔如此種種世間希有種種之物羊車鹿車牛車羊車喻聲聞鹿車喻緣覺牛車喻菩薩今在門外今設此車在於門外露地之中可以遊戲可以三乘遊戲佛土汝等於此火宅汝等諸子於此三界火宅之內宜速出來宜乎速捷出三界來隨汝所欲隨從汝等心之所欲皆當與汝皆當以此施與汝等爾時諸子聞父所說聞父長者說於三車珍玩之物珍寶玩具適其願故隨順諸子所願之故心各勇銳其心各自勇猛銳利互相推排近互推理排退餘緣競共馳走共相奔競爭出火宅爭馳而出欲愛火宅是時長者見諸子等時父見子諸人眾等安隱得出安然隱審得出火宅皆於四衢道中喻方便教四門之道露地而坐住真如理名坐露地無復障礙無復三界惑業障礙其心泰然其父之心貼然無慮歡喜踊躍心歡喜故身自踊躍自下明索車譬時諸子等各白父言子見父喜而各白父父先所許父於先時所許我等玩好之具賞玩戲好珍奇器具羊車鹿車牛車二方便乘願時賜與願得一時賜與我等舍利弗爾時長者爾索車時各賜諸子各各賜與三十之子等一大車平等各一珍寶大車其車高廣其妙寶車喻佛知見竪高橫廣眾寶莊校車喻法體寶喻眾善周匝欄楯欄楯喻總持防惡護善四面懸鈴以四辯聲令一切聞又於其上車頂之上張設幰盖頂盖上法表一佛乘無緣大慈究竟之道亦以珍奇雜寶萬善功勛其類非一故云雜寶而嚴飾之用嚴法身寶繩交絡寶繩喻弘誓交絡防閑垂諸華瓔華瓔垂下以喻四攝重敷婉筵車內重褥表柔軟行安置丹枕車內之枕丹表智枕表定駕以白牛白喻淨慧牛喻五根膚色充潔肌膚充肥顏色潔白戒淨定明內外相稱形體姝好身形姝大全體具德而復妙好有大筋力任重致遠究竟成佛名大筋力行步平正所行如法無黨曰平無邪曰正其疾如風大智慧力速至涅槃如風之疾又多僕從僕從眾多喻助道行而侍衛之侍奉衛護本有法身所以者何所以大車若此嚴飾其意如何是大長者由此大富長者之人財富無量法財豐滿其數無量種種諸藏布施持戒忍辱精進禪定此五功德名福德藏甚深般若名智慧藏悉皆充溢萬善具修充盛滿溢而作是念長者喻佛作此念言我財物無極法財充滿用之無竭不應以下劣小車不當以下劣羊鹿小車與諸子等賜與諸子今此幼童道力微淺故曰幼童皆是吾子三乘之機皆是佛子愛無偏黨愛心平等無有偏見及以私黨我有如是我既富有高廣如是七寶大車七支功德名為七寶其數無量一念心體是一大車淨行眾多故無有量應當等心合當無異平等一心各各與之各各賜與不宜差別不宜使之差互各別所以者何何所以故而欲等賜以我此物以我所有積聚財物周給一國周徧給施一國之人猶尚不匱如此廣施猶不匱乏何況諸子何況等賜此三十子自下明得車歡喜是時諸子時諸子等均拜父賜各乘大車喻三乘人皆證圓理得未曾有得獲大賜昔所未有非本所望三乘之人住於方便本自無心希望圓果舍利弗於汝意云何於汝之意以為如何是長者等與諸子等心賜與諸三十子珍寶大車珍奇雜寶一乘大車寧有虗妄不先許三車今但賜一許與不同有虗妄過否舍利弗言答佛所問不也世尊不有過也是長者出無過意但令諸子但只令此三十諸子得免火難得免三界火宅之難全其軀命保全身命而不墮落非為虗妄即是非妄何以故何故非妄若全身命若得保全便為已得便是已得玩好之具身命不壞樂則有餘是真玩好故云已得況復方便況復長者慈心方便於彼火宅於彼三界欲愛火宅而拔濟之拔出三界濟度苦海世尊若是長者若此救難大富長者乃至不與乃至亦不賜與最小一車謂小羊車聲聞果也猶不虗妄猶且不可名為虗妄何以故以何義故是長者先作是意長者先作救難之意我以方便我以三車而為方便令子得出令諸子等得出火宅以是因緣以是因心緣由之故無虗妄也無有虗妄何況長者何況其父自知財富無量自心知得己財無量欲饒益諸子意欲饒潤利益諸子等與大車等心賜與珍寶大車佛告舍利弗善哉善哉美舍利弗善能對揚如汝所言果然如是之所言也舍利弗如來亦復如是上是喻說此下法合則為一切三乘六道世間之父欲色無色三有世間慈悲之父於諸怖畏於諸三界生死怖畏衰惱憂患天上五衰人間四相種種苦惱煩惱憂患無明暗蔽無所明了根本枝末一切暗障永盡無餘苦惑業三一切永盡更無有餘而悉成就而皆成立圓就無量知見知見是一就境彰名乃有無量力無所畏如來十力及四無畏有大神力具足成就大神通力及智慧力神力伏魔慧力破障具足方便百千善巧總名方便智慧波羅蜜一切方便是佛權智能到彼岸名波羅蜜大慈大悲與三德樂名為大慈拔二死苦名為大悲常無懈倦常爾慈悲無有懈慢及以倦怠恒求善事常求出世善好之事利益一切利惠饒益一切眾生而生三界為一切故出生三界朽故火宅朽壞故舊欲火之宅為度眾生為欲度脫一切眾生生老病死四相也憂悲苦惱憂愁悲切苦難懊惱愚癡暗蔽愚昧癡騃昏暗蔽塞三毒之火貪嗔癡毒如火熾然悉令滅盡教化令得教誨訓化令其獲得阿耨多羅三藐三菩提無上等正覺見諸眾生佛眼觀見諸趣眾生為生老病死憂悲苦惱如前已解之所燒煑八種惡緣共相燒煑亦以五欲財利故於五塵境起愛樂心名為五欲及財利故受種種苦以不善心招感諸苦又以貪著追求故復以貪心着於世相追陪求覓心不歇故現受眾苦現在身中便感諸苦後受地獄畜生餓鬼之苦作業之人現世華報受種種苦後墮地獄受大苦惱地獄罪畢復墮餓鬼餓鬼罪畢復墮畜生若生天上有五衰苦及在人間及生人間貧窮困苦貧乏窮窘困頓之苦愛別離苦本相親愛而忽別離豈非苦也怨憎會苦冤害相憎而常會遇豈非苦也如是等更有求而不得名之為苦五陰熾盛生老死苦種種諸苦苦相非一故云種種眾生沒在其中眾生迷故沒眾苦中歡喜游戲心迷之故不思來苦生而復死故云游戲不覺不知不曾省覺不能了知不驚不怖不生驚恐不知怖畏亦不生厭終日耽欲不生厭離不求解脫不求方便解散脫離於此三界火宅三界雖異苦樂不等皆有三毒故名火宅東西馳走東生西沒名為馳走雖遭大苦雖復遭遇種種大苦不以為患以心迷故從苦入苦不知是病舍利弗佛見此已佛見眾生此眾苦已便作是念應時即作如是思念我為眾生之父我出三界為諸眾生大慈悲父應拔其苦難應拔除其眾苦患難與無量無邊佛智慧樂諸佛智慧寂滅之樂令其游戲令其眾生游戲如來大寂滅海舍利弗如來復作是念如來復作如是念言若我但以神力但以神通諸禪定力及智慧力即般若力捨於方便捨於漸門方便之教為諸眾生為諸鈍劣在迷眾生讚如來知見讚歎如來無上知見力無所畏者十力四無畏者眾生不能則諸眾生終不能得以是得度以此妙乘而得度脫所以者何所以不得其意如何是諸眾生是諸在迷法界眾生未免生老病死未能免離世間四相憂悲苦惱諸不樂事而為三界而被三界火宅所燒貪恚癡宅如火焚燒何由能解有何因由而能解了佛之智慧如來知見無上智慧舍利弗如彼長者上是法說此下合喻雖復身手有力喻如來身力無所畏而不用之謂不用大但以殷勤方便但用慇勤漸教方便勉濟諸子勸勉拔濟諸三乘子火宅之難免離生死三界苦難然後各與待證小已後方各與珍寶大車即一佛乘如來亦復如是此合法也雖有力無所畏如前而不用之謂不用實但以智慧方便但以權乘方便智慧於三界火宅於此三界火宅之中拔濟眾生救拔濟度在迷眾生為說三乘與之演說三方便乘聲聞辟支佛佛乘聲聞乘者即四諦法辟支佛乘者即十二因緣佛乘者即漸教大乘而作是言於三乘中作如是言汝等莫得樂住汝等諸子勿得要在三界火宅三界輪迴業火之宅勿貪麤弊不得貪愛麤穢弊惡色聲香味觸也五欲塵境也若貪著生愛若還貪著生愛戀心則為所燒則被欲火之所焚燒汝速出三界汝若疾速出離三界當得三乘當得三種快樂車乘聲聞辟支佛佛乘如前我今為汝我於今日當為汝等保任此事保護任持此出離事終不虗也終是真實斷不虗也汝等但當汝諸子等但當一心勤修精進辛勤修習精細進趣如來以是方便如來用此方便智慧誘進眾生誘引䇿進三乘眾生復作是言如來又復作如是言汝等當知汝諸子等當須知之此三乘法此方便教三乘之法皆是聖所稱歎此法皆是一切聖人之所稱歎自在無繫本來自在無有繫縛無所依求於世間相無所依倚及以希求乘是三乘乘是權化方便三乘以無漏根力用無漏善五根五力覺道禪定七覺支八聖道四禪八定解脫三昧等八解脫諸正定正慧等而自娛樂而自以此歡娛快樂便得無量應時即得無有數量安隱快樂安然隱靜快心之樂舍利弗若有眾生如有一類樂善眾生內有智性內心具有精一修進從佛世尊隨從於佛大覺世尊聞法信受聞說法音信心領受殷勤精進殷重勤勞精一修進欲速出三界樂欲速得出離三界自求涅槃但求自度無化他心是名聲聞乘是則名為聲聞小乘如彼諸子如彼宅中幼稚諸子為求羊車為欲求索小小羊車出於火宅出於三界生死火宅若有眾生若有一類樂善眾生從佛世尊聞法信受殷勤精進上三句如前求自然慧深求諸法自然之慧樂獨善寂常樂獨處善修真寂深知諸法因緣深能了知諸法生滅十二因緣是名辟支佛乘是則名為緣覺獨覺中根之乘如彼諸子如彼宅中幼冲之子為求鹿車鹿王行動頻顧後群緣獨之機勤修福業分能為他故喻於鹿出於火宅出於三界怖畏火宅若有眾生從佛世尊聞法信受勤修精進如前求一切智求於一切空寂之智佛智求於成佛清淨慧智自然智求自然理無生之智無師智不因開示自能解了名無師智如來知見如來極果正知正見力無所畏十力四無所畏愍念安樂慈愍愛念安隱快樂無量眾生不可計量在迷眾生利益天人利潤饒益諸天世人度脫一切收度解脫一切等眾是名大乘是則名為水牛之車菩薩大乘菩薩求此乘故大心菩薩求此牛車名為摩訶薩此云大眾生如彼諸子如彼宅中諸幼稚子為求牛車為欲求覓大牛之車出於火宅出於三界煩惱火宅舍利弗如彼長者如彼聚落大富長者見諸子等見三十子五百人等安隱得出火宅安然隱審得出三界險難火宅到無畏處到無火灾怖畏之處自惟財富無量自思家富財寶無量筭以大車等心皆以大寶之車而賜諸子而賜露地三十之子如來亦復如是如來之意亦如長者為一切眾生之父作諸眾生慈悲之父若見無量佛若見彼無有限量億千眾生或億或千修道眾生以佛教門用佛教中方便之門出三界苦出於三界種種諸苦怖畏險道怕怖畏懼險惡之道得涅槃樂得於出世寂滅之樂如來爾時爾諸子等證寂滅時便作是念便即思惟作是念言我有無量無邊智慧我身本有無有限量無有邊際無上智慧力無畏等如來十力及四無所畏十八不共等諸佛法藏三世十方一切諸佛法寶之藏是諸眾生是諸三界在迷眾生皆是我子等視眾生皆是己子等與大乘平等賜與究竟大乘不令有人不使其中別有一人獨得滅度自得解脫皆以如來滅度皆以如來究竟滅度而滅度之而度脫之是諸眾生是諸界內三乘眾生脫三界者得脫三界諸苦難者悉與諸佛皆悉賜與三世諸佛禪定解脫等清淨淨禪那伽大定無上解脫諸定慧等娛樂之具法喜禪悅歎娛之具皆是一相一種一相即實相一種即種智了一切相悉皆平等無有彼此愛憎之心名為一相一切即一無別種類名為一種聖所稱歎大覺聖人之所稱讚能生淨妙善能出生清淨微妙第一之樂諸佛所證寂滅之理更無有上名第一樂舍利弗如彼長者如彼世中大富長者初以三車始以三種羊鹿牛車誘引諸子誘引宅中諸三十子然後但與大車既然之後唯賜白牛大寶之車寶物莊嚴以眾寶物而為莊飾安隱第一無有傾動最為詳審故云安隱微妙第一然彼長者然彼門外大富長者無虗妄之咎許三與一無虗妄過如來亦復如是大覺如來意亦如是無有虗妄無有一切虗妄過咎初說三乘始初演說三方便乘引導眾生誘引化導三乘眾生然後但以大乘既然設三之後但以一實究竟大乘而度脫之而為救度令得脫之何以故如來有何所以之故如來有無量智慧如來本有不可限量真實智意力無所畏佛十種力及四無畏諸法之藏諸真實法秘妙之藏能與一切眾生善能賜與學道眾生大乘之法無上大乘平等之法但不盡能受但以眾生根力微故不能盡受舍利弗以是因緣為是眾生因淺緣微當知諸佛當知三世一切諸佛方便力故以隨順眾生善巧方便智慧之力於一佛乘於無二三一佛乘法分別說三分別深淺約諦緣度作三乘說佛欲重宣此義釋迦欲通於一說三合三即一如此之義而說偈言而以意括作偈言說譬如長者引大長者以譬如來有一大宅近譬一身遠譬三界其宅久故五陰舍宅久則故舊而復頓弊故而傾頓兼之弊壞堂舍高危堂喻面舍喻身高聳傾危柱根摧朽柱喻雙足根喻脚跟梁棟傾斜梁木棟桁是喻脊骨老病背傴故曰傾斜基陛頺毀基喻報命陛喻運限報命損減運限衰殘墻壁圮坼身之皮膚如屋墻壁皮膚損壞如墻壁坼泥塗阤落身以皮褁屋以泥塗身生瘡毒如壁泥損覆苫亂墜年老之者短髮下垂如屋之損草苫顛墜椽梠差脫椽喻筋骨梠即綿簷以喻助扇背傴身斜助扇走動周障屈曲周圍之內大小二膓盤旋屈曲雜穢充徧屎尿雜穢充徧其中有五百人五百即喻五道眾生脩羅一道散在五中止住其中一一眾生住五陰宅鴟梟鵰鷲鴟食鼠鳥也梟即土梟子食其母不孝鳥也鵰觜赤色能食麞鹿鷲色蒼黃其目赤色食穢物鳥烏鵲鳩鴿老烏喜鵲鳴鳩及鴿此上八禽食噉麤穢自謂為得憍慢矜能輕餘羽族此喻世間粗有財力我慢自高輕率一切八種暴慢憍恣人也蚖蛇蝮蝎蚖毒蛇也蝮身廣三寸頭如大梅狀似蜘蛛其尾有毒蜈蚣蚰蜒頸赤色者名為蜈蚣能食蛇腦頸不赤者名為蚰蜒此土六種當是毒𧉚動輙傷人以喻嗔恚守宮百足守宮虫者即是𧏺蜓居屋墻間百足身黑長四五寸具足至多鼬貍鼷鼠鼬黃赤色身臭尾大能噉鼠俗云黃犱子狸狀如猫兒鼷鼠甜口鼠也食人不覺疼諸惡蟲輩指上五種交橫馳走交相橫列卉馳世路屎尿臭處喻諸世間穢惡之境不淨流溢不清淨相泛溢於時𧏙蜋諸蟲𧏙蜋一名蛣蜣身黑有錯即車屎虫也而集其上喻世癡人不擇淨穢處處貪著如虫附臭狐狼野干狐性多疑狼性狠戾野干妖怪咀嚼踐踏喻世貪人耽著世味名為咀嚼作壞他人名為踐踏嚌齧死屍如彼虫輩口嚌齒齧穢惡死屍骨肉狼藉敗事傷肉害理損骨如狼食物徧處散也由是群狗以是之後群隊之狗競來搏撮一時鬬來擊搏拏撮飢羸慞惶無法自修名之曰飢身心焦枯名曰羸疲未甞安隱名之曰慞惶處處求食是事皆貪如飢乞食以喻貪使鬪諍摣掣鬪亂諍競摣拏牽掣啀喍嘷吠如狗爭食啀喍其口發聲嘷吠其舍恐怖其五陰舍驚恐怖畏變狀如是變現不一以喻疑使惡狀如此處處皆有境境之上一一皆有魑魅魍魎山澤之怪曰魑宅舍之怪曰魅木石之怪名曰魍魎此等精怪有影無形總喻世人被伶俐使自惱惱他夜叉惡鬼夜叉即勇健鬼喻動蕩心倐忽轉變如惡鬼也食噉人肉執於邊見自是他非如噉人肉毒蟲之屬即前文中蛇蚖之類諸惡禽獸即前鴟梟及狐狗等孚乳產生卵生曰孚胎生曰乳各自藏護各執己見以自藏心常常愛護如彼虫獸各護胎卵夜叉競來有聰利者如彼惡鬼一時競來爭取食之以邪害正如鬼吞噉食之既飽殘害於他自心飽滿惡心轉熾惡毒邪心撥棄因果轉加熾盛鬬諍之聲有無相破名為鬪諍發言諍論所以有聲甚可怖畏執有著空二俱有過皆生死本故可怖畏鳩槃荼鬼此云厭魅鬼以喻世中執相修行成戒取者蹲踞土埵其鬼陰物狀如冬瓜行置肩上坐則踞之專持事戒報在欲天忉利天等在須彌頂名為土埵或時離地或兼事禪能離欲地一尺二尺離於欲界生在梵宮名為一尺更離梵天生無色界名為二尺往返遊行福聚生天福謝退轉往迴六道故曰遊行縱逸嬉戲縱放其心著於世善不求無生等同兒戲捉狗兩足狗喻取著戒行之心足喻身口涉境之相攝諸異念離身口惡如彼喪鬼捉狗兩足撲令失聲如其鞭撻無容自在所以不覺失聲嘷吠以脚加頸頸喻戒心攝彼身口住於善行如捉狗足加狗頸上怖狗自樂彼邪祟鬼打撲於狗令其失聲現諸怪變欲令人怖自以為樂此戒取人禁身口惡住於淨行常加勤䇿令心怖罪以自為樂復有諸鬼此有六句諸鬼神等喻執身見著我之者其身長大無明業身竪窮三際故云長也徧一切處橫攝五道故云大也躶形黑瘦心無愧耻名躶形也見處不明所以黑也失禪悅食所以瘦也常住其中常住三界苦輪之中發大惡聲鬼以飢故發聲大呌人以愚故發言求解呌呼求食如鬼呌喚求索飲食復有諸鬼此有二句譬見取也其咽如針鬼大咽小喻無色界但有四陰咽細命危非壽計壽非常計常復有諸鬼首如牛頭此下八句譬邊見也空有二邊著相之見如牛二角或食人肉壞出世善如食人肉或復噉狗作世間業如或噉狗頭髮髼亂八萬四千善惡法門喻如頭髮不知通塞顛倒行事如髮髼亂殘害險善惡相破摧殘損害兇暴危險飢渴所逼無禪悅食名之為飢無理水潤名之為渴心中枯槁無可資持如飢渴逼呌喚馳走發言爭執名為呌喚把捉不定名為馳走夜叉餓鬼此中六句總結欲界煩惱火宅不善之相諸惡鳥獸鳥即鴟等獸即狐等飢急四向飢渴窘急四面趣向窺看牕牖窺覷窓戶喻尋門路爭欲求出到溫飽處如是諸難如上所舉諸多患難恐畏無量驚恐怖畏無有限量是朽故宅此中四句明火起因如是哀朽故患之宅屬于一人本屬一人即是長者以喻三界是佛化境其人近出長者他行喻佛性隱佛現涅槃即是出宅未久之間言轉背後未多時間於後宅舍此中八句正明火勢長者出後宅中無主忽然火起忽然之間三毒火起四面一時四面即喻四種倒見無常計常不淨計淨無我計我不樂計樂種種情見集在一時其𦦨俱熾其火勢𦦨俱時熾盛棟梁椽柱喻身四大爆聲震裂屋壞𪹼聲震動破裂身壞呻吟喧動一切四大分解摧折墮落屋壞崩摧木植損折零碎墜落身壞神逝肢體分離骨殖散亂墻壁崩倒謂身敗壞皮膚迸裂諸鬼神等此中六句明被燒相即前黑瘦諸惡鬼等揚聲大呌即前發聲呌呼求食鵰鷲諸鳥即前喻慢八種飛禽鳩槃荼等即前蹲踞厭魅鬼等周慞惶怖周回慞狂驚惶怖畏喻臨終時神識荒亂不能自出墮在輪迴自無力量不能出等惡獸毒蟲此中十四句次明色界火起惡獸即狐狼等毒虫即蚖蛇類藏竄孔穴虫獸藏穴被火逼出行人攝靜被觸毒發毗舍闍鬼此云噉精鬼喻貪靜者貪心起時如噉精氣亦住其中亦同住此火宅之中薄福德故福厚德重無如是事薄福尠德以此之故為火所逼被三毒火之所煎逼共相殘害於火宅中互相損害飲血噉肉著於靜默如飲血也著於覺觀如噉肉也野干之屬野干之獸喻淺見者並已前死並已被火諸見悉滅諸大惡獸即前群狗喻利使者競來食噉耽著世味如噉死物臭煙蓬㶿諸物被燒故有臭氣屋舍遭火故有煙起火勢益熾煙愈㶿心被毒使故發惡氣身為心擾火色外現鼻息粗大出入如煙四面充塞四種倒計充塞其心蜈蚣蚰蜒此中十句明無色界火起虫藏孔穴喻無色天住於空定毒蛇之類即前蚖等為火所燒被無明火之所燒然爭走出穴虫被火逼失於巢穴人被毒使失於空定鳩槃荼鬼如前隨取而食靜定既失則墮有中空有相傾故云隨食又諸餓鬼無法自濟常在飢虗名餓鬼也頭上火然無色四空居三界頂空中被火故云頭上火然飢渴熱惱一念妄心種種計較故云飢渴常被心火之所燒然故云熱惱周障悶走徧求出要不得其門其心昏馳故云悶走其宅如是此中四句總結三界火起故云其宅如是甚可怖畏險難之甚故可怖畏毒害火灾三毒害心業火之灾眾難非一如上所列種種患難非止一端是時宅主是三界中火起之時宅主長者在門外立如來已離三界火宅故在門外設諸方便故云立也聞有人言如來住於實際理地本不見有火起之相依方便中說有火起如聞於他故云聞有人言汝諸子等三乘之子及五道等先因遊戲一切苦樂非因不生先因妄念遊戲諸根造種種業來入此宅從業惑來入此火宅稚小無知章稚幼小無所了知喻無智者不知是苦歡娛樂著於欲歡娛心生樂著長者聞已佛以慈眼見是事已驚入火宅見子如是不覺心驚從真起應入火宅中方宜救濟方欲隨宜而設救濟令無燒害令無業火燒害之苦告喻諸子告示曉諭諸三乘子說眾患難如下所列諸苦難相惡鬼毒虫惡鬼即鳩槃荼等毒虫即蚖蛇等灾火蔓筵灾難之火枝曼筵引眾苦次第從惑起業從業惑報苦惑業三相從而起故云次第相續不絕業作煩惱煩惱作業三道輪轉無有休息毒蛇蚖蝮及諸夜叉鳩槃荼鬼野干狐狗鵰鷲鴟梟百足之屬此上六句蓋是重舉三界火宅毒害之相飢渴惱急甚可怖畏飢窘逼切甚是可怖此苦難處如此苦毒患難之處況復大火宅苦已甚況兼火起諸子無知此中四句說子智劣聞言不信雖聞父誨雖聞慈父深切訓誨猶故樂著猶為欲故樂著不捨嬉戲不已遊戲塵境不肯止息是時長者此下三十句頌長行中釋子所願是誨諭子不信受之時而作是念見子不信復作念言諸子如此諸幼稚子癡騃如此益我愁惱增益我心之所愁惱今此舍宅今此三界五陰舍宅無一可樂其中所有悉皆是苦更無一事可以愛樂而諸子等而我諸子即五道等耽湎嬉戲耽著沉湎嬉喜遊戲不受我教我雖訓誨而不信受將為火害將次被火之所殘害即便思惟即時便更巧作思量設諸方便設諸三車方便之教告諸子等思方便已乃告諸子我有種種即下三種珍玩寶車珍玩之具珍奇玩好受用之具妙寶好車眾寶所飾上妙之車羊車鹿車羊車喻四諦接聲聞子鹿車喻十二因緣接緣覺子大牛之車即水牛車喻以六度萬行擬接大乘權教菩薩今在門外三乘雖異皆是界外寂滅之法故在門外汝等出來以車勸諭出火宅來吾為汝等我與汝等造作此車三車本無一時權設故云造作隨意所樂方便之教隨他根性故云隨汝心之所樂可以遊戲此之三車是真快樂故可遊戲非此宅中五欲之樂是所不可諸子聞說自下六句明釋子願是時諸子聞父所說如此諸車如此三種妙寶之車即時奔競即於是時競共爭奔馳走而出聞即敬信增上修行名為奔競脫出三界苦惱之患名為馳走到於空地到於涅槃空寂之地離諸苦難三乘之人同斷見思離煩惱難不起妄緣離結業難不生三界離苦報難長者見子自下二十句明父心喜佛於眾生以慈眼觀見得出火宅得出三界險難火宅住於四衢住於四門入三乘道通達之衢坐師子座諸子得出長者心安坐於大寶師子之座昔時誘小權立三乘所以前云在門外立今引入實故坐寶座而自慶言佛所以出為度眾生得眾生出自慶本懷我今快樂昔見在苦益加愁惱今見得出所以暢懷此諸子等此三乘子生育甚難從昔以來方便教育故云甚難愚小無知智愚力小無正知見而入險宅為業緣故引入三界險難火宅多諸毒蟲即上蚖蝎諭諸毒心魑魅可畏即上鬼魅喻虗妄心大火猛燄煩惱毒火大猛煙燄四面俱起四顛倒見俱時發起而此諸子而此三乘宅中諸子貪樂嬉戲耽著世樂不知是苦我已救之我以方便而救護之令得脫難今得脫離火宅之難是故諸人我今快樂以是之故告汝諸人我於今日心得快樂爾時諸子自下十二句明子得出從父索車喻三十子求方便果知父安坐子知其父安心在座皆詣父所喻到佛前而白父言同發善言而白於佛願賜我等願欲賜我三十子等三種寶車羊鹿牛車三乘之果如前所許適為引出許賜三車諸子出來述先許意當以三車當用三種妙寶之車隨汝所欲隨汝諸子心所樂欲今正是時今既出宅正是與時惟垂給與願垂賜與長者大富自下三十句明長者富厚等心賜與大寶之車庫藏眾多諸根如庫眼萬行如伏藏智慧功德喻如寶物其數無量故曰眾多金銀琉璃硨磲瑪碯於七寶中略舉五種並如前解以眾寶物眾寶義具真珠珊瑚造諸大車此大車者白牛之車一佛乘也因修獲證故云造作七寶造車即喻七種功德法財莊校嚴飾莊嚴點校周匝欄楯功德法體誓戒嚴防如彼大車周圍欄楯四面懸鈴以四辯聲令一切聞如鈴懸也金繩交絡以金為繩即繩黑義如戒交絡真珠羅網戒珠智珠互相照映猶如羅網張施其上舒張施設於車之上喻以眾寶嚴於法身金華珠纓金之色黃以表中道從於正智發真妙心名曰金華諸珍為纓以嚴車體處處垂下諸無作諦俯就群機故曰垂下眾寶雜飾眾綵間飾於大寶車如彼萬行共嚴法身周匝圍繞周回徧布圍裹纏繞於車之上柔軟繒纊繒帛綿纊其體柔軟以為茵褥茵褥者車上敷具以忍辱心修諸聖行如繒綿軟可以依藉上妙細氎氎細布也上等妙好細軟之氎價直千億言體貴也鮮白淨潔新鮮細白而復潔淨以覆其上是大寶車敷以綿茵復以白氎而蓋其上法身之體以忍辱力修諸萬行而為莊嚴有大白牛牛喻道力白喻潔淨大喻恢偉一者體大二者相大三者用大肥壯多力以肥壯故色力具足形體姝好身體殊大而復妙好以駕寶車以駕寶飾高廣之車多諸儐從多諸方便智慧之力如儐相者前後擁從而侍衛之侍奉衛護以是妙車以是眾寶妙嚴之車等賜諸子等以第一上妙之車賜與諸子諸子是時自下六句得車歡喜歡喜踊躍心地歡喜身形踊躍乘是寶車喻乘一實大寶之車遊於四方徧學諸法名之為遊歷住行向地四十聖位名為四方嬉戲快樂遊歷百千三昧法門名為遊戲得於法喜禪悅之味名為快樂自在無礙身得自在心無罣礙告舍利弗此下十六句頌合總喻我亦如是合長者譬眾聖中尊聲聞緣覺菩薩及佛四聖之中佛為最尊世間之父三界世間同師於佛生育法身故名為父一切眾生六道一切有生之類皆是吾子等視一切猶如一子深著世樂深著世間五欲之樂無有慧心無有出世智慧之心三界無安三界之中苦樂雖異無非有漏不安隱處猶如火宅猶如大火所爇之宅眾苦充滿五苦八苦濁惡充滿合前禽畜毒虫神鬼甚可怖畏甚是不安極可驚畏常有生老病死憂患未出輪迴常常有於生老病死憂愁患難如是等火如上所列是等業火熾然不息晝夜熾然不曾休息如來已離合前長者在門外立自下十二句頌見眾生為苦所逼三界火宅如來已出在三界外寂然閑居住於寂滅無欲關心不作眾事故曰閑居安處林野安然居於覺支茂林空寂大野今此三界今此三界火宅之中皆是我有如來因地發願度生三界之中是佛化境故云我有其中眾生其三界中所有眾生悉是吾子皆是佛子而今此處而今三界此輪迴處多諸患難多諸苦惱患難之事唯我一人獨佛一人能為救護能作救拔護念之師雖復教詔自下四句合舍几譬即經云若以几案從舍出之佛雖復作如是教詔而不信受而於一乘力無畏等不能信受即方便品云若但讚佛乘眾生沒在苦不能信是法於諸欲染於諸五欲染汙之境貪著深故貪心著欲深奧之故所以不信以是方便自下六句合前用車救子得䇿以不信實方便用權為說三乘與說三乘方便之教令諸眾生令諸界內在迷眾生知三界苦知此三界恣意憍權所受快樂無非是苦開示演說開明教示言詞演說出世間道出離世間寂滅之道是諸子等自下六句合釋子願是受教法諸弟子等若心決定若三乘子其心斷定具足三明及六神通三明者過去宿命明現在漏盡明未來天眼明六通者一天眼通能見障內外事二天耳通能聞遠近眾音聲三他心通能知他人心下事四宿命通能知已往世中事五神境通亦名如意通能現起種種神變入地履水皆如其意於一切境無有障礙六漏盡通三界漏業一時已盡於真空理通達無礙發心欲具此通明者即聲聞乘有得緣覺其心欲得稟十二緣了生滅法即緣覺乘不退菩薩其心欲得於大乘教得不退轉即菩薩乘汝舍利弗自下二十句合等賜大車我為眾生佛為法界一切眾生以此譬喻以此種種言詞譬喻說一佛乘所以說三意在顯一欲令諸子皆入佛乘汝等若能汝等諸子若或善能信受是語信心領受是三即一誠實之語一切皆當一切三乘皆悉合當成得佛道成就菩提得佛妙道是乘微妙是一佛乘微密圓妙清淨第一究盡三惑故曰清淨於中最上故云第一於諸世間於三世間諸法之中為無有上是最妙法更無有上佛所悅可是佛之所悅懌印可一切眾生三乘六道九界眾生所應稱讚所當稱揚發言贊歎供養禮拜設諸供養敬重禮拜無量億千此下四句明一佛乘具足諸法合前長者財富無量諸力解脫如來十力諸大三昧清淨解脫禪定智慧種種禪定種種智慧一一各有無量億千及佛餘法及佛方便餘真淨法得如是乘此下十二句合得車歡喜得於如是一佛妙乘令諸子等令諸三乘求法之子日夜劫數近則日夜遠經塵劫常得遊戲常得於中遊戲三昧與諸菩薩及聲聞眾乘車之機合有緣覺此但說二語略意合乘此寶乘乘此一佛大寶上乘直至道場徑直至於無上佛道寂滅之場以是因緣以此妙因無上勝緣十方諦求於十方界諦審推求更無餘乘更無餘法在一乘外除佛方便唯除如來假方便說告舍利弗自下十四句合前無有虗妄汝諸人等汝諸求法三乘人等皆是吾子三乘悟實皆成佛子我則是父既立為兒佛則是父汝等累劫汝等從於累劫已來眾苦所燒被眾苦惱之所燒然我皆濟技我以三乘皆悉濟拔令出三界令得出離三界火宅我雖先說我雖先時方便說云汝等滅度汝等已得有餘涅槃但盡生死但只得盡三界之內分段生死而實不滅而實不得究竟涅槃今所應作今者所當起修之者唯佛智慧唯是佛乘無上智慧若有菩薩自下八句頌諸方便皆為一乘於是眾中於是法會大眾之中能一心聽能以一心攝耳諦聽諸佛實法一切諸佛如實之法諸佛世尊一切諸佛大覺世尊雖以方便雖用權宜三乘方便所化眾生其所化眾三乘之人皆是菩薩其實皆是菩薩之子究竟同歸一佛乘道若人小智此下二十八句頌不獲已隨機用權說三乘意若復有人智見狹小深著愛欲深心著於恩愛情欲為此等故為於此等鈍機之故說於苦諦說於三界種種眾苦諦審是實終不虗也眾生心喜鈍根眾生聞說領解心歡喜也得未曾有世間文字末常及此蒙佛開示得所未聞佛說苦諦佛說三界苦諦之義真實無異信知苦諦真實是苦更無異說若有眾生若復更有一類眾生不知苦本不知苦果何為因本深著苦因深心愛著苦因集業不能暫捨不能暫時生厭棄心為是等故為是等人迷惑之故方便說道依方便門說向他道諸苦所因世間諸苦所起因由貪欲為本皆以貪欲而為根本即集諦也若滅貪欲若能息滅貪欲之心無所依止則諸苦果無可依倚而得生也滅盡諸苦以正念力息於集業斷於三界生死諸苦名第三諦即滅諦也為滅諦故為欲成就寂滅諦故修行於道修攝身心不令縱逸奉行如來三學八正真實之道即道諦也離諸苦縛速離諸多生死苦縛名為解脫因修道故解縛得脫名為解脫證四果也是人於何是修道人為於何法而得解脫而得入道解脫世間但離虗妄但是遠離見思二惑虗妄之心出分段苦名為解脫指出三界名解脫也其實未得自下十二句明先施方便後說大意其於大乘實未曾得一切解脫一切寂滅究竟解脫佛說是人所以佛說如是之人未實滅度未曾實得大般涅槃斯人未得如此之人以未曾得無上道故無上正真實道之故我意不欲佛之本意所以不欲令至滅度令其至於究竟滅度我為法王佛為出世萬法中王於法自在於諸眾生隨意說法卷舒自在安隱眾生欲令眾生而得安隱故現於世以是之故出現於世已上頌長行畢此下勸信流通汝舍利弗自下六句明佛說法為欲利生能信受者說之有益若非其人聞不生信非為無益兼之有害囑令詳審我此法印此上妙法實相之印為欲利益為欲聞者如說修行成大利益世間故說三有世間故所以說在所遊方在在所遊一切方土勿妄宣傳須得其人然後宣說苟非誠實切勿妄傳若有聞者此去有十六句明可為說若復有人聞妙法者隨喜頂受墮順喜悅頂戴受持當知是人當知如此信受之人阿惟越致此云不退轉謂於正道不退轉也若有信受此經法者信大乘經上妙法者是人已曾是信根人宿世已曾見過去佛得見過去無數諸佛恭敬供養於諸佛所深心恭敬修法供養亦聞是法亦曾聞說如是之法以果驗因理數若此若人有能若復有人能以淨心信汝所說聞汝所說而生正信則為見我則名見佛亦見於汝亦是見於汝之法身及比丘僧及餘比丘僧伽之眾梵語僧伽翻和合眾若能了知佛法不二名見僧也并諸菩薩并諸大乘修行菩薩斯法華經為深智說此去有十六句明不可為說此之妙經與有深信智應者說淺識聞之智識淺者乍得聞之迷惑不解心迷疑惑不能解了一切聲聞小乘聲聞及辟支佛及以緣覺於此經中於此法華妙經之中力所不及力量寡薄不能得及汝舍利弗於小乘中智慧第一尚於此經尚且於此大乘妙經以信得入以信心故而得入法功行未全而非親證況餘聲聞況復餘者鈍根聲聞其餘聲聞自餘所有一切聲聞信佛語故聞佛說妙從語生信隨順此經隨喜順受此之妙經非己智分非他自己智慧之分又舍利弗憍慢懈怠此去有八句明懈怠淺識勿與之說憍慢之人無有正信懈怠之者不能勤修計我見者計著己見非受道機莫說此經勿向愚輩而說此經凡夫淺識下劣凡夫識見膚淺深着五欲於五欲境深生戀著聞不能解縱然聞說不能解了亦勿為說亦莫容易與之演說若人不信此下有百三十句明謗經得罪分三初有二十四句因謗經故墮在地獄若復有人聞不生信毀謗此經發言毀謗此之妙經則斷一切則是斷却所有一切世間佛種世間眾生成佛種子或復顰蹙或復聞說眉顰蹙皺而懷疑惑自心不喜所以毀眉而懷猶預疑惑不決汝當聽說此人罪報此謗經人所得罪報若佛在世若當如來在世之時若滅度後若佛世尊滅度之後其有誹謗其有眾生發言誹謗如斯經典如斯圓妙大乘經典見有讀誦見有眾生至心讀誦書持經者書寫受持是經典者輕賤憎嫉輕薄鄙賤憎惡嫉妬而懷結恨而抱冤結心生嗔恨此人罪報此謗經人所獲罪報汝今復聽汝等今者復聽我說其人命終其謗經人命終已後入阿鼻獄阿鼻此云無間常時受苦無有間斷具足一劫阿鼻地獄一日一夜人間歲數六十小劫從此積月積年具滿一劫劫盡更生一劫盡後又復更生如是展轉展演轉增至無數劫苦報長也從地獄出此下有四十二句明獄苦畢復墮畜生當墮畜生落異類中若狗野干若復作狗或作野干其形領瘦其形飢羸憔悴瘦黧黮疥癩其色黧黮即是黑皮膚疥癬及病癩也人所觸嬈為人之所觸撥擾撓又復為人之所惡賤被人之所憎惡薄賤常困飢渴常被飢渴之所困厄骨肉枯竭骨枯髓竭肉枯消瘦生受楚毒生前受諸楚痛苦毒死被瓦石死已被又埋瓦石中斷佛種故因斷世間佛種之故受斯罪報受此畜類不善之報若作馲駝大身畜也北地有之或生驢中身常負重駝驢二畜皆能荷負加諸杖捶加之棒杖捶步令行但念水草但只念念在於水草餘無所知愚癡自任無所知曉謗斯經故獲罪如是因必克果如影隨形有作野干有時或作野干之身來入聚落干本野獸入聚落來身體疥癩毀善之報又無一目壞他正見所以失目為諸童子之所打擲小兒見之或以棒打或以石擲受諸苦痛受打擲痛或時致死或復因此而致死亡於此死已於野干死更受蟒身更復受生為大蟒蛇其形長大五百由旬身極大也聾騃無足蛇以身聽耳不聞聲癡騃無知而無脚足宛轉腹行宛宛轉轉以腹而行為諸小亞之所𠯗食一一鱗甲則有多虫帀齧肌肉晝夜受苦晝夜之間常受痛苦無有休息始終無有休息之時謗斯經故獲罪如是彰罪深也若得為人此下六十四句明畜生罪畢復生人中若脫畜類轉生人身諸根闇鈍謂六根門不能明了矬陋𤼣躄矬矮醜陋𤼣拳跛躄盲聾背傴眼盲耳聾脊背傴曲有所言說口中若有所言說者人不信受人生嫌鄙而不信受口氣常臭誦經之者言作蓮香毀謗真乘所以口臭鬼魅所著為無正信邪得侵擾貧窮下賤為不修福下劣貧窮為人所使被人所役不得自在多病消瘦多生病苦肌肉消瘦無法潤故所以枯槁無所依怙不依師友故受飢寒雖親附人以無緣故雖則發心親附於人人不在意而彼前人不著在意若有所得若或於法少有所得尋復忘失心昏智迷而多健忘若修毉道若學方書修合道理順方治病隨順藥方療治他病更增他疾不能瘥病復增餘疾或復致死或時增重甚致於死皆由謗經無善緣故若自有病若或自己有諸病患無人救療無人與之毉治救療設服良藥設或順病服餌好藥而復增劇轉增煩劇若他反逆若因他人反叛悖逆抄劫竊盜抄掠劫奪竊取偷盜如斯等罪如斯等事非法之罪橫羅其殃橫逆羅織受其殃害如斯罪人如此謗經罪逆之人永不見佛永不得見十方諸佛眾聖之王四聖眾中妙法之王說法教化演說諸法教詔訓化如斯罪人如是不信障法罪人常生難處世世常生苦難之處狂聾心亂顛狂聾聵心神昏亂永不聞法永劫不得聞佛正法於無數劫如恒河沙經歷劫數如恒沙多生輒聾啞一生下來輙便聾啞諸根不具六種情根多不具足常處地獄如遊園觀以業障故常居地獄如遊園苑宮觀之處在餘惡道如已舍宅在餘餓鬼畜生修羅惡道之中一如家舍駝驢猪狗是其行處業力所使異類中行謗斯經故獲罪如是毀訾經法感斯惡報若得為人此明惡道報盡復生為人聾盲瘖瘂眼耳喉咽皆悉受病貧窮諸衰貧乏窮苦種種灾眾以自莊嚴以此惡報而自莊嚴水腫乾痟水氣腫滿乾枯痟瘦疥癩癰疽疥癬白癩癰癤瘡疽如是等病如是種種諸惡重病以為衣服以作身上莊嚴衣服身常臭處其身常處臭氣之中垢穢不淨垢膩穢汙不曾清淨深著我見深心取著執己之見增益嗔恚瞋心盛也婬欲熾盛貪於色欲如火熾盛不擇禽獸甚至婬濫狎於禽獸謗斯經故獲罪如是因中集業皆正行邪果土苦報障善墮惡告舍利弗此下有八句結示惡報說不可盡收歸前文勸令詳擇苟非其人不可為說謗斯經者謗此法華微妙經者若說其罪窮劫不盡若說謗經其所得罪窮歷塵劫亦不能盡以是因緣以是不信業報因緣與之演說有損無益我故語汝我於先時所以告汝無智人中於無智慧愚癡人中莫說此經即前二偈誡令揀機囑勿為說若有利根自下六十八句用大慈門為善人說根性通利智慧明了智見慧性清淨明了多聞強識博學多聞強記廣識求佛道者發心求成佛之道者如是之人乃可為說機教相扣宜應為說若人曾見億百千佛宿有善因曾見多佛植諸善本供養禮拜種諸善根深心堅固發心深遠志願堅固如是之人乃可為說為是等說適機合教若人精進精一其心進趣佛道常修慈心常以慈悲自修其心不惜身命輕生重法於身命財無所恡惜乃可為說斯等之機方可與說若人恭敬恭謙敬謹無有異心心無異念一志求佛離諸凡愚遠離諸多凡夫愚輩獨處山澤獨居山林空澤之內如是之人乃可為說厭喧攝靜是道器故令為說也又舍利弗若見有人捨惡知識親近善友知識名同善惡逈異押習惡者名惡知識見有善人捨離惡輩如是之人乃可為說其心樂善為說有益若見佛子佛子即是菩薩之機簡去小乘聲聞子也持戒清潔堅持佛戒清明潔白如淨明珠猶如明珠淨無瑕翳求大乘經願求佛乘方等經典如是之人乃可為說身口清淨心意廣大可為說也若人無嗔其心慈愍無有嗔恨質直柔軟質朴正直柔和善軟常愍一切常懷慈愍一切眾生恭敬諸佛於諸世尊能加恭敬如是之人乃可為說慈忍恭敬是可受道故令說也復有佛子如前於大眾中於諸人天廣眾之中以清淨心為利說法名不淨心遠離諸過名淨心也種種因緣種種善因種種事緣譬喻言詞引物比喻善巧言詞說法無礙演說正法無有滯礙如是之人乃可為說是等心明於餘法中善解義味為之說妙必能信受故可說也若有比丘出家僧也為一切智為悟一切空寂之智四方求法四出尋求寂滅之法約事則四向方土表法則是空之與有兩亦雙非名為四方合掌頂受合十指掌頂戴奉持但樂受持但只樂欲信奉受持大乘經典大菩薩乘方等經典乃至不受餘經一偈於餘經中下至一偈亦不信受如是之人乃可為說如是信樂大教之人於方便門不生執著故可說也如人至心如或有人發至善心求佛舍利大教所詮寂滅之理是佛法身譬如骨髓名為舍利此云骨身如是求經如是至心求佛妙經得已頂受聞說妙時但只歡喜而不深信豈能堅夕唯得聞已深心頂戴喜躍受持其人不復其人心一更不復有志求餘經立志他求餘方便教亦未曾念又亦未甞邪心愛念外道典籍殺生鬬戰婚娶等文邪見邪戒諸外道書如是之人乃可為說如是正見能受能行不為邪惑圓頓之機乃可為說告舍利弗自下有八句結略顯示對彼善人乃可得說我說是相佛若廣說是受道相求佛道者求於無上佛之道者窮劫不盡盡塵點劫亦不能窮如是等人如上所舉是等之人則能信解則於妙經能生信解汝當為說汝等當為如法演說妙法華經圓妙心法此蓮華經妙法蓮華經信解品第四前譬喻品方便設三會歸一實是為中根於法說中未能悟者開通性理四大弟子聞佛所說於一乘道深生正信妙解發明爾時慧命須菩提當譬喻品說竟之時續佛慧命上首弟子名須菩提此云善現尊者生時現諸善相從此得名摩訶迦旃延此云扇繩摩訶迦葉此云飲光摩訶目犍連此云採菽氏從佛所聞從釋迦處忽然得聞未曾有法佛成道來四十餘年未曾括出希有之法世尊授舍利弗阿耨多羅三藐三菩提記法說之後譬喻品初授舍利弗華光佛記發希有心於方便品聞佛法說是聲聞人得授記莂昔所未有又聞如來火宅喻說心地發明稱希有也歡喜踊躍內心歡喜外相踊躍即從座起將欲對佛述己所明故即舉身從座而起整衣服整肅三衣正外儀也偏袒右肩作用之時右手得便袒右肩者示執勞相弟子事師禮之至也右膝著地一心之中包含事理一身之上具左右足左足住空用顯理虗右膝著地以表事實一心合掌齊其一心兩掌相合表不二也曲躬恭敬曲身表恭低頭致敬瞻仰尊顏瞻視仰慕世尊顏容而白佛言此十八句結集之師阿難敘也我等居僧之首迦葉白佛目謂我等於眾僧中而為上首年並朽邁年事並皆衰朽老邁自謂已得涅槃自謂已得小乘寂滅無所堪任於大乘行無所堪能不復進求不復有志進往上求阿耨多羅三藐三菩提無上正等正覺世尊往昔佛自往昔方等般若說法既久說大乘法既已長久我時在座我於是時在佛座下身體疲懈身形疎散疲倦懈怠但念空無相無作但只思念小乘人行偏空真如無我人相無作滅諦三解脫門於菩薩法而於大乘菩薩之法遊戲神通心遊法性自在神通淨佛國土清淨如來常寂之土成就眾生清淨佛國即自修也成就眾生即度他也心不喜樂於此大乘無忻愛心所以者何所以於大不愛樂者其意云何世尊令我等世尊昔日但令我等出於三界勤求出於欲色無色有漏三界得涅槃證得於偏空涅槃果證又今我等年已朽邁謂年已老不能向大於佛教化菩薩於佛所說教示大乘諸菩薩等阿耨多羅三藐三菩提無上正等正覺不生一念好樂之心乃至一念樂大之心亦不生也我等今於佛前今法華會於世尊前聞授聲聞聞授身子小乘聲聞阿耨多羅三藐三菩提記成佛之記心甚歡喜心中甚是生大歡喜得未曾有今得聞者昔所未有不謂於今不謂徼倖於今法會忽然得聞希有之法妙法難聞故云希有深自慶幸深心喜悅自生慶幸獲大善利得獲聞此大善利益無量珍寶所謂力無畏等十八不共神通道力名為珍寶不求自得本無心求自然而得世尊我等今者我等聲聞今於此者樂說譬喻樂欲引事譬喻而說以明斯義以明聲聞無心希求得大之義譬若有人譬如世間有於一人年既幼稚年齒即然尚自幼小捨父逃逝捨棄其父逃往他處久住他國喻聲聞人棄大慕小住於同居五濁穢土或十二十至五十歲十即諸天二十即人五十即是五道年既長大喻在迷久年長身大加復窮困轉復增加貧窮困苦馳騁四方喻以世諦四門入道以求衣食四門求法以自莊嚴如彼貧人乞衣覆體乞食資身漸漸遊行漸漸入道如貧遊行遇向本國迷本佛性如失家鄉反妄歸真如向本國其父先來父喻如來以大擬宣求子不得下劣不堪名求不得中止一城佛於小教說二涅槃又於大教說大涅槃住於同居實報兩楹之間如彼長者中止化城其家大富財寶無量佛之淨土功德無邊如長者家財富無量金銀琉璃珊瑚琥珀頗梨珠等此七寶也琉璃石中所出珊瑚海水之中秀氣結成琥珀千年茯苓之所變化頗梨其色不一亦玉類也珠即摩尼及赤真珠若表法者喻七法財其諸倉庫倉積米麥喻於識藏任持眾善庫積財帛喻於身中修行六度悉皆盈溢喻佛法藏功德充滿多有僮僕臣佐吏民童僕之類出入奔走喻第七識大臣輔佐喻第六識吏掌注記喻分別識民供役使喻於五根表七方便同宗淨識象馬車乘象馬代步車乘運行所向自在喻五通也牛羊無數化三乘人功德進益如牛羊長出入息利乃徧他國起心修善惠及一切名為出財導利前人化功歸己名為入息橫徧諸土名為他國商估賈客亦甚眾多行者曰商喻運善也坐者曰賈喻攝靜也其相非一故曰眾多時貧窮子喻退大後在凡夫地不起化導無福德故名為窮子遊諸聚落涉五陰身名遊聚落經歷國邑國大邑小經十二入歷十八界如人遊行從邑至國遂到其父所止之城宿善因緣感佛應世故云到父所止大城父每念子佛念眾生如父憶子與子離別五十餘年自從佛地至于凡夫五道之身相去隔遠五十餘位而未曾向人說如此事從來未曾向眾人說小乘聲聞即是佛子但自思惟但只自意常常思惟心懷悔恨心中懷抱追悔怨恨自念老朽喻佛應世化事將終多有財物富足法財金銀珍寶喻佛世尊智慧功德倉庫盈溢性具身包倉盈庫積無有子息家第雖富而無子息喻佛德豐尚無法嗣一旦終沒一旦之間報命殞沒喻佛化畢一旦歸真財物散失無所委付喻功德財無人接嗣是以殷勤以是之故心下殷勤每憶其子每每憶念所失之子復作是念又復起念我若得子我若得於所生之子委付財物委囑付與法寶之財坦然快樂心中坦夷自然快樂無復憂慮無復更有憂愁思慮世尊爾時窮子爾父思念所生子時備賃展轉窮子與人傭工雇任展布旋轉經歷國邑喻諸弟子為福修善如僕受雇徧走諸方遇到父舍到於如來所居之土住立門側小乘之人滯偏空理不見中道如立門側遙見其父佛居實報資住偏空相去甚遠故曰遙見踞師子床實坐曰踞佛為師子坐於寶床寶几承足以眾福智而為因本如几承足諸婆羅門即是士夫喻於權教諸菩薩也剎利居士剎利尊姓即是王種喻大菩薩居士清淨攝衛自居喻梵行人皆恭敬圍繞四眾奉佛如彼眾人恭敬長者以真珠纓絡珠結瓔珞喻如福智莊嚴法身價直千萬言高貴也莊嚴其身以諸功德嚴飾法身吏民僮僕方便智慧如彼人吏及以童僕手執白拂手執表權白表清淨拂供揮舉侍立左右環列侍傍為給使也覆以寶帳以寶為帳覆庇其身表慈忍也垂諸華幡華艶幡動華即四攝幡即神通香水灑地以香喻德以水喻智用德與智涵養性理散諸名華散有名色眾寶之華表萬行也羅列寶物法行森布如寶物列出內取與起教利生名之為出收功歸己名之為納效法於人名之為取推己及物名之為與有如是等種種嚴飾指上所列名如是等種種人物嚴飾之具威德特尊有威可畏有德可敬所以獨尊窮子見父喻小乘者見尊特身有大力勢德可服人名有大力人皆畏之名有大勢即懷恐怖見已即懷恐畏之心悔來至此自悔不合來此勝處見實報境心不安也竊作是念私自作念此或是王疑是國王喻法佛也或是王等疑與王等喻報佛也非我傭力喻實報土自屬菩薩非我小乘當用功力得物之處小乘之見慕果修因如傭作人先取工價不如往至貧里不如往至貧賤地里喻念小乘偏空之理肆力有地肆恣用力有位可進衣食易得慚愧為衣行法為食附相修行故云易得若久住此若久留心住於實報或見逼迫頓教大乘不許取著無棲泊處故云逼迫強使我作敦逼令信名強使作作是念已窮子作此竊思念已疾走而去於大乘門望涯而進時富長者喻福智尊報身之佛於師子座喻實報位見子便識一見聲聞知是佛子心大歡喜見可度機佛心歡喜即作是念佛即作念我財物庫藏我之德行財物智庫法藏今有所付今見是子有所付托我常思念此子佛於覺地常常思念授法之子無由見之無有因由而得見之而忽自來而忽從小漸入大乘不因追求故曰自來甚適我願甚副於我平昔願心我雖年朽喻佛晚年猶故貪惜四十餘年猶且待機秘而不談故曰貪惜即遣傍人傍人即喻大菩薩也以大乘化名即遣也急追將還教嚴名急性教名追使令將帶還復大乘爾時使者喻大菩薩為佛所使疾走往捉頓超直入名為疾走用是攝化名為往捉窮子驚愕小機聞大驚恐愕然稱怨大喚稱是冤家大聲呌喚我不相犯謂本無心犯著大化何為見捉何由見訝急捉於我使者執之逾急喻華嚴中菩薩大教機緩教急強牽將還以大化小名曰強牽令復本性名曰將還于時窮子喻華嚴會二乘之機自念無罪自念於大不曾犯着而被囚執不堪聞大聞之生惱如被囚禁執縛其身此必定死以離相教無用心處不容喘氣故曰疾死轉更惶怖轉更不安驚惶怕怖悶絕躃地迷悶氣絕躃倒地上父遙見之佛於實報遠望二乘故曰遙見而語使言對境轉意如告使者不須此人勿強將來見非可化故曰不須將欲寢大故曰勿強以冷水灑面令得醒悟寢大施小導以空定如水洒面令離生死證涅槃空名為醒悟莫復與語莫復以大而與之語所以者何所以爾者其意云何父知其子佛知聲聞志意下劣志在求小意不高上見處卑劣自知豪貴佛又自知功德智慧豪富尊貴為子所難窮子父富見之驚疑所以成難審知是子佛自審知是己法子而以方便為不堪大以方便接不語他人云是我子不告餘眾云此聲聞是佛之子使者語之使者即喻佛方便心我今放汝息於大化如放捨也隨意所趣隨汝之意所趣何地窮子歡喜本畏大教見佛寢大所以歡喜得未曾有如死得活所未有也從地而起昔悶倒地懼實際理今得放捨如從地起往至貧里背實向權遊偏空理以求衣食修道證滅似求衣食爾時長者爾聲聞子退大之時將欲誘引其子佛意將欲以權接小而設方便以方便慧設三乘法密遣二人密遣菩薩化作二乘形色憔悴無威德者現劣應身土面灰頭故曰憔悴不現相好迹同凡夫故無威德汝可詣彼徐語窮子遣使者往以小乘法徐徐語之異昔急也此有作處倍與汝直此聲聞地有可作處倍與汝價許四果也窮子若許將來使作彼若肯許可以將來令其使作若言欲何所作窮子若言今欲倩我何所作為便可語之顧汝除糞便可告云今欲雇汝掃除糞穢許證四果名為雇也令斷見思名除糞也我等二人亦共汝作菩薩所現二乘之身亦共同修小乘之行時二使人即求窮子使者受命求所化機既已得之具陳上事使得此機具以披陳雇倩之事爾時窮子爾二使人告諭之時先取其價先且取索所有工價以機劣故先求所得尋與除糞既得工價即便傭作喻小乘眾慕果修因其父見子愍而怪之佛見眾生捨大取小心生憐愍而恠異之又以他日於窓牖中謂法身地思惟鹿苑說小之日方便知見不甚廣大如窓牖也遙見子身佛眼見凡相去遠故遙見子也羸瘦憔悴無大法味所以羸瘦無有威德所以憔悴糞土塵坌糞土塵者喻苦惑業蒙覆其身名之為坌汙穢不淨汙染臭穢喻障所纏即脫瓔珞細輭上服嚴飾之具瓔珞首飾喻佛福慧上服嚴身喻佛慈忍更著麤弊垢膩之衣塵土坌身脫珍著弊現劣應身右手執持右表權智除糞之器二乘經律破惑止惡名除糞器狀有所畏現老比丘無其莊嚴語諸作人告聲聞眾及緣覺乘汝等勤作勿得懈息汝於二乘勤加精進以方便故得近其子佛以小乘劣應方便得接聲聞後復告言既合機已復告之言咄男子咄即語聲將欲告之先且警悟汝常此作勿復餘去此之一字即指小乘勿餘去者誡勿從邪當加汝價喻沙門果次第增進諸有所須修行所須盆器米鹽醋之屬盆器盛貯喻果位也米濟飢喻戒定也鹽醋調和喻智慧也莫自疑難喻小教中諸戒定慧解脫知見皆悉具足勿自生疑及作難也亦有老弊使人使人即指內秘外現二乘使也須者相給汝有所須吾當給與好自安意自當好好以安其心我如汝父未親指出汝是我子故曰如父此即權意勿復憂慮昔畏生死故多憂慮今有所依勿復憂也所以者何出無慮意我年老大約相則佛有威德故曰老大約理則佛居極果名老大人而汝少壯初心入道機方幼稚故曰少壯汝常作時汝於平常作務之時無有欺怠瞋恨怨言無有欺罔及以懈怠瞋心悵恨怨望之言都不見汝有此諸惡如餘作人我都不見汝於平時有此諸惡如餘世間未入道者有諸過惡自今已後如所生子上既讚美令生歡喜故復告言從今已後便如我之自所生子即時長者更與作字名之為兒命二乘人為聲聞子名為作字爾時窮子爾作字時聲聞窮子雖忻此遇雖復忻悅有此際遇猶故自謂容作賤人佛雖如是聲聞自謂非菩薩機猶執小見由是之故因此之故未甚相孚於二十年中常令除糞或以見道一解脫一無礙修道九解脫九無礙名為二十或以見思名二十年令滌此過名為除糞過是已後心相體信斷見思已名過二十心明相孚體解信受入出無難出聲聞界入菩薩乘以相信及故無難色然其所止猶在本處然聲聞人所依止處心雖喜大猶住小乘世尊爾時長者有疾自知將死不久示現老病故云有疾報緣將謝故云不久語窮子言告二乘言我今多有金銀珍寶倉庫盈溢如前已解其中多少即般若中加被二乘為菩薩所八十餘科所應取與汝悉知之其間之所應取應與汝皆知之我心如是當體此意佛言此心本實如是汝當體悉毋得懷疑所以者何何故令汝勿懷疑惑今我與汝便為不異今我所有付汝掌收如我無異宜加用心無令漏失宜須加意用心照管勿令滲漏及以去失爾時窮子即受教勅爾大長者作是語時窮乏之子即受父命領知眾物領解知委眾多法財金銀珍寶及諸庫藏即喻如來功德智慧而無希取一飡之意而無希望下至受取一飡之念表於大乘無心趣向然其所止故在本處然其聲聞之所依止猶在二乘故云本處下劣之心亦未能捨雖聞大教自謂己小未能捨權復經少時謂般若中聞說妙空淘汰之後父知子心佛知弟子漸以通泰漸以心開通達安泰成就大志宜發大心自鄙先心自覺鄙賤先時鹿苑執小之心臨欲終時謂般若後將欲示滅說法華時而命其子召聲聞子并會親族諸菩薩眾內眷屬也國王大臣餘土應身名為國王等覺菩薩名為大臣剎利居士剎利大姓佛種族也修法行人名居士也皆悉已集法華之會普集群機即自宣言如方便品佛自告眾諸君當知即上大眾名曰諸君當知此意此是我子此之聲聞是佛之子我之所生謂大通時從佛受化而發大心於某城中於實報土捨吾逃走捨佛大教逃入小乘竛竮辛苦竛竛竮竮枉受窮苦五十餘年佛望下凡住五道中相去隔遠五十餘位其本字某本曾發大是菩薩機我名某甲現受用身說圓滿教昔在本城昔居實報懷憂推覔聞大不信所以懷憂推昔本因以方便接忽於此間於方便教漸門之間遇會得之子來遇父父得會子此實我子此聲聞人實是佛子我實其父佛身實是聲聞之父今我所有今佛身中之所有者一切財物無量智慧功德法藏皆是子有皆是聲聞己之所有先所出內般若轉教出納財產是子所知是聲聞子之所已知世尊是時窮子是付財時聲聞之子聞父此言聞佛此之囑付言音即大歡喜即時之間心大歡喜得未曾有從昔已來未曾聞許聲聞得佛而作是念而其心中自作念言我本無心我於大教本自無心有所希求有所希望求成佛果今此寶藏自然而至今此妙乘無價寶藏佛自開顯云自然至世尊大富長者則是如來前說譬喻此合法也我等皆似佛子大乘菩薩是佛真子小乘聲聞名為似子如來常說我等為子諸大乘說佛視眾生猶如一子世尊我等以三苦故此句正顯退大之因以三苦者苦身之上受種種苦名為苦苦漸漸衰殘名為壞苦業運遷流名為行苦於生死中而於三界生死海中受諸熱惱受諸火宅熱逼苦惱迷惑無知以心迷故惑於世相於無上道無所知曉樂著小法樂著聲聞小教之法厭老病死為求涅槃今日世尊今此法會吾佛世尊令我等思惟佛於鹿苑說方便乘令於漸教起聞思修蠲除諸法戲論之糞一切世間種種執見皆名戲論如於糞穢令悉蠲除我等於中勤加精進我等於佛小乘教中勤加精苦進趣梵行得至涅槃一日之價慕果修因得至寂滅如傭作人得一日價既得此已既於小乘得四果已心大歡喜自以為足本期證小滿所願故心中大喜於小利中自以為足便自謂言便自心中作是念言於佛法中勤精進故所得弘多於佛小乘方便法中勤修精進所得大多然世尊先知我等然而吾佛先鹿苑時知我等眾心著弊欲心著世間麤弊五欲樂於小法樂於小乘方便之法便見縱捨佛便見機縱令習小捨於大化不為分別汝等當有不與我等分別演說汝等聲聞本自當有如來知見寶藏之分佛知佛見無上智慧功德寶藏妙法之分世尊以方便力說如來智慧世尊慈悲為我等故以諸權門方便之力假名字說諸佛如來甚深智慧我等從佛得涅槃一日之價以為大得從佛聞修得小涅槃如彼作人得於一日傭工之價便自為足於此大乘無有志求於此法華圓頓大乘無有志願欲求進修我等又因如來智慧此明般若會上佛以自己智慧神力加被空生及舍利弗故云因也為諸菩薩開示演說為菩薩眾說大般若此則名曰寄下訓高意在接下而自於此無有志願自謂己小非菩薩根於此大乘無志願求所以者何所以是者其意云何佛知我等心樂小法由佛知我心志劣故樂著小法以方便力隨我等說以方便教智慧之力隨我等機而為演說而我等不知真是佛子我等謂己是小曾不能知昔本因中是佛之子今我等方知世尊今日我等方始知佛於佛智慧無所恡惜於如來所證無上智慧非是有所慳惜也所以者何欲明如來無恡所以為何之故我等昔來真是佛子如前而但樂小法而為智劣只樂小乘若我等有樂大之心若是我等有其愛樂大乘之心佛則為我說大乘法佛則慨然便為我等說大乘法於此經中唯說一乘於此法華妙經之中唯為演說一乘佛道而昔於菩薩前毀訾聲聞樂小法者而於昔日方等會中當諸菩薩大眾之前毀斥聲聞著小法者名為焦種然佛實以大乘教化然則如來實以大乘但化菩薩是故我等說本無心有所希求以是之故我等自說本無大心希求佛法今法王大寶自然而至今日會中如來法王無上大寶不求自至如佛子所應得者皆已得之如諸菩薩所當得法我於今日皆已得之爾時摩訶迦葉欲重宣此義而說偈言長行已說今復再頌故曰重宣我等今日我等聲聞今日靈山聞佛音教聞佛法說方便開顯譬喻言音歡喜踊躍心大歡喜身形踊躍得未曾有得所未聞佛說聲聞當得作佛從來但云聲聞證小今日忽然許容作佛無上寶聚不求自得無上大法寶藏之聚我本無心有所希求蒙佛慈悲自為開示譬如童子幼穉無識譬若小兒年齒幼故無所識別捨父逃逝遠到他土昔師於佛本學大乘為智劣故退大習小如兒捨父逃往他方大小迴隔故云遠去周流諸國五十餘年循環五道故曰周流其父憂念四方推求師念弟子如父憂兒於四生處方便推尋求之既疲頓止一城以大乘求機不受教既已疲勞頓便止息中路一城設方便化造立舍宅五欲自娛禪定為城道品為宅五分功勛是善樂故安住其中以自娛樂為機假設故云造立其家巨富多諸金銀喻佛豐富多諸法財硨磲碼碯真珠琉璃喻諸智慧無量功德象馬牛羊輦輿車乘四種走獸是運車者以喻通力四種車輿是所乘者以喻法行田業僮僕人民眾多田產營運喻於道業僮僕給使喻於七識人民種植喻於五根出入息利方徧他國以法示人如於出財化功歸己如於入息徧諸同居方便實報三土之中故云他國商估賈人無處不有行商坐賈即喻定散二種善因更無一處不有善法千萬億眾圍繞恭敬喻四部眾天龍八部咸宗於佛常為王者之所愛念王喻諸佛說中道義名為法王如是之人常為諸佛之所護念群臣豪族皆共宗重群臣即喻諸菩薩等豪族即喻諸方應化菩薩是等大眾咸尊於佛以諸緣故往來者眾以有化事諸因緣故十方諸佛及大菩薩常相來往其數甚眾豪富如是有大力勢雄豪豐富其相如是有大威力勢壓諸方而年朽邁益憂念子喻佛年高將終化事益加憂念於其法子夙夜惟念死時將至早夜思量化事將畢癡子捨我五十餘年癡騃幼子自捨我來五十餘載喻隔佛地五十餘階住於五道庫藏諸物當如之何我之所有大乘庫業諸多寶藏未見其子為當如何爾時窮子是大長者作是思時窮露之子求索衣食喻徧塵境修諸苦行從邑至邑從國至國從太五陰至於六入從十二處至十八界或有所得著有漏善或無所得住於斷空飢餓羸瘦體生瘡癬聲聞趣空失大法利故云飢餓以不修福故云羸瘦法體劣弱力用不充故多過患云生瘡癬漸次經歷到父住城漸漸遊行歷陰界入至遇宿善此處名為到父住城傭賃展轉遂至父舍傭作顧賃轉次增進至得人天可受道處是名到其父舍爾時長者於其門內是諸聲聞到應化土長者如來於其所舍大乘之宅教門之內施大寶帳處師子座大寶屏帳喻佛莊嚴處師子座喻諸法空眷屬圍繞法身大士如雲籠月諸人侍衛即前臣佐僮僕及人民等或有計筭金銀寶物第六心識為能計筭即使人也智慧功德是所計筭即金銀等出內財產註記券疏如前比合出之與納財產物業出內即喻第七末那傳送識也財即功行產即法位住法位中修諸梵行如營財也註述記當即分別識契券文疏即教典也窮子見父豪貴尊嚴小機見佛豪邁高貴尊重威嚴謂是國王若國王等以疑於佛事涉兩途思是國王法身佛也若與國王位皃相等即喻報身佛也驚怖自怪何故至此遂生驚畏如斯之境非我所到心下自怪何緣到此覆自念言我若久住密自作念若更長久住此勝處或見逼迫強驅使作或恐見勑修大乘行乘戒俱急逼迫於我強力駈之使加增進思惟是已馳走而去時貧窮子作是思已疾走而去借問貧里欲往傭作借問傍人貧賤地里喻畏大乘忻求小法期趣偏空名為欲往慕果修因名為傭作長者是時在師子座佛在實報法空之座遙見其子默而識之以聖望凡故曰遙見一見便識知是己子但不語人故云默識即勅使者追捉將來即勑菩薩而為使命追逐捕捉將帶前來窮子驚喚迷悶躃地謂華嚴時法門高峻二乘聞說心中驚愕不知所措如迷悶人顛躃倒地是人執我必當見殺是菩薩人執捉於我不容措心定當見殺何用衣食使我至此何得為用衣食濟給而使我身至此迫切長者知子愚癡狹劣佛知小機愚鈍癡迷見處窄狹劣弱不勝不信我言不信是父不順佛教名不信言不知是師名不信父即以方便更遣餘人即寢實教施方便慧遣二乘人而為誘掖眇目矬陋無威德者見近名眇目劣形名矬矮隱諸相好名為醜陋示現此相名無威德汝可語之汝見小機可以語之云當相雇除諸糞穢當得相雇謂與小果除諸糞穢謂破惑業倍與汝價從於初果以至四果隨功證入倍倍增勝故曰倍還汝價窮子聞之歡喜隨來劣機聞小稱悅本心是故歡喜憣然相從為除糞穢淨諸房舍破見思惑名為除穢修諸道品名淨房舍長者於牖常見其子墻間之牕名之曰牖非正門也以方便慧常見其子念子愚劣樂為鄙事探領法身憐念是子愚痴狹劣欲作賤事於是長者於是如來著弊垢衣執除糞器往到子所長者麤弊垢膩之衣現劣應也執除糞器即是執著小乘藏中破惑之教遂到其子所安立處方便附近語令勤作以是方便親附近傍言俯就也仍語之言汝於法行當勤修作既益汝價并塗足油既已增益汝之工價足有皴𭃖與油塗之足喻所行四如意足𭃖是病處油喻理水所以潤之飲食充足薦席厚煖飲食喻戒定所需無乏故云充足薦席喻四念處是可依藉故云厚暖如是苦言汝當勤作以如是等苦切之言誡勤修作又以軟語若如我子又以軟言而為慰喻謂以聲聞如於親生菩薩之子故曰若如長者有智如來長者多方便智漸令入出經二十年執作家事漸漸訓導出麤入細出住小乘入見尊特又復得聞方等般若名二十年佛力加被令為菩薩演說般若大乘教法名為執作佛家之事示其金珠真珠頗梨種種庫藏諸法寶也諸物出入皆使令知出入無量百千三昧皆令知之猶處門外止宿草庵未入大乘名居門外住小乘境名宿草庵自念貧事我無此物自念貧里小乘之事大教法財此非我有父知子意漸以曠大欲與財物佛知聲聞聞般若故漸開其心空壙廣大將欲付與智慧法財即聚親族國王大臣剎利居士即時欲得眾人作證聚親屬者即是本所化導諸大菩薩國王即是諸佛化身大臣即諸等覺菩薩剎利即是諸佛猶子如四加行居士清閑即攝靜者於此大眾說是我子於此法華大眾之中說此小乘是佛之子捨我他行經五十歲捨大入小隔於五道自見子來已二十年自父見子教於小法斷見思已雖令轉教猶住草庵名二十年昔於某城而失是子昔於實報而失其子周行求索遂來至此周行五道而索其子遂來至此中路化城凡我所有舍宅人民凡是我身所有之物住止舍宅乃至人民悉已付之恣其所用傳家付業繼出續燈所有法財恣其演布子念昔貧志意下劣小乘之人念昔修空志願卑劣取於四果今於父所大獲真寶今於佛所得聞妙法受應身記如獲大寶并及舍宅一切財物舍宅喻理即所依處財物喻事即所受用甚大歡喜得未曾有心中甚是發大歡喜得所未有受成佛記佛亦如是合長者譬知我樂小未曾說言汝等作佛知我等心樂於小法未曾開言汝當作佛而說我等得諸無漏而說得於諸無漏智解脫之法成就小乘聲聞弟子成就小教阿羅漢果但名聲聞方便弟子佛勑我等說最上道佛於般若勑聲聞子說無上法教諸菩薩修習此者當得成佛修習此之大乘行者當得成就究竟佛果我承佛教為大菩薩我受佛勑為諸利機大根菩薩以諸因緣種種譬喻以如來教八十一科正因善緣如夢幻等種種譬喻若干言詞說無上道言若干者大約之數說於如來無上道教諸佛子等從我聞法諸大菩薩名為佛子從聲聞人聞於大法日夜思惟精勤修習晝夜不倦如理思修是時諸佛即授其記如是時間諸佛同音即與印證授菩提記汝於來世當得作佛汝於未來無量之世具菩薩道當得成佛一切諸佛秘藏之法一切十方諸佛如來秘密之藏但為菩薩演其實事獨為大乘菩薩之機演其微妙如實之事而不為我說斯真要而不與我說此真實至要之道如彼窮子得近其父子喻聲聞父即如來雖知諸物心不希取雖知法寶謂非己物無心希望我等雖說佛法寶藏自無志願亦復如是合上喻也我等內滅自謂為足內心息滅而自謂言所得滿足唯了此事更無餘事但了生死得涅槃事更無餘外大乘之事我等若聞我等志劣若或得聞淨佛國土教化眾生除諸惑業名淨佛土自利行也起諸化導攝受眾生利他行也上求下化是菩薩業都無忻樂怖畏生死急求自度於悲智門都無喜樂所以者何所以樂小不求大利其意如何一切諸法皆悉空寂於大乘見世出世間一切法相性本空寂無生無滅法性本寂來無所從故不生也生則有滅本既無生故不滅也無大無小於方便教分大小乘圓頓教中全粗即妙大外無小點小即大唯一圓融無大無小無漏無為以性空故本來清淨無有滲漏無有作為如是思惟如是妙解正念思惟不生喜樂初不曾生一念好樂我等長夜我等在迷長如夜暗但知樂小畏苦求空於佛智慧於佛世尊無上智慧無貪無著愛樂名貪慳心名著而由迷故都無貪著無復志願更無有志願求佛道而自於法而自迷心執於小法謂是究竟謂證羅漢三界生死皆悉已盡不受後身便為畢竟不知界外微細無明全未曾斷非是究竟無上佛道大般涅槃我等長夜修習空法執小迷大暗於圓乘名為長夜但只修持習於偏空無漏之法得脫三界苦惱之患斷見思惑得無漏果脫離三界生老病死憂悲苦惱如是之患住最後身有餘涅槃已證四果名最後身見思雖盡尚有身在名為有餘心住空寂名為涅槃佛所教化得道不虗此小教中生滅之法是佛所說依之修行已得聖道是實不虗則為已得報佛之恩則作已得隨順佛教報答如來化育之恩我等雖為諸佛子等說菩薩法般若會中蒙佛加被為諸菩薩說大乘經以求佛道令大乘機用以修行求成佛道而於是法永無願樂而於大乘是般若法永無一念好樂之心導師見捨如來導師而見棄捨觀我心故觀察我等樂著小法心行之故初不勸進說有實利都不發言勸勉䇿進說有真實無上利益如富長者知子智劣合如來心知眾生意以方便力柔伏其心以方便教智慧之力調柔降伏其虗妄心然後乃付一切財物如彼長者先調子心後付財物佛亦如是佛之方便亦如長者現希有事如佛示現方便智力世間所無名罕有事知樂小者知諸世問樂小乘者以方便力用功便力調伏其心調停制伏其妄心已乃教大智然後乃教佛之大智我等今日得未曾有我等聲聞今日法會所得密意昔所未有非先所望而今自得非是本心先有指望而於今日蒙佛開示自然而得如彼窮子得無量寶聲聞之人從佛得法如彼窮子從父得財世尊我今得道得果白佛世尊我等今日聞佛妙教得於無上趣佛之道必定當得無上佛果於無漏法於一佛乘無漏妙法得清淨眼得實相慧名清淨眼我等長夜持佛淨戒我等昔來無明長夜修持如來清淨戒行始於今日得其果報前說小乘是佛方便始於今日聞佛音教得其成佛真實果報法王法中久修梵行佛為法王於法自在我於法中久年修持清淨梵行今得無漏無上大果小乘無漏離分段生大乘無漏離變易苦二死俱亡名無上果我等今日真是聲聞我等昔來聞聲入道名小聲聞今者真是大乘聲聞以佛道聲令一切聞以成佛道微妙音聲令一切人聞即成佛我等今日真阿羅漢昔證四果是小羅漢今者入圓是大乘中真阿羅漢於諸世間天人魔梵於三界中諸天世人魔王梵王普於其中應受供養普於天人大眾之中以修如來智慧之故皆應受其恭敬供養世尊大恩世尊於我有大恩德以希有事以無上法罕有之事憐愍教化利益我等矜怜哀愍善巧教化饒益我等令入妙道無量億劫誰能報者經無量劫勤苦修行有誰能報佛之恩者手足供給手足服役供給走使頭頂禮敬頭頂至地禮拜恭敬一切供養以一切物而為供養皆不能報如上多種皆不足報若以頂戴兩肩荷負以頂戴佛以肩而擔於恒沙劫盡心恭敬縱經劫數如恒沙多盡己一心而行恭敬又以美膳美好食膳無量寶衣及諸臥具以無量種貴價寶衣及諸睡臥床褥之具種種湯藥或以種種上妙湯藥牛頭栴檀牛頭山中栴檀妙香及諸珍寶以起塔廟若以香木及諸寶物為佛起造種種塔廟寶衣布地即以寶衣而為茵褥如斯等事以用供養以如上等而為供養於恒沙劫亦不能報經劫雖久未足報稱諸佛希有諸佛出世如優曇華時一現耳故云罕有無量無邊不可思議大神通力佛之神通不可限量無有邊際非是心思及以口議之所能及故云大也無漏無為諸法之王三惑已盡故無滲漏稱性自在故無作為於世出世為大法王能為下劣忍于斯事以慈悲故能為下小劣弱之機忍耐調柔說于斯事取相凡夫隨宜為說若遇取相凡鄙之夫佛則隨宜方便為說諸佛於法得最自在一切諸佛於法門中或漸或頓最得自在知諸眾生種種欲樂及其志力善知眾生諸根行業種種情欲及其智見任持之力隨所堪任隨其力量之所堪能以無量喻而為說法以諸無量種種譬喻而為演說方便之法隨諸眾生宿世善根隨其宿世所有善根又知成熟未成熟者知根已熟及未熟者種種籌量分別知已如是種種籌度思量分別知其諸根性已於一乘道隨宜說三於一佛乘無上之道方便隨宜作三乘說
