body:
  text: 錢塘廣照沙門釋聞達妙法蓮華經五百弟子授記品第八方便品云若我弟子自謂阿羅漢辟支佛者不聞不知諸佛如來但教化菩薩事此非佛弟子以是之故諸聲聞人願欲授記求成佛道然此品中如來明云千二百羅漢悉亦當作佛五百羅漢在此數中又第六品佛語大衆我諸弟子其數五百皆當授於記未來世咸得成佛已自分明何故復請願佛授記當知前品佛普同説是通記也今此品中請應身記是別記也方便品後身子領悟受華光記法説周也藥草品後四大弟子領解得記譬説周也化城品後樓那尊者受法明記陳如尊者五百羅漢受普明記千二百人次第蒙佛亦與授記第九品阿中難羅睺羅亦各授記二千聲聞同名寶相因緣周也法無異味等為衆生由機不同悟入有異爾時富樓那彌多羅尼子如序品解從佛聞是智慧方便即指前品所説化城方便智慧隨宜説法隨機宜樂而為説法又聞授諸大弟子阿耨多羅三藐三菩提記諸大弟子即前二周五人得授成佛記莂復聞宿世因緣之事即化城品舉昔王子覆講因緣復聞諸佛有大自在神通之力又聞諸佛有大智慧隨緣自在為佛乘故方便設三神力無礙一切通達得未曾有心淨踊躍得見未有三種勝事一聞諸佛智慧方便二聞聲聞得受道記三聞諸佛大自在力心地清淨所以喜躍即從座起到於佛前將有所請先且避席到於佛前頭面禮足却住一面頭面致敬接足作禮禮已却復住立一面瞻仰尊顏目不暫捨瞻視仰慕佛之尊顏眷戀之深目睛不瞬而作是念自心作念世尊甚奇特世尊甚是希奇尊特所為希有佛之所為最是罕有隨順世間若干種性善能隨順世間衆生有若干等種種之性以方便知見而為説法以方便智而為衆生説種種法拔出衆生處處貪著衆生之性無種不貪佛慈悲故隨病與藥拔出諸處種種毒根我等於佛功德言不能宣我等於佛所有功德以智劣故不能宣揚唯佛世尊唯有吾佛大覺世尊能知我等深心本願善能知我及以衆等求佛深心本時大願爾時佛告諸比丘佛語在會諸比丘衆汝等見是富樓那彌多羅尼子不名如序品即滿慈子汝等比丘見此人不我常稱其於説法人中最為第一十大弟子唯富樓那説法第一亦常歎其種種功德我亦常歎其人所植種種智慧神通功德精勤護持助宣我法精勤不懈善能護持助化宣揚佛之正法能於四衆示教利喜能於天人四衆之中開示教導利益令喜具足解釋佛之正法盡能具足解釋佛法而大饒益同梵行者大能饒益同聞佛法修淨行者自捨如來無能盡其言論之辨自從除了大覺如來餘無有人能窮其辨汝等勿謂富樓那但能護持助宣我法汝等莫謂此滿慈子但只能護助宣釋迦所説之法亦於過去九十億諸佛所又於過去久劫佛所護持助宣佛之正法愛護奉持贊助宣揚諸佛之法於彼説法人中亦最第一於彼過去諸佛之所説法人中亦為最上又於諸佛所説空法又於諸佛金口所説空寂之法明了通達得四無礙智於諸法性悉皆明達證得四種無礙之智一者法無礙智二者義無礙智三者詞無礙智四者樂説無礙智常能審諦清淨説法無有疑惑以有智故常能於法審實諦當離染清淨如法而説無有狐疑惑亂之心具足菩薩神通之力具足大乘菩薩所證一切神通智慧之力隨其壽命常修梵行隨其諸佛所應壽量常於佛所修諸淨行彼佛世人咸皆謂之實是聲聞而富樓那本是菩薩隱實揚權示聲聞相彼諸佛所世間之人見迹迷本咸謂尊者實是聲聞而富樓那以斯方便以此示迹巧權方便饒益無量百千衆生饒潤利益無量機緣又化無量阿僧祇人令立阿耨多羅三藐三菩提又復化導無數種人令其立志修等正覺為淨佛土故為欲清淨佛土之故常作佛事教化衆生隨佛所行名作佛事以己所得轉化他人諸比丘富樓那亦於七佛於過去世七佛之所説法人中而得第一説法最妙皆推第一今於我所説法人中亦為第一如昔無異於賢劫中當來諸佛説法人中亦復第一釋迦正當賢劫第四樓那於彼未來佛所説法人中亦為第一而皆護持助宣佛法於佛佛所悉皆如是亦於未來護持助宣無量無邊諸佛之法非特賢劫於未來世無邊佛所亦皆護持助宣正法教化饒益無量衆生教訓化誘饒益群生令立阿耨多羅三藐三菩提令其立志求於無上正等正覺為淨佛土故為欲清淨成佛國土常勤精進教化衆生常常勤苦修精進行化諸群生漸漸具足菩薩之道如是積劫漸漸修行具足菩薩所行之道過無量阿僧祇劫經過無量無數劫波當於此土得阿耨多羅三藐三菩提此土即是娑婆世界得成無上正遍知覺號曰法明尊者因地於諸佛法明了通達故至得果號曰法明從因得也如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊此上十號如序品解其佛以恆河沙等三千大千世界為一佛土言所化境如是廣大七寶為地因作七支善根功德果上報土七寶莊嚴地平如掌佛心平故地面亦平無有山陵溪澗溝壑人心暴慢猶若高山稜層高峻貪欲熾盛喻如溪澗吞納衆流陰險如溝虗偽如壑佛土平正一切無也七寶臺觀充滿其中亭臺觀宇所遊之處皆功德成故云寶也處處皆然故云充滿諸天宮殿近處虗空上品戒善生欲界天四無量心生色界天四種空定生無色天指上功德即是所居天宮寶殿依空入道故云近處人天交接兩得相見約事相説如釋迦尊從忉利天下閻浮提化現寶階接於地面人天兩處互得相見約理而説人修上善得生天上諸天降德下生人間事相顯然兩得相見無諸惡道亦無女人同居穢土有四惡道及以女人今法明佛同居淨土故無惡道及女人也一切衆生皆以化生無有淫欲從法化生故無淫欲修成法身故非苦道得大神通身出光明飛行自在以定力故得有神通身出光明從戒定慧三學而生飛行自在即神境通志念堅固精進智慧建志舉念皆悉堅固常勤精進有大智慧普皆金色三十二相而自莊嚴國中之人身皆金色金之色黃是中方色因修中道清淨勝行所以感報身真金色三十二種大人相好以自嚴身其國衆生常以二食常以二種而為淨食一者法喜食聞法歡喜心地充足名法喜食二者禪悅食修習佛定得安隱樂名禪悅食有無量阿僧祇千萬億那由他諸菩薩衆大乘菩薩數甚衆多得大神通四無礙智如前已解善能教化衆生之類神通無礙故能善化其聲聞衆算數校計所不能知言其多也皆得具足六通三明及八解脫如前已解其佛國土其法明佛所應之土有如是等即上所明依正二報無量功得莊嚴成就以諸功德而以莊嚴劫名寶明時多衆寶而復明耀故曰寶明國名善淨國多善人而復清淨其佛壽命無量阿僧祇劫佛智所知本有數量人天莫數故云無量乃是有量之無量也法住甚久正法像法住世甚久佛滅度後彼法明佛入滅之後起七寶塔遍滿其國衆多弟子以七珍寶為佛起塔供養舍利遍滿所化善淨國中爾時世尊欲重宣此義而説偈言諸比丘諦聽誡衆諦心聽佛所説佛子所行道佛子樓那所行之道善學方便故不可得思議善能習學方便慧故心思口議所不能及知衆樂小法而畏於大智知聲聞衆樂於小法而復怖畏菩薩大智是故諸菩薩作聲聞緣覺菩薩化身現作聲聞及以緣覺以無數方便化諸衆生類以諸無數萬億方便化誘一切衆生之類自説是聲聞去佛道甚遠口自説言體是聲聞去於佛道甚是隔遠度脫無量衆皆悉得成就以是方便度無量衆令得成就出世之道雖少欲懈怠漸當令作佛所化之衆雖則樂小於一乘道而生懈惓漸以此法而誘掖之當令作佛內祕菩薩行外現是聲聞內則祕藏菩薩之行外則示現聲聞之形少欲厭生死實自淨佛土外作聲聞行小欲法厭離生死內心實自遊戲神通淨佛國土示衆有三毒又現邪見相示三毒者如身子懷嗔難陀著欲現邪見者如三迦葉及須菩提先事梵志我弟子如是方便度衆生此四攝中同事行也與之同事示行三毒現邪見相誘彼迷者易得相從若我具足説種種現化事若佛一一具説方便示現之事衆生聞是者心則懷疑惑今但略説不敢盡言恐諸聞者生疑惑故今此富樓那於昔千億佛而此樓那久於過去諸佛之所勤修所行道勤修大乘菩薩所行清淨之道宣護諸佛法宣揚護持諸佛之法為求無上慧為求如來無上智慧而於諸佛所現居弟子上於諸佛所説法第一現居一切弟子之上多聞有智慧廣學多聞有大智慧所説無所畏其所説法得四無畏能令衆歡喜能令聽者生歡喜心未曾有疲倦未曾見有疲倦之相而以助佛事而以小化助揚佛事已度大神通已度生死得大神通具四無礙智如前知諸根利鈍知諸衆生根性利鈍常説清淨法演暢如是義常説清淨無上妙法流通演暢如是之義教諸千億衆令住大乘法教諸無數千億之衆令得住於大乘法中而自淨佛土雖現聲聞而心常自清淨佛土未來亦供養無量無數佛供養諸佛修福分也護助宣正法亦自淨佛土外現劣形助宣正法內祕真心自淨佛土常以諸方便説法無所畏常以諸多善巧方便説於妙法心無所畏度不可計衆成就一切智所度之衆不可計量皆令成就一切智慧供養諸如來護持法寶藏供佛修福説法修慧其後得成佛號名曰法明應身名也其國名善淨七寶所合成如前劫名為寶明如前菩薩衆甚多其數無量億所度多也皆度大神通威德力具足充滿其國土皆已度脫得大神通威德具足遍滿其國聲聞亦無數聲聞之衆亦復無數二明八解脫得四無礙智如前以是等為僧以如是等小教果人無漏功德名之為僧其國諸衆生淫欲皆已斷純一變化生國無惡道及以女人斷淫欲相純變化生具相莊嚴身身紫金色三十二相以自莊嚴法喜禪悅食法喜開慧禪悅安心即以定慧而為法食更無餘食想更無餘外分段食想無有諸女人皆變化生亦無諸惡道尚無惡名何況有實富樓那比丘功德悉成滿一切功德成就滿足當得斯淨土當得如此同居淨土賢聖衆甚多菩薩聲聞人天之衆不可數知如是無量事我今但略説略如上説恐聞生疑不敢具舉爾時千二百阿羅漢心自在者千二百人皆證無學煩惱已盡名自在者作是念心作是念我等歡喜得未曾有我等衆人得聞樓那受記成佛自亦有分所以歡喜歎未曾有若世尊各見授記如餘大弟子者不亦快乎若蒙世尊各見我等深心本願亦為授記如前上首諸弟子者豈不快也佛知此等心之所念佛他心通知此衆人作此念言欲求授記告摩訶迦葉迦葉尊者前已授記今佛告者是衆首故是千二百阿羅漢此千二百即三迦葉一千弟子目連身子所有弟子共二百人我今當現前次第與授阿耨多羅三藐三菩提記言現前者現與授記言次第者從節次來阿耨等者即成無上正等正覺於此衆中我大弟子憍陳如比丘即鹿野中初度五人陳如為首此大知識當供養六萬二千億佛六萬二千即是表斷六十二億無明煩惱隨順佛言淨諸塵或名供養佛然後得成為佛號曰普明因中解了達法本際果上成佛故號普明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如序品解其五百阿羅漢優樓頻螺迦葉伽耶迦葉那提迦葉如序品解迦留陀夷此云黑光從相為名優陀夷此云出現以日出時尊者生故阿難弟子阿䨲樓馱離婆多劫賓那薄拘羅如序品解周陀莎伽陀等亦云周利槃陀伽亦云周利特迦此翻大小路邊母從夫遊將欲還國於差路處而生尊者故立此名等即五百皆當得阿耨多羅三藐三菩提皆當得成無上正覺盡同一號名曰普明五百弟子同一名號爾時世尊欲重宣此義而説偈言憍陳如比丘當見無量佛於當來世見無量佛承事供養過阿僧祇劫乃成等正覺過無數劫然後乃成常放大光明具足諸神通放光表智神通表定名聞遍十方一切之所敬名字聞望遍滿十方為一切衆之所敬仰常説無上道故號為普明説法即是普放慧光照燭一切故號普明其國土清淨依報勝也菩薩皆勇猛正報勝也咸升妙樓閣一切道品名為樓閣菩薩進趣名之為升遊諸十方國十方即是表十界也遍遊法界修諸功德以無上供具奉獻於諸佛具即是器如薩埵捨身藥王燃臂皆名上供作是供養已心懷大歡喜如是作法修妙供已心懷暢悅生大歡喜須臾還本國有如是神力遍供十方須臾還國何其速也蓋以心想神力之故一念既遍一塵亦遍心遍法遍不離剎那如禮懺時運想香華遍十方界而身隨心亦皆遍至未逾念須復本道場其理可見佛壽六萬劫應身壽量正法住倍壽十二萬劫像法復倍是二十四萬劫法滅天人憂佛法住世為人作眼其法滅時人天皆憂其五百比丘次第當作佛五百尊者轉次授記我滅之後汝當作佛故云轉次同號曰普明轉次而授記我滅度之後某甲當作佛意亦同上其所化世間亦如我今日其補處者亦與前佛化事是同故曰亦如我之一字五百第指今日之言亦是將來第記之語國土之嚴淨即善淨國及諸神通力即上種種神通自在變化之力菩薩聲聞衆正法及像法壽命劫多少皆如上所説五百尊者次第出世劫國名號所化之衆住世壽量正法像法皆與最初普明如來等無有異故通指云皆如上説迦葉汝已知五百自在者佛告迦葉我記五百得自在者汝已知之餘諸聲聞衆亦當復如是千二百人先記五百餘諸聲聞亦復如是其不在此會汝當為宣説其有今日不預此會而汝迦葉當為宣説爾時五百阿羅漢於佛前得受記已歡喜踊躍五百尊者面於佛前得成佛記故喜躍也即從座起到於佛前將陳所解故離本坐前詣佛所頭面禮足悔過自責頭面頂禮佛之雙足自悔前非責己昏鈍世尊我等常作是念説己所見自謂已得究竟滅度從佛聞法得成四果便自謂言是究竟道今乃知之如無智者羅漢雖悟悟已還迷而於大乘不能通達今聞佛説始覺失驚如無智者所以者何何以無智我等應得如來智慧我等修行合應證得如來所有功德智慧而便自以小智為足而即自以聲聞小智便為滿足不求大利世尊譬如有人至親友家醉酒而臥人喻自身親友譬佛醉喻昏迷酒喻五欲昔大通時從王子化如詣親友得入大乘佛性種子如衣繫珠中間疲倦退大入小貪著小利猶如飲酒長夜不覺猶如醉人是時親友官事當行喻諸王子此土化終他方緣熟理應往化名為官事捨此趣彼名為當行以無價寶珠繫其衣裏佛性種子名無價珠今入其身如繫衣下與之而去謂授法已轉化餘方其人醉臥都不覺知根力淺故無宿命通寧知往事猶如醉人都無所知起已遊行到於他國謂捨報已轉生餘處為衣食故勤力求索甚大艱難身無忍力乏慚愧衣心無法滋缺甘露味厭老病死猶如牢獄辛勤萬狀求學小乘如寒求衣如飢求食遍處乞索不能自安若少有所得便以為足證得小果方便涅槃自謂為足更不進身於後親友會遇見之喻今靈山師資相遇而作是言咄哉丈夫言咄哉者警悟之聲言丈夫者許是大器何為衣食乃至如是何故為於求索衣食乃至枉受如是艱難我昔欲令汝得安樂五欲自恣我往昔世欲令汝等得安樂故飽足衣食自恣享用於某年日月以無價寶珠繫汝衣裏今故現在某年日月合大通時八萬餘劫無價寶珠喻於佛性王子説經為下大種如以寶珠繫於衣下今故現在謂雖不覺善種常存而汝不知勤苦憂惱以求自活而汝不知有大乘種在於身中却學小乘枉受動苦以求自活甚為癡也甚為可惜真癡迷也汝今可以此寶貿易所須此寶即佛性貿易即變轉所須即忍辱之衣禪悅之食常可如意無所乏短常可富足如汝之意於一切時無所缺少佛亦如是佛亦如彼親友之人為菩薩時昔在因地作菩薩時教化我等令發一切智心教訓化導於我衆等令發一切智慧之心而尋廢忘不知不覺而即於後廢弛遺忘不能了知亦不省覺既得阿羅漢道自謂滅度及證四果自謂已得究竟滅度資生艱難得少為足斷惡修善辛勤萬狀資生之具甚是艱難得證無學便以為足一切智願猶在不失昔發大心求一切智此願猶在至今不失今者世尊覺悟我等今者靈山大覺世尊警覺開悟我等之輩作如是言作是告言諸比丘汝等所得非究竟滅汝等所證無學之果乃是小乘非實滅度我久令汝等種佛善根我從久劫令汝等種佛之善根以方便故示涅槃相為機怖大以方便力示於小乘寂滅之相而汝謂為實得滅度而汝認作究竟實滅世尊我今乃知實是菩薩白言世尊我等今者乃知自身本是菩薩得受阿耨多羅三藐三菩提記得受應身成佛之記以是因緣以是蒙記作佛因緣甚大歡喜得未曾有心中甚覺生大歡喜得所未有爾時阿若憍陳如等五百羅漢欲重宣此義而説偈言我等聞無上安隱授記聲我等得聞無上菩提令心安隱授佛記聲歡喜未曾有禮無量智佛衆心歡喜得所未有頂禮佛足無量智慧萬德世尊今於世尊前自悔諸過咎今於佛前自悔執小迷昧大乘無量過咎於無量佛寶得少涅槃分於佛無量大智慧寶但得少分偏空涅槃如無智愚人便自已為足如彼無智愚癡之人便於小法自已為足譬如貧窮人往至親友家貧人喻己親友喻佛昔往依佛如去親家其家甚大富具設諸肴膳實報國土是佛之家功德具足名為大富法相畢陳如諸肴膳雜食曰肴美食曰膳以無價寶珠繫著內衣裏無價寶珠即佛種性方便受法名為繫珠內衣即喻正報色身默與而捨去時臥不覺知親友默密繫珠衣下轉化餘國名為捨去我時迷昧如昏醉人不自覺知是人既已起遊行詣他國死而復生猶如醉醒發心修行名之為起忘大習小如遊他國求衣食自濟資生甚艱難遍處求法莊嚴色心自求涅槃不起化導如彼貧者乞食自濟資生之具甚是艱難得少便為足更不願好者於少分法便自為足更不發心求於實道不覺內衣裏有無價寶珠不自覺知內報色心有無價寶藏匿其中與珠之親友後見此貧人佛出娑婆復見昔時所化之者苦切責之己示以所繫珠二十年中常令除糞斷見思惑方等彈訶般若淘汰名苦切責來至法華開顯佛性知從衣下指出明珠貧人見此珠其心大歡喜諸聲聞人得見佛性如貧得寶歡喜叵言富有諸財物五欲而自恣功德法財無量智慧皆悉具足故云富有色香味觸無非三昧隨緣應用廣大自在故云五欲得以自恣我等亦如是我等聲聞退大入小回心向大亦復如彼貧人無異世尊於長夜常愍見教化我昔在迷猶如長夜世尊愍見常起教化令種無上願令我等種無上菩提廣大之願我等無智故不覺亦不知我等智劣不知往願亦復不能覺有佛性得少涅槃分自足不求餘既得少分偏空涅槃便謂為足不求大利今佛覺悟我言非實滅度今佛世尊覺悟我等言所得法非究竟滅得佛無上慧是乃為真滅得成無上正遍知覺是乃名為真實滅度我今從佛聞授記莊嚴事我等今者親從佛聞授成佛記國土莊嚴及轉次授決及以展轉次第授記身心遍歡喜心歡喜故充遍其身妙法蓮華經授學無學人記品第九五百羅漢千二百人皆已授記當來成佛大弟子中阿難多聞羅睺密行衆中上首未蒙記莂應身成佛又學無學共二千人心中亦願聞授記音如來應機故説此品爾時阿難羅睺羅如序品解而作是念二大弟子同作是念我等每自思惟我等每自心內思惟設得授記不亦快乎設或得佛與之授記豈不快乎即從座起到於佛前將有所請避席進前頭面禮足俱白佛言頭面禮敬佛之雙足俱同發聲而白佛言世尊我等於此亦應有分我等於此授記數中亦當有分成佛菩提唯有如來我等所歸唯佛世尊是我等衆之所依歸又我等為一切世間天人阿修羅所見知識又復我等是諸世間天人修羅四衆八部之所具見衆所知識阿難常為侍者護持法藏阿難常為如來侍者護持一切法寶之藏羅睺羅是佛之子羅睺羅者是佛親子若佛見授阿耨多羅三藐三菩提記者若佛世尊見授我等無上菩提成佛記者我願既滿衆望亦足我等願心既得圓滿衆人所望亦皆備足爾時學無學聲聞弟子二千人是二千人兼學無學在千二百無學之外皆從座起偏袒右肩到於佛前一心合掌瞻仰世尊如阿難羅睺羅所願住立一面諸人心念同二尊者但不發言在一面立爾時佛告阿難汝於來世當得作佛於未來世當成佛道號山海慧自在通王阿難智慧山藏海納神通廣大卷舒自在將來成佛為法中王號山海慧自在通王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如序品解當供養六十二億諸佛隨順佛語名供養供六十二億即表斷除六十二見護持法藏於諸佛所擁護受持一切法藏然後得阿耨多羅三藐三菩提具修諸度乃成正覺教化二十千萬億恆河沙諸菩薩等令成阿耨多羅三藐三菩提所化之機有如是等恆河沙數皆得菩提國名常立勝幡其佛國名常立勝幡者西域風俗議論高者常持勝幡表智高勝尊者多聞常勝一切故所居國名立勝幡其土清淨琉璃為地因心清淨內外映徹果感佛土亦復如然劫名妙音遍滿時分清平佛微妙音遍滿法界其佛壽命無量千萬億阿僧祇劫人壽長故佛壽亦長若人於千萬億無量阿僧祇劫中經如許劫算數校計不能得知佛壽長遠非是凡夫心力所知正法住世倍於壽命一倍增多像法住世復倍正法又二倍增阿難是山海慧自在通王佛彼時之佛為十方無量千萬億恆河沙等諸佛如來所共讚歎稱其功德十方諸佛皆同一音稱讚彼佛廣大功德爾時世尊欲重宣此義而説偈言我今僧中説阿難持法者佛於衆中説是阿難持法藏者當供養諸佛然後成正覺當供無數萬億諸佛然後得成無上正覺號曰山海慧自在通王佛如前其國土清淨名常立勝幡如前教化諸菩薩其數如恆沙彼佛會中無聲聞衆純諸菩薩其數無量佛有大威德名聞滿十方其佛如來威德廣大名聲遠布遍滿十方壽命無有量以愍衆生故以欲愍念諸衆生故所以應身壽量長遠不可度量正法倍壽命像法復倍是正法像法住世長久倍於佛壽如恆河沙等無數諸衆生正像法中受化之衆於此佛法中種佛道因緣於山海慧佛法之中種植佛道諸善因緣爾時會中新發意菩薩八千人初心菩薩見諸聲聞受記作佛咸作是念我等尚不聞諸大菩薩得如是記咸皆心疑作是念言我等昔來尚且不聞大菩薩衆得受如是菩提道記有何因緣而諸聲聞得如是決疑聲聞人何因得記爾時世尊知諸菩薩心之所念世尊知是初心菩薩生於疑念而告之曰告諸初心諸善男子我與阿難等佛與阿難及諸羅漢於空王佛所過去久長古世尊所同時發阿耨多羅三藐三菩提心同時發於無上道心阿難常樂多聞阿難處性常好多聞我常勤精進而我常勤修精進行是故我已得成阿耨多羅三藐三菩提釋迦如來只一常勤先得成道而阿難護持我法釋迦佛法亦護將來諸佛法藏於未來世護持諸佛法寶之藏教化成就諸菩薩衆教化無數億種衆生其本願如是故獲斯記昔空王時本願廣度今世亦然如楞嚴云如一衆生未成佛終不於此趣泥洹阿難面於佛前面於會中釋迦佛前自聞授記及國土莊嚴親自得聞佛為授記及以報土清淨莊嚴所願具足心大歡喜本所願心幸得具足其心豁然生於歡喜得未曾有今之所得昔所未有即時憶念過去無量千萬億諸佛法藏憶昔過去久遠之世於諸佛所聞諸法藏通達無礙如今所聞悉皆通達無所滯礙猶如今日之所得聞亦識本願亦識本時所發大願爾時阿難而説偈言世尊甚希有世尊特勝甚為罕有令我念過去無量諸佛法令我憶念過去久遠諸佛之法如今日所聞如今日聞等無有異我今無復疑我今無復疑惑之心安住於佛道安心住於諸佛之道方便為侍者護持諸佛法以方便力為佛侍者護持諸佛法寶之藏爾時佛告羅睺羅如前汝於來世汝於未來久遠之世當得作佛號蹈七寶華因時廣修七善功德果地高蹈七寶蓮華如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如序品解當供養十世界微塵等數諸佛如來以十三千應化國土抹為微塵用喻當供諸佛之數十世界者即表十方常為諸佛而作長子未來諸佛當出於世是羅睺羅皆為長子猶如今也如今佛世無以異也是蹈七寶華佛國土莊嚴壽命劫數所化弟子正法像法國土壽命弟子正像如是等事亦如山海慧自在通王如來無異指同阿難亦為此佛而作長子為山海慧作佛長子過是已復過此世後當得阿耨多羅三藐三菩提當成無上正遍知尊爾時世尊欲重宣此義而説偈言我為太子時羅睺為長子我未出家為太子時是羅睺羅為我長子我今成佛道受法為法子受如來法為我法子於未來世中見無量億佛於當未來見無量佛皆為其長子一心求佛道皆為彼佛而作長子一心求於無上佛道羅睺羅密行唯我能知之而羅睺羅微密之行唯佛世尊乃能知之現為我長子以示諸衆生現今垂迹為我長子以示一切世間衆生無量億千萬功德不可數而其所積密行功德無量萬億非數可知安住於佛法以求無上道安心住於諸佛之法以求無上真正之道爾時世尊見學無學二千人其意柔軟寂然清淨佛授記者印其所證非同世間人情取捨見二千人其心異常柔和善軟寂然沉靜清淨明了堪可授道一心觀佛一心不亂瞻仰於佛佛告阿難汝見是學無學二千人不衆在面前十目所覩云何更問見是人否當知會衆但見其形寧知心念所以世尊問阿難也唯然已見答云唯然我實已見阿難是諸人等二千聲聞當供養五十世界微塵數諸佛如來從今已去常復供養五十世界抹為微塵如是塵數諸佛如來恭敬尊重恭謙敬謹尊崇厚重護持法藏護持諸佛法寶之藏末後同時於十方國各得成佛於最後身各成佛道皆同一號名曰寶相是二千人均蒙授記同一名號曰寶相佛如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如序品解壽命一劫一小劫也國土莊嚴依報之相聲聞菩薩正報之相正法像法法住之相皆悉同等功行相類感報亦等爾時世尊欲重宣此義而説偈言是二千聲聞今於我前住二千之衆今於佛前住立一面悉皆與授記未來當成佛我今悉與授菩提記於未來世當得成佛所供養諸佛如上説塵數供佛之數如上所説五十世界抹為微塵如微塵衆無數諸佛護持其法藏後當成正覺護持如上塵數諸佛法寶之藏後當成就佛果菩提各於十方國悉同一名號各於十方成等正覺皆同一號名寶相佛俱時座道場以證無上慧皆名為寶相是二千人一時成佛同坐道場以證無上甚深智慧名寶相佛國土及弟子正法與像法悉等無有異種種化事國土弟子壽命劫數一一平等以德同故報無差別咸以諸神通度十方衆生咸以智慧神通之力度十方界一切衆生名聞普周遍漸入於涅槃名號聞望普遍諸方漸漸次第入於寂滅爾時學無學二千人新得記者聞佛授記歡喜踊躍而説偈言世尊慧燈明世尊智慧明明無盡方燈續明普照一切我聞授記音我等得聞授記之音心歡喜充滿如甘露見灌其心歡喜充滿正報如得甘露之所見灌妙法蓮華經法師品第十前藥草品説時雨譬言此妙經普被一切雖與授記皆為聲聞今此品中是為大衆及以八部能於是經受持讀誦解説書寫乃至得聞一句一偈一時通記皆成佛道爾時世尊因藥王菩薩告八萬大士佛因藥王告諸大衆藥王汝見是大衆中現前法會大衆之中無量諸天龍王夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人與非人及比丘比丘尼優婆塞優婆夷如序品解求聲聞者求四諦法成阿羅漢求辟支佛者求因緣法及觀如幻緣覺獨覺名辟支佛求佛道者求最上乘願成佛道如是等類三乘之人咸於佛前聞妙法華經在於佛前得聞妙法一偈一句乃至一念隨喜者下至但聞一句一偈乃至聞經一念心中生歡喜者我皆與授記當得阿耨多羅三藐三菩提佛記是等皆當得道佛告藥王又如來滅度之後上明佛在下顯滅後若有人聞妙法華經乃至一偈一句一念隨喜者聞是妙經一偈一句一念之間起隨喜者我亦與授阿耨多羅三藐三菩提記我皆與授成佛之記若復有人受持讀誦解説書寫妙法華經乃至一偈信心受持對文披讀離文暗誦隨義解説紙素書寫此之妙經下至一偈於此經卷敬視如佛敬重經卷視同於佛種種供養華香瓔珞抹香塗香燒香繒蓋幢幡繒綵為蓋及以幢幡衣服伎樂乃至合掌恭敬下至但爾合掌致敬藥王當知是諸人等是諸敬信供養經人已曾供養十萬億佛宿曾供養諸佛世尊於諸佛所成就大願於佛之所已曾成就廣大志願愍衆生故生此人間蓋欲愍念諸衆生故而生於此世間人中藥王若有人問何等衆生於未來世當得作佛佛語藥王若復有人如此問時應示是諸人等於未來世必得作佛當示他云敬信持誦書寫供養如是之人於當來世決定成佛何以故若善男子善女人於法華經乃至一句受持讀誦解説書寫上説傳經下明供養種種供養經卷華香瓔珞抹香塗香燒香繒蓋幢幡衣服伎樂合掌恭敬如前是人一切世間所應瞻奉如是之人一切世間衆生之類所當瞻敬應以如來供養而供養之以無佛時是人補處代佛宣揚應以佛供而供養之當知此人是大菩薩既於妙經生大信解則知斯人是大菩薩成就阿耨多羅三藐三菩提已能成就阿耨菩提哀愍衆生願生此間愍衆生故生此人間廣説分別妙法華經廣大敷演分別解説如是妙經何況盡能受持種種供養者隨分受持所護功德尚且無量何況全部具足受持及以種種上妙香華繒蓋幢幡而為供養藥王當知是人當知如是持供之人自捨清淨業報自當生於清淨佛土捨彼勝報生於閻浮於我滅度後當釋迦佛滅度之後愍衆生故愍念一切衆生之故生於惡世此娑婆界多不善聚故云惡世廣演此經廣為衆生演説此經若是善男子善女人是受持經善男善女我滅度後當佛滅後能竊為一人有能私竊為於一人説法華經乃至一句下至極少一句之義當知是人則如來使當知如是説經之人則是如來法華之使如來所遣乃是如來之所津遣行如來事行於如來化法之事何況於大衆中廣為人説竊為一人功德極大於衆廣説其功莫等藥王上明持經功德甚多下顯謗毀罪報極重若有惡人以不善心有諸惡人起於毒念於一劫中經歷許時現於佛前於現在世當佛面前常毀罵佛其罪尚輕心惡時長面罵於佛罪固非輕云尚輕者反顯謗毀持經之人罪報極重若人以一惡言下至但出一句惡語毀訾在家出家在家之人善男善女出家僧尼及沙彌等讀誦法華經者四衆讀誦法華之者其罪甚重由謗人故退他道心教法不行所以罪重藥王其有讀誦法華經者其有若人讀是經者當知是人當知如是持經之人以佛莊嚴而自莊嚴經説妙行名佛莊嚴是人以此自嚴其身則為如來肩所荷擔則是如來傳法之使乃為如來肩所荷擔持佛正法轉化衆生令得正見則是荷負諸佛如來大重擔者其所至方其持經人所至方土應隨向禮應當至心隨方向禮一心合掌一心不亂合十指掌恭敬供養恭謙敬謹志誠供養尊重讚歎尊崇貴重讚詠稱歎華香瓔珞粖香塗香燒香繒蓋幢幡衣服肴饌作諸伎樂如前具解人中上供而供養之以諸人間上妙之供而供此人應持天寶而以散之此勤諸天散華獻寶天上寶聚應以奉獻天上所有寶物積聚應當奉獻是持法者所以者何所以如此興供養者其意云何是人歡喜説法欲勤是人歡喜説法須臾聞之即得究竟阿耨多羅三藐三菩提故每一晝夜分為三十須臾蓋言聞法少時之間由信心故精義入神便能究盡佛菩提故爾時世尊欲重宣此義而説偈言若欲住佛道成就自然智若欲住心於佛正道成就無作自然智慧常當勤供養受持法華者常當勤供持法華者其有欲疾得一切種智慧有人欲得疾成諸佛一切種智中道正慧當受持是經並供養持者當持此經并供持者若有能受持妙法華經者若人能持是法華者當知佛所使愍念諸衆生當知是人為佛之使愍及衆生諸有能受持妙法華經者諸有能持是經典者捨於清淨土愍衆故生此捨己淨土生濁世中當知如是人自在所欲生當知是人非業報生乃自在意欲生此中能於此惡世廣説無上法能於惡世説無上法應以天華香及天寶衣服天上妙寶聚供養説法者如前已解吾滅後惡世能持是經者佛滅度後濁惡世中持此經者當合掌禮敬如供養世尊敬持經人如佛無異上饌衆甘美及種種衣服供養是佛子冀得須臾聞所以設供意欲須臾得聞是經究竟大事若能於後世受持是經者若於滅後能持是經我遣在人中行於如來事佛遣生於人道之中代佛行事若於一劫中常懷不善心經於一劫懷不善心作色而罵佛作嗔怒色而罵於佛獲無量重罪是罵佛人獲罪無量其有讀誦持是法華經者有讀誦持是法華者須臾加惡言其罪復過彼須臾罵是持經之人罪復過彼經劫罵佛有人求佛道而於一劫中有人為求佛之道故經於一劫合掌在我前以無數偈讚合掌住於如來之前以無數偈讚歎於佛由是讚佛故得無量功德以讚佛故得多福德歎美持經者其福復過彼歎持經者功德過於讚歎果佛於八十億劫以最妙色聲八十億劫表於八識妙色即是香華等物妙音即是種種音樂以諸世間最妙色聲及與香味觸妙香妙味及與觸塵供養持經者當以是等供持經人如是供養已作如是等修供養已若得須臾聞若於須臾得聞妙經則應自欣慶我今獲大利則當自心生大喜慶我於今日得獲大利藥王今告汝佛召藥王我今語汝我所説諸經我成道來所説諸經而於此經中法華最第一而於此部法華經中更無與等最為第一爾時佛復告藥王菩薩摩訶薩如序品解我所説經典無量千萬億再語藥王我平日間所説經法無量萬億已説今説當説若已説竟若今現説若當來説而於其中此法華經最為難信難解當念成佛功高難信説佛知見義深難解藥王此經是諸佛祕要之藏此法華經是諸世尊祕密要妙功德法藏不可分布妄授與人不可容易分布世上妄付與人恐生輕謗翻成損惱當擇其可然後授之諸佛世尊之所守護經説諸佛所行之處一切如來之所守護從昔已來未曾顯説我從昔日成道已來為機劣故未曾顯説但以方便密為説之即經云衆生聞是者心則懷疑惑而此經者如來現在猶多怨嫉如來在世人尚不信多懷怨怒及以憎嫉即譬喻品云將非魔作佛惱亂我心耶況滅度後佛世尚爾況復滅後藥王當知如來滅後於釋迦佛入滅之後其能書持讀誦供養其有能書持誦供養為他人説者為一切人而演説者如來則為以衣覆之若非道力豈解弘經能行忍辱精進不解則披如來忍辱之衣又為他方現在諸佛之所護念餘方諸佛咸敬是經能持是者得佛護念是人有大信力是説經人有於廣大信心之力及志願力及以立志發願之力諸善根力過去久植善根之力當知是人與如來共宿一切如來悉皆棲宿究竟一乘寂滅場地今此行人安住法華功德海藏故云共宿則為如來手摩其頭手表權智頭表實理從如來説方便之義入於佛乘究竟之道則為已得手摩其頭藥王在在處處若説若讀若誦若書若經卷所住之處若人流通有是經處皆應起七寶塔極令高廣嚴飾以為供養不須復安舍利大凡起塔本為奉安佛之舍利所以不須安舍利者意見下文所以者何此中已有如來全身經明妙理理性清淨即是如來清淨法身有是經處便為是塔經文即是佛之舍利即經云如人志心求佛舍利如是之人乃可為説此塔應以一切華香瓔珞繒蓋幢幡伎樂歌頌供養恭敬尊重讚歎此之寶塔應以是等而為供養若有人得見此塔禮拜供養若人見塔頂禮供養當知是等皆近阿耨多羅三藐三菩提是敬信人去道甚近藥王多有人在家出家行菩薩道以見有人若在家士女出家僧尼行菩薩道者若不能得見聞讀誦書持供養是法華經者如上四部雖則受行菩薩之道而於法華不得見聞受持讀誦當知是人未善行菩薩道當知此輩未是善能行菩薩道若有得聞是經典者乃能善行菩薩之道得其要道乃曰善行其有衆生求佛道者發心欲求佛之道者若見若聞法華經眼見耳聞如是妙經聞已信解受持者見聞敬信是入道緣當知是人得近阿耨多羅三藐三菩提根種熟故近於佛慧藥王譬如有人渴乏須水如人渴乏欲須涼水於彼高原穿鑿求之於佛境上尋求理味如向高原鑿井求水猶見乾土知水尚遠乾土喻於方便漸教乾慧之地乾有其慧未得理水初心菩薩遊於理外如見乾土施功不已轉見濕土逐漸見泥加功不已住內凡位如見濕土至十回向如見沍泥其心決定知水必近修行至此位鄰漸教初歡喜地圓教菩薩登住之位心不狐疑故云決定去聖非遙故云必近菩薩亦復如是合上喻也若未聞未解未能修習是法華經如此之人全未染指當知是人去阿耨多羅三藐三菩提尚遠如見乾土若得聞解思惟修習如前喻中加功不已必知得近阿耨多羅三藐三菩提如漸得見濕土沍泥所以者何有何所以須弘法華一切菩薩阿耨多羅三藐三菩提皆屬此經一切菩薩修菩提法皆屬此經之所統攝不聞妙法滯在權門此經開方便門示真實相未説法華三乘隔歷方便門閉各自修持來至法華開顯佛性點前權乘即菩薩道認僕為子方便門開會諸漸教同入圓頓示一切人真實之相是法華經藏是法華經一實相理人人本具未蒙開顯而不得知猶如伏藏深固幽遠明佛至理無上菩提故名為深是決定義不可破壞名堅固法其理微密隱而難見故名為幽以凡望佛隔於十果故名為遠無人能到唯佛與佛乃能知之六道三乘莫能跋及是故經曰無人能到今佛教化今佛開顯教化一切成就菩薩成就一乘大菩薩道而為開示而與開發示一乘相藥王若有菩薩聞是法華經驚疑怖畏乍聞説圓其理深妙而心生疑驚恐怕怖當知是為新發意菩薩如彼八千初發心者若聲聞人聞是經驚疑怖畏聞圓妙教反為魔説當知是為增上慢者如彼五千退席之者藥王若有善男子善女人如來滅後欲為四衆説是法華經者此一節經教善男女滅後弘經云何應説此問起也答見下文是善男子善女人教行四法入如來室令起慈悲著如來衣令行忍辱坐如來座令住法空爾乃應為四衆廣説斯經爾信解人入室著衣坐座説法乃可得也如來室者一切衆生中大慈悲心是於諸一切衆生分上以慈心故除諸憂惱與其快樂以悲心故方便救濟拔其苦厄如是之心能容一切名慈悲室如來衣者柔和忍辱心是以柔和故不惱於人以忍辱故不思報怨有慚有愧名為著衣如來座者一切法空是了一切法悉皆空寂安然不動名為坐座安住是中住於慈忍法空之座然後以不懈怠心雖能慈忍了法性空若還懈怠弘經是難故經云以不懈怠心為諸菩薩及四衆所為人也廣説是法華經所説法也藥王我於餘國遣化人為其集聽法衆謂於餘國方便土中遣變化人為集聽衆如信解品密遣者是亦遣化比丘比丘尼優婆塞優婆夷聽其説法佛神力故密彼諸人令來聽法是諸化人聞法信受隨順不逆諸化人等以佛之力聞即信受無有違逆若説法者在空間處約事則住空曠間靜無人之處約理則是攝心住定樂於空寂無生之地我時廣遣天龍鬼神乾闥婆阿修羅等聽其説法來聽法者八部之衆皆如來力之所遣至我雖在異國佛雖應化在餘國土時時令説法者得見我身説法之人心中了了解法義味即見如來清淨法身住常寂光圓滿報身居實報境千百億身應同居土若晝若夜常在目前若於此經忘失句逗若復受持讀誦講説於此妙經句逗之中有所忘失我還為説令得具足即於時中忽然省悟得見佛理無所遺忘是名如來還為解説令得句義皆悉具足爾時世尊欲重宣此義而説偈言欲捨諸懈怠應當聽此經若人欲得捨諸懈怠應當至心聽受此經是經難得聞信受者亦難如是之經難得聽聞信受之者亦是難得如人渴須水穿鑿於高原志誠求法如渴須水於彼高原穿鑿為井猶見乾燥土知去水尚遠住乾慧地知去理水尚且遠在漸見濕土泥決定知近水位在內凡鄰於聖位漸漸見理自知成佛無疑名為近水藥王汝當知如是諸人等如是初心諸菩薩等不聞法華經去佛智甚遠未曾得聞如是妙經去佛智慧甚是遙遠若聞是深經決了聲聞法是諸經之王若得聞是深妙經典是諸一切經中之王聞已諦思惟聞是法已諦心思審當知此人等近於佛智慧聞已能思思已能修當知是人近於佛慧若人説此經若復有人欲説此經應入如來室興大慈悲著於如來衣行大忍辱而座如來坐住於法空處衆無所畏處大衆中無所畏心廣為分別説廣為一切分別演説大慈悲為室柔和忍辱衣諸法空為座處此為説法入室披衣坐座演説方名如法若説此經時若復説此妙經之時有人惡口罵加刀杖瓦石有人前來惡口穢罵加以刀杖瓦石捶打念佛故應忍此等違惱境界現前當念佛故忍此諸惡我千萬億土現淨堅固身云何念佛當思如來昔於無量千萬億土示現清淨能忍諸惡毀贊不動堅固之身於無量億劫為衆生説法如本門中常不輕是若我滅度後能説此經者若佛滅後有説經者我遣化四衆比丘比丘尼及清淨士女即前四衆供養於法師恭敬供養於説法師引導諸衆生集之令聽法誘引化導諸衆生等令集一處聽説妙法然佛所遣諸化人者即前文云是人自捨清淨業報愍衆生故生此間者若人欲加惡刀杖及瓦石人來興惡加諸毒害則遣變化人為之作衛護即遣上所辨化善人為之方便而作衛護若説法之人獨在空間處獨自處於空間之地寂莫無人聲讀誦此經典其處闃靜無人音聲在彼讀誦是妙經典我是時為現清淨光明身寂寞之處無有人聲清淨身也讀妙經典見佛智慧光明身也清淨即法身光明即慧身修性泯合隨處現形即應身也因靜讀誦得見如來三德法身若忘失章句為説令通利若於經文有所忘失如來慈力密被其人自然通利憶持不失若人具是德若人具此清淨德行或為四衆説或於四衆為説妙法空處讀誦經或在空處讀誦是經皆得見我身皆得見於如來法體光明妙身若人在空間在於間處修攝其心靜處之人我遣天龍王夜叉鬼神等為作聽法衆八部之衆誓護佛法今此法師讀誦講説故佛遣之作聽法衆是人樂説法分別無障礙是説法師在衆講演善能分別樂説無礙諸佛護念故以得諸佛護念之故能令大歡喜能令聽衆生大歡喜若親近法師速得菩薩道若能親近説法之師速得成就菩薩之道隨順是師學得見恆沙佛若能隨順從是師學則於經中得見三世恆沙諸佛不離本心妙法蓮華經見寶塔品第十一過去久劫多寶世尊臨滅度時告諸大衆有欲供養我全身者應當發心起一大塔十方世界説法華處我之寶塔因聽經故踊現其前為作證明今由此土佛説是經大耳遙聞故從地涌爾時佛前爾法師品説竟之時有七寶塔以七珍寶而為大塔即是表顯七善法財高五百由旬塔表法身高五百者五分功德之所修成縱廣二百五十由旬縱廣即説塔基之相豎縱橫廣二百五十約由旬量該一萬里修成法身以戒為體聲聞之戒二百五十今開小乘同歸作佛戒定慧三相由而生故説塔基其量如是四威儀中皆具是數故云縱廣二百五十從地涌出住在空中約相易見若表法者從心地中之所涌出住於究竟大涅槃空種種寶物而莊校之萬善功德而為嚴飾五千欄楯橫者曰欄竪者曰楯即寶塔上防間之具五千即表遮防五道龕室千萬塔上所有龕穴寶室其數千萬即表行人之所住處無量法門無數幢幡以為嚴飾幢表鎮靜幡表鼓動靜即是定動即是慧定慧均等名善莊嚴垂寶瓔珞以衆寶珠結為瓔珞處處垂下即表智珠垂諸方便教化衆生寶鈴萬億而懸其上以寶為鈴懸於塔上微風吹動出妙音聲以妙寶音發於報體隨其扣擊接物利生四面皆出塔之方面多摩羅跋旃檀之香多摩羅跋此云性無垢無垢旃檀即絶妙香實行內充淨無瑕翳如牛頭山性無垢香充偏世界德行之人香聞十方故云充遍其諸幡蓋其諸寶幡及以寶蓋頂上莊嚴表佛功德以金銀琉璃硨磲碼瑙真珠玫瑰七寶合成若表法者金性堅剛表堅固智銀性潔白表清淨行琉璃映徹表明了智硨磲圓轉表委曲心碼瑙雜色表萬行心真珠圓明表巧慧心玫瑰即玉表溫潤心衆德莊嚴五分法塔是故名曰七寶合成高至四天王宮四天門王居須彌腹寶塔高故齊於天宮四念護心如天三十三天須彌四峯各有八天帝釋居中成三十三若表法者即喻菩薩五十二位住行向三名為三十十地聖人名三十一等覺菩薩名三十二如來妙覺名三十三雨天曼陀羅華供養寶塔諸天雨華供養寶塔表心善行莊嚴法身餘諸天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等千萬億衆在事相邊即是八部若表法者豈外一心天龍二部即是善心餘夜叉等總是惡心善根勝故攝諸惡念無數億萬化而為善以一切華香瓔珞幡蓋伎樂供養寶塔以諸供施而供寶塔恭敬尊重讚歎覩相生善起恭敬心尊重寶塔而興贊歎爾時寶塔中是諸天人設供之時出大音聲塔中忽然出大妙音歎言善哉善哉釋迦牟尼世尊如是贊歎釋迦世尊能以平等大慧能以生佛本性平等佛之知見廣大智慧教菩薩法十方如來教其弟子菩薩根者上妙之法佛所護念此之大慧是一切佛清淨心中常所護念妙法華經生於妙果妙法華經為大衆説與諸大衆分別演説如是如是謂釋迦尊慈悲方便如是如是為衆生説釋迦牟尼世尊如所説者皆是真實如釋迦尊之所説者一一皆是真實之語爾時四衆見大寶塔住在空中如前又聞塔中所出音聲如善哉等皆得法喜皆於如來妙法之中得大歡喜怪未曾有衆皆驚異謂未曾有從座而起將欲請問是塔因緣故從座起恭敬合掌却住一面先加恭敬合掌問訊然後退身立在一面爾時有菩薩摩訶薩名大樂説衆中上首大菩薩也智慧深故善説諸法名大樂説知一切世間天人阿修羅等心之所疑衆見寶塔不知何謂怪未曾見所以心疑菩薩知已故為請問而白佛言世尊以何因緣因何等緣有此寶塔從地涌出欲知自來又於其中發是音聲又於塔中發出讚歎大妙之音爾時佛告大樂説菩薩因問故答此寶塔中有如來全身諸佛入滅化火焚身分布舍利為衆結緣多寶入滅不曾化身臨終付囑令衆起塔供養遺體為欲證經所以佛答塔有全身乃往過去東方無量千萬億阿僧祇世界久遠劫前東方世界國名寶淨國中清淨多諸寶物彼中有佛號曰多寶彼寶淨國佛號多寶其佛行菩薩道時作大誓願因地之時曾發大願若我成佛滅度之後若我得成無上佛道入滅之後於十方國土有説法華經處應十方國説是經處我之塔廟我之所有七寶塔廟為聽是經故為聽如是法華經故涌現其前即當涌現其佛之前為作證明讚言善哉因心如是彼佛成道已既成佛已臨滅度時化緣已畢臨欲終時於天人大衆中告諸比丘語諸會衆出家弟子我滅度後欲供養我全身者有欲供養我之全身應起一大塔以藏佛身其佛以神通願力以大神通誓願之力任持其身十方世界在在處處若有法華經者十方佛土在處有説法華經者彼之寶塔皆涌出其前隨處應現全身在於塔中讚言善哉善哉全身出現贊善哉者酬宿願故大樂説今多寶如來塔聞説法華經故從地涌出讚言善哉善哉説其來意令衆得知是時大樂説菩薩以如來神力故以如來神力者願藉佛慈非自己力而能得見白佛言世尊我等願欲見此佛身願見古佛多寶之身佛告大樂説菩薩摩訶薩是多寶佛有深重願佛告樂説彼佛宿有深重之願若我寶塔為聽法華經故出於諸佛前時塔為聽法出現之時其有欲以我身示四衆者其欲以我塔中全身示於會上四衆之者彼佛分身諸佛在於十方世界説法彼現在世説經之佛分身在於十方世界廣説諸法度衆生者盡還集一處直待分身一時集已好自一身分千百億今此所集攝多歸一故云盡還然後我身乃出現耳然後我之塔中全身乃出現也大樂説我分身諸佛在於十方世界説法者今應當集汝欲見此多寶佛身我當應集分身諸佛大樂説白佛言樂説聞已重白佛言世尊我等亦願欲見世尊分身諸佛禮拜供養所以欲見為修供養爾時佛放白毫一光如來欲集分身諸佛故放中道白毫光明即見東方五百萬億那由他恆河沙等國土諸佛因光照故衆皆得見五百萬億以表菩薩五位真因恆沙諸佛即諸淨念彼諸國土皆以頗梨為地頗梨地者即善淨心寶樹寶衣以為莊嚴寶樹即是菩提樹王寶衣即是柔和忍辱無數千萬億菩薩充滿其中菩薩即是念念之心遍張寶幔寶網羅上寶幔即是慈悲所覆寶網即是戒珠所網彼國諸佛以大妙音而説諸法彼一一佛皆出大音演説諸法及見無量千萬億菩薩遍滿諸國為衆説法彼一一土皆有菩薩充滿其中各為其衆而演説法南西北方四維上下方位有十光照東方所見如是例餘九方光所照處其相亦然白毫相光所照之處亦復如是與東方同爾時十方諸佛十方分身釋迦文佛各告衆菩薩言各語座下諸菩薩言善男子我今應往娑婆世界釋迦牟尼佛所光既照彼知意故來並供養多寶如來寶塔并欲供養多寶佛塔時娑婆世界即變清淨欲集諸佛故釋迦尊以神通力先淨其土琉璃為地寶樹莊嚴黃金為繩以界八道釋迦世尊實報之土淨如此為欲化度頑惡衆生故現五濁同居穢土今欲説實所以現起清淨國土衆寶莊嚴無諸聚落村營城邑男女混居名為聚落今實報土純諸男子無有女人故無聚落及以村坊營塞城郭郡邑之相一時皆無大海江河山川林藪海與江河喻諸乘人淺深之智山靜川流即喻定慧林藪即喻諸覺枝林今現實報同歸一實諸相皆無燒大寶香修大功德名燒寶香曼陀羅華遍布其地表修善因無遺缺處以寶網幔羅覆其上菩薩所行慈悲為首故云寶幔之所遍覆成佛之行非戒不立故云寶網羅覆其上懸諸寶鈴鈴有音聲以表説法唯留此會衆獨留此會聽法之衆移諸天人置於他土以佛神力移餘一切天人之衆置他土中是時諸佛十方分身釋迦牟尼各將一大菩薩以為侍者各佛但帶一大菩薩以為給侍至娑婆世界各到寶樹下此方現土寶樹之下一一寶樹高五百由旬即表五分功德法身枝葉華果次第莊嚴枝喻事相一一相中復有多別喻如葉也開華表因成果表智如次進修用嚴法體諸寶樹下皆有師子之座高五由旬樹是願行座表空寂安詳其理名為坐座高五由旬即五忍位亦以大寶而校飾之坐是空法今云寶飾即表不空如來之坐爾時諸佛各於此座結加趺坐既到此已各坐寶座如是展轉遍滿三千大千世界如是展開轉轉坐去遍滿一化三千之界而於釋迦牟尼佛一方所分之身猶故未盡但坐東方所分之身遍三千界獨自未盡時釋迦牟尼佛欲容受所分身諸佛故為欲安座容納諸佛八方各更變二百萬億那由他國皆令清淨言八方者此約橫遍但變四方及以四維不涉上下二百萬億八方皆然總成一千六百萬億三千世界無有地獄餓鬼畜生及阿修羅以清淨故無四惡道又移諸天人置於他土唯留會衆移餘天人所化之國所變化土亦以琉璃為地寶樹莊嚴樹高五百由旬枚葉華果次第嚴飾樹下皆有寶師子座高五由旬種種諸寶以為莊校亦無大海江河並如上解及目真鄰陀山此云石山摩訶目真鄰陀山此云大石山鐵圍山四大洲外有山圍繞名小鐵圍大鐵圍山大千界外有山圍繞名大鐵圍須彌山等諸山王須彌此云妙高須彌之外有十大山圍褁須彌名諸山王悉無是等通為一佛國土以諸所變恆沙大千通為一國寶地平正寶交露幔於露地上以寶為幔遍覆其上遍皆遮覆懸諸幡蓋義如前解燒大寶香諸天寶華遍布其地如前釋迦牟尼佛為諸佛當來座故為分身佛復於八方各更變二百萬億那由他國皆令清淨如是三變八方淨土初則一大千界次則千六百億更加今數通計三萬二千億那由他國方能容盡十方世界分身諸佛無有地獄餓鬼畜生及阿修羅無四惡道又移諸天人置於他土所化之國亦以琉璃為地寶樹莊嚴樹高五百由旬枝葉華果次第莊嚴樹下皆有寶師子座高五由旬亦以大寶而校飾之亦無大海江河及目真鄰陀山摩訶目真鄰陀山鐵圍山大鐵圍山須彌山等諸山王通為一佛國土寶地平正寶交露幔遍覆其上懸諸幡蓋燒大寶香諸天寶華遍布其地並如前解爾時東方釋迦牟尼所分之身百千萬億那由他恆河沙等國土中諸佛東方一面自有如是恆沙國土分身之佛各各説法各於其土而演説法來集於此是東方佛來集娑婆如是次第十方諸佛皆悉來集坐於八方所變之土爾時一一方四百萬億那由他國土諸佛如來遍滿其中言分身佛遍滿八方是時諸佛各在寶樹下坐師子座一如東方皆遣侍者問訊釋迦牟尼佛皆遣所帶一大菩薩作禮致敬問訊如來各齎寶華滿掬滿衣裓也而告之言語侍者言善男子汝往詣耆闍崛山釋迦牟尼佛所各遣至於靈山會上如我辭曰代佛傳言少病少惱少有疾病及以煩惱氣力安樂氣力充盛心安樂不及菩薩聲聞衆悉安穩不已禮如來次問大衆以此寶華散佛供養先供養訖後方傳旨而作是言彼某甲佛雖是釋迦之所分身而一一佛各有名號故云某甲與欲開此寶塔所以來者為欲開塔示此大衆諸佛遣使亦復如是一佛既爾諸佛皆然爾時釋迦牟尼佛見所分身佛悉已來集各各坐於師子之座佛見分身安坐已畢皆聞諸佛與欲同開寶塔聞諸佛語所願皆同即從座起住虗空中將欲開塔而塔高妙若非升空云何可得所以起身住立空中一切四衆起立合掌一心觀佛當時在會諸四衆等見佛離坐故皆起立合掌一心瞻仰於佛於是釋迦牟尼佛以右指開七寶塔戶用右指者表於權智出大音聲如却關鑰開大城門佛開塔戶作大音聲如去關鑰開大城門即時一切衆會在會之衆皆見多寶如來於寶塔中坐師子座全身不散如入禪定全身不動如禪定入又聞其言善哉善哉釋迦牟尼佛快説是法華經塔初現時已嘗贊歎今塔戶開重復説讚故曰又聞所以歎佛為快説經我為聽是經故而來至此言我此來為聽經故爾時四衆等見過去無量千萬億劫滅度佛説如是言歎未曾有衆見久遠已滅度佛發如是言昔所未見故歎希有以天寶華聚以諸天上寶華之聚散多寶佛因見多寶散華致敬及釋迦牟尼佛上因釋迦故得見多寶所以散華供釋迦佛爾時多寶佛於寶塔中分半座與釋迦牟尼佛多寶分座命釋迦坐而作是言釋迦牟尼佛可就此座請釋迦佛就於寶座即時釋迦牟尼佛入其塔中坐其半座結加趺坐因多寶請所以入塔安坐半座爾時大衆見二如來釋迦多寶在七寶塔中師子座上結跏趺坐遠見二尊坐於寶塔各作是念佛坐高遠以在遠故雖欲親近而不可得所以作念惟願如來以神通力令我等輩俱處虗空衆願佛力接引住空即時釋迦牟尼佛以神通力接諸大衆皆在虗空佛慈悲故如其所願以神力接咸住空中以大音聲普告四衆釋迦佛出大妙音聲遍告四衆誰能於此娑婆國土廣説妙法華經今正是時佛將示滅普告大衆勸募流通正是其時如來不久當入涅槃化事將終欲歸元寂佛欲以此妙法華經付囑有在所以勸召正欲以此妙法華經付托得所免致湮況爾時世尊欲重宣此義而説偈言聖主世尊雖久滅度大聖法主萬德世尊雖已久滅入於涅槃在寶塔中尚為法來在於七寶妙塔之中尚為聽法得得遠來諸人云何不勤為法汝等諸人云何之故不能精進勤求大法此佛滅度無央數劫言佛滅久不可計劫處處聽法以難遇故處處化往聽説妙法以法高妙難得遇故彼佛本願我滅度後彼多寶佛本發誓願於我此身滅度之後在在所往常為聽法處處所去曾無他事常為聽法又我分身無量諸佛此指十方分身諸佛如恆沙等來欲聽法數如恆沙來為聽法及見滅度多寶如來及為欲見久滅多寶各捨妙土及弟子衆各各諸佛土捨及衆天人龍神諸供養事四衆供事一時捨去令法久住故來至此為住法故咸集於此為坐諸佛以神通力釋迦為欲坐十方佛故現神通移無量衆令國清淨移天人衆置於他土嚴淨其國諸佛各各詣寶樹下諸佛各詣此寶樹下如清淨池蓮華莊嚴以池喻國以蓮喻佛其寶樹下諸師子座諸寶樹下師子之座佛坐其上光明嚴飾諸佛坐於師子寶座光明熾盛嚴飾妙好如夜暗中然大炬火衆生在迷如夜暗中諸佛光耀如然炬火身出妙香遍十方國諸佛身香充遍諸處衆生蒙熏喜不自勝衆生蒙佛香氣所熏各各歡喜不能自勝譬如大風吹小樹枝風喻佛香枝喻機見以是方便令法久住以如是等善巧方便令得正法久住於世告諸大衆我滅度後告諸會衆如來滅後誰能護持讀説斯經誰能發心護持讀誦解説斯經今於佛前自説誓言今日自當於佛之前發深重願其多寶佛雖久滅度其多寶佛雖則久已入於滅度以大誓願而師子吼以其宿世大願力故於寶塔中作師子吼多寶如來及與我身所集化佛當知此意多寶遠來我身現在十方分身咸集此土本為何事當知如是深切之意諸佛子等誰能護法召諸大衆誰能為我誰持正法當發大願令得久住事行如彩願力如膠彩色無膠則不堅固唯膠無彩文相不彰有願無行但是虗言有行無願則不堅久行願相資方能成事欲護法者故佛勸令當發大願可使正法久住世間其有能護此經法者其有能佛子護此經則為供養我及多寶斯經中説佛及多寶所行之事隨佛所行名供養佛此多寶佛處於寶塔常遊十方此佛世尊在寶塔中常遊十方諸佛國土為是經故皆因為此法華經故亦復供養諸來化佛亦為奉供諸十方來分身化佛莊嚴光飾世界者即指化佛為嚴飾者佛國之中以佛菩薩而為莊嚴光飾世界能令見者發歡喜心若説此經則為見我多寶如來及諸化佛若有人能讀説此經深解義趣見佛法身則是得見釋迦多寶及以分身諸來化佛諸善男子各諦思惟告諸會衆善男子等各各諦聽善自思惟此為難事宜發大願此護持經是一難事若非忍厚勤加精進其孰能之宜當勇猛發大願誓以為基本諸餘經典數如恆沙諸方便教三乘經典其數甚衆如恆河沙雖説此等未足為難雖能説此方便三乘不了義教未為難也若接須彌若以手接須彌盧山擲置他方無數佛土亦未為難此舉世中人所難者皆不為難唯此惡世讀説斯經是則是難若以足指動大千界遠擲他國亦未為難如佛按指大千世界咸悉震動以至擲向他方國土此乃化現神通邊事不及弘經若立有頂為衆演説無量餘經亦未為難無色界天名為三界有為之頂若人立心於有為頂為諸大衆演説無量三乘方便不了義經亦未為難若佛滅後於惡世中能説此經是則為難佛滅濁世説此法華是則為難假使有人手把虗空而以遊行亦未為難虗空無相不可把捉縱能手把亦不為難於我滅後若自書持若使人書是則為難若佛滅後人根劣弱能弘此經勝把空者若以大地置足甲上升於梵天亦未為難梵天依空今以大地安足甲上而升於彼亦非難也佛滅度後於惡世中暫讀此經是則為難滅後惡世暫時之間能讀此經勝持地者假使劫燒簷負乾草入中不燒亦未為難劫燒起時負乾草入而不被焚固為難矣而亦非難我滅度後若持此經為一人説是則為難末劫持經下至但為一人而説亦勝負草入劫燒者若持八萬四千法藏十二部經為人演説八萬四千佛法藏者如來説法三百五十會一一會中皆具六波羅蜜三六十八計千八百又五六三百總成二十一百一一皆破四大六塵成二萬一千約貪嗔癡及等分三毒各具二萬一千總成八萬四千十二部經者一長行二重頌三授記四孤起五無問自説六因緣七譬喻八本事九本生十方廣十一未曾有十二論議佛所説法雖則無量圓攝所歸唯十二部經若持此等為人演説令諸聽者得六神通令彼聽衆獲六神通得阿羅漢雖能如是亦未為難説雖高妙而其聽衆但得小果未為難也於我滅後聽受此經問其義趣是則為難若聽斯經請問義趣如説修行則能成就佛果菩提故為難也若人説法令千萬億無量無數恆沙衆生若説法人能度如是無數衆生得阿羅漢具六神通六通之義如藥草中雖有是益亦未為難雖有如是小乘利益亦未為難於我滅後若能奉持如斯經典是則為難若持此經為諸人説則令其人得無上道是則為難我為佛道於無量土從始至今廣説諸經我為衆生得佛道故分身遍滿十方國土從始成道以至于今廣説無量諸餘經典而於其中此經第一於餘無量諸經典中此法華經最為第一若有能持則持佛身法華經體是佛法身能持是典則為見佛諸善男子於我滅後告諸會衆於佛滅後誰能受持讀誦此經問諸衆等有誰勇猛能任此責今於佛前自説誓言當於佛前自發深誓此經難持若暫持者我則歡喜諸佛亦然此經最難若暫持者佛及諸佛悉皆歡喜如是之人諸佛所歎如是末世持法華者常為諸佛之所贊歎是則勇猛是則精進能為難事則名勇猛一心不倦則名精進是名持戒行頭陀者持諸戒行即菩薩道行頭陀行即入佛乘則為疾得無上佛道則是速得無上佛道能於來世讀持此經能於未來讀誦受持此經典者是真佛子住淳善地則為真是如來之子住於慈悲淳善之位佛滅度後能解其義佛滅度後於此法華善解義味是諸天人世間之眼則是世間人天眼目於恐畏世能須臾説於佛滅後恐怖惡世能須臾間為人演説一切天人皆應供養一切世間若天若人皆應恭敬供養是人
