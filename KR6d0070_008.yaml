body:
  text: 錢塘廣照沙門釋聞達妙法蓮華經觀世音菩薩普門品第二十五世尊大慈依如實慧演説上乘圓融妙法清淨質直如蓮華王以教末世一切菩薩是故名曰妙法蓮華文詮此義名為經也觀音本是正法明王為度衆生依方便門隱實揚權現菩薩相無盡意者非不知之欲顯觀音普門示現大慈大悲不思議力故為衆生合掌請問爾時無盡意菩薩菩薩善能入佛知見通達無盡深妙之意即從座起心欲請法故從座起偏袒右肩表事師時便於執作合掌向佛而作是言合掌致敬向佛陳情世尊觀世音菩薩今此會中觀世音者以何因緣名觀世音名不虗得必有所由佛告無盡意菩薩因菩薩問故佛答之善男子若有無量百千萬億衆生受諸苦惱有諸衆生受苦惱時聞是觀世音菩薩一心稱名聞觀音名一心稱念觀世音菩薩即時觀其音聲皆得解脫聲屬耳聞今云觀者此是心聞菩薩慈悲以心觀聞而拔其苦若有持是觀世音菩薩名者若人持此菩薩名號設入大火火不能燒嗔火起時焚燒三界一念轉善火作池涼由是菩薩威神力故此由菩薩威神之力若為大水所漂貪水漲時沒溺世界一念知足業海乾枯稱其名號即得淺處聞聲察理漸際邊涯若有百千萬億衆生為求金銀琉璃硨磲碼瑙珊瑚琥珀真珠等寶琉璃石中之寶出波羅奈國此方有者以藥燒成像彼寶耳硨磲海中螺貝如車之渠碼瑙生於石中其色紅潤如馬之腦珊瑚生於海中狀如小樹琥珀千年茯苓之所變作真珠即蚌珠也入於大海為財販海假使黑風吹其船舫飄墮羅剎鬼國鬼國近於須彌山下人若入彼即為所害在事易明若表法者為貪財故入於欲海被無明風吹殼漏般飄墮三毒羅剎鬼國流而莫返溺苦海中其中若有乃至一人稱觀世音菩薩名者船中若有下至一人能稱觀世音菩薩名號是諸人等皆得解脫羅剎之難一人持名衆皆脫苦所謂一善能消百惡以是因緣名觀世音以能聞聲觀時救難故名觀音若復有人臨當被害謂當受戮臨命終時稱觀世音菩薩名者為苦所逼稱菩薩名彼所執刀杖尋段段壞而得解脫如孫敬德在獄持名臨刑刀壞事驗尤多若表法者惡念起處臨當喪身一念回光能行忍辱𮌎中釰戟無有不壞若三千大千國土滿中夜叉羅剎欲來惱人若諸國土所有惡鬼夜叉羅剎萌於惡意欲來相惱若表法者三千即是妄念之心惡毒如彼夜叉羅剎毒由心起反自惱身聞其稱觀世音菩薩名者是諸惡鬼尚不能以惡眼視之況復加害鬼雖獰惡聞菩薩名惡眼即閉不敢懷嗔況加殺害若表法者毒雖熾盛思菩薩時惡見即息況復興害設復有人若有罪若無罪杻械枷鎖檢繫其身若果有罪囚於囹圄若或無罪橫羅其殃稱觀世音菩薩名者若能稱念菩薩名者皆悉斷壞即得解脫杻即木杻械即匣床枷項鑽足以念菩薩威神之力皆悉脫壞若表法者惡念起時拘繫其身不得自在思惟菩薩惡念自灰遠離煩惱如脫杻械若三千大千國土滿中怨賊內則六賊外則冤盜有一商主將諸商人賫持重寶經過險路商主喻心王諸商喻心數賫持重寶喻拘佛往經過險路喻涉生死約事相説謂賊寇處主伴同行賫財度險其中一人作是唱言於其衆中一人作唱諸善男子勿得恐怖慰衆勿怖有方便門汝等應當一心稱觀世音菩薩名號勸衆一心同稱聖號是菩薩能以無畏施於衆生是觀世音能以安樂自在無畏施與一切汝等若稱名者汝等若能稱菩薩號於此怨賊當得解脫藉菩薩力可以脫災衆商人聞俱發聲言南無觀世音菩薩衆聞是語悉皆稱念稱其名故即得解脫三千界內六賊充滿但得一善以為主宰牽引餘心皆成善念則可保全如來重擔諸善法財智慧珍寶無盡意觀世音菩薩摩訶薩威神之力巍巍如是却敵曰威感應曰神解苦是力巍巍即是顯赫之狀上文歷舉能救諸難令得解脫故云如是若有衆生多於淫欲常念恭敬觀世音菩薩便得離欲多欲之時常能思念恭敬觀音修不淨觀是人則能離於淫欲若多瞋恚常念恭敬觀世音菩薩便得離瞋多嗔之時常行恭敬念觀音名修慈悲觀止於毒害則能離嗔若多愚癡常念恭敬觀世音菩薩便得離癡不識好惡多愚昧時常念觀音修因緣觀善知通塞則能離癡無盡意觀世音菩薩有如是等大威神力多所饒益能滅三毒獲清淨智名大威神饒益一切是故衆生常應心念以有益故衆生常當一心繫念若有女人設欲求男女人或願求生男子禮拜供養觀世音菩薩禮拜滅罪供養生福是得子因便生福德智慧之男禮供之故感生福德志誠之故感生智慧功由母德應在子身設欲求女便生端正有相之女由母心正女亦端正由母心慈女足相好宿植德本衆人愛敬感得宿生曾種福業人愛敬者以為其女無盡意觀世音菩薩有如是力隨人意願有求皆得若有衆生恭敬禮拜觀世音菩薩福不唐捐若能禮敬必得其福無有虗棄是故衆生皆應受持觀世音菩薩名號以福多故皆當受持無盡意若有人受持六十二億恆河沙菩薩名字若人持念諸菩薩名復盡形供養飲食衣服臥具醫藥復能終身四事供養於汝意云何是善男子善女人功德多不汝意如何是善男女持名供養衆多菩薩功德多不無盡意言甚多世尊答佛所問功德甚多佛言若復有人受持觀世音菩薩名號乃至一時禮拜供養若人受持觀音名號乃至少時禮敬奉供是二人福正等無異一人受持六十二億恆沙名號終身供養一人受持觀音名號一時供養如是二人所獲福德正好相等更無有異何故如是楞嚴云世尊我一名號與彼衆多名號無異由我修習得真圓通於百千萬億劫不可窮盡一時之福受用無窮無盡意受持觀世音菩薩名號得如是無量無邊福德之利顯示受持功德無量勸令歸散念觀世音無盡意菩薩白佛言前文是問菩薩云何名為觀音今此乃問緣何遊此云何度生欲顯菩薩普門示現大自在力故問起也世尊觀世音菩薩云何遊此娑婆世界問以何緣遊娑婆界云何而為衆生説法問以何法為衆生説方便之力其事云何遊行説法是其方便革凡成聖名方便力是二種事其相如何佛告無盡意菩薩善男子若有國土衆生應以佛身得度者若國土中有其衆生當以佛形得度脫者觀世音菩薩即現佛身而為説法現如來相引之入道應以辟支佛身得度者若有樂修緣覺獨覺即現辟支佛身而為説法隨類應現以順前機應以聲聞身得度者若有樂修四諦之道即現聲聞身而為説法現羅漢相以逗其機應以梵王身得度者若有離欲樂清淨者即現梵王身而為説法現梵天身説離欲法應以帝釋身得度者若有欲生忉利天者即現帝釋身而為説法現欲界身説十善法應以自在天身得度者欲身自在遊十方者即現自在天身而為説法現化樂天身説自在樂法應以大自在天身得度者欲身自在飛行虗空即現大自在天身而為説法現色究竟天身説諸禪三昧法應以天大將軍身得度者欲統鬼神護國土者即現天大將軍身而為説法現天大猛將身如散脂大將等為説救護衆生之法應以毗沙門身得度者欲統世界護衆生者即現毗沙門身而為説法為説治世護生之法應以小王身得度者欲為人王治國邑者即現小王身而為説法為説安國治民之法應以長者身得度者欲為重厚世所尊敬即現長者身而為説法為説重厚尊敬之法應以居士身得度者愛談名理語清淨自居者即現居士身而為説法為説清淨攝修之法應以宰官身得度者有愛治民剖判曲直即現宰官身而為説法為説公正清明之法應以婆羅門身得度者有愛數術攝衛自安即現婆羅門身而為説法為説養生息命之法應以比丘比丘尼優婆塞優婆夷身得度者有出家者樂持具戒有在家者樂五八戒即現比丘比丘尼優婆塞優婆夷身而為説法為説具戒五八戒法應以長者居士宰官婆羅門婦女身得度者有如上等四種婦人內政立身以修家國即現婦女身而為説法為説內助修身之法應以童男童女身得度者若有男子不壞男根若有女子愛樂處室即現童男童女身而為説法為説清淨童真之法應以天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等身得度者天即諸天天王及諸天子龍即諸大龍王及龍眷屬夜叉此云捷疾鬼乾闥婆此云樂神阿修羅此云無端正形狀醜故迦樓羅此云金翅鳥緊那羅此云歌神摩睺羅伽此云大莽蛇人即世人非人即是諸天修羅地獄餓鬼非同人類故曰非人是等八部樂脫其倫求入道者即皆現之而為説法各隨其類而説諸法應以執金剛神得度者即執寶杵以護法者即現執金剛神而為説法為説勇鋭護持之法無盡意是觀世音菩薩成就如是功德如是二字即指上文成就諸事功能德善以種種形遊諸國土即三十二應入國土身度脫衆生遍十方界尋聲赴感前文之中無盡意問觀音菩薩云何遊方為衆説法方便之力其義云何故以此答是故汝等應當一心供養觀世音菩薩由是菩薩德重慈深故勸一心修法供養是觀世音菩薩摩訶薩於怖畏急難之中能施無畏能於衆生怖畏急難施於無畏得大安樂是故此娑婆世界皆號之為施無畏者心險惡者衆生畏之菩薩慈忍見者獲安無盡意菩薩白佛言蒙如來勸令修供養故白世尊世尊我今當供養觀世音菩薩白佛知者擬欲行施即解頸衆寶珠瓔珞價直百千兩金而以與之解頸所嚴瓔珞之具極貴價者以奉觀音作是言仁者受此法施珍寶瓔珞事相布施有與者有受者有所施物內外中間三處皆實執相布施其福有限是有漏業報在人天法布施者見法空故無與者無受者無所施物三輪空寂離一切相施一人時如施一切施一切人與一人等以法供養心無所擇名為平等清淨法施時觀世音菩薩不肯受之觀音力辭不受所施無盡意復白觀世音菩薩言由不納故所以重白仁者愍我等故受此瓔珞行施之法為表捨心施而不受則不生福勸愍我等而為受之爾時佛告觀世音菩薩佛見施者辭意甚濃觀音辭讓而不領納所以告之當愍此無盡意菩薩及四衆僧尼士女天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等故受是瓔珞佛勸觀音愍衆納受即時觀世音菩薩愍諸四衆及於天龍人非人等受其瓔珞敬順佛意愍念衆生受無盡意所施瓔珞分作二分一分奉釋迦牟尼佛一分奉多寶佛塔施而不取表於知足不妄受也受已轉施奉佛表於世財無所吝也分二分者表平等施無所偏也施與佛者表無上施回因向果成佛道也無盡意觀世音菩薩有如是自在神力如前所舉總是菩薩自在無礙神通之力遊於娑婆世界前文之中無盡意問觀世音菩薩云何遊此娑婆世界故此結示以答來機爾時無盡意菩薩以偈問曰什師譯本即無重頌今此偈文是後來人以笈多本經中之偈入此本中相承傳誦世尊妙相具我今重問彼初句歎佛次句重問佛子何因緣名為觀世音問觀音名從何而得具足妙相尊偈答無盡意因菩薩問佛以偈答汝聽觀音行善應諸方所三十二應善化諸方弘誓深如海歷劫不思議廣大誓願深如巨海歷塵點劫莫能思議侍多千億佛發大清淨願侍奉無數千萬億佛發於廣大清淨誓願我為汝略説許為無盡説觀音行聞名及見身若聞彼名及見身相心念不空過一心繫念未嘗空過能滅諸有苦能滅三有一切苦惱此句總標下文別顯假使興害意推落大火坑假使有人興毒害意卒然推入大猛火坑念彼觀音力火坑變成池化諸熱惱為清涼池或漂流巨海龍魚諸鬼難黑風所吹大水所漂毒龍惡魚夜叉羅剎巨海諸難念彼觀音力波浪不能沒菩薩力故臨危得免或在須彌峯為人所推墮高峯頂上被人推墮念彼觀音力如日虗空住如日處空不致有損或被惡人逐墮落金剛山被惡人逐失足墮山念彼觀音力不能損一毛以念力故不損一毛或值怨賊擾各執刀加害怨家惡賊持刃損害念彼觀音力咸即起慈心念菩薩力怨賊興慈免加殺害或遭王難苦臨刑欲壽終犯罪至死念彼觀音力刀尋段段壞刀即段段自然損壞或囚禁枷鎖手足被杻械囹圄之難念彼觀音力釋然得解脫遇赦寬宥而得釋免呪詛諸毒藥所欲害身者口舌呪詛毒藥加臨念彼觀音力還著於本人譬如有人仰面唾天天既不受還墮面中或遇惡羅剎毒龍諸鬼等遇諸惡類欲害身者念彼觀音力時悉不敢害一時回心不敢加害若惡獸圍繞利牙爪可怖若虎狼等可怖畏者念彼觀音力疾走無邊方念菩薩力疾自走去蚖蛇及蝮蠍氣毒煙火然毒蟲之氣如煙火然念彼觀音力尋聲自回去念觀音力隨聲自去雲雷鼓掣電降雹澍大雨雲興雷震電光迸掣降雹澍雨損物之時念彼觀音力應時得消散即時晴霽免其災惱衆生被困厄無量苦逼身衆生被於窮困厄難無量衆苦逼切其身觀音妙智力能救世間苦世間厄難非智莫脫唯智乃能避凶趍吉故云智力能救諸苦具足神通力廣修智方便神通智慧皆悉具足廣修方便利益衆生十方諸國土無剎不現身十方剎海無不遍應種種諸惡趣地獄鬼畜生諸惡趣者即是三塗生老病死苦以漸悉令滅生老病死不能頓除故云以漸悉令除滅真觀清淨觀以真實智照真實理名為真觀了法空寂如太虗空名清淨觀廣大智慧觀以廣大智遍觀一切無不了了名智慧觀悲觀及慈觀以大悲心觀衆生苦拔其患難名曰悲觀以大慈心與衆生樂隨時制義名曰慈觀常願常瞻仰常常發願得獲瞻仰此勸修也無垢清淨光慧日破諸暗以無障垢清淨光耀智慧日輪破諸幽暗能伏災風火普明照世間善能降伏癡風嗔火以普明慧照諸世間悲體戒雷震菩薩之戒不殺生初悲則護生戒體淨故名聲遠聞如雷之震慈意妙大雲慈心與樂濟慧衆生妙如大雲遍覆一切澍甘露法雨口輪説法教化衆生如澍甘雨普潤一切滅除煩惱𦦨慈悲法味如雲雷雨滅煩惱焰與清涼樂諍訟經官處怖畏軍陳中有訟經官軍前怖畏念彼觀音力衆怨悉退散念觀音力衆怨自然悉皆退散妙音觀世音開悟一切微妙之音觀察世間赴感之音梵音海潮音清淨美妙如梵天音如大海潮普震之音勝彼世間音遠勝一切世間之音是故須常念以是之故常當稱念念念勿生疑一念疑心能為道障應當深信勿生疑惑觀世音淨聖觀音大士清淨至聖於苦惱死厄能為作依怙於諸衆生苦惱死厄能為救護作大依怙具一切功德慈眼視衆生具足神通智慧方便以慈悲眼等視衆生福聚海無量是故應頂禮菩薩之身即是智慧福德之聚深廣無量猶如大海是故應當恭敬頂禮爾時持地菩薩楞嚴云毗舍佛時曾為比丘平地待佛得蒙印證塵消智圓登無上覺名為持地即從座起前白佛言此品請主本無盡意今説經竟持地起身而白佛者蓋因在會聞説菩薩普門示現而讚善耳世尊若有衆生聞是觀世音菩薩品自在之業三業運用無往不通名為自在普門示現神通力者開方便門普現一切所喜見身神通妙用廣大力者當知是人功德不少若聞此品依而行之則發觀音普門智慧故云是人功德不少佛説是普門品時衆中八萬四千衆生于時在會聞法之者八萬四千衆生之性皆發無等等阿耨多羅三藐三菩提心無等等者佛之智慧最上最尊超過一切故無與等非不與諸究竟果佛悉皆平等此乃最妙無等之等故云無等等即無上道心也妙法蓮華經陀羅尼品第二十六普門品竟藥王請問若持是經得幾所福佛為發明藥王歡喜説陀羅尼以護持者勇施及以諸天天女亦皆説呪願欲護持故曰陀羅尼品然陀羅尼而有顯密顯即經文如圓覺云有陀羅尼名為圓覺密即呪語如今當品與説法者陀羅尼呪以守護之又陀羅尼翻為總持總攝二邊遮惡護善任持中道佛之正理於一法中具含多義能總能持名總持也爾時藥王菩薩即從座起偏袒右肩合掌向佛而白佛言避席起身偏袒合掌皎向於佛然後白言世尊若善男子善女人有能受持法華經者若善男女聞法信受憶持之者若讀誦通利對本曰讀背念曰誦無有忘失名為通利若書寫經卷若自書寫若教人書得幾所福如上之人得多少福佛告藥王若有善男子善女人供養八百萬億那由他恆河沙等諸佛舉供佛福比校持經於汝意云何其所得福寧為多不此人供養衆多諸佛所獲福德是為多不甚多世尊藥王答佛功德甚多佛言若善男子善女人能於是經乃至受持一四句偈持經四句言極少者讀誦解義讀誦偈句解其義理如説修行如偈所説依之修行文雖不多解行功德勝彼前人供佛之者功德甚多供養生福持經發慧以慧比福功德甚多爾時藥王菩薩白佛言聞經福勝所以白佛世尊我今當與説法者陀羅尼呪以守護之欲以妙呪護説法者即説呪曰安爾曼爾摩禰摩摩禰旨隸遮梨第賖咩賖履多瑋羶帝目帝目多履娑履阿瑋娑履桑履娑履叉裔阿叉裔阿耆膩羶帝賖履陀羅尼阿盧伽婆娑簸蔗毗叉膩禰毗剃阿便哆邏禰履剃阿亶哆波隸輸地歐究𨽻牟究隸阿羅隸波羅隸首迦差阿三磨三履佛陀毗吉利帙帝達磨波利差帝僧伽涅瞿沙禰婆舍婆舍輸地曼多邏曼哆邏叉夜多郵樓哆郵樓哆憍舍略惡叉邏惡叉冶多冶阿婆盧阿摩若那多夜呪是諸佛密語密默治惡惡自消散不可解釋世尊是陀羅尼神呪六十二億恆河沙等諸佛所説能持此呪則能轉彼六十二種我人知見成六十二佛之功德呪從諸佛之所傳來故云佛説若有侵毀此法師者若有侵犯毀訾受持法師之者則為侵毀是諸佛已則是已損此諸世尊時釋迦牟尼佛讚藥王菩薩言因説呪護所以讚之善哉善哉稱美之辭藥王汝愍念擁護此法師故此説蓮經法師之故説是陀羅尼即上呪語於諸衆生多所饒益以呪之故法師安樂善説諸法導利一切末世衆生饒益多矣爾時勇施菩薩白佛言勇説見佛讚美藥王故亦白佛願護持經世尊我亦為擁護讀誦受持法華經者説陀羅尼為護法師説於祕呪若此法師得是陀羅尼若持經者得此神呪若夜叉此云勇健若羅剎此云速疾鬼若富單那此云臭餓鬼即主熱病者若吉蔗此云所作即起尸鬼若鳩槃荼此云甕形即厭魅鬼若餓鬼等無飲食者伺求其短無能得便鬼祟害人隨短處入稍有所長不能為害即於佛前而説呪曰座隸摩訶座隸郁枳目枳阿隸阿羅婆第涅𨽻第涅隸多婆第伊緻抳韋緻抳旨緻抳涅𨽻墀抳涅梨墀婆底世尊是陀羅尼神呪恆河沙等諸佛所説亦皆隨喜如是神呪恆沙佛説傳之有自説此呪時諸佛亦皆為之隨喜若有侵毀此法師者若有侵害毀損法師則為侵毀是諸佛已則是已損恆沙諸佛爾時毗沙門天王護世者白佛言即是北方多聞天王世尊我亦為愍念衆生擁護此法師故天王護世愍念衆生若護法師經得流布則衆生類得大饒益説是陀羅尼以呪護之即説呪曰阿梨那梨䨲那梨阿那盧那履拘那履世尊以是神呪擁護法師説此呪者為護法師我亦自當擁護持是經者上以呪護今自身護令百由旬內無諸衰患令諸邪魅皆悉遠去百由旬外離諸衰惱爾時持國天王在此會中東方護世持國天王亦在此會與千萬億那由他乾闥婆衆此云樂神恭敬圍繞前詣佛所合掌白佛言世尊我亦以陀羅尼神呪擁護持法華經者天王白佛與所部衆亦願以呪護於法師即説呪曰阿伽禰伽禰瞿利乾陀利旃陀利摩蹬耆常求利浮樓莎抳頞底世尊是陀羅尼神呪四十二億諸佛所説四十即表住行向地二即等覺及以妙覺若有侵毀此法師者則為侵毀是諸佛已毀持經者則法不行法不流世誰知有佛若毀法師則已毀佛爾時有羅剎女等一名藍婆二名毗藍婆三名曲齒四名華齒五名黑齒六名多髮七名無厭足八名持瓔珞九名臯帝十名奪一切衆生精氣羅剎者噉人惡鬼也羅剎女者即是女鬼也十種名義或從相貌或從所為未見所出不可解也是十羅剎女與鬼子母鬼子母神并其子及眷屬五百鬼子及鬼屬也俱詣佛所同聲白佛言願欲擁護持法華者世尊我等亦欲擁護讀誦受持法華經者除其衰患欲以呪護令除衰惱若有伺求法師短者令不得便若有欲求法師短處而加害者令不得便即於佛前而説呪曰伊提履伊提泯伊提履阿提履伊提履泥履泥履泥履泥履泥履樓醯樓醯樓醯樓醯多醯多醯多醯兜醯䨲醯寧上我頭上莫惱於法師寧可上於我頭之上不可惱害説法之師若夜叉若羅剎若餓鬼若富單那若吉蔗已上名義如前已解若毗陀羅此云赤色鬼若犍馱此云黃色鬼若烏摩勒伽此云黑色鬼若阿跋摩羅此云青色鬼若夜叉吉蔗若人吉蔗此云起尸鬼人及夜叉皆此鬼相若熱病若一日若二日若三日若四日若至七日謂前諸鬼興災害人若常熱病常興熱病以損於人若男形鬼現男形若女形鬼現女形若童男形若童女形種種變現惑於人乃至夢中亦復莫惱有托夢中惱害人者亦復不許即於佛前而説偈言若不順我呪惱亂説法者若不隨順我之呪禁而輒惱害説法之者頭破作七分如阿梨樹枝令其頭破而作七分如彼七義阿梨樹枝如殺父母罪罪過深重與五逆等亦如壓油殃外國作油先搗麻碎令其生蟲然後並蟲一時壓之務得多油及以肥美以損命故罪業尤重謗法殃禍亦如彼人斗稱欺誑人亦如市肆輕稱小斗欺瞞誑惑他人之罪調達破僧罪調達破僧生身陷入阿鼻地獄此罪亦爾犯此法師者當獲如是殃若有侵犯此法師者當獲如上深重之殃諸羅剎女説此偈已白佛言前以咒護其次白佛當身護持世尊我等亦當身自擁護受持讀誦修行是經者受持讀誦即是學法如經履鍊名曰修行令得安穩離諸衰患消衆毒藥令持經者心得安隱遠離一切衰惱憂患一切毒藥入此人口皆成甘露佛告諸羅剎女善哉善哉鬼女噉人及食精氣今乃發心擁護大教及持法人大似火中生出蓮華故佛讚曰善哉善哉汝等但能擁護受持法華名者福不可量汝但能護持經名者所得福德已不可量何況擁護具足受持況能擁護持全部者供養經卷及護供養經卷之人華香瓔珞若華若香及以瓔珞抹香塗香燒香細末之香及塗身香幡蓋伎樂或施幡蓋及獻伎樂燃種種燈即下所列蘇燈油燈諸香油燈以諸香油然燈供養蘇摩羅華油燈此云善攝意華瞻蔔華油燈此云金色華智論翻黃華樹形高大婆師迦華油燈此云夏生華色黃白而香優鉢羅華油燈此云青蓮華蓮本無油以蓮薰之如是等百千種供養者有如是等供養經者臯帝汝等及眷屬汝等即十羅剎女眷屬即鬼子母等應當擁護如是法師有能持經及修供養汝等應當擁護是人説此陀羅尼品時佛説是時六萬八千人得無生法忍若表法者六根八識咸得清淨了知衆生及無情法畢竟本空入無生忍妙法蓮華經妙莊嚴王本事品第二十七妙莊嚴王本事品者説妙莊嚴往昔世中曾為國王本所作事此品之來無人請問佛自為説意顯弘經供養持者二種功德不可思議以勸流通其王有妻名曰淨德復有二子淨藏淨眼此四人者宿因本是同修道侶為辦衣食道業難成一人發心為求供給三人勤修得成聖果其一營事福報為王此三人者追念其恩意欲誘引令得出離復相謂言是王著欲而又信邪自非妻子何由感動遂即托緣隨意化現一人為妻二人為子方便誘之回邪入正下文會通昔妙莊嚴王今華德是淨德夫人今莊嚴相是淨藏淨眼即此會中藥王藥上菩薩是爾時佛告諸大衆乃往古世過無量無邊不可思議阿僧祇劫佛告衆言過去久遠不可思議阿僧祇劫有佛名雲雷音宿王華智義約佛身如雲普覆一切佛之妙音如雷普震相好具足面貌端嚴如月天子星宿中王衆善莊嚴如華遍布惑盡解滿智慧無邊多陀阿伽度此云如來即佛法身阿羅訶此云應供應受世供三藐三佛陀此云正等正覺國名光明莊嚴以佛光明而自莊嚴劫名喜見時世升平人所喜見彼佛法中宿王華智正法之中有王名妙莊嚴以衆妙善而共莊嚴其王夫人名曰淨德其德真淨故曰淨德有二子一名淨藏能解無邊清潔法藏二名淨眼善能徹見大智慧海是二子有大神力福德智慧本是菩薩有大神通福德智慧皆悉具足方便化現示為王子久修菩薩所行之道久劫精修菩薩所行清淨之道所謂檀波羅蜜此云布施為破慳貪尸羅波羅蜜此云持戒為止諸惡羼提波羅蜜此云忍辱為治凶暴毗離耶波羅蜜此云精進為除怠墮禪波羅蜜此云寂定無攝散亂般若波羅蜜此云智慧為斷愚癡方便波羅蜜隨機善巧修己利他名為方便以善修故得度生死到於彼岸名波羅蜜慈悲喜捨即四無量心以慈心故與一切樂以悲心故拔一切苦以喜心故見人歡喜以捨心故隨求與之乃至三十七品助道法三十七品在小乘中名為正道在大乘中名為助道良由道性本具匪由造作修諸道行但是助成所謂四念處四正勤四如意足五根五力七菩提八正道總三十七名為道品避繁不解皆悉明了通達悉能明了通達無礙又得菩薩淨三昧內外無垢淨如琉璃即清淨定日星宿三昧大解如日細智如星照了無遺名為三昧淨光三昧清淨慧光寂而常照淨色三昧了色性空不住於相淨照明三昧淨是定體照明是用長莊嚴三昧常修正定以為莊嚴無有間斷大威德藏三昧大威服衆大德利生名大寶藏從禪定生於此三昧亦悉通達凡諸正定悉能通達爾時彼佛欲引導妙莊嚴王佛愍嚴王信邪之故欲導以正及愍念衆生故又為愍念一切衆生在迷之故説是法華經於大衆中演説是經時淨藏眼二子到其母所淨德之前合十指爪掌白言十指兩掌一時俱合願母往詣雲雷音宿王華智佛所勸母見佛我等亦當侍從親近供養禮拜我當侍母親近供養禮拜於佛所以者何出勸往意此佛於一切天人衆中説法華經宜應聽受以是之故勸母往也母告子言汝父信受外道信受外道邪師之教深著婆羅門法於婆羅門所行之法深生樂著汝等應往白父與去俱去父既不信云何容去汝往白父化令同往淨藏淨眼合十指爪掌白母母令勸父故再白之我等是法王子而生此邪見家我等本是法王之子不幸而生此邪見家母告子言汝等當憂念汝父為現神變母知二子有大神力令現神變以感動之若得見者心必清淨善法難入若見神通乃可受化或聽我等往至佛所或可聽許我與汝等往詣佛所於是二子念其父故母令憂念所以念之踊在虗空高七多羅樹一多羅樹高於七尺踊身虗空高五丈計現種種神變示現種種神通變化於虗空中行住坐臥現四威儀依空之相身上出水身下出火水上火下身下出水身上出火水下火上或現大身滿虗空中而復現小小復現大菩薩所證自在神通大包虗空細入無間於空中滅忽然在地空中隱去地上現身入地如水履水如地入地如水不見有礙履水如地不見虗浮現如是等種種神變即十八變令其父王心淨信解所以現相意令父王心得清淨生正信解時父見子神力如是心大歡喜得未曾有有生以來所未見者合掌向子言汝等師為是誰誰之弟子見其神異知必有師問誰弟子皆欲知之二子白言大王彼雲雷音宿王華智佛指所事師今在七寶菩提樹下法座上坐指所住處於一切世間天人衆中指所有衆廣説法華經指所説法是我等師我是弟子答父所問父語子言我今亦欲見汝等師可共俱往因覩神異知德尊嚴故欲與子俱往見之於是二子從空中下收攝神變還復本形到其母所合掌白母化父從己往白母知父王今已信解堪任發阿耨多羅三藐三菩提心言父已解堪發道心我等為父已作佛事如上現通名作佛事願母見聽於彼佛所出家修道願母見許往彼修道爾時二子欲重宣其意以偈白母再以意白願母放我等出家作沙門求母放捨出俗為僧諸佛甚難值我等隨佛學諸佛出世值遇甚難我等願得隨佛學道如優曇波羅值佛復難是優曇鉢華此云瑞應般泥洹經云閻浮提內有大樹王名優曇鉢羅有實無華優曇鉢樹有金華時世乃有佛言佛難值亦如曇華脫諸難亦難願聽我出家脫離世間一切患難亦復是難願聽我等出家行道母即告言聽汝出家許從汝意所以者何佛難值故所以聽許為佛難逢於是二子白父母言父母既聽勸同見佛善哉父母願時往詣雲雷音宿王華智佛所親覲供養恭敬親近修法供養所以者何佛難得值如優曇鉢羅華言難得見又如一眼之龜值浮木孔龜只一目漂大海中欲值浮木得孔安身甚難可得人懷偏見溺生死海欲值應身得法解脫此亦甚難而我等宿福深厚生值佛法我等福厚幸遇世尊是故父母當聽我等令得出家志在於道所以者何諸佛難值時亦難遇一為佛難逢二為時難遇彼時妙莊嚴王後宮八萬四千人皆悉堪任受持是法華經由王著欲八萬四千迷惑之人同在後宮善心一生無惡不轉故諸宮女皆願持經淨眼菩薩於法華三昧久已通達經云不染世間法如蓮華在水多聞總持善解佛語此即法華正定淨藏菩薩已於無量百千萬億劫通達離諸惡趣三昧經云又見佛子心無所著以此妙慧求無上道此即離諸惡趣正定欲令一切衆生離諸惡趣故菩薩之心先人後己修此正定欲諸衆生離惡趣故此定成時法界有情同時解脫其王夫人得諸佛集三昧住正定時十方諸佛集在目前能知諸佛祕密之藏性雖本空不妨常用用而常空而不住相視之不見聽之不聞在動用中而收不得名為諸佛祕密之藏二子如是謂得三昧以方便力善化其父現通等事無非方便善能如是化誘父王令心信解好樂佛法令父心信解了佛法而生愛樂於是妙莊嚴王與群臣眷屬俱王及群臣與夫宗族一切眷屬淨德夫人與後宮采女眷屬俱夫人同諸采女眷屬其王二子與四萬二千人俱王子從母求欲出家受持戒行四萬二千福河同注表戒學也一時共詣佛所同往見佛到已頭面禮足繞佛三匝却住一面到佛所已加敬作禮繞三匝者表心戀慕住一面者欲聞法故爾時彼佛為王説法佛為嚴王應機説法示教利喜開示教道利益令喜王大歡悅王聞法音深心信解生大喜悅爾時妙莊嚴王及其夫人解頸真珠瓔珞價直百千以散佛上敬佛之故捨嚴身具貴價之物而行布施於虗空中化成四柱寶臺達法空故住於空中由四弘誓化成四柱處法空座名為寶臺臺中有大寶牀敷百千萬天衣於空寂理安處法座名為寶床無邊忍辱慚愧之服以為莊嚴名曰天衣其上有佛結加趺坐座上之佛即正因性加趺坐者示無動搖放大光明慧光發明即了因性現斯瑞相即緣因性爾時妙莊嚴王作是念佛身希有端嚴殊特王見瑞相作是念言佛身罕有端正殊妙成就第一微妙之色如來成就微妙色身最為第一自餘衆生無與等者時雲雷音宿王華智佛告四衆言四衆受法皆佛弟子所以告之汝等見是妙莊嚴王於我前合掌立不佛問四衆王立我前還知意不此王於我法中作比丘言當出家精勤修習助佛道法無上大覺名為正道習諸道品名為助道當得作佛號娑羅樹王娑羅樹者其性堅實冬夏不雕為木中王王心堅固精勤行道是故作佛號娑羅王國名大光從解入道所依之國故名大光劫名大高王時節最好比之餘劫皆所不及名大高王其娑羅樹王佛有無量菩薩衆及無量聲聞言所化衆其數甚多其國平正功德如是因心平易正直無私所應化方坦然平正其王即時以國付弟捨人王住與夫人二子并諸眷屬所從之衆於佛法中出家修道於彼佛會正法之中清淨出家修菩薩道王出家已於八萬四千歲出家之後終身在道常勤精進修行妙法華經謂常修習法華三昧過是已後得一切淨功德莊嚴三昧前與授記是未來事此證三昧是現世修以淨信心修諸功德故於定中獲此三昧即升虗空高七多羅樹而白佛言舉身騰空離地五丈世尊此我二子已作佛事謂二聖子所現佛事以神通變化轉我邪心王本信邪見子現通知佛殊勝即轉邪心令得安住於佛法中得見世尊令我得於佛法之中安住其心得見我佛此二子者是我善知識二子實是我善知識為欲發起宿世善根如前所舉同修之終饒益我故來生我家王勤修進得宿命通知其妻子是昔善友為欲饒益方便受生爾時雲雷音宿王華智佛告妙莊嚴王言如是如是如汝所言佛告嚴王如汝所言其事實爾若善男子善女人種善根故若善男子能種善根以是之故世世得善知識世世得遇諸善知識其善知識能作佛事知識善能作諸佛事示教利喜令入阿耨多羅三藐三菩提開示教導令入正覺大王當知善知識者是大因緣內有宿因外感善緣因緣之義通包大小善知識者非小因緣所謂化導令得見佛發阿耨多羅三藐三菩提心化令見佛發大道心所以名為大事因緣大王汝見此二子不汝還見子宿因緣不此二子已曾供養六十五百千萬億那由他恆河沙諸佛親近恭敬六十者表六波羅蜜五者表五位善因一外凡二內凡三見道四修道五無學道百千萬億者一一行中具無邊行善修其心住於正法名為親近恭敬供養無量無數百千諸佛於諸佛所受持法華經以如實心修如實慧名於佛所持法華經愍念邪見衆生令住正見愍念衆生著於邪見所以化之令歸正道妙莊嚴王即從虗空中下而白佛言收攝神通復還地上啓白世尊世尊如來甚希有言希有者一則難遇時乃一出二則端嚴相好無比以功德智慧故以二種故所以如此一則具修五度成就福德二則行深般若成就智德頂上肉髻光明顯照一歎肉髻無與等倫二歎光明從肉髻出顯照一切其眼長廣而紺青色眼生長廣是智慧相紺琉璃色是慈悲相眉間毫相白如珂月兩眉中間白毫之相色如珂貝淨如滿月齒白齊密常有光明齒不黃黑亦不參差鮮白淨潔密而齊整常有光明唇色赤好如頻婆果此云相思果色丹紅潤可喻口唇爾時妙莊嚴王讚歎佛如是等如上所説希有之事無量百千萬億功德已所修之功所成之德於如來前一心合掌復白佛言先歎佛已復述其意世尊未曾有也歎所未有如來之法如來所證真淨大法具足成就不可思議微妙功德無法不具不可思議微妙功德悉皆成就教戒所行安穩快善教導戒約菩薩所行安隱受樂快得善利我從今日不復自隨心行不復隨順自心所行不生邪見憍慢嗔恚諸惡之心邪見不生則入正道憍慢不生則能恭敬嗔恚不生則慈悲起對佛立誓除諸惡心説是語已禮佛而出聞法得記讚佛發願能事已畢禮辭而退佛告大衆於意云何妙莊嚴王豈異人乎今華德菩薩是其淨德夫人今佛前光照莊嚴相菩薩是今法華會光照莊嚴即是昔世淨德夫人哀愍妙莊嚴王及諸眷屬故於彼中生為愍嚴王及王眷屬示現受生其二子者淨藏淨眼今藥王菩薩藥上菩薩是即此二子是藥王藥上菩薩成就如此諸大功德已歷劫之前已能成就衆多無量諸大功德於無量百千萬億諸佛所又於無量百千佛所植衆德本大菩提心四弘六度是諸菩薩植德之本成就不可思議諸善功德由植善故成就衆德若有人識是二菩薩名字者若人識此二菩薩名亦於佛門可以趣入一切世間諸天人民亦應禮拜能敬持名而行禮拜則是入道最初方便佛説是妙莊嚴王本事品時八萬四千人遠塵離垢八萬四千塵勞煩惱悉得斷除離諸障垢於諸法中得法眼淨楞嚴云想相為塵識情為垢二俱遠離則汝法眼應時精明妙法蓮華經普賢菩薩勸發品第二十八普賢菩薩本生東方寶威德佛淨妙國土遙聞靈鷲説法華經與諸大衆俱時至此為欲聽法勸發道心爾時普賢菩薩化被衆生慈臨一切德鄰極聖故曰普賢以自在神通力善功發用自在無礙神通之力威德名聞以威力故能伏魔怨以德善故普化一切名聲遠布聞於十方與大菩薩無量無邊不可稱數同衆多故無有邊量稱量莫盡非數可知從東方來從彼東土來至此方所經諸國所經由處普皆震動大地震動表破無明雨寶蓮華從真空性起一念善如空雨華作無量百千萬億種種伎樂意如伎兒和氣名樂又與無數諸天龍夜義此云捷疾鬼乾闥婆天帝樂神阿修羅此云無端正即好鬬諍者迦樓羅此云金翅鳥緊那羅此云歌神天帝作樂即用此部摩睺羅伽此云大蟒蛇人世間之人非人等天修鬼獄總名非人大衆圍繞衆擁普賢各現威德神通之力各各自現威神德用到娑婆世界娑婆此云堪忍衆生堪能忍衆苦故耆闍崛山中此云靈鷲頭面禮釋迦牟尼佛頭面接足頂禮世尊右繞七匝旋繞表敬白佛言先禮次言世尊我於寶威德上王佛國言其來處佛性尊貴名之為寶威德中勝名曰上王遙聞此娑婆世界説法華經天耳遠聞與無量無邊百千萬億諸菩薩衆共來聽受言所以來為欲聽法唯願世尊當為説之願佛為説若善男子善女人於如來滅後佛滅後者普賢之意正為末法善男信女求聞法要云何能得是法華經有何方便能得是經佛告普賢菩薩若善男子善女人成就四法四方便法如下自明於如來滅後當得是法華經有方便慧可得是經一者為諸佛護念心歸於佛則為諸佛之所護念二者植衆德本諸修行人以德為本種諸善根名植德本三者入正定聚正以簡邪聚包諸定心散佛隱入定佛現四者發救一切衆生之心前三種法悉是自利今此第四正是利他善男子善女人如是成就四法如經而修於如來滅後必得是經此結答也爾時普賢菩薩白佛言普賢白佛願欲守護世尊於後五百歲經明五五百歲第一五百解脫堅固第二五百禪定堅固第三五百持戒堅固第四五百多聞堅固第五五百鬪諍堅固今景定辛酉於後五百已過二百一十一載即斯時也濁惡世中即劫濁見濁煩惱濁衆生濁命濁五濁惡世也其有受持是經典者有人如上能持是經我當守護除其衰患令得安穩普賢願欲為之守護除其衰惱令其得獲身心安隱使無伺求得其便者鬼常伺候求欲害人菩薩護故令不得便若魔即魔王居欲界頂者若魔子魔王之子若魔女魔王之女若魔民魔所有衆若為魔所著者人被魔著復來魅人若夜叉此云捷疾鬼也若羅剎此云暴尸鬼若鳩槃茶此云厭魅鬼若毗舍闍此云噉精氣鬼若吉蔗此云起尸鬼若富單那此云臭餓鬼即行熱病者若韋陀羅等此云妙善即厭禱鬼諸惱人者皆不得便使一切鬼皆不能害是人若行若立讀誦此經隨意讀誦不拘行立我爾時乘六牙白象王普賢乘象以表大行牙喻六根白表純淨與大菩薩衆俱詣其所舉衆皆至誦經人所而自現身供養守護不求而應名為自現三業加敬名為供養間邪存善名為守護安慰其心軟語慰喻以安其心亦為供養法華經故亦是為供法華之故是人若坐思惟此經端坐諦審名曰思惟爾時我復乘白象王現其人前前護行立即散心人今護端坐即定心人其人若於法華經有所忘失一句一偈其持經人若有脫忘我當教之與共讀誦還令通利慈力所加令無忘失爾時受持讀誦法華經者得見我身得見菩薩為現色身甚大歡喜轉復精進其心喜故倍加精進以見我故即得三昧此云正定及陀羅尼此云總持總攝空有遮惡護善名為旋陀羅尼周旋解了無所不通百千萬億旋陀羅尼從於一法演出無數百千萬億陀羅尼門法音方便陀羅尼於法音中善解方便得如是等陀羅尼諸總持門其數無量略舉二種故云等也世尊若後世後五百歲濁惡世中言後世者即佛滅後後五百者即今之世言濁惡者如前已解比丘比丘尼優婆塞優婆夷僧尼士女四衆弟子求索者求覓經者受持者以心領受憶持之者讀誦者對本明讀及背誦者書寫者若自書寫若倩人書欲修習是法華經欲依此經修習行法於三七日中應一心精進要期三七攝淨一心滿三七日已修期滿日我當乘六牙白象與無量菩薩而自圍繞與衆圍繞至行人所以一切衆生所喜見身衆生喜見上妙色身現其人前而為説法示教利喜現身開示教訓利益令生歡喜亦復與其陀羅尼呪亦復與説陀羅尼呪以守護之得是陀羅尼故無有非人能破壞者神呪力故魔不能壞亦不為女人之所惑亂身得法持色所不劫我身亦自常護是人我亦以身常護其人唯願世尊聽我説此陀羅尼呪示不專擅求佛聽許即於佛前而説呪曰阿檀地一檀陀婆地二檀陀婆帝三檀陀鳩賖隸四檀陀修陀隸五修陀隸六修陀羅婆底七佛馱婆羶禰八薩婆陀羅尼阿婆多尼九薩婆婆沙阿婆多尼十修阿婆多尼十一僧伽婆履叉尼十二僧伽涅伽陀尼十三阿僧祇十四僧伽波伽地十五帝隸阿惰僧伽兜略阿羅帝波羅帝十六薩婆僧伽地三摩地伽藍地十七薩婆達磨修波利剎帝十八薩婆薩埵樓馱憍舍略阿䨲伽地十九辛阿毗吉利地帝二十一切神呪是佛密語密默治惡自消散不可解説所以不翻世尊若有菩薩得聞是陀羅尼者以呪難聞若有聞者當知普賢神通之力皆菩薩力之所加被若法華經行閻浮提閻浮樹名此云勝金樹近河邊果熟落水染沙成金為紫磨色提字翻洲即是南方贍部洲也有受持者應作此念皆是普賢威神之力令思所自若有受持讀誦正憶念即正思惟解其義趣善解經義趣佛之道如説修行如經所説修心行之當知是人行普賢行是人所行即普賢行於無量無邊諸佛所深種善根已於無邊諸佛之所深種菩提善根種子為諸如來手摩其頭得諸如來權智之手摩於菩薩實智之頂若但書寫但是書寫未能憶持讀誦解義是人命終當生忉利天上忉利此云三十三天散心修善得生欲界是時八萬四千天女作衆伎樂而來迎之以書經福得生天上感諸天子伎樂來迎其人即著七寶冠於采女中娛樂快樂采女娛樂暢快其心何況受持讀誦正憶念解其義趣如説修行若有人受持讀誦解其義趣其功尤勝是人命終為千佛授手命終得佛授手提携令不恐怖使得心安不墮惡趣離四惡趣即往兜率天上兜率此云知足天彌勒菩薩所此云慈氏菩薩彌勒菩薩有三十二相大菩薩衆所共圍繞勝友會同有百千萬億天女眷屬而於中生此乃兜率外院凡夫天也若是內院則無女人有如是等功德利益明功益多是故智者應當一心自書若使人書倩人為書受持讀誦正憶念如説修行書寫受持讀誦解説是開解也如説修行即起行世尊我今以神通力故守護是經願以通力而守護之於如來滅後末法之世閻浮提內所流行處廣令流布使不斷絶令經廣布解行不絶則得佛種相續不斷爾時釋迦牟尼佛讚言美其願力所以稱讚善哉善哉普賢汝能護助是經却除魔惱名之為護勸進修善名之為助令多所衆生安樂利益一人持經不惱一切令多所衆皆得安樂汝已成就不可思議功德汝久已成不思議力深大慈悲慈能與樂悲能拔苦拔二死苦與三德樂名為深大從久遠來發阿耨多羅三耨三菩提意久已發起無上道意而能作是神通之願守護是經作神通願護法受生我當以神通力守護能受持普賢菩薩名者我亦當護有能受持汝之名者普賢若有受持讀誦正憶念修習書寫是法華經者能行是者當知是人則見釋迦牟尼佛經文即是如來法身其見法者則是見佛如從佛口聞此經典雖生末世信得經文則與親聞等無有異當知是人供養釋迦牟尼佛隨順佛語名供養佛當知是人佛讚善哉所行如法為佛稱讚當知是人為釋迦牟尼佛手摩其頭得佛權智摩實智頂如手摩頭當知是人為釋迦牟尼佛衣之所覆忍辱名衣力能忍受遮惡不生名佛衣覆如是之人如上行人不復貪著世樂以法自娛不貪世味不好外道經書手筆心不好樂外道經書亦不好其製作手筆亦復不喜親近其人狎邪長惡故不喜近及諸惡者一切為惡不善之者若屠兒殺生之者若畜豬羊雞狗為利養生初非善類若獵師捕生之人若衒賣女色以色衒賣非良人也是人心意質直是持經人心誠意正質朴端直有正憶念恭默思道心無妄念有福德力以福力故遠離障惡是人不為三毒所惱心常有道三毒不生亦不為嫉妬害賢曰嫉忌色曰妬我慢邪慢持己陵他名為我慢著邪侮正名為邪慢增上慢所惱持己增勝下視他人名增上慢以福德故如上諸過所不能惱是人少欲知足於未得者不生希望名為少欲於現在者隨分省儉名為知足能修普賢之行能忍逆順能離過惡以此修心名普賢行普賢若如來滅後後五百歲如前已解若有人見受持讀誦法華經者見持經人應作是念此人不久當詣道場得入佛道名詣道場破諸魔衆破不善境諸魔怨衆得阿耨多羅三藐三菩提得成無上正等正覺轉法輪以佛之法展轉度化名轉法輪擊法鼓以大音聲演説諸法名擊法鼓吹法螺樂中吹螺即是改號隨機改轉名吹法螺雨法雨説法利生令成善種如澍甘雨增長芽莖當坐天人大衆中師子法座上師子座者以表威德獸王一吼百獸皆怖法音一震萬類共聞普賢若於後世受持讀誦是經典者末世持經行道之人是人不復貪著衣服臥具飲食資生之物前文所明於外境上不生貪著今此所明於受用上不起貪心所願不虗隨有所願實稱其心亦於現世得其福報上明來生此説現報若有人輕毀之言汝狂人耳毀持經人名為狂者空作是行終無所獲空作無獲謗無因果如是罪報當世世無眼輕人毀法壞他正見故感無目彰罪深也非止一生故云世世若有供養讚歎之者若見持經供養讚歎當於今世得現果報現世即報感應速也若復見受持是經者見有持者出其過惡揚其短處若實若不實實猶得罪況復謗他此人現世得白癩病以惡加人令他遭玷身病白癩罪是自貽若有輕笑之者輕陵取笑持經之者當世世牙齒疏缺輕毀牙疏戲笑齒缺醜脣平鼻唇如吹火下垂上縮鼻梁不起即匾㔸也手腳繚戾行用非正病見手足眼目角𣍿眼生三角或復轉晴身體臭穢毒氣傷人感身臭穢惡瘡膿血心毒惡瘡語毒膿血水腹短氣因時氣怒果時水腹因時短倩果時氣促諸惡重病謗法謗人造諸重過故感如是諸惡病緣非從天降非從地涌亦非人與業使然也是故普賢若見受持是經典者毀既罪深敬則福厚當起遠迎見當起身遠去迎接當如敬佛以無佛時此人弘經替佛補處當如敬佛説是普賢勸發品時佛説是時恆河沙等無量無邊菩薩恆河之沙其細如麵舉河沙數喻菩薩者言其多也得百千萬億旋陀羅尼此云旋總持由敬信心發生智慧於一法中解無量義曰旋總持三千大千世界微塵等諸菩薩如以三千大千世界抹為微塵以喻得道菩薩之數具普賢道因聞妙法是諸菩薩皆得具足普賢之道佛説是經時普賢等諸菩薩大菩薩衆舍利弗等諸聲聞大聲聞衆及諸天龍人非人等八部之衆一切大會皆大歡喜聞法得益心大喜悅受持佛語語即此經信力故受念力故持作禮而去聞法既周合掌敬禮却行而退
