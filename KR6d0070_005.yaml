body:
  text: 錢塘廣照沙門釋聞達妙法蓮華經提婆達多品第十二提婆達多即調達也此云焦熱斯人生時三十三天心皆焦熱以其生下欲破佛法故心焦也如此解者是約小乘迹門中說今約大教發迹顯本乃足如來昔世之師因是人故得成正覺明此品者正顯法華於諸經中最為第一若持此經則成佛道爾時佛告諸菩薩及天人四衆當寶塔品說竟之時告諸菩薩及天人衆吾於過去無量劫中昔過去無量世時求法華經無有懈倦尋求法華未嘗倦怠於多劫中常作國王曾於多劫為國王身發願求於無上菩提心不退轉發願欲求成佛之道而心未嘗有退墮者為欲滿足六波羅蜜為欲修行滿六度故勤行布施心無吝惜六度之中布施為首檀波羅蜜攝一切行故說勤施無所吝惜是教世人立行之本象馬七珍國城妻子奴婢僕從此外財也頭目髓腦身肉手足不惜軀命此內財也隨有求者皆施與之時世人民壽命無量彼過去時人民壽長劫數無量言其難捨為於法故捐捨國位委政太子為欲求於妙法之故即時棄捨國王之位以諸國政委於太子擊鼓宣令四方求法擊於大鼓宣布號令四出訪求微妙之法誰能為我說大乘者誰有能為說大乘法吾當終身供給走使言終身者非是暫時言走使者為供僕從若不謙卑焉得聞法若不忍耐豈能勤苦此為世人起模𦘕聖賢令求道者法則時有仙人來白王言因宣令故所以來也我有大乘名妙法蓮華經彼仙人云我有大教名妙法華若不違我當為宣說若能不敢違逆於我當與宣說王聞仙言歡喜踊躍時王聞是仙人之言得遂所願其心歡喜不覺踊躍即隨仙人供給所須即時隨侍此之仙人如其所須皆為供給採果汲水拾薪設食隨時執作道人家風林端採果㵎下汲泉山上拾柴厨中設食是種皆為乃至以身而作床座身心無倦身為座者如肩荷擔備歷艱苦忍耐疲勞為於法故身心無倦于時奉事經於千歲經時浸久終始一如為於法故精勤給侍令無所乏為欲從師求法之故身心精勤給侍走使所須皆辨令不缺乏爾時世尊欲重宣此義而說偈言我念過去劫為求大法故佛念過去久遠劫中為欲求於大乘之法雖作世國王不貪五欲樂雖為世王能離欲樂五欲者色聲香味觸椎鍾告四方前云擊鼓此說椎鍾為法之深鍾鼓皆作誰有大法者若為我解說身當為奴僕捨身為法不見疲勞時有阿私仙來白於大王阿私此云長壽仙人因王求故來白王言我有微妙法世間所希有微妙之法是我所持世間希有若能修行者吾當為汝說若能行者當為說之先擇其人所堪可者時王聞仙言心生大喜悅王聞仙言心喜踊躍即便隨仙人供給於所須隨侍其人給以所須採薪及果蓏隨時恭敬與蓏即瓜菜之屬隨時所須皆給與之情存妙法故身心無懈倦存情為法終不倦怠普為諸衆生勤求於大法心在利生不務專己以是之故勤求大法亦不為己身及以五欲樂亦非自為及求欲樂故為大國王勤求獲此法舊為國王獲得此法遂致得成佛今故為汝說因法修行今遂成佛法如是妙故為汝說佛告諸比丘語諸會衆爾時王者則我身是時求法王今釋迦是時仙人者今提婆達多是彼時仙人即今調達由提婆達多善知識故因彼提婆善知妙法識通塞故令我具足六波羅蜜即六度行慈悲喜捨即四無量心也三十二相八十種好成應化身諸相好也紫磨金色身如金色十力四無所畏如佛十力及四無畏四攝法菩薩四法攝化衆生十八不共佛十八法不共三乘神通道力佛之妙通及至道力此等法相並在前文尋之可見成等正覺廣度衆生於今成佛廣度一切皆因提婆達多善知識故推思有自已得成佛功由於師告諸四衆提婆達多却後過無量劫從是以去經無量劫當得成佛號曰天王佛德至大天中之天故曰天王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如序品解世界名天道世界清淨修天之道故曰天道時天王佛住世二十中劫器界一增減名為一小劫成住壞空八十小劫名一中劫天王佛壽其量如是廣為衆生說於妙法住世既久說法彌多恆河沙衆生得阿羅漢果度如是等聲聞之衆無量衆生發緣覺心度如是等辟支佛衆恆河沙衆生發無上道心得無生忍住不退轉度如是等菩薩之衆無生忍者了知諸法本來空寂窮其端輗不見起處名無生也由得法空心能安忍唯進不退名不退轉時天王佛般涅槃後梵語般涅槃那此云寂滅謂天王佛入滅之後正法住世二十中劫滅後正法住世許久全身舍利起七寶塔不同釋迦碎身供養彼天王佛塔瘞全身高六十由旬表六波羅蜜縱廣四十由旬表圓教中住行向地四十聖位諸天人民悉以雜華天人所修一切善因名為雜華抹香燒香塗香以香表德衣服瓔珞幢幡寶蓋表衣忍辱瓔珞表智幢幡表定慧寶蓋表頂法妓樂歌頌妓樂表四攝法歌頌表無生曲禮拜供養七寶妙塔禮拜折慢幢供養懺慳業無量衆生得阿羅漢果成就聲聞無數衆生悟辟支佛成緣覺果不可思議衆生發菩提心至不退轉衆生數多心思口議所不能及皆悉發於無上道心得不退轉佛告諸比丘未來世中釋迦滅後未來之世若有善男子善女人聞妙法華經提婆達多品若善男女得聞是經提婆達品淨心信敬不生疑惑者能以淨心信敬此法於其經中不疑惑者不墮地獄餓鬼畜生以信經故不墮三惡生十方佛前得生十方諸佛之前所生之處常聞此經若所生處常得聞是妙法華經若生人天中受勝妙樂若生天上及以人間得受勝妙五欲之樂若在佛前蓮華化生生佛土者不處胎藏生蓮華中於時下方多寶世尊所從菩薩名曰智積從多寶佛來此娑婆上足菩薩名曰智積白多寶佛當還本土昔為證經涌現寶塔今已聞經請還本土釋迦牟尼佛告智積曰釋迦因見智積欲還故少留之令與文殊而得相見善男子且待須臾且勸少留須臾之頃此有菩薩名文殊師利此間有一深地菩薩名曰文殊可與相見論說妙法可還本土汝可與之相見一面論說如來深妙之法然後可還下方淨土爾時文殊師利座千葉蓮華大如車輪所坐華臺如車輪大俱來菩薩亦坐寶蓮華與文殊菩薩俱來之者皆亦坐於寶蓮華臺從於大海娑竭羅龍宮自然涌出娑竭羅此云鹹海諸菩薩衆從於鹹海龍宮涌出住虗空中各以神力於空中住詣靈鷲山到靈鷲山釋迦之所從蓮華下至於佛所下蓮華臺前至佛前頭面敬禮二世尊足釋迦多寶修敬已畢先禮世尊次見菩薩往智積所共相慰問却座一面二大菩薩各從異處來至此中禮相慰問然後却坐智積菩薩問文殊師利智積菩薩見文殊來化現之事故此致問仁往龍宮所化衆生其數幾何仁往大海龍王宮中所化之衆為有多少文殊師利言其數無量不可稱計不可稱量及以計算非口所宣非心所測口宣心測莫能得知且待須臾自當證知待少時間自當親證而得知也所言未竟文殊所言聲尚未竟無數菩薩坐寶蓮華從海涌出所化菩薩乘華從海一時涌出詣靈鷲山佛說法處住在虗空乘通而來故依空住此諸菩薩皆是文師殊利之所化度具菩薩行一一具足菩薩之行皆共論說六波羅蜜皆共議論所修六度波羅蜜法本聲聞人在虗空中說聲聞行元是小機在於下方虗空之中說聲聞道今皆修行大乘空義如上等人從遍空理開漸入圓今則皆修不思議空文殊師利謂智積曰文殊指其所來之衆以告智積於海教化其事如是我於海中所設教化其相若此爾時智積菩薩以偈讚曰大智德勇健化度無量衆文殊大智具諸威德而能勇健化無量衆今此諸大會及我皆已見今此現前所集大衆我悉已見演暢實相義開闡一乘法流演通暢如實相義開示弘闡一乘妙法廣導諸衆生令速成菩提廣化一切令其速得成就菩提文殊師利言我於海中唯常宣說妙法華經言常以此化無量衆智積問文殊師利言此經甚深微妙諸經中寶世所希有此法華經其義甚深語意微密妙無以加一切世間之所希有頗有衆生勤加精進修行此經速得佛不其有衆生聞此妙經勤加精進疾成佛不文殊師利言答智積問有娑竭龍王女鹹海龍王有一女子年始八歲智慧利根方年八歲有大智慧根性聰利善知衆生諸根行業善能了知一切衆生種種根性種種行業得陀羅尼獲總持門諸佛所說甚深祕藏悉能受持一切諸佛所說祕密甚深法藏悉能受持深入禪定了達諸法善能深入菩薩妙定於一切法悉能通達於剎那頃發菩提心於一剎那至促之頃發於無上菩提之心得不退轉辨才無礙其心證得不退轉地智辨才能無所滯礙慈念衆生猶如赤子慈悲憐念一切衆生猶如赤子等無有異功德具足菩薩功德皆悉具足心念口演微妙廣大心之所念口輪演說其義深微體性廣大慈悲仁讓志意和雅慈念悲愍仁厚謙讓志願意地柔和端雅能至菩提以具如上種種之德能令至於阿耨菩提智積菩薩言智積因聞龍女之事謂文殊言我見釋迦如來我昔常見釋迦世尊於無量劫難行苦行曾於無量僧祇劫中行所難行無量苦行積功纍德求菩提道未曾止息積纍功德求於無上菩提之道從是多劫未曾休息觀三千大千世界遍觀化境三千世界乃至無有如芥子許乃至無有一芥子地非是菩薩捨身命處無有隙地不是菩薩捨身之處為衆生故為諸一切衆生之故然後乃得成菩薩道如是備修後方成佛不信此女於須臾頃便成正覺我實不信此小龍女於須臾間便成正覺事異常途所以不信言論未訖智積文殊言論未畢時龍王女忽現於前神通力故欲證是事所以現前頭面禮敬却住一面頭面致敬禮佛足已却住一面以偈讚曰深達罪福相遍照於十方龍女歎佛深達一切罪福之相智慧光明遍照微妙淨法身具相三十二微妙即報身淨法即法身三十二即應身一語該括總歎三身以八十種好用莊嚴法身若據法身萬德相好以為莊嚴所謂微塵相海功德妙身今言八十用嚴法身即於劣應點出妙體本迹不二方契圓宗天人所戴仰龍神咸恭敬若天若人咸所推戴一心慕仰若龍若神咸悉歸敬欽崇佛德一切衆生類無不宗奉者一切世間有生之類無不如敬宗奉之者又聞成菩提又聞佛法得成菩提唯佛當證知唯佛世尊自當證知我闡大乘教度脫苦衆生我闡大乘一實之教度脫無量苦惱衆生爾時舍利弗語龍女言因見文殊告智積曰龍女八歲慈悲和雅能至菩提所以疑也汝謂不久得無上道是事難信即前文云於剎那頃發菩提心故言不久得無上道此實難信所以者何出其所以不信之意女身垢穢非是法器方便教中說諸女人有五種障不得成佛所以執此而為難端云何能得無上菩提不信能成佛道懸曠佛之道者懸遠曠大經無量劫勤苦積行具修諸度然後乃成經歷多劫精勤勞苦積纍功行具足修行六波羅蜜然後乃成又女人身猶有五障如下次列一者不得作梵天王大梵天王色界天王彼尚無女云何為王二者帝釋忉利天王亦非女作三者魔王魔居欲頂他化天宮亦非女作四者轉輪聖王四種輪王皆是男身非女人作五者佛身佛身淨妙女身垢穢豈容為佛云何女身速得成佛此舍利弗執權難實欲破權疑願聞實道爾時龍女有一寶珠龍之神通全在珠上價直三千大千世界至貴寶也持以上佛龍女持此以奉世尊表大施也佛即受之龍女獻珠為表圓解如來納受印證其心龍女謂智積菩薩尊者舍利弗言既獻珠已乃問智積及舍利弗我獻寶珠世尊納受是事疾不獻珠之事佛受速不答言甚疾二人答言是事甚疾女言以汝神力以汝所有神通之力觀我成佛復速於此見我成佛速如獻珠當時衆會當時在會諸聽法者皆見龍女忽然之間變成男子具菩薩行忽轉男身具足大行即往南方無垢世界所應化國在於南方世界名字號為無垢坐寶蓮華成等正覺即報身也三十二相八十種好即粗之妙普為十方一切衆生演說妙法爾時娑婆世界此娑婆界菩薩聲聞天龍八部人與非人三乘八部人天大衆皆遙見彼龍女成佛衆見龍女於彼成佛普為時會人天說法又見彼佛為衆說法心大歡喜悉遙敬禮衆心大喜悉皆遙望恭敬作禮無量衆生聞法解悟得不退轉彼土衆生得聞佛說心得開悟住不退轉無量衆生得受道記復有無量根熟大士得成佛記無垢世界六反震動如序品解娑婆世界三千衆生住不退地因於彼土聞法得益登不退地三千衆生發菩提心而得受記衆見彼佛發大道心遂蒙授記智積菩薩及舍利弗一切衆會默然信受昔所未信所以有語今見其事所以默然衆皆得益無可疑也妙法蓮華經勸持品第十三時會聽衆聞佛世尊法師品內歎持經人見寶塔品下方多寶為欲證經現諸勝事提婆品中開迹顯本如來由此得最正覺而提婆師後亦成佛於是藥王及大樂說其眷屬二萬之衆發誓弘爾時藥王菩薩摩訶薩及大樂說菩薩摩訶薩與二萬菩薩眷屬俱二大菩薩與諸眷屬二萬之衆俱同發心皆於佛前作是誓言對佛立誓惟願世尊不以為慮願佛世尊不必以謂無能弘經而為憂慮我等於佛滅後當奉持讀誦說此經典我等諸人當任此責後惡世衆生善根轉少去聖時遙善根之人轉轉希少多增上慢間有增上能修行者未得謂得多於侮慢貪利供養貪著事物利養供養增不善根因修行中而起惡業反種生死不增善根遠離解脫遠離清淨解脫之法雖難可教化是等之則難可說法教化我等當起大忍力難化之人當起精進大忍辱力讀誦此經持說書寫一讀二誦三持四說五寫名五種法師種種供養不惜身命有弘持者當修種種恭敬供養為於法故於身命財無所吝惜爾時衆中五百阿羅漢得受記者此五百人皆已得受成佛記者白佛言世尊我等亦自誓願我等亦各自發誓願於異國土廣說此經於異國者畏此濁惡難可教化願於餘土而廣說之復有學無學八千人得受記者即第九品得記之者從座而起合掌向佛作是誓言離座合掌表於敬儀然後立誓世尊我等亦當於他國土廣說此經是等力微畏此難化所以者何是娑婆國中人多弊惡病弊處多又且頑惡懷增上慢稍能增上便慢他人功德淺薄功能德善皆悉淺薄瞋濁諂曲嗔怒昏濁諂迂曲心不實故為此土人有如是過所以發誓求化他方爾時佛姨母摩訶波闍波提比丘尼義如序品與學無學比丘尼六千人俱佛之姨母與尼衆俱從座而起一心合掌先具威儀瞻仰尊顏目不暫捨將有所請願聞授持所以瞻敬不能暫捨於時世尊告憍曇彌此云衆主以是尼衆主首之故亦即如來姨母之名出本行集何故憂色而視如來佛見姨母頗有憂色所以問之汝心將無謂我不說汝名授阿耨多羅三藐三菩提記耶汝心將非謂我授記於尼衆中不提名字為授記莂所以憂耶憍曇彌佛告姨母我先總說一切聲聞皆已授記僧尼雖異據所修行同稱聲聞既云一切皆與授記則諸尼衆已在其中今汝欲知記者今欲得知別記名者將來之世於未來時當於六萬八千億諸佛法中六萬即表六根八千即表八識六根八識一時清淨名見諸佛為大法師於大乘中而為法師及六千學無學比丘尼俱為法師六千尼衆亦復如是汝如是漸漸具菩薩道汝等如是漸漸修行具足菩薩所修之道當得作佛號一切衆生喜見因中具修慈忍之行不惱衆生所以果上一切衆生皆喜見之如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如序品解憍曇彌是一切衆生喜見佛及六千菩薩即六千尼轉次授記展轉次第與授記莂得阿耨多羅三藐三菩提得成無上正遍知覺爾時羅睺羅母耶輸陀羅比丘尼作是念羅睺母者是佛之親義當別記未聞佛言所以作念世尊於授記中獨不說我名意謂諸尼皆得別記而獨於我不聞拈出佛告耶輸陀羅汝於來世百千萬億諸佛法中修菩薩行百千萬億諸佛之法不出修行一念之心善淨心法名曰介爾為大法師漸具佛道常為大衆演法之師漸漸具足成佛之道於善國中當得作佛因修善行果應善國號具足千萬光相因中供養百千萬億佛具菩薩道果上具足千萬光相成十力尊如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如序品解佛壽無量阿僧祇劫住世壽量如是長遠爾時摩訶波闍波提比丘尼及耶輸陀羅比丘尼並其眷屬二比丘尼及六千衆皆大歡喜得未曾有俱蒙授記將來成佛故皆歡喜得未曾有即於佛前而說偈言世尊導師安隱天人唯佛世尊是大導師善能安隱諸天人民我等聞記心安具足我等得聞授記之音身心安寧所願具足諸比丘尼說是偈已諸尼說偈贊歎佛已白佛言世尊我等亦能於他方國土廣宣此經以力微故畏此濁惡願於餘處而廣說經爾時世尊視八十萬億那由他諸菩薩摩訶薩世尊慈眼遍視會中所化弟子諸大菩薩是諸菩薩皆是阿惟越致此云不退轉轉不退法輪菩薩自住不退轉地復轉不退無上法輪得諸陀羅尼此云總持是諸菩薩得此三昧總皆攝持護善遮惡即從座起至於佛前一心合掌諸大菩薩八十萬億見佛一視善解知機故從座起合掌具儀致敬於佛而作是念衆心作念若世尊告勑我等持說此經者若蒙世尊敕使我等受持讀說此經典者當如佛教廣宣斯法當依佛教廣說此經復作是念又復作意如是念言佛今默然不見告敕佛於今者但只默然不見發言有所告命我當云何我等今是當如之何時諸菩薩敬順佛意敬順如來前寶塔品付囑之意並欲自滿本願并欲自滿菩薩所修本有行願便於佛前作師子吼而發誓言既思惟已即於佛前發師子音立深誓願世尊我等於如來滅後我等諸人於佛滅後周施往返十方世界遍一切處佛之境界能令衆生能令末世正信之人書寫此經受持讀誦解說其義如法修行正憶念如經中說修行之法正心憶念勤而行之皆是佛之威力皆藉世尊廣大威力唯願世尊在於他方遙見守護此方化周佛歸圓寂餘處機熟更應餘方故云遙見希垂守護即時諸菩薩俱同發聲而說偈言唯願不為慮惟願世尊不必為慮於佛滅度後恐怖惡世中我等當廣說佛滅之後甚可恐怖濁惡世中我當廣說有諸無智人惡口罵詈等有諸不善無智之人惡口穢言罵詈等事及加刀杖者我等皆當忍及以加之刀劒杖石當為弘經悉忍諸惡惡世中比丘邪智心諂曲惡世之僧無正智慧生諸異見心地不直諂迂曲未得謂為得如第四禪無聞比丘本是凡夫妄言證聖我慢心充滿自高我慢邪心充滿或有阿練若此云空靜處謂或有人修空靜行納衣在空間冬夏常被一衲之夜在彼間處修於空靜自謂行真道輕賤人間者自謂所行是真實道輕賤人間行化之者貪著利養故與白衣說法為貪利養與俗說法為世所恭敬如六通羅漢得諸世人之所恭敬如同得果六通羅漢是人懷惡心常念世俗事口雖說法心存求利是人內懷如此惡見常念世間塵俗之事假名阿練若好出我等過借練若名行塵俗事好出我等弘經者過而作如是言出彼邪見所謗之言此諸比丘等是貪利養故說外道論議反謗人𨞬慈悲大士名貪利人斥毀所說大乘妙經名外道義自作此經典誑惑世間人反謗佛經是私撰造欺誑迷惑世間之人為求名聞故分別說是經為欲求於名聲聞望故分別說如是之經常在大衆中欲毀我等故常在一切大衆之前為欲毀訾我等之故向國王大臣婆羅門居士向於國王及以大臣諸婆羅門即淨行者居士即是處家之士及餘比丘衆誹謗說我惡及在其餘比丘之前生諸誹謗說我等惡謂是邪見人說外道論議以正為邪反生輕謗我等敬佛故悉忍是諸惡我等為欲敬順佛故悉忍是等違惱之惡為斯所輕言汝等皆是佛為此邪見輕謗者言汝等諸人悉皆是佛如此輕慢言皆當忍受之如此之類輕慢語言以為法故皆忍受之濁劫惡世中多有諸恐怖謂當來世濁惡之時多有是等恐怖之事惡鬼入其身罵詈毀辱我諸邪惡鬼附入其身常見罵詈毀辱於我我等敬信佛當著忍辱鎧我等諸人欲言如來當修慈忍大悲之行著忍辱鎧化所難化為說是經故忍此諸難事為欲廣說是經之故當忍此等難忍之事我不愛身命但惜無上道我等不敢自愛身命但當愛惜無上之道我等於來世護持佛所囑我等當於未來之世護持世尊之所付囑世尊自當知我心如是佛自當知何待我說濁世惡比丘不知佛方便隨宜所說法濁惡世中諸比丘等不善了知佛慈方便諸三乘法隨宜所說乃生疑心執權謗實惡口而顰蹙顰蹙即是眉頭皺也以薄福故聞是妙經顰蹙罵詈數數見擯出數數反見擯出衆外遠離於塔寺遠離僧坊塔寺之處如是等衆惡有如是等種種衆惡念佛告敕故皆當忍是事思念吾佛告敕之故持說此經皆當忍受諸如是等違惱之事諸聚落城邑村居聚落或城郭中或是縣邑諸衆生居其有求法者其或有人求大法者我皆到其所說佛所囑法我等皆當到其所住說佛所囑無上妙法我是世尊使處衆無所畏八十萬億深地聖人神通自如道力充盛能於濁惡末世之中當為如來說法之使處衆演說得大無畏非同先來初心菩薩及羅漢等我當善說法願佛安隱住我等當得善說法要願佛安住不必介懷我於世尊前釋迦佛前諸來十方佛十方遠來諸分身佛發如是誓言勇發如上深重誓言佛自知我心佛神力故自知我等廣大堅固誓願之力妙法蓮華經卷第五妙法者即是心法心是法體法是心用念頭瞥起事相隨生一切時中放教平淡但依公理勿徇私情自然明白無往不通如是清淨不染塵埃如是公正無有諂邪微妙香潔甚於蓮華我佛證此愍物迷之故現世間說如是法名之為一大事四緣諸佛由是得最正覺其法妙故名為妙法居塵不染名曰蓮華經者法也教諸衆生法茲常理回光返照入一佛乘姚秦三藏法師鳩摩羅什奉詔譯衆生語音在處各異佛出中梵隨彼方言演說諸法傳至東華語音字義皆不可曉有丘慈國羅什法師博通三藏善知佛理姚秦國主遣使迎來譯中梵音成東華語妙法蓮華經安樂行品第十四前持品中蓋因如來勸募流傳藥王樂說及二萬衆敬順佛意發誓通經佛又以眼願視大衆八十萬億大菩薩衆誓於惡世竭力流通於是文殊復為末世初心菩薩白佛世尊求方便門云何修進爾時文殊師利法王子文殊師利此云妙德佛為法王菩薩傳道名法王子菩薩摩訶薩此云大道心成衆生蓋稱文殊有大道心能成衆生白佛言世尊佛有聖德為世所尊是諸菩薩甚為難有歎前持品發誓通經諸大菩薩甚是難有敬順佛故敬重隨順如來之故發大誓願對於佛前發深重願於後惡世於佛滅後濁惡之世護持讀說是法華經護惜任持讀誦解說如是妙經世尊菩薩摩訶薩此指末世初發道心諸菩薩也於後惡世云何能說是經初心之人根力既淺惡世之中云何可行佛告文殊師利因文殊問如來答之若菩薩摩訶薩於後惡世欲說是經若有菩薩於惡世中欲說是經當安住四法一教行處及親近處名身安樂行二誡口過令善說法名口安樂行三淨心業離貪瞋癡名意安樂行四起慈悲誓度一切名誓願安樂行一者安住菩薩行處於佛法中終日履踐名為行處親近處遠離惡友親友善人名親近處能為衆生演說是經行用有法親近得人則能為他演說是經文殊師利云何名菩薩摩訶薩行處牒前章門重新問起何名菩薩行用之處若菩薩摩訶薩能行之人住忍辱地安心住於忍辱之地柔和善順柔則勿強和則勿諍善則遠惡順則隨宜而不卒暴而不可以倉卒躁暴心亦不驚若聞妙法亦勿驚疑又復於法無所行又復常於妙法之中敬順佛意謙卑自牧勿謂於法能有所行而觀諸法如實相而當觀察一切諸法本來空寂如實之相亦不行不分別恐人聞說法性本寂使謂如空無所分別亦勿行此無分別見是名菩薩摩訶薩行處如是而行是名菩薩之所行處云何名菩薩摩訶薩親近處前云安住親近之處故此牒起為之釋通菩薩摩訶薩不親近不可縱情親附近傍國王王子大臣官長若近貴人恐恃權勢損物害他不親近諸外道梵志不可親近諸外道中出家之人行梵志者尼犍子等諸外道種總有六師各有弟子師資合論九十六種故云等也心外求法名為外道梵語尼犍陀此云離繫即外道中出家總名為離人間繫眷之故及造世俗文筆讚詠外書及勿親近製造俗典文筆之人以至讚嘆詠外書者及路伽耶陀此云惡論世俗之中惡不善論逆路伽耶陀者此云逆論背逆君父不善之論及路伽耶陀名師破弟子逆路伽耶陀名弟子破師者之一字即學論人不可近者恐為所感生諸異見亦不親近諸有戲又亦勿近險戲者相扠相撲共相扠搪與夫廝撲及那羅等那羅此云力士捔力戲也種種變現之戲應是世間粧飾面首變諸異相緣撞倒擲如路岐人所作之戲若觀戲劇令心捶蕩又不親近旃陀羅此云屠儈即殺生者及畜猪羊雞狗畜此等物無非為殺畋獵漁捕獵獸捕魚等是惡類狎習惡者損己道心諸惡律儀應諸不善殺害之法名惡律儀如是人等如上種種諸惡人輩或時來者或時之間善心來者則為說法則可與之說於正法無所希望不可有所希望之心又不親近求聲聞求小乘果比丘比丘尼出家僧尼優婆塞善男子優婆夷善女人即小乘四衆也亦不問訊道既不同不須問訊若於房中房院之中若經行處行道之處若在講堂中不共住止若或在於講堂之中不必與之同一住止或時來者如是人等或時之間以好心故而自來者隨宜說法但可隨宜與之說法無所希求切勿有所希求之心文殊師利又菩薩摩訶薩又復習大菩薩之人不應於女人身不當於女人之身取能生欲想相生心取著起情欲相而為說法內心腐穢外現威儀而為說法亦不樂見亦不欲見女人之身若入他家若有緣故入於他家不與小女處女寡女等共語小女即年幼者處女即是在室大童女也寡女即喪其夫守寡之者與之共語事涉譏嫌況為誘調恐生重過亦復不近五種不男之人以為親厚端謹之人因心正故形體具足諸邪諂者由宿惡業雖得人身諸根不具言五種者一生謂生下來男根不具二鍵謂鍵去外腎三妬謂見他行欲心妬色故身分方勇四變謂或時變轉男女不定五半謂上半月男下半月女由形不正故號不男斯等之人性多雜染無丈夫操故誡勿近與之親厚自害道心不獨入他家不可獨自入他俗舍若有因緣若有急緣事不容己須獨入時須因獨自入他家時但一心念佛但當一心想念於佛佛既見前過惡自弭若為女人說法若或有緣為女說法不露齒笑笑不露齒欲謹嚴也不現胸臆遮覆胸臆令拘檢也乃至為法猶不親厚乃至正念實心為法猶不當得而生親厚況復餘事況復為餘不善之事不樂畜年少弟子年少之人多諸輕躁沙彌小兒沙彌幼小未稟具戒小兒憍懦非受道器亦不樂與同師亦不欲與是等同師常好坐禪常須好樂安坐禪寂在於間處在於空曠間靜之處修攝其心心久在迷遂成過病今欲入道須修其心令復本淨於一切時攝其正念文殊師利是名初親近處四安樂行第一先明菩薩行處親近處就親近中又自分二初從菩薩摩訶薩不親近國王等即初親近處二從復次菩薩摩訶薩觀一切法空等即第二親近處初親近中又自分二初不近國王等此是即遠論近凡非其人皆勿親近是令遠去又云或時來者則為說法是令近之即遠論近也又云常好坐禪等令修攝其心乃即近論近也復次菩薩摩訶薩觀一切法空如實相一切法者謂世出世間諸所有法正心誠意如理詳審名之為觀了一切法本性空寂求其起處而不可得即知本空雖則性空不妨現用復是假義空假不二即是中道非一非三而三而一名如實相又復應知如即空義相即假義實即中義不一不異不並不別一性圓具即空假中如實相也不顛倒自體本空實無倒正背覺合塵名顛倒相滅塵合覺即無顛倒不動法性本空如如不動不退了性平等不生退屈不轉如箭離弦無反回勢如虗空如大虗空無一切相無所有性無其所有種種妄性妄既本空心思處滅一切語言道斷非口可議語路處絶不生不出不起性空寂故本自不生葉如幻化本自不出無始無終本自不起起滅皆幻性自本空三際來之如夢所見生出起相皆不可得無名無相無名者法身之體遍一切處而不可以名字詮顯如佛菩薩菩提涅槃凡諸名字悉是假立無相者謂無我人衆生壽者虗妄之相非無如實清淨之相實無所有法身清淨照體獨立實無前境所有之相無量無邊無量者法身之體包遍虗空而不可以數日度量無邊者體本空寂前後際斷而不可以邊際推窮無礙無障無礙者體性虗通無有質礙如風於空無所礙故無障者體性無染離一切障無明體相本自不有無煩惱障自性清淨過惡不生則無業障生死本空不受後有則無報障但以因緣有體雖空寂不礙緣生譬如虗空體非群相而不拒彼諸相發揮以無明為緣則起六凡法界貪嗔癡者三惡道起不貪嗔癡三善道起以教行為緣則起四聖境界修四諦法則起聲聞修十二緣則起緣覺修六度行則起菩薩無緣大慈不思議用則起佛乘非心為因非境為緣世出世法無從而生但以因緣而有法起從顛倒生故說楞嚴云衆生無始種種顛倒皆由不知二種根本錯亂修習云何二種一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者由諸衆生遺此本明雖終日行而不自覺枉入諸趣當知本明元清淨體即如實相枉受輪回入諸趣者即指六凡從顛倒生故說輪轉一念頓悟了性本空大千沙界水上浮漚一切聖凡猶如電拂常樂觀如是法相常願諦觀如是空寂清淨本然如實之相是名菩薩摩訶薩第二親近處此是即非遠非近處而論親近爾時世尊欲重宣此義而說偈言如來欲顯滅後惡世初心菩薩行處近處住四安樂第一行門重括前意以偈敷演欲令速證安樂解脫寂靜妙常若有菩薩若有佛子行菩薩道於後惡世於佛滅後濁惡世中無怖畏心無有怕怖畏懼之心欲說此經欲說如是妙法華經應入行處即前文中菩薩行處及親近處即前文中親近之處常離國王及國王子大臣官長王有威力王子儲君大臣乘權郡縣官長各有權勢恐或親附恃勢惱他長慢損德險戲者即世邪術刀杖等戲及旃陀羅諸屠儈者是等心惡悉令離之外道梵志外道出家行梵志者道不同故不相為謀亦不親近增上慢人增上修行傲慢之人貪著小乘於小乘教生貪著心三藏學者學經律論小乘藏者雖則習學三藏之教機劣智微非菩薩友破戒比丘雖是比丘破佛禁戒名字羅漢非實有德名字號為得道羅漢及比丘尼好戲笑者尼女報別近則招譏好多戲笑尤當遠之深著五欲於五塵境深生欲著求現滅度求現異相妄稱涅槃諸優婆夷女人非是所可親近況復貪欲求現清淨涅槃相者皆勿親近如上諸人皆勿親近若是人等以好心來雖非其人用好心來到菩薩所為聞佛道到菩薩所為欲聞道菩薩則以無所畏心凡升高座先自安心不懷希望而為說法不可懷於希望之意當須安詳為之說法寡女處女寡婦室女及諸不男生鍵妬變半五種不男如前已解皆勿親近以為親厚皆莫近傍親愛相厚亦莫親近屠兒魁膾殺中之魁名為魁膾畋獵漁捕縱火曰畋用犬曰獵漁網張捕為利殺害為財利故而行殺害販肉自活販賣魚肉以自活命衒賣女色即倡妓家以色衒賣如是之人皆勿親近近殺增瞋近色生欲皆令勿近險相撲即前戲及相扠撲種種嬉戲應是種種世間嬉戲諸淫女等前衒色者為利故賣令諸淫女說貪色者盡勿親近是等諸人皆非善類盡勿近之莫獨屏處為女說法夫說法者應於當陽屏處涉私不可說也若說法時無得戲笑說法之時貴於持重戲笑非法毋得如是入里乞食將一比丘入村里時須將一人以為同伴若無比丘一心念佛必若無人可以為侶當須一心思念於佛勿令散亂是則名為行處近處結歸上文行近二處以此二處能安樂說用此行近二如法處能得安樂可以說之若餘非處不可說也又復不行上中下法菩薩六度名為上法緣覺所修名為中法聲聞四諦名為下法皆非佛道復不當行有為無為有為即是世間因果生死苦業人天之法無為即是空寂涅槃二乘小行方便之法實不實法實者即是有宗執一切法悉是實有不實義者即是空宗空有二見皆非佛乘求佛道者不當行也亦不分別是男是女佛法平等普被一切亦不必得分別男女不得諸法不知不見小乘法中誡令擇機有得不得如諸律部唯被僧尼未稟具者不許見聞大菩薩法但有能解法師語者悉得聞之如海納流無所簡擇是則名為菩薩行處如是而行是名菩薩之所行處一切諸法空無所有一切法者謂五陰十二入十八界世間諸法及出世間四諦十二緣六度萬行乃至八萬四千陀羅尼門皆悉空寂本無所有無有常住亦無起滅小乘三藏說色生滅性是真常色性兩分一常一滅大乘法者空即是色無有常住色即是空亦無起滅不同小乘二邊之見空色不二即是圓常是名智者所親近處如是解了不墮愚癡名為智者所親近處顛倒分別諸法有無法性本寂離一切相衆生顛倒妄起分別說有說無皆名妄見是實非實小乘有宗執一切法悉是實有小乘空宗說一切法悉如幻夢非是實有是生非生小乘藏中說色從緣名為生法性是本有非從緣生名非生法大教一乘全性起色如水起波了色非生全波即水非特愚夫迷真遂妄名為顛倒諸三乘人依不了義隨執一門不能圓會皆屬遍邪顛倒中攝在於間處修攝其心修行之法貴要沉靜若處隤閙心豈能安佛勸行人在於空間寂靜之處以攝其心安住不動如須彌山安心住定而不傾動猶如鎮靜須彌山王觀一切法皆無所有以智觀察了法性空猶如虗空無有堅固猶如太虗本來空寂無有堅固室礙之相不生不出不動不退本性自爾不從因出不從緣生不從法起不曾動搖亦無進退常住一相前文中云無有常住今此又云常住一相其旨云何前云無者是破偏見確定死常今此常住是住無相一實相理是名近處是名菩薩所親近處若有比丘於我滅後入是行處及親近處若有人能於佛滅後入於如上行近二處說斯經時無有怯弱前云心無所畏今云無有怯弱此勸行人留心於道先當靜定觀法觀緣精思熟慮理義入神行必依經言必中理縱然有得億千萬衆悉在目前舉起口時句句令他心開意解學力既到智解又明如理而說何怖之有苟不精究詐言得解欲無畏怯其可得乎菩薩有時入於靜室菩薩有緣欲說法時先當入於寂靜之室以正憶念隨義觀法以正定心記憶思念隨經中義觀察於其所說之法從禪定起思得之已理義精當然後安詳從定而起為諸國王王子臣民婆羅門等開化演暢說斯經典即前文云如是人等或時來者則為說法其心安隱無有怯弱如我所說依而行之則得其心自然安隱無有臨時怖畏大衆怯弱之過文殊師利是名菩薩安住初法安心住畏菩薩所修最初安樂清淨行門能於後世說法華經則能於佛滅後惡世為諸四衆說法華經自此以去一段經文正當第二口安樂行又文殊師利如來滅後於末法中欲說是經於佛滅後欲說法華應住安樂行應當住於安樂行門若口宣說若讀經時若說若讀此經之時不樂說人及經典過不欲說人及經典過亦不輕慢諸餘法師亦不可以輕陵侮慢諸餘經典說法之師不說他人好惡長短不說共他尋常之人身中好惡長短之事於聲聞人小乘之人亦不稱名說其過惡亦不指名談其過失亦不稱名讚歎其美亦不指名讚其德處云何毀讚二俱不可以壞真心平等法故毀之生諍互不能安讚之生愛容引餘人入於小法故雙止也又亦不生怨嫌之心此尤不可善修如是安樂心故善能攝修如是口業則令其心得安樂故諸有聽者不逆其意法師演說當觀機緣順聽者意不可逆之有所難問前人有所質難請問不以小乘法答若問大時答以小義則失機宜但以大乘而為解說問小答大引權入實問大答大正合前機二俱有益令得一切種智令諸聽者皆得中道一切種智爾時世尊欲重宣此義而說偈言菩薩常樂安隱說法修行菩薩常欲離過令心安隱如理說法於清淨地而施床座當擇清淨無染濁處而施說法高廣牀座以油塗身小乘教中不許愛好香油塗身今令塗者為除惡氣非貪美也澡浴塵穢澡洗塵垢為淨身也著新淨衣或著新衣或洗浣淨又所有衣求處非法亦名不淨內外俱淨內心外儀俱當清淨安處法座安詳居於說法之座隨問為說隨其所問而為解說若有比丘及比丘尼出家僧尼諸優婆塞清信男子及優婆夷清信女人國王王子王及王子群臣士民在朝群臣士子庶民以微妙義如上諸人到菩薩所當以微妙甚深之義和顏為說和悅顏色而為演說若有難問若有人來起難問時隨義而答隨其所問約義而答因緣譬喻或引因緣或舉譬喻敷演分別敷布流演分別曉白以是方便以此等緣為化方便皆使發心皆令聽者發無上心漸漸增益理可頓悟事須漸修令得增益入於佛道入於一乘無上佛道除懶墮意除去懶散惰慢之意及懈怠想及以懈倦荒怠之想離諸憂惱謹言離過則無憂心慈心說法以慈忍心而為說法晝夜常說晝夜常常為人演說無上道教明無上道一乘之教以諸因緣用諸善惡二種因緣惡令止息善勸修持無量譬喻以無量種事相譬喻開示衆生開解曉示一切衆生咸令歡喜咸令信解生歡喜心衣服臥具若於衣服及以臥具飲食醫藥二時飲食醫治藥料而於其中而心於此四事之中無所希望無有規求希望之心但一心念說法因緣但只專一端心正念演說妙法清淨因緣願成佛道願得成就無上佛道令衆亦爾令諸大衆亦得如是是則大利安樂供養是則名為廣大之利施於安樂清淨供養我滅度後佛滅之後若有比丘說法之僧能演說斯妙法華經心無嫉恚諸惱障礙心中清淨如湛止水無有一切嫉妬瞋恚亦無相惱障礙之事亦無憂愁及罵詈者亦無一切憂愁思慮及以惡語罵詈之者又無怖畏加刀杖等慈忍之人其心常安既不惱他人誰惱己則怖畏刀杖等事亦無擯出亦無被人擯出衆外安住忍故能住大乘安樂行故智者如是諸有智者若能如是善修其心善能修攝於其道心能住安樂則能住於口安樂行如我上說如我上文之所宣說其人功德其弘經人所獲功德千萬億劫於千萬億無數劫中算數譬喻以數算計引事譬喻說不能盡說其功德終不能盡自此以去一段經文正當第三意安樂行又文殊師利菩薩摩訶薩若有菩薩摩訶薩埵於後末世法欲滅時於佛末世法欲滅時受持讀誦信受憶持明讀背誦斯經典者此法華者無懷嫉妬無得輒懷憎嫉妬忌諂誑之心諂虗誑不善之心亦勿輕罵學佛道者亦莫輕觸及以罵詈習學佛門聖道之者求其長短推求伺覔他人長短若比丘比丘尼優婆塞優婆夷義如前解求聲聞者求學聲聞四諦之者求辟支佛者求學緣覺十二緣者求菩薩道者求六度行菩薩道者無得惱之令其疑悔勿得妄惱令生疑惑掉悔之心語其人言汝等去道甚遠向前人說汝等所行去於佛道甚是長遠終不能得一切種智終竟不能得於如來一切種智一切者即空智種即道種智空假不二即是圓融大覺如來中道妙智所以者何汝是放逸之人於道懈怠故汝是縱性放蕩狂逸不善之人不能於道勤精進故此上七句正是輕惱他人之語又亦不應戲論諸法有所諍競又亦不當於一切法強生戲論紊亂法門有所廢立而興諍競當於一切衆生起大悲想當於一切世間衆生哀憐拔苦起大悲想於諸如來起慈父想於諸如來起於愛敬慈父之想於諸菩薩起大師想於諸菩薩起於受法大師之想於十方諸大菩薩常應深心恭敬禮拜於十方界諸大菩薩不應淺見應當深心恭敬禮拜於一切衆生平等說法於諸衆生以平等心而為說法以順法故不多不少以順平等心法之故不敢少多取中而說乃至深愛法者亦不為多說乃至於法深愛樂者亦不偏心為之多說文殊師利是菩薩摩訶薩於後末世法欲滅時於惡世中當如來法滅盡之時有成就是第三安樂行者有能成就此第三種安樂法門清淨行者說是法時無能惱亂說法華時無有他緣而能惱亂得好同學共讀誦是經得善好人與之同學受持讀誦亦得大衆而來聽受亦能感得一切大衆聽信領受聽已能持耳聽聞已憶持在心持已能誦既憶持已然後能誦誦已能說既皆誦已能為人說說已能書為人說已又能書寫若使人書自雖不能倩人為書供養經卷復能志心修法供養恭敬尊重讚歎恭敬故不敢侮慢尊重故不敢輕視讚歎故不敢毀訾爾時世尊欲重宣此義而說偈言若欲說是經若人欲得演說是經當捨嫉恚慢諂誑邪僞心當須捨去嫉妬嗔恚傲慢諂諛邪虗僞諸不善心常修質直行不輕懱於人常爾修習質朴正直如法之行不可輕易懱裂於人亦不戲論法又亦不可強生知見戲論於法不令他疑悔云汝不得佛不令他人生疑悔心云汝所修不得成佛是佛子說法若能如是善用其心此則名為佛子說法常柔和能忍常常柔和善能含忍慈悲於一切於諸衆生起慈心故與之快樂起悲心故拔其苦惱不生懈怠心常勤為衆而不可生懈慢怠墮十方大菩薩愍衆故行道十方世界諸大菩薩愍衆生故行慈悲道應生恭敬心是則我大師應當生於恭敬之心此則是我傳法大師於諸佛世尊生無上父想於諸如來則起慈悲無上父想破於憍慢心說法無障礙破除一切憍傲慢心善說法要無障礙緣第三法如是智者應守護此第三種意安樂行其義如是諸有智者應當謹守常懷愛護一心安樂行齊一之心安樂妙行無最衆所敬常為一切無量大衆之所恭敬自此以去一段經文正當第四誓願安樂行又文殊師利菩薩摩訶薩佛告文殊有大道心成衆生者於後末世法欲滅時如來之法有正像末正像之世人淳易化唯末法時善根轉少難可化度故指此時弘經最難有受持法華經者有能持是法華經者於在家出家人中生大慈心當於在家善男信女出家僧尼衆人之中生於大慈與樂之心於非菩薩人中生大悲心於諸不修菩薩大行邪見之人應生大悲拔苦之心應作是念應當發心作是念言如是之人則為大失如斯不信大乘之人是大過失如來方便隨宜說法云何為失良由如來慈悲方便演說諸法不聞不知不覺不能聽聞不能了知不能省覺不問不信不解不能請問不能信受不能問解則是大失其人雖不問不信不解是經其人雖則於是妙經不能請問不能信解我得阿耨多羅三藐三菩提時我若悟得無上道時隨在何地隨其所處在何方所以神通力智慧力當以神通而行化誘以智慧力而為開導引之令得住是法中從應作是念至住是法中正是第四誓願度生安樂妙行以善誘之令得入法文殊師利是菩薩摩訶薩是修妙行道心衆生於如來滅後有成就此第四法者有成就此大慈悲心大誓願力第四一能安樂行者說是法時無有過失演說如是妙法華時無有一切不善過失常為比丘比丘尼優婆塞優婆夷國王王子大臣人民婆羅門居士等並如前解供養恭敬尊重讚歎由如法故願力深重智解又深所以諸人皆敬仰也虗空諸天虗空之中所有諸天為聽法故亦常隨侍為欲聽聞法音之故亦常晝夜隨逐侍衛若在聚落城邑空間林中其說法人若在村聚或是郡邑空間靜處山林之中有人來欲難問者有人來欲質難請問論法之者諸天晝夜常為法故而衛護之諸天面於佛前立誓護持正法有難說者故天護之能令聽者皆得歡喜能令聽聞法要之者皆得深妙法喜之樂所以者何云何持經諸天擁護聞者歎喜得大法利此經是一切過去未來現在諸佛神力所護故典由經深妙十方三世一切諸佛以神通力之所護故文殊師利是法華經如是妙法大乘經於無量國中乃至名字不可得聞於餘無量國土之中乃至欲聞首題名字尚不可得何況得見受持讀誦何況親眼欲見是經心內受持口中讀誦文殊師利譬如強力轉輪聖王金輪王者王四天下有大威力強壓一切經舉輪王以況於佛有大威德攝化一切種種衆生欲以威勢降伏諸國王欲以勢降諸小國如佛現通降伏魔衆而諸小王不順其命小國不順輪王之命如諸異見不入正法時轉輪王起種種兵而往討罰兵之為義象馬步騎隱伏揚耀名色不同故云種種喻佛善巧或折或攝神通妙用愈出愈奇而人莫測王見兵衆戰有功者即大歡喜隨功賞賜王喜兵勝歡喜賜賞佛見弟子勤修正行隨其功力與方便果或與田宅聚落城邑田即三昧宅即智慧聚落即喻初二兩果邑即三果城即四果涅槃之樂或與衣服嚴身之具軍功勝者賜以章服紫袍金帶法戰勝者得服慚愧忍辱之衣得行養身助道之法或與種種珍寶金銀琉璃硨磲碼瑙珊瑚琥珀或復賜與珍玩之具七寶妙物喻佛授彼有德行者七覺支寶象馬車乘奴婢人民軍功賜以鞍馬乘輿法將賜以象馬車乘即是二乘盡無生智奴婢即是神通功用人民即是有漏善法唯髻中明珠不以與之唯王頂髻一顆明珠不妄與人喻佛頂上甚深妙法是人乃付所以者何有何所以不輕與人獨王頂上有此一珠獨王有者言其貴極喻一乘法唯佛獨知若以與之若輕與之王諸眷屬必大驚怪即三乘人自謂無分偶然賜之反生驚怪文殊師利如來亦復如是合輪王喻以禪定智慧力由禪定智慧二種道力得法國土得出世法無生國土王於三界統王三千大千世界而諸魔王不肯順伏諸魔王者內即心魔五陰煩惱及以死魔外則天魔居欲界頂行人修進道業將成震動魔宮故來相擾不肯順正而自調伏如來賢聖諸將與之共戰佛諸弟子於生死中與魔相戰其有功者於其中間有功勞者心亦歡喜佛心亦復與之助喜於四衆中為說諸經於僧尼士女四種衆中與之演說諸餘經典令其心悅令其聞之心生歡悅賜以禪定解脫四禪四定及八解脫無漏根力無漏智慧五根五力諸法之財即指三十七品名為出世解脫之財又復賜與涅槃之城得涅槃者能脫生死譬如大城可以禦敵言得滅度示言已得出世寂滅引導其心令皆歡喜以斯方便誘引化導令皆聞之心得歡喜而不為說是法華經而獨不為說是法華文殊師利如轉輪王合如來喻見諸兵衆有大功者心甚歡喜如兵有功王心甚喜以此難信之珠以此頂上難信之法久在髻中不妄與人八萬四千法門名為頭髮此妙法者法中最勝如髻中珠四十餘年祕而不談名為久在為機未熟不敢說示而今與之而今靈山根器既淳正是其持覿面付與如來亦復如是如來說法隨機受道亦如輪王隨功賞賜於三界中為大法王為大乘教法中之王以法教化一切衆生以無漏法教化一切見賢聖軍見大小乘賢聖軍之與五陰魔色受想行識五者和聚假名為人被身心惱名曰陰魔煩惱魔即指一念無明煩惱或亂正性名之為魔死魔共戰人皆有死所不能免名之為魔修善却惡名共魔戰有大功勳戰退諸魔有大功勳滅三毒出三界破魔網羅漢之人滅盡三毒得出三界不為界繫之所羈縻名破魔網爾時如來亦大歡喜如來見諸修道之者得出三界亦大喜悅此法華經能令衆生至一切智此之妙經能令修者至於一切如來智地一切世間多怨難信世間之人多所怨惡難得信受先所未說先為難信所以未說而今說之今因信及所以說之文殊師利此法華經是諸如來第一之說此經微妙乃是諸佛第一法門於諸說中最為甚深於諸所說經典之中此經最為甚深難解末後賜與末後靈山為開三乘同入佛性遂乃賜之如彼強力之王如彼強力轉輪聖王久護明珠久護頂髻所有明珠今乃與之今因極太不賞之功乃賜與之文殊師利此法華經諸佛如來祕密之藏久默斯要不務速說名祕密藏今乃分明為衆而說即是顯露於諸經中最在其上諸經之中各有果位如諸小王此法華經統攝一切如轉輪王長夜守護不妄宣說於諸衆生無明長夜深心守護不敢妄說始於今日乃與汝等而敷演之始於末後靈山會上知時舉要與汝等說爾時世尊欲重宣此義而說偈言佛欲重宣誓願安樂甚深之義而作偈說常行忍辱哀愍一切常行安忍耐於耻辱哀愍一切世間衆生乃能演說佛所讚經如是之人乃能末世演說佛讚妙法華經後末世時持此經者末世持此法華經者於家出家及非菩薩於在家人及出家者乃至非是學教菩薩應生慈悲於是等人當生愍恤斯等不聞不信是經則為大失於此妙經不能從師聞問信解則是大失我得佛道我若得明無上佛道以諸方便為說此法以諸所應善巧方便為說此之甚深妙法令住其中令彼聞者住於法中譬如強力轉輪之王兵戰有功賞賜諸物王見兵勝稱功而賞象馬車乘嚴身之具及諸田宅聚落城邑或與衣服種種珍寶奴婢財物歡喜賜與一一如前表對釋說如有勇健能為難事如有傑出勇健之人起三界者王解髻中明珠賜之佛開頂上圓融智寶而賜與之如來亦爾如輪王也為諸法王忍辱大力智慧寶藏佛為法王有大忍力具足智慧功德寶藏以大慈悲如法化世如諸佛說佛亦隨行誘化一切故云如法見一切人受諸苦惱欲求解脫見世上人受諸一切愁憂苦惱欲求清淨自在解脫與諸魔戰與諸四魔之所鑿戰為是衆生說種種法三乘教以大方便說此諸經佛以大悲善巧方便為諸衆等說此諸經既知衆生得其力已已知衆生於方便法得修行力末後乃為說是法華待機熟已末後說妙如王解髻明珠與之賞極功也此經為尊衆經中上於衆經中此經最上我常守護不妄開示佛常祕護不輕示人今正是時為汝等說今日正是開示之時故為汝說我滅度後求佛道者佛滅末世欲求成就佛之道者欲得安隱演說斯經欲得常時身心安隱演說此經應當親近如是四法即四安樂讀是經者常無憂惱心安隱也又無病痛身安隱也顏色鮮白不醜黑也此因經力除現惡報不生貧窮卑賤醜陋未來之世常生勝處不受貧窮卑陋之事此因經力除來報也衆生樂見如慕賢聖一切衆生願欲見之心生敬慕如見賢聖天諸童子以為給使童真天仙而來給侍此之四句轉貧愛障成富足也刀杖不加毒不能害刀杖之屬不臨其身一切諸毒不能為害若人惡罵口則閉塞若人欲加罵詈之時口自閉塞遊行無畏如師子王遊行出間無所畏忌猶如獸王大威猛者此之六句轉瞋恚障成安樂也智慧光明如日之照智慧明了其光普照如日當空罄無側影此之二句轉愚癡障成智慧也自從此去直至品末說一大夢是轉煩惱即成菩提若於夢中但見妙事善惡之境唯心所現以修善故心無惡想若感夢時其相亦善但見佛法勝妙之事其事云何如次下列初夢信位見諸如來坐師子座諸比丘衆圍繞說法心存佛國勝境冥現見佛及衆又聞說法此是心神靈悟所染暫得如是非為聖證又見龍神阿修羅等數如恆沙恭敬合掌又見衆集恭敬於己自見其身而為說法見已為衆而說諸法此是夢入十信位也二夢十住又見諸佛身相金色前雖見佛未甚精明今見佛相作紫金色身輪應世也放無量光照於一切放光表智即意輪鑑機也以梵音聲演說諸法以淨妙音說方便教口輪說法也佛為四衆說無上法又見如來為四衆說無上道者即如實相一佛乘法無上道教見身處中合掌讚佛自見其身處大衆中恭敬合掌說偈讚佛覩相生善也聞法歡喜而為供養聞佛為說一切之法心得歡喜而興供養精義入神也得陀羅尼證不退智得總持門證智不退法眼清淨也佛知其心深入佛道佛他心通知已深入一佛乘道即為授記成最正覺夢佛與授無上道記汝善男子當於來世得無量智佛之大道記於來世得佛智慧成無上道正報勝也國土嚴淨廣大無比所應之土廣大淨妙依報勝也亦有四衆合掌聽法化法流行徒衆多也此上八句即夢佛為授記之辭夢成正覺從又見諸佛至合掌聽法總二十六句此表夢入十住位也三夢十行又見自身在山林中修習善法法雖本有非修不證在山林中樂寂淨也修習善法勤正行也此表夢入十行位也四夢十向證諸實相因修獲證悟實相理此表夢入十向位也五夢十地深入禪定見十方佛入於深禪定中見佛此表夢入十聖位也諸佛身金色百福相莊嚴見諸佛身作紫金色百福相好以為莊嚴聞法為人說從佛得聞微妙之法自見其身為他演說常有是好夢若人修此安樂行者常有如是善好之夢前云若於夢中但見妙事此是標起從見諸如來至十方佛此釋妙事今此四句結示所夢五十位事不言等覺者攝十地中或可修即等覺證即妙覺也此下夢見八相成道又夢作國王捨宮殿眷屬及上妙五欲雖為國王一切棄捨樂出家也行詣於道場在菩提樹下而處師子座行至道場樹下安座修聖道也求道過七日得諸佛之智求道七日得佛智慧證妙果也成無上道已起而轉法輪為四衆說法從定而起為衆說法轉法輪也經千萬億劫說無漏妙法夢經許久常說妙法度無量衆生夢度生也後當入涅槃如煙盡燈滅度衆事畢後入涅槃如油煙盡燈光即滅此表夢入般涅槃也後四句彰功益若後惡世中說是第一法若使滅後末世之中能說如是第一之法是人得大利如上諸功德是說法人當得最妙廣大利益如上所說不可思議甚深功德妙法蓮華經從地涌出品第十五靈山說妙他方遠聞諸菩薩衆其數衆多過如八箇恆河沙數聞釋迦說弘經福大願於此土發誓傳通佛即止云不須汝等此世界中我所化者自有無數諸菩薩等能護是經作此語時下方舊住大菩薩衆即時聞得皆從地涌爾時他方國土諸來菩薩摩訶薩從他方國來聽法者過八恆河沙數言衆多也於大衆中起立合掌作禮而白佛言將欲請委起身具儀而白佛也世尊若聽我等由諸菩薩從餘佛土來至此方故求聽許於佛滅後在此娑婆世界於釋迦佛滅後惡世在此娑婆界勤加精進勤力加功精心進行護持讀誦書寫供養是經典者守護受持讀誦書寫敬心供養法華經者當於此土而廣說之我當於此娑婆國土廣為大衆而演說之爾時佛告諸菩薩摩訶薩衆因菩薩請佛故語之止善男子不須汝等護持此經令止此事不必煩汝所以者何我娑婆世界何故不勞我此世界自有六萬恆河沙等菩薩摩訶薩上首弟子自有許多一一菩薩各有六萬恆河沙眷屬各人所化眷屬之衆亦各許多是諸人等能於我滅後護持讀誦廣說此經言我此衆能任其責佛說是時釋迦如來作是說時娑婆世界三千大千國土地皆震裂佛神力故感動他境振動地裂而於其中有無量千萬億菩薩摩訶薩同時涌出下方空中諸菩薩衆聞佛語故從彼發來是諸菩薩身皆金色三十二相無量光明身紫金色相好具足光明無量皆大菩薩先盡在娑婆世界之下光明經云如此大地厚十六萬八千由旬今言此下即空輪也此界虗空中住住虗空者不屬彼此表住中道大涅槃空是諸菩薩聞釋迦牟尼佛所說音聲從下發來因師之命所以來也一一菩薩皆是大衆唱導之首言是上首大菩薩也各將六萬恆河沙等眷屬言六萬者即表六度一一度中有如是等眷屬之行況將五萬四萬三萬二萬一萬恆河沙等眷屬者若表法者五即五眼四即四諦三即三學二即定慧一即一道清淨況復乃至一恆河沙半恆河沙四分之一乃至千萬億那由他分之一從多至少次第減來況復千萬億那由他眷屬況復億萬眷屬況復千萬百萬乃至一萬況復一千一百乃至一十況復將五四三二一弟子者從前次第減損那由他為億為萬為千為百為十至於五四三二一次第說眷屬從多至少況復單己樂遠離行言諸來者所帶眷屬或多或少或有獨住樂於寂靜不畜衆者如是等比以如上等次第相比並無量無邊無有數量無有邊際算數譬喻所不能知以數算計以物譬喻無能知者是諸菩薩從地出已從下方中地裂出已各詣虗空七寶妙塔多寶佛塔住在空中菩薩遠來欲見佛故故皆詣空七寶塔所多寶如來釋迦牟尼佛所見二世尊到已向二世尊頭面禮足來即詣見見已作禮及至諸寶樹下師子座上佛所亦皆作禮以次巡禮右繞三匝合掌恭敬禮已繞旋表敬儀也以諸菩薩種種讚法而以讚歎用諸菩薩常途種種讚佛之偈以讚於佛住在一面既行禮已在一面立欣樂瞻仰於二世尊欣喜愛樂瞻視仰慕釋迦多寶是諸菩薩摩訶薩從初涌出自從始初地中涌出以諸菩薩種種讚法而讚於佛讚二世尊如是時間經五十小劫經是許時是時釋迦牟尼佛默然而坐世尊默然端坐受讚及諸四衆亦皆默然五十小劫時會集衆亦皆默然佛神力故以佛所證神通力故令諸大衆謂如半日曉解之者即短而長見半日事如五十劫不了之者即長而短見五十劫如半日事爾時四衆亦以佛神力故時會四衆亦因佛力見諸菩薩遍滿無量百千萬億國土虗空見於所來諸菩薩衆遍滿他境無量國土虗空之中是菩薩衆中有四導師是來菩薩大衆之中有四上首唱導之師一名上行功行殊勝最為上故二名無邊行具足無邊清淨妙行三名淨行具足修習白淨之行四名安立行安住寂滅成立梵行是四菩薩於其衆中最為上首唱導之師作唱引導為衆之師在大衆前各共合掌觀釋迦牟尼佛而問訊言出衆合掌觀佛問訊而作是言世尊少病少惱安樂行不稱言世尊少疾病不少憂惱不於四儀中常得安樂行正道不所應度者受教易不所可度衆易受教不不令世尊生疲勞耶機易受化師則不勞此約如來應化之身同於人世故以世情而致問訊若據真身初無逆順爾時四大菩薩而說偈言世尊安樂少病少惱安樂病惱相持為言安則不病樂則不惱教化衆生得無疲倦於世衆生易得行化無有疲勞又諸衆生受化易不又所化衆易受教不不令世尊生疲勞耶此乃菩薩遊化十方禮事諸佛問訊之儀爾時世尊於諸菩薩大衆中而作是言此三句是阿難敘如是如是世尊答云一一皆如汝之所問諸善男子告諸菩薩如來安樂少病少惱身心俱安諸衆生等易可化度度生甚易無有疲勞亦無疲倦所以者何云何易度無有疲勞是諸衆生世世已來常受我化由其衆生易受化意由此人等久受我化亦於過去諸佛恭敬尊重種諸善根又因久於過去佛所恭敬尊重種善根故此諸衆生始見我身諸大根者始於寂場得見世尊華嚴座席聞我所說即皆信受入如來慧如十住十行十向十地及以等覺四十一位法身大士聞法信解入佛智慧除先修習學小乘者唯除最先不解華嚴習小乘者如是之人如是習小鈍根之人我今亦令得聞是經入於佛慧為鈍根故須開方便為說三乘俟根利已乃為說圓亦同華嚴令入佛慧爾時諸大菩薩而說偈言時諸菩薩聞佛所說善巧方便利根鈍根等令入於佛之智慧故以偈讚善哉善哉重言善哉美其至德大雄世尊有大雄猛萬德世尊諸衆生等易可化度上根之人極其易化不俟多方便中下之根方便度脫後易入圓能問諸佛甚深智慧華嚴會上如諸菩薩法華會上如舍利弗聞已信解我等隨喜聞如來說能信能受能解能行我等菩薩亦皆隨喜於時世尊讚嘆上首諸大菩薩四導師讚善哉善哉先如讚美後述其事善男子汝等能於如來發隨喜心所讚美者善汝能於如來法中發心隨喜爾時彌勒菩薩補處菩薩及八千恆河沙諸菩薩衆皆作是念彌勒及衆見下方來諸大菩薩昔所未見所以心疑作是念言我等從昔已來自從久遠往昔已來不見不聞眼不曾見耳不曾聞如是大菩薩摩訶薩衆如是諸來大菩薩衆從地涌出住世尊前從地中涌住世尊前合掌供養問訊如來三業恭謹名為供養省問如來起居安隱時彌勒菩薩摩訶薩知八千恆河沙諸菩薩等心之所念他心通故所知人意並欲自決所疑心亦自疑求佛問決合掌向佛以偈問曰為衆及己問所疑事無量千萬億大衆諸菩薩昔所未曾見問所來者無量之衆願兩足尊說願福慧足世尊為說是從何所來以何因緣集一問來處是何方所二問所集為何因緣巨身大神通巨大之身有大神通從地涌出智慧叵思議智慧深遠不可思議其志念堅固立志建念堅實牢固有大忍辱力能耐一切極重違惱衆生所樂見一切衆生之所樂見為從何所來為復是從何處所來一一諸菩薩所將諸眷屬各各所帶眷屬之衆其數無有量如恆河沙等狀其多也或有大菩薩將六萬恆沙一菩薩將大恆沙衆如是諸大衆一心求佛道衆皆一心為求佛道是諸大師等六萬恆河沙上首菩薩六萬恆沙俱來供養佛及護持是經所以俱來為欲供佛及以持經將五萬恆沙其數過於是將五萬者又復過前六萬之衆四萬及三萬二萬至一萬一千一百等乃至一恆沙半及三四分億萬分之一千萬那由他萬億諸弟子乃至於半億其數復過上百萬至一萬一千及一百五十與一十乃至三二一次第數來漸漸減少單己無眷屬樂於獨處者樂於獨自在間靜者俱來至佛所其數轉過上眷屬雖少衆數甚多轉過於上如是諸大衆如是所集無央之衆若人行籌數過於恆沙劫猶不能盡知若復有人行籌數之過恆沙劫猶不能知是諸大威德精進菩薩衆是諸菩薩有大威德勤行精進誰為其說法教化而成就為師於誰與其說法教化修行成就道果從誰初發心稱揚何佛法平昔稱揚何佛之法受持行誰經受持修行誰之經典修習何佛道其所修習何佛道行如是諸菩薩神通大智力有大神通智慧之力四方地振裂皆從中涌出地自裂開衆從地涌世尊我昔來未曾是是事白佛世尊自昔未見願說其所從國土之名號願說是衆其所來處國土之名我常遊諸國未曾見是事我住等覺常遊十方未見是衆我於此衆中乃不識一人我更不識衆中一人忽然從地出願說其因緣忽然之間從地而出願說所來為何因緣今此之大會無量百千億會衆之數是諸菩薩等皆欲知此事為衆請問咸願欲知是諸菩薩衆本末之因緣是諸菩薩自本至末如上所問種種因緣無量德世尊唯願決衆疑惟願大覺萬德世尊為諸大衆決此疑情此下明分身諸佛弟子致疑爾時釋迦牟尼分身諸佛即寶塔品所集分身從無量千萬億他方國土來者十方諸佛在於八方四方四維名為八諸寶樹下師子座上結跏趺坐在此佛現寶樹下坐其佛侍者其分身佛所帶侍者各各見是菩薩大衆各見地涌大菩薩衆於三千大千世界四方從地涌自下而升住於虗空塔佛在空故住空裏各白其佛言各白自己所師之佛世尊此諸無量無邊阿僧祇菩薩大衆從何所來欲知來由爾時諸佛各告侍者諸佛各語所帶侍者諸善男子且待須臾告言少待有菩薩摩訶薩名曰彌勒此方補處慈氏菩薩釋迦牟尼佛之所授記次後作佛釋迦授記當來成佛已問斯事如前彌勒所問世尊佛今答之釋迦今者當為說之汝等自當因是得聞佛答彌勒汝自得知爾時釋迦牟尼佛告彌勒菩薩善哉善哉阿逸多此云無能勝彌勒名也乃能問佛如是大事即問所來諸菩薩衆稱揚受持修習何道汝等當共一心佛將答示先誡攝心被精進鎧修道破魔貴乎精進譬如入陳而披鎧甲發堅固意意不堅固事不能成故先勸發如來今欲顯發宣示欲明大事故誡勸之諸佛智慧諸佛所慧無上智慧諸佛自在神通之力一切諸佛得大自在神通無礙以智慧故不住生死以慈悲故不住涅槃或長或短隨緣應現名為自在神通之力諸佛師子奮迅之力師子行時前進後却前表進善後表却惡佛如是名為師子奮迅之力諸佛威猛大勢之力圓教大乘究盡三惑圓顯一性此佛威猛大勢之力爾時世尊欲重宣此義而說偈言當精進一心當須一心勤行精進我欲說此事佛欲明此大事因緣勿得有疑悔疑惑退悔不能入道故誡勿得佛智叵思議佛之智慧其義深遠心思口議所不能及汝今出信力汝今出自信心之力住於忍善中住於忍耐善法之中昔所未聞法今皆當得聞昔所未聞圓妙之法今於此會悉當得聞我今安慰汝勿得懷疑懼我今先當安慰於汝聞妙勿得懷疑憂懼佛無不實語智慧不可量佛口所宣一一稱實智慧深遠不可度量所得第一法甚深叵分別佛所證得第一妙法其義深遠不可分別如是今當說汝等一心聽如是深妙今當演說汝等咸須一心善聽爾時世尊說是偈已說上誡勸如實偈已告彌勒菩薩我今於此大衆宣告汝等今於衆中明示汝等阿逸多如前是諸大菩薩摩訶薩地中涌者無量無數阿僧祇如是數量從地涌出汝等昔所未見者即前云我常遍遊未見是事我於是娑婆世界佛於此界發心修行得阿耨多羅三藐三菩提已得成無上正等覺已教化示導是諸菩薩果上教化是衆菩薩調伏其心令發道意以戒定慧調柔制伏其定一心令發究竟無上道意此諸菩薩皆於是娑婆世界之下此界虗空中住在娑婆下不住此也在下空中不異此也不住不異即表中道菩薩住寂故云空中於諸經典讀誦通利雖則住空而不廢有讀誦諸經皆悉通利思惟分別正憶念菩薩證得無分別智一切諸塵皆不顯現住於真寂清淨湛然不涉思忖憶忘俱無是不涉有今大菩薩思惟分別即是正觀如淨名云能善分別諸法相於第一義而不動正憶念者即是正定即淨名云雖知諸法空而常修淨土能正其心憶念不謬即正定也阿逸多是諸善男子等地涌菩薩不樂在衆多有所說在衆多事空言無益所以不樂常樂靜處常只樂於靜默安處勤行精進未曾休息勤行聖道晝夜精進無暫停息亦不依止人天而住亦不依附人間天上常樂深智無有障礙常樂修於甚深智慧觀法空寂無有障礙亦常樂於諸佛之法諸佛法者揀去三乘唯樂一乘佛所得法一心精進求無上慧常爾一心無諸思念精進求於無上佛慧爾時世尊欲重宣此義而說偈言阿逸汝當知告阿逸多汝當知此是諸大菩薩地涌大衆從無數劫來修習佛智慧修行習學佛之智慧悉是我所化令發大道心悉是我身之所教化令發無上大道之心此等是我子依止是世界此等皆是我之法子依此空界異餘菩薩常行頭陀事志樂於靜處頭陀是梵語此云抖擻謂修空寂抖擻一切塵勞煩惱立志樂居空勝之處捨大衆憒閙不樂多所說捨去衆事寡於言語如是諸子等學習我道法如是大衆諸弟子等學習我之無上道法晝夜常精進為求佛道故曉夜之間未常懈倦為欲求於佛道之故在娑婆世界下方空中住前彌勒問為從何來今佛答云住下方空志念力堅固常勤求智慧立志作念願力堅固常欲勤修佛之智慧說種種妙法其心無所畏善能演說種種妙法其心安隱無所畏懼我於伽耶城菩提樹下坐伽耶此云山城即中印土摩竭提國城之西南佛成道處菩提樹下得成最正覺轉無上法輪圓覺登住便名正覺佛自證處名最正覺三乘法輪分上中下一乘法輪名為無上爾乃教化之令初發道心爾時我乃常教化之令其初發無上道心今皆住不退悉當得成佛今則皆住不退之地悉當得成無上佛果我今說實語汝等一心信昔云今生伽耶成道是為劣機方便而說今云久成是說實語汝等皆當一心信受勿生疑惑我從久遠來教化是等衆我從久遠曠大劫來教化是等大菩薩衆爾時彌勒菩薩摩訶薩及無數諸菩薩等彌勒及衆無數菩薩心生疑惑怪未曾有一疑釋迦成道未久二疑菩薩智慧神通所以驚怪而作是念衆心作念云何世尊於少時間謂佛成道四十餘年教化如是無量無邊阿僧祇諸大菩薩疑地涌衆非佛所化令住阿耨多羅三藐三菩提今得住於無上菩提即白佛言因疑白佛世尊如來為太子時出於釋宮如來昔在迦夷羅國太子時不嗣王位出於釋宮去伽耶城不遠去於山城未得長遠坐於道場得成阿耨多羅三藐三菩提便坐道場得成佛果從是已來始過四十餘年十九逾城六年苦行五年遊歷三十成道說法華時七十二歲故云始過四十餘年世尊云何於此少時大作佛事云何於此些少時間能作如是廣大佛事以佛勢力以佛功德轉凡成聖佛勢力也令具福慧佛功德也教化如是無量大菩薩衆當成阿耨多羅三藐三菩提其事甚大所以疑也世尊此大菩薩衆假使有人於千萬億劫數不能盡不得其邊言衆之多久數不盡斯等久遠已來於無量無邊諸佛所謂是等衆久事諸佛植諸善根成就菩薩道常修梵行靈山會衆不識地涌諸大菩薩云何得知久植德本成菩薩道常修淨行由見所來神通智慧以果驗因知是久習世尊如此之事世所難信言此一事師少子老一切世間之所難信譬如有人色美髮黑年二十五以少壯者喻佛近成指百歲人言是我子喻佛指衆是我弟子其百歲人亦指年少言是我父生育我等喻大菩薩亦指世尊是我等師教化我者是事難信如是之事是所難信佛亦如是合少年喻得道已來其實未久四十餘年而此大衆諸菩薩等地涌之衆已於無量千萬億劫久劫已修為佛道故勤行精進為欲求於佛道之故晝夜勤行精進之道善入出住無量百千萬億三昧真常大定本無出入有出入者是示現耳端心正念趣於寂定名為入也堅固不動如須彌山名為住也稍稍安詳後定而起名為出也言三昧者即是正定得大神通久修梵行神通之力猶定而發因寂定故了了見性心通無礙故發神通福德莊嚴皆由梵行善能次第習諸善法事行衆多一時難辨善能次第隨時修習巧於問答人中之寶如初至時見佛瞻禮問答之語其義善巧於人倫中真大寶也一切世間甚為希有於諸世間甚為罕有今日世尊方云得佛道時云在伽耶得道之時初令發心教化示導令向阿耨多羅三藐三菩提初教發心導化令向無上菩提世尊得佛未久四十餘年乃能作此大功德事教化示導是諸菩薩我等雖復信佛隨宜所說我等菩薩雖復信佛如來方便隨宜而說佛所出言未曾虗妄佛金口中所出之言皆是真實未嘗虗妄佛所知者皆悉通達佛智無礙所知如實無不通達然諸新發意菩薩於佛滅後彌勒所以難於佛者唯恐後人不能信故若聞是語或不信受為疑惑故不信是法而起破法罪業因緣不信則毀毀則招過唯然世尊願為解說除我等疑唯然者應諾之辭惟願為說去我等疑及未來世諸善男子聞此事已亦不生疑由問答故斷二種疑一斷現在二斷未來爾時彌勒菩薩欲重宣此義而說偈言佛昔從釋種出家近伽耶佛在昔時從釋種中棄俗出家近伽耶城五六里間坐於菩提樹爾來尚未久坐道樹下自從爾來四十餘年此諸佛子等其數不可量言衆多也久已行佛道住神通智力久已修行住於無礙大神通力善學菩薩道不染世間法善能習學菩薩之道不敢染著世間之法如蓮華在水從地而涌出譬如蓮華在於濁水自於地中而忽涌出皆起恭敬心住於世尊前皆起敬心住在佛前是事難思議云何而可信是化現事難可思議人云何能而即信受佛得道甚近所成就甚多得道日淺化衆甚多願為除衆疑如實分別說願與衆人除疑惑故以如實義分別演說譬如少壯人年始二十五如有年少方二十五示人百歲子髮白而面皺示他年高髮白面皺百歲之人是等我所生子亦說是父少年指老我之所生老指年少謂是己父父少而子老舉世所不信事異常情人豈得信世尊如是得道來甚近如年少者是諸菩薩等志固無怯弱志願堅固無有怯弱從無量劫來而行菩薩道自從遠劫行菩薩道巧於難問答其心無所畏善巧能為疑難問答其心圓活而無所畏忍辱心決定端正有威德而能忍辱心不狐疑形體端正有大威德十方佛所讚善能分別說十方諸佛皆所讚歎善能分別演說諸法不樂在人衆常好在禪定不樂在於衆憒閙中常好習靜在於禪定為求佛道故於下空中住為欲求於成佛之道在於謙下空寂之中我等從佛聞於此事無疑我等從佛聞如是說心自不疑願佛為未來演說令開解願佛慈悲為未來世初心菩薩說令開解若有於此經生疑不信者即當墮惡道言不決疑大有所損恐生毀謗墮於惡道願今為解說願於今日明為解說是無量菩薩是諸無量地涌菩薩云何於少時教化令發心而住不退地世尊云何於少時間教化示導令發道心今皆住於不退之地
