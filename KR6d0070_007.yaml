body:
  text: 錢塘廣照沙門釋聞達妙法蓮華經常不輕菩薩品第二十前品發明五種法師弘經功德不可稱量但聞是經未見其人今舉不輕已往世時忍辱不倦力行斯道得成正覺應驗之事以印前法令生深信於濁惡世竭力流通爾時佛告得大勢菩薩摩訶薩亦名大勢至義如序品佛所以告大勢至者濁世弘經最為難事自非得大忍辱至有勢力方能行之故語此菩薩也汝今當知若比丘比丘尼優婆塞優婆夷持法華經者如上四衆持法華者若有惡口罵詈毀謗惡口罵詈持經之人獲大罪報如前所說即譬喻品說謗經者得諸罪報其所得功德如向所說眼耳鼻舌身意清淨持經之人所獲功德如前法師功德品說得大勢乃往古昔過無量無邊不可思議阿僧祇劫佛告勢至過去久遠無量劫前有佛名威音王佛為法王名聲遠布威震十方故立是號如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如序品解劫名離衰時世好故離諸哀惱國名大成禮樂刑政無所不備故曰大成其威音王佛於彼世中為天人阿修羅說法天人修羅聽法之機為求聲聞者說應四諦法聲聞小機厭苦求樂與四諦法是所相應故為說也度生老病死度脫世間四種苦相究竟涅槃究竟成就偏空寂滅為求辟支佛者說應十二因緣法緣覺之機觀緣入道與十二緣生滅法相是所相應故為說也為諸菩薩因阿耨多羅三藐三菩提菩薩之機志求佛道因於無上正等正覺說應六波羅蜜法究竟佛慧與六度法是所相應故說菩薩波羅蜜法令得成就佛之智慧得大勢是威音王佛壽四十萬億那由他恆河沙劫彼佛應身壽量如是正法住世劫數如一閻浮提微塵以一閻浮抹為微塵喻於正法住世之數像法住世劫數如四天下微塵以四天下抹為微塵喻於像法住世之數其佛饒益衆生已然後滅度四十萬億恆河沙劫數住世說法度衆生已後入涅槃正法像法滅盡之後如上一閻浮提四天微塵劫數法滅之後於此國土即大成國復有佛出亦號威音王與前初佛名號無異如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如序品解如是次第有二萬億佛皆同一號名威音王最初威音王如來既已滅度身入滅已正法滅後正法劫數亦已滅盡於像法中味法稍薄機緣漸稀大略相像正法之時名曰像法增上慢比丘有大勢力法久人微實行者少增上修行未得謂得傲慢人者此時得勢爾時有一菩薩比丘名常不輕像法之中為比丘身行菩薩行名常不輕得大勢以何因緣名常不輕徵起名字欲舉往緣是比丘凡有所見凡一切時有所遇見若比丘比丘尼優婆塞優婆夷像法四衆皆悉禮拜讚歎見人設禮發言稱歎而作是言我深敬汝等不敢輕慢口作是言我於汝等深生恭敬不敢輒生輕慢之心所以者何汝等皆行菩薩道由汝皆行菩薩之道當得作佛道是佛因佛即道果行菩薩道必當作佛而是比丘常不輕者不專讀誦經典但行禮拜不專讀經及與禮拜乃至遠見四衆亦復故往禮拜讚歎遠有所見四衆之時亦復故意前往禮拜讚歎其人在遠尚爾近則可知而作是言我不敢輕於汝等汝等皆當作佛遇有所見即作是言四衆之中有生瞋恚心不淨者中有嗔恚心染世緣不清淨者惡口罵詈彼以習俗反罵正人言是無智比丘從何所來言是愚人自何而來自言我不輕汝而與我等授記當得作佛是述不輕口中之語我等不用如是虗妄授記世人意謂果佛方能與他記莂此愚比丘云何記人顯是虗言我等不用如此經歷多年見人之時常作是言汝當作佛常被罵詈不生嗔恚常被衆人之所罵詈未嘗生於嗔恚之心常作是言汝當作佛雖遭罵詈不易初心說是語時衆人或以杖木瓦石而打擲之衆人惡見常如是說故以杖木而打擲也避走遠住猶高聲唱言遭打遠避猶且高聲我不敢輕於汝等汝等皆當作佛臨危不變真丈夫也以其常作是語故以是比丘常作是語增上慢比丘比丘尼優婆塞優婆夷彼時上慢四衆之人號之為常不輕號此比丘名常不輕是比丘臨欲終時比丘世壽臨終之時於虗空中具聞威音王佛先所說法華經由其平昔觀法性空能行難事故臨終時聞空中聲佛所說法二十千萬億偈悉能受持經文雖多以道力故悉能持之即得如上眼根清淨耳鼻舌身意根清淨由能忍辱持經之故得如前品六根清淨得是六根清淨已淨六根已遂乃不死更增壽命二百萬億那由他歲重增如上世壽之數廣為人說是法華經復廣為人說是妙經於時增上慢四衆比丘比丘尼優婆塞優婆夷即是威王像法四衆輕賤是人為作不輕名者為常不輕作名字者見其得大神通力空中聞法悉能受持神通力也樂說辨力廣為人說樂說辨也大善寂力聞罵不嗔被打不怒大善寂也聞其所說皆信伏隨從見殊勝故聞說生信心中敬伏隨順教化是菩薩即常不輕復化千萬億衆令住阿耨多羅三藐三菩提復化衆多令住佛道命終之後得值二千億佛皆號日月燈明捨前身已生報復值二千億數日月燈明於其法中於日月燈佛法之中說是法華經常為人說是法華經以是因緣復值二千億佛同號雲自在燈王日月燈後復值如上自在燈王於此諸佛法中受持讀誦內淨其心為諸四衆外行化導說此經典故因說如是法華經故得是常眼清淨父母所生清淨耳鼻舌身意諸根清淨六根一時悉得清淨於四衆中說法心無所畏見處不明心多怖畏六根既淨達法淵微遇緣即說何畏之有得大勢是常不輕菩薩摩訶薩供養如是若干諸佛即二萬億威音王二千億日月燈明二千億雲自在燈王恭敬尊重讚歎種諸善根於諸佛所深心奉事植衆善根於後復值千萬億佛雲自在燈王之後值千萬億數無量諸佛亦於諸佛法中說是經典始終業此妙法華經功德成就當得作佛六根功德莊嚴成就後當作佛得大勢於意云何爾時常不輕菩薩豈異人乎則我身是彼威音王時常不輕菩薩即今我身釋迦佛是若我於宿世不受持讀誦此經宿若不持此法華經為他人說者為衆說者不能疾得阿耨多羅三藐三菩提則不能得阿耨菩提我於先佛所受持讀誦此經為人說故疾得阿耨多羅三藐三菩提由讀誦說所以疾成得大勢彼時四衆比丘比丘尼優婆塞優婆夷威音王時像法四衆以嗔恚意輕賤我故惡口罵詈及以打擲是輕賤相二百億劫經如許時常不值佛不聞法不見僧以輕僧故而不信法以慢法故而不敬佛以是業緣二百億劫不遇三寶千劫於阿鼻地獄受大苦惱毀打之報畢是罪已地獄罪畢復遇常不輕菩薩教化阿耨多羅三藐三菩提以宿曾聞罪畢復遇得大勢於汝意云何爾時四衆常輕是菩薩者豈異人乎彼時侮慢不輕菩薩增上慢者今此會中今此靈山法華會中跋陀婆羅等五百菩薩跋陀婆羅此云善守五百菩薩略舉一名師子月等五百比丘師子月者義約威如師子智若月光等五百人尼思佛等五百優婆塞尼思佛者是梵語未詳何義等餘五百皆於阿耨多羅三藐三菩提不退轉者是如上菩薩比丘及優婆塞千五百人皆於菩提得不退轉即是彼時增上慢者得大勢當知是法華經大饒益諸菩薩摩訶薩能令至於阿耨多羅三藐三菩提不輕弘經今登妙覺餘從化者皆得菩提至於上慢亦預聖流是故諸菩薩摩訶薩是故此會諸大菩薩於如來滅後於佛世尊滅度之後常應受持讀誦解說書寫是經如前品中五種法師爾時世尊欲重宣此義而說偈言過去有佛號威音王神智無量將導一切過去世尊威音王佛神通智慧皆悉無量將帶引導一切衆生天人龍神所共供養八部之衆咸共敬仰是佛滅後法欲盡時威音滅後像法之時有一菩薩名常不輕因多可故被諸四衆呼為不輕時諸四衆計著於法僧尼士女執著法相不輕菩薩往到其所到彼四衆著法者所而語之言我不輕汝汝等行道皆當作佛然我所以不輕汝者由汝行道皆當作佛諸人聞已輕毀罵詈諸人不信所以罵之不輕菩薩能忍受之不輕悉能安然忍受其罪畢已菩薩本是善心教化為有何罪般若經云若有讀誦此經為人輕賤者是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅由持經故即以輕賤便除業報臨命終時得聞此經六根清淨臨終之時聞空中說此法華經得六根淨神通力故增益壽命以神通力重增壽命復為諸人廣說是經復為衆說是法華經諸著法衆執著法相諸四衆等皆蒙菩薩教化成就令住佛道皆蒙不輕之所教化成就智慧住於佛道不輕命終值無數佛即日月燈雲自在燈王佛等說是經故得無量福由說經故感得多福漸具功德疾成佛道漸漸具足菩薩功德疾得成就無上佛道彼時不輕則我身是今釋迦是時四部衆著法之者如跋陀婆羅等聞不輕言汝當作佛彼本無心不輕力勉名為強毒與之結緣下大乘種以是因緣值無數佛以是聞法因緣之故得值無數萬億諸佛此會菩薩五百之衆并及四部清信士女即師子月尼思佛等今於我前聽法者是今釋迦前聽法華者我於前世勸是諸人即上諸人聽受斯經第一之法於諸經中此經最上故云第一開示教人令住涅槃開說顯示教化諸人令得住於大般涅槃世世受持如是經典我當世世持此經典億億萬劫至不可議時乃得聞是法華經以億億萬而為一劫至於思議所不能得直待衆生緣熟之時乃得聞是微妙之經言難得遇不可輕也億億萬劫至不可議諸佛世尊時說是經言佛出世說是法華亦自難得如今釋迦四十年後方始說之是故行者於佛滅後聞如是經勿生疑惑疑則成障故勸勿疑應當一心廣說此經應當攝念常一其心廣為人說世世值佛疾成佛道則得世世常值諸佛速成無上佛果菩提妙法蓮華經如來神力品第二十一微妙等數地涌菩薩聞釋迦佛開顯壽量本地風光如是久遠又聞分別法師功德不輕弘經今成正覺是以同聲合掌白佛願於滅後弘傳是經世尊所以於大衆中現起神通證明護念諸分身佛亦復如是放光現相為作證明故曰如來神力品也爾時千世界微塵等菩薩摩訶薩從地涌出者即下方空中諸菩薩皆於佛前一心合掌瞻仰尊顏而白佛言衆皆一心合掌白佛世尊我等於佛滅後於此娑婆佛滅度後世尊分身所在國土滅度之處當廣說此經應是釋迦分身之處當於後廣說是經所以者何我等亦自欲得是真淨大法所以爾者不獨為他兼亦為己欲得明此真常妙經清淨大法受持讀誦解說書寫而供養之為法如是爾時世尊於文殊師利等無量百千萬億菩薩數也舊住娑婆世界菩薩摩訶薩此諸菩薩皆是此方娑婆世界釋迦弟子舊住之人及諸比丘比丘尼優婆塞優婆夷四衆弟子天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等一切衆前於諸八部大衆之前現大神力如下所明大神變力出廣長舌上至梵世舌相長廣橫遍三千竪至梵世妄語之者舌則卷縮出此舌相令衆得見以表真實發信解心一切毛孔放於無量無數色光毛孔放於無數色光表佛圓證法智慧眼皆悉遍照十方世界表佛大慈等照一切衆寶樹下師子座上諸佛亦復如是十方世界分身釋迦坐寶樹下師子座者亦如此現出廣長舌放無量光如前世尊咸出舌相俱至梵天身毛孔中放無數光釋迦牟尼佛及寶樹下諸佛現神力時滿百千歲諸佛神力百千劫事不離剎那一時普遍然後還攝舌相一時謦咳俱共彈指是諸世尊現瑞之後收攝舌相還復如初謦咳覺悟彈指讚善一時俱作無差別者以顯其同佛所以出為說是事而十方界分身諸佛亦復讚善是二音聲是釋迦佛及諸分身謦咳彈指二種音聲遍至十方諸佛世界聲遍十方諸佛國土悉皆震響地皆六種震動十方世界所有大地皆震動者表破無明轉障成德六動之相如序品中其中衆生天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等八部之名如序品解以佛神力故以佛世尊神變之力皆見此娑婆世界十方衆生皆見此土無量無邊百千萬億衆寶樹下師子座上諸佛因佛光故所以得見及見釋迦牟尼佛共多寶如來在寶塔中坐師子座分身諸佛列在八方所以先見自外之內次見釋迦及與多寶又見無量無邊百千萬億菩薩摩訶薩亦是得見此會之衆及諸四衆僧尼士女恭敬圍繞釋迦牟尼佛悉見凡聖恭敬圍繞既見是已見光見相見佛菩薩及四衆已皆大歡喜得未曾有見希有事故大歡喜即時諸天於虗空中高聲唱言空中諸天唱告諸方大衆見者過此無量無邊百千萬億阿僧祇世界從遙見處過爾許剎有國名娑婆指此堪忍是中有佛名釋迦牟尼指釋迦尊今為諸菩薩摩訶薩為此大衆說大乘經名妙法蓮華教菩薩法佛所護念妙等十二字即是法華廣題目也汝等當深心隨喜天勸大衆令發深心隨喜妙法亦當禮拜供養釋迦牟尼佛又勸加敬釋迦世尊彼諸衆生聞虗空中聲已彼十方界其中衆生聞虗空中諸天告已合掌向娑婆世界作如是言衆皆合掌向此娑婆作如是言南無釋迦牟尼佛南無釋迦牟尼佛因聞生信稱持佛名以種種華香瓔珞幡蓋設諸供事及諸嚴身之具珍寶妙物謂以珍寶莊嚴身者皆共遙散娑婆世界因佛光明得遠瞻見故以華等遙散此方所散諸物從十方來譬如雲集變成寶帳物多之故如雲而聚化作寶帳遍覆此間諸佛之上遍釋迦佛及諸分身寶座之上于時十方世界通達無礙如一佛土於事易解若表法者十法界心同一實性如理通達故云無礙爾時佛告上行等菩薩大衆即下方來諸菩薩也諸佛神力如是即上所現神變之相無量無邊不可思議瑞相無邊思議叵及若我以是神力以上所現威神之力於無量無邊百千萬億阿僧祇劫經爾許時為囑纍故為欲付囑如是妙經纍於滅後四衆之故說此經功德猶不能盡功德甚深說不可盡以要言之以其要者而試言之如來一切所有之法所謂漸頓偏圓三乘一乘十二分教如來一切自在神力生滅去來方便示現隨心自在神通力如來一切祕要之藏此法華經是諸如來祕密要妙諸法之藏四十年後時乃說之爾前未發名為祕藏如來一切甚深之事所謂久近本迹二門塵點劫事一切衆生無能知者故曰甚深皆於此經宣示顯說在昔未談名祕密藏今日乃為顯然而說即顯露也是故汝等於如來滅後應當一心受持讀誦解說書寫令傳法也如說修行令起行也所在國土若有受持讀誦解說書寫如說修行謂若有人讀說修行若經卷所住之處隨有是經所在之處若於園中園苑之中若於林中叢林之下若於樹下獨樹之下若於僧坊僧所住處名修道坊若白衣舍俗士之家若在殿堂僧坊殿宇若山谷曠野若在山谷及曠野中是中皆應起塔供養是諸處中皆應建塔所以者何何故勸令起塔供養當知是處即是道場當知世間有是經處即為有佛諸佛於此得阿耨多羅三藐三菩提經是如來成道處也諸佛於此轉于法輪此之一字即指當經佛依此法轉于法輪諸佛於此而般涅槃諸佛亦以此經典故證大涅槃爾時世尊欲重宣此義而說偈言諸佛救世者住於大神通諸佛慈悲乃救世者住於神通大福德藏為悅衆生故現無量神力為令衆生見之歡悅故現如是無量神力舌相至梵天身放無數光現此等相即神通也為求佛道者現此希有事為諸求學佛道之者現此神通希有之事諸佛謦咳聲及彈指之聲周聞十方國謦咳彈指是二音聲十方國土周遍咸聞地皆六種動因現通故所以大地六種震動以佛滅度後能持是經故因諸菩薩於佛滅後發誓弘經諸佛皆歡喜現無量神力一時謦咳同發善音俱共彈指明讚其德囑纍是經故讚美受持者為欲囑纍是法華故發言讚美能受持者於無量劫中猶故不能盡縱經塵劫讚不能盡是人之功德無邊無有窮是持經人所得功德無有邊際亦無窮盡如十方虗空不可得邊際虗空無邊持經功德亦復如是能持是經者則為已見我此經所明是佛法性見佛性者則見佛身亦見多寶佛及諸分身者見本性時即見多寶見差別性即分身佛又見我今日教化諸菩薩得見佛性念念進修期成佛道即衆菩薩能持是經者令我及分身滅度多寶佛一切皆歡喜釋迦出世為說是經多寶出現為說是經分身諸佛為是經故十方雲集見有能持則持佛身故皆歡喜十方現在佛十方現住世之佛并過去未來并已過去入涅槃者及以未來當成佛者亦見亦供養時是經者亦見十方三世諸佛以此心持亦是供養諸佛世尊亦令得歡喜亦令諸佛皆大歡喜諸佛坐道場所得祕要法一切諸佛坐於道場所得祕密要妙之法能持是經者不久亦當得能持是經則行佛道行佛道者不久亦當成得佛道能持是經者於諸法之義於一切法所有義理名字及言辭名字位號及以言辭樂說無窮盡於一名字具無量法於一法中有無量義言辭辨說豈能窮盡如風於空中一切無障礙由見理故善解法義一切通達絶無狐疑譬如清風遊於太虗風無形質虗空無相能所俱空故無障礙於如來滅後知佛所說經於佛滅後知佛所說妙法華經因緣及次第隨義如實說一切經典因緣為宗大小偏圓各有次第今經因緣為一大事今經次第三周開顯融漸即頓點偏即圓先近後遠本迹第論大外無小窮佛性性能善因緣及以次第隨宜解釋不紊宗網一一稱理名如實說如日月光明能除諸幽冥譬如日月有大光明能除世間一切暗昧斯人行世間能滅衆生暗此明經人行於世間能除衆生一切暗障教無量菩薩畢竟住一乘以此妙經教無量衆究竟住於一乘佛道是故有智者聞此功德利以是之故諸有智者聞此持經功德大利於我滅度後應受持斯經於佛滅後當持此經是人於佛道決定無有疑如是智人於佛聖道決定無有疑惑之心妙法蓮華經囑纍品第二十二下方舊住無數菩薩誓於滅後竭力弘經如是大事付托得所佛及分身皆大喜悅現相放光謦咳彈指讚美斯人以堅其志爾時如來於寶塔中從座而起復現神通舒右手摩諸菩薩頂再三囑付以廣流傳囑是付托之為纍即勞煩之義佛以是法囑付將來勞諸菩薩力為行之故名囑纍品也爾時釋迦牟尼佛爾神力品說竟之時從法座起從多寶塔法座中起現大神力以右手摩無量菩薩摩訶薩頂菩薩無量非現神力孰能遍摩一切之頂以右手者右表權智摩其頂者頂表實智而作是言我於無量百千萬億阿僧祇劫從初發心至成正覺經歷爾許阿僧祇劫修習是難得阿耨多羅三藐三菩提法修行習學如是難得菩提之心今以付囑汝等今以此法付於汝等汝等應當一心流布此法廣令增益心若不一豈能成事故勸菩薩應當一心流布如此難得之心廣令法種日漸增益如是三摩諸菩薩摩訶薩頂凡三撫摩欲令堅固而作是言我於無量百千萬億阿僧祇劫修習是難得阿耨多羅三藐三菩提法意義同前令以付囑汝等汝等當受持讀誦廣宣此法囑令持誦廣宣流布令一切衆生普得聞知欲令衆生聞生信解所以者何云何欲廣如來有大慈悲能為衆生拔苦與樂無諸慳吝無有一切慳吝之心亦無所畏亦復無有所怖畏心能與衆生佛之智慧三惑俱亡究竟極果妙覺智慧也如來智慧一三相即修性不二如如智慧也自然智慧匪由修作本有真淨平等大慧也如來是一切衆生之大施主以如如智照如如境境智不二自住其中亦以此法教化一切名大施主汝等亦應隨學如來之法勿生慳吝教諸菩薩亦當隨順學如是法施與衆生勿懷慳吝於未來世若有善男子善女人信如來智慧者有於如來真實智慧能信受者當為演說此法華經使得聞知當與演說此之妙經使其得聞知解義味為令其人得佛慧故欲令聞者得入妙覺佛之智慧若有衆生不信受者或有衆生以緣淺故於此妙經不能信心如教領受當於如來餘深法中示教利喜當於如來餘方便教深法之中開示教導令得利益生大歡喜汝等若能如是若能隨機如是授道則為已報諸佛之恩諸佛本願誓度衆生能順佛意是報佛恩時諸菩薩摩訶薩蒙佛摩頂諸大菩薩聞佛作是說已聞世尊說報恩之語皆大歡喜遍滿其身衆皆歡喜充遍其身益加恭敬曲躬低頭合掌向佛俱發聲言增加敬慕曲身低頭俱同發聲如世尊敕當具奉行如佛世尊之所教敕當備奉行唯然世尊願不有慮以身任責歡勿慮也諸菩薩摩訶薩衆如是三反俱發聲言如世尊敕當具奉行唯然世尊願不有慮如是至三請不有慮爾時釋迦牟尼佛令十方來諸分身佛各還本土為諸菩薩欲見多寶故集分身證經事畢故令各還本化之國而作是言諸佛各隨所安多寶佛塔還可如故分身諸佛各隨本土之所安住多寶佛塔已酬素志請還下方說是語時十方無量分身諸佛坐寶樹下師子座上者即寶塔品八方所變四百萬億那由他國菩提樹下坐師子座諸分身佛及多寶佛即寶塔品下方涌出住於虗空寶塔中佛并上行等無邊阿僧祇菩薩大衆即十五品下方涌出舊住娑婆上行菩薩等無邊僧祇誓持經者舍利弗等聲聞四衆即現住娑婆法華得記諸大聲聞并四衆等及一切世間天人阿修羅等八部之衆聞佛所說皆大歡喜衆聞如來語諸佛言各還本土聽法既辨心各悟明故皆歡喜妙法蓮華經藥王菩薩本事品第二十三他經之中聞囑纍已大衆即散今法華會於囑纍後遇宿王華請問藥王何緣遊此願聞苦行唯分身佛即沒不現多寶尚留衆亦不散前囑纍品佛起塔中多寶之座立空中說今藥王品復在靈山法座上說爾時宿王華菩薩白佛言世尊宿王華者未詳其義藥王菩薩云何遊於娑婆世界藥王者楞嚴云無始時來為世良醫世尊印我名為藥王宿王華問意欲世尊發明往事激勵時心世尊是藥王菩薩有若干百千萬億那由他難行苦行言藥王有人所難行衆多苦行善哉世尊願少解說不敢具聞願為略說諸天龍神夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等八部之衆又他國土諸來菩薩他方遠來諸大菩薩及此聲聞衆及以此土小乘之衆聞皆歡喜言如上衆皆喜願聞爾時佛告宿王華菩薩乃往過去無量恆河沙劫往古無量恆沙劫前有佛號日月淨明德義約佛智慧明如日月德淨無垢故得是名如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如序品解其佛有八十億大菩薩摩訶薩大乘弟子七十二恆河沙大聲聞衆二乘弟子佛壽四萬二千劫住世之壽菩薩壽命亦等壽與佛等彼國無有女人離淫欲也地獄餓鬼畜生阿修羅等無四惡也及以諸難無八難也地平如掌由平心地世地亦平琉璃所成心明淨故地亦明淨寶樹莊嚴菩提行願以為道樹寶帳覆上以佛頂智修佛福德遍覆其上垂寶華幡幡像色身取鼓動義寶瓶香爐寶瓶惑華守口如瓶不令傾側養衆寶華寶爐然香爐以表心香以表信周遍國界七寶為臺臺即寶座一樹一臺一一樹下有一寶臺其樹去臺盡一箭道寶樹相去各一箭地一百二十步也此諸寶樹皆有菩薩聲聞而坐其下大願名樹住法名座諸寶臺上各有百億諸天一切善念名為諸天作天伎樂歌歎於佛和樂之音名天伎樂歌揚讚歎佛之功德以為供養隨順佛心名供養佛爾時彼佛為一切衆生喜見菩薩即是藥王往世之名以慈悲故為衆生之所喜見及衆菩薩大乘之衆諸聲聞衆小乘之衆說法華經彼佛為衆亦說妙經是一切衆生喜見菩薩樂習苦行樂欲習學精苦之行於日月淨明德佛法中依彼佛法安於其中精進經行精一修進晝夜行道直來直去如絲經直名曰經行即常行三昧也一心求佛心無異念志求佛道滿萬二千歲已至勤苦卓經歷許時得現一切色身三昧以勤苦故即時證得普現色身得此三昧已心大歡喜以見法故得三昧樂即作念言我得現一切色身三昧我得此定皆是得聞法華經力云何聞經即得三昧經令運心普化一切則於一一衆生之前皆有我身以是之故得普現身由經力也我今當供養日月淨明德佛及法華經從佛聞法從法入道故得道已思供佛經即時入是三昧即普現身於虗空中於虗空者表於空寂起方便用雨曼陀羅華摩訶曼陀羅華大小二種白色之華表淨行也細末堅黑旃檀香質堅黑細末而下滿虗空中如雲而下表細行也又雨海此岸旃檀之香閻浮洲比海之此岸出最妙香名牛頭旃檀此香六銖價直娑婆世界二二四銖名為一兩六銖即是四分之一六銖之價直娑婆國言至貴也以供養佛雨華獻香即是自供性德佛也作是供養已從三昧起現大神變作廣供已還從定出而念言我雖以神力供養於佛前所現供皆身外物不如以身供養身是內財方為大施即服諸香旃檀薰陸狀如桃膠葉似棠梨兜樓婆白茆香畢力迦丁香沉水沉香膠香柏膠香又飲瞻蔔黃色華諸華香油以諸華香浸油令香滿千二百歲已如是淨身千二百歲香油塗身如木犀油等可以塗身者於日月淨明德佛前以天寶衣而自纏身灌諸香油先以衣纏次灌以油如燭之狀以神通力願而自然身以神通力大願之力而自燒然百福之身光明遍照八十億恆河沙世界以神通力故能光照恆沙世界八十億者即是照破八識塵勞其中諸佛同時讚言善哉善哉光所照處諸佛同讚善男子是真精進若以事供未足為難以然身供真精進也是名真法供養如來捨身命財如法行施若不了知五陰本空四大非有云何能捨見法空故名為法施施合真空是故名為真法供養若以華香瓔珞燒香末香塗香天繒幡蓋色塵供養及海此岸旃檀之香香塵供養如是等種種諸物供養所不能及此皆外物不及身施假使國城妻子布施亦所不及國城之施即是外報妻子等施即是內報亦皆不及捨身布施善男子是名第一之施於諸施中最尊最上悉過諸施以法供養諸如來故以此之人見法空故能捨身命供如來故作是語已而各默然諸佛讚已然後默然今謂身是穢物舉體不淨縱灌香油然之亦臭何為諸佛喜此供養咸稱善哉名真法供當知此義若能空身則一切物無有不空其見空者則能無礙心無礙故諸障即空即空亦空空極覺滿是真解脫其身火然千二百歲言如此久也過是已後其身乃盡然身事畢一切衆生喜見菩薩作如是法供養已捨身之後命終之後復生日月淨明德佛國中重復應世於淨德王家托國王家結加趺坐以神通力加坐化生忽然化生即為其父而說偈言既曰化生云何有父以托王家稱王為父大王今當知我經行彼處即上文云精進經行即時得一切現諸身三昧從精進定發得神通故能普現一切色身勤行大精進捨所愛之身總述前身能捨所愛得道之身說是偈已而白父言日月淨明德佛今故現在菩薩苦行先取涅槃如來壽高猶現在世我先供養佛已得解一切衆生語言陀羅尼十方國土所有衆生種種言音悉能解了名解一切衆生語言三昧復聞是法華經八百千萬億那由他甄迦羅頻婆羅阿閦婆等偈八百千萬者謂八百箇一千萬也西土大數有五十二種甄迦羅是第十六頻婆羅是十八阿閦婆是第二十後面更有三十二種故云等也大王我今當還供養此佛即復供養淨明德佛白已即坐七寶之臺即寶座也上升虗空騰身空中高七多羅樹一多羅約以七尺總五丈許往到佛所頭面禮足往彼佛所頭面敬禮佛之雙足合十指爪以偈讚佛容顏甚奇妙歎佛福相容顏甚妙光明照十方歎佛慧光照十方界我適曾供養謂前身時已曾供養今復還親覲謂再出世復遇世尊爾時一切衆生喜見菩薩說是偈已而白佛言此經家語阿難所置世尊世尊猶故在世菩薩再生又得見佛故作是說爾時日月淨明德佛告一切衆生喜見菩薩因喜見問佛尚在出所以告之善男子我涅槃時到謂化緣畢將事歸真滅盡時至謂當入於滅盡涅槃汝可安施床座令治床座入滅之處我於今夜當般涅槃諸佛降生並在日中表陽明也諸佛入滅悉於中夜表陰暗也佛出於世間為衆生作眼世尊入寂滅十方皆暗瞑又敕一切衆生喜見菩薩善男子我以佛法囑纍於汝謂以佛之功德法藏付囑住持流通後世及諸菩薩大弟子付以弟子囑令教導并阿耨多羅三藐三菩提法前云佛法通囑三藏今菩提法是圓頓教亦以三千大千七寶世界實報土也諸寶樹寶臺樹即願王臺即法空及給侍諸天佛在世時諸天侍衛今佛入滅付傳法人悉付於汝悉囑喜見我滅度後所有舍利亦付囑汝舍利乃是佛之骨身由戒定慧之所熏修甚難可得最上福田故囑喜見善為護持當令流布廣設供養當令衆生流布供養應起若干千塔又令起塔奉安舍利如是日月淨明德佛敕一切衆生喜見菩薩已淨明德佛如上囑已於夜後分入於涅槃中夜之後即入滅也爾時一切衆生喜見菩薩見佛滅度目見如來入於滅度悲感懊惱戀慕於佛悲切感動追思佛德懊惱戀慕即以海此岸旃檀為𧂐海此岸栴檀即牛頭栴檀積聚為𧂐供養佛身而以燒之以香為薪焚化於佛火滅已後收取舍利收拾遺身作八萬四千寶瓶以寶為瓶盛貯舍利以起八萬四千塔每一寶瓶建立一塔高三世界表極三際表剎莊嚴立剎竿者表佛示剎令諸迷者知其所趣垂諸幡蓋懸衆寶鈴各有所表如前委釋爾時一切衆生喜見菩薩復自念言建塔之後又復作念我雖作是供養心猶未足未滿所願我今當更供養舍利意欲如是便語諸菩薩大弟子及天龍夜叉等一切大衆告大衆知汝等當一心念勸令攝靜一心正念我今供養日月淨明德佛舍利我今當供佛之舍利作是語已即於八萬四千塔前然百福莊嚴臂菩薩之臂因修百福之所莊嚴然以供佛七萬二千歲而以供養七萬即表七善功德二千即表真俗二諦令無數求聲聞衆求小乘者教令入大無量阿僧祇人初入道者發阿耨多羅三藐三菩提心發大道心皆使得住現一切色身三昧使衆皆住現色身定爾時諸菩薩天人阿修羅等人天八部見其無臂憂惱悲哀見其菩薩無百福衆臂皆愍之而作是言此一切衆生喜見菩薩是我等師所依止者教化我者唱導之師而今燒臂身不具足因然臂故身相不具于時一切衆生喜見菩薩於大衆中立此誓言菩薩見衆不了色空故立誓言以彰如幻我捨兩臂必當得佛金色之身菩薩自謂其理當然若實不虗此事若是真實不虗令我兩臂還復如故對於大衆作如是言作是誓已自然還復兩臂如故由斯菩薩福德智慧淳厚所致云何燒已臂復如初由此菩薩福德務實智慧解空淳淨深厚之所招致當爾之時三千大千世界六種震動神通願力所感如此天雨寶華諸天見喜散華供養一切人天得未曾有燒已還復世所未有佛告宿王華菩薩於汝意云何於汝之意以為云何一切衆生喜見菩薩豈異人乎今藥王菩薩是也彼時喜見即今藥王其所捨身布施如是無量百千萬億那由他數非止一度如斯苦行其所從來捨身供養不可勝數宿王華若有發心欲得阿耨多羅三藐三菩提者若人發心求菩提者能然手指乃至足一指供養佛塔此意無他佛只要人稍知痛癢勝以國城妻子國城是所住妻子是所愛雖如是施不及捨身及三千大千國土山林河池所依之土諸珍寶物所可玩好此亦外物寧及捨身而供養者財寶供養不及捨身若復有人以七寶滿三千大千世界供養於佛若人以滿三千世界七寶供佛及大菩薩辟支佛即緣覺也阿羅漢此云無生謂供四果是人所得功德是布施人所獲功德不如受持此法華經乃至一四句偈其福最多布施乃是有為之福持經則能獲無漏慧尚且不及持經四句況復欲比具持經者宿王華譬如一切川流江河諸水之中海為第一衆流歸海此法華經亦復如是亦如大海於諸如來所說經中最為深大極談佛智名之為深無機不被無法不收名之為大又如土山黑山小鐵圍山褁四天下大鐵圍山褁大千界及十寶山即須彌山外十大山王衆山之中須彌山為第一須彌山者生大海中高出水面八萬四千由旬此法華經亦復如是亦如須彌於諸經中最為其上諸經之王又如衆星之中月天子最為第一星宿中王此法華經亦復如是如月天子於千萬億種諸經法中最為照明餘方便教光照三乘此經慧光照究竟覺又如日天子能除諸暗日光出時破諸幽暗此經亦復如是能破一切不善之暗究盡三惑成一實道又如諸小王中轉輪聖王最為第一餘諸少王各守一國轉輪聖王統四天下此經亦復如是於衆經中最為其尊經王中王統御一切又如帝釋三十三天中王須彌四岸各有八天帝釋居中共三十三餘三十二皆尊帝釋此經亦復如是諸經中王衆經之尊又如大梵天王一切衆生之父大梵尊天三界之主一切衆生視之如父此經亦復如是一切賢聖學無學一切賢聖即指三乘三果已還名為有學四果羅漢名為無學及發菩薩心者之父菩薩屬因經談佛果則是父也又如一切凡夫人中須陀洹此云預流初得聖果預聖人流斯陀含此云一來證二果已更來欲界一反受生阿那含此云不來證三果已居四禪天不來欲界阿羅漢此云無生見思惑盡證無學果不生三界辟支佛為第一此云緣覺觀十二緣覺空理故又云獨覺獨宿孤峯自能覺了果位聲聞但斷正使緣覺之人更侵習氣居四果上故云第一此經亦復如是一切如來所說方便權教若菩薩所說若聲聞所說諸經法中最為第一圓教上乘攝諸權小故云第一有能受持是經典者亦復如是於一切衆生中亦為第一持餘經者位在三乘若持此經則成佛道於諸人中是最第一一切聲聞辟支佛中菩薩為第一三乘之中菩薩居上此經亦復如是於一切諸經法中最為第一於諸經中此經最上如佛為諸法王此經亦復如是諸經中王先比凡夫次比二乘三比菩薩四比如來次第比勝顯經第一宿王華此經能救一切衆生者此法華經能為衆生作救護者此經能令一切衆生離諸苦惱能離一切生死苦惱此經能大饒益一切衆生充滿其願持此經者則成佛果所願皆足如清涼池能滿一切諸渴乏者渴乏之者得水則濟衆生得法理水入心離諸枯槁如寒者得火寒者得火則免凍苦衆生得法暖氣漸鄰如裸者得衣裸者得衣免露形醜衆生入法得忍辱衣如商人得主商販之人投奔主者遊學之人見性為本如子得母子得其母則免孤露衆生得經成就聖體如渡得船渡者得船江河無礙學者得經障礙悉遣如病得醫病者得醫身則安愈學者得經心無憂畏如暗得燈暗處得燈凡事可見衆生得解暗障潛消如貧得寶貧人得寶免於貧乏學者發明智慧具足如民得王民得其王方能存活學者見性方得心安如賈客得海客人得海泛舶津通學人悟性見理精明如炬除暗炬能破暗經能除惑此法華經亦復如是即指上文種種譬喻能令衆生離一切苦所謂三苦五苦八苦二死等苦一切病痛世間病痛從業報生以慈修身則無病惱能解一切生死之縛不見理者被生死縛若悟理時則得自在若人得聞此法華經或耳得聞有此法華或因講說而得聽聞若自書親手自寫若使人書倩人為書所得功德是書經人所獲功德以佛智慧籌量多少不得其邊以佛慧測尚不能知況餘聖賢若書是經卷為欲供養而書是經華香瓔珞燒香末香塗香以此香華而為供養幡蓋衣服以此為供種種之燈此句總標蘇燈油燈蘇及清油諸香油燈諸香浸油薝蔔油燈此云黃華華本無油以華浸耳須曼那油燈此云稱意華波羅羅油燈此云重生華婆利師迦油燈此云憂生華那婆摩利油燈那婆此云雜華摩利亦云末利此方有之供養以諸香油燃燈供養所得功德亦復無量幡蓋衣服香華油燈供養經卷是人亦獲無量功德宿王華若有人聞是藥王菩薩本事品者即前燒身臂指本時所作苦行之事亦得無量無邊功德聞一善言心隨向善故能亦獲無邊功德若有女人聞是藥王菩薩本事品女人得聞是藥王品能受持者因聞敬信堅意受持盡是女身後不復受盡此女報後報男身若如來滅後後五百歲中即今末世屬後五百若有女人聞是經典如說修行女人聞經如經中說依而行之於此命終於此娑婆報命終後即往安樂世界西方彌陀安樂國土阿彌陀佛此云無量壽佛大菩薩衆圍繞住處菩薩大衆圍繞佛處生蓮華中寶座之上即指九品土寶蓮臺不復為貪欲所惱何故聞是藥王品經即捨女身生安樂土中貪愛故受女人身今聞藥王捨身之事悟色性空不生貪著故能脫也亦復不為瞋恚愚癡所惱妬色生瞋今知色空息瞋心也貪瞋不捨不擇尊卑及以種類即癡心也今因經故瞋癡亦滅亦復不為憍慢嫉妬諸垢所惱有憍慢心則輕下小有嫉妬心則忌婢妾垢汙自心今因經故回心向善諸病自除則不被惱得菩薩神通無生法忍此明悟心生淨土已得通證忍因不著故住於空寂定中發得自在神通由能安忍了生法空得無生忍得是忍已眼根清淨色壞眼故為恩愛奴眼不著色根則清淨以是清淨眼根見七百萬二千億那由他恆河沙等諸佛如來七百萬者即是表對七支功德二千億者即是表顯真俗二諦眼根淨故一切七支空有之境以蘊空智悉見諸相無非是佛是時諸佛遙共讚言體本因人望於果位相去尚遠故云遙讚善哉善哉善男子汝能於釋迦牟尼佛法中今藥王品是佛所說故云能於釋迦法中受持讀誦思惟是經即自行也為他人說即利他人自利利他名菩薩也所得福德無量無邊利益深也火不能焚以忍力故一切嗔火所不能燒水不能漂以絶愛故一切貪水所不能漂汝之功德千佛共說不能令盡縱使千佛一時共說所得功德亦不能盡汝今已能破諸魔賊魔有四種所謂五蘊魔煩惱魔死魔天魔前三內魔四是外魔賊有六種六根為男六塵為女六識為媒自劫家寶了性空寂根塵清淨外魔不作內障潛消名破魔賊壞生死軍有貪瞋癡造身口業則受生死塵既不緣根無所偶生死軍壞諸餘怨敵皆悉摧滅大陳既破餘惑自消譬如日出霜露咸晞善男子百千諸佛以神通力共守護汝一切妄念悉轉為善是諸善念常護一心名百千佛神通之力所共守護於一切世間天人之中無如汝者得忍菩薩住自在通云何人天而能比擬唯除如來得是除得如來一人其諸聲聞辟支佛乃至菩薩智慧禪定無有與汝等者三乘之中菩薩最勝權教菩薩比今圓人斷不可及宿王華此菩薩成就如是功德智慧之力功德力故成就福報智慧力故滅諸生死若有人聞是藥王菩薩本事品能隨喜讚善者有聞是經隨順歡喜讚言善哉者是人現世口中常出青蓮華香口談善事香從口出身毛孔中常出牛頭旃檀之香其身淨故香從內發毛孔出香所得功德如上所說即指上文是故宿王華以此藥王菩薩本事品囑纍於汝以苦行事囑宿王華勸人行也我滅度後後五百歲中即末法萬年初五百歲今日是也廣宣流布囑令廣說流布世上於閻浮提無令斷絶閻浮從樹為名提即南洲常令相續勿斷法種惡魔魔民魔王即殺害主魔民即隨從者諸天龍夜叉鳩槃茶等此皆魔外非是護法諸天龍也鳩槃茶者即厭魅鬼得其便也不令魔外同求其便宿王華汝當以神通之力守護是經以己所證大神通力常加守護於是經典所以者何何故囑付如是之嚴此經則為閻浮提人病之良藥色心二病皆可得治若人有病得聞是經病即消滅知經所行自然病瘥不老不死云何持經得不老死如常不輕更增壽命即其證也宿王華汝若見有受持是經者遇持經者應以青蓮華盛滿末香供散其上青是東方之色表於仁慈末香即是表於細行由持經人慈心發行故以是散散已作是念言散華供已當作是念此人不久必當取草坐於道場應身之佛以草為座釋迦如來觀三世佛皆悉在於樹下成道見刈草者遂立其前彼人問云莫欲是否世尊默然其人束草以施世尊取之為座樹下安坐成無上覺故云不久必當取草坐於樹下菩提道場破諸魔軍示現成道震動魔宮魔故來戰須用破也當吹法螺螺聲發時即是改號諸佛說法轉凡成聖即改號義名吹螺也擊大法鼓擊鼓之時即是集衆佛演法音衆集諦聽名擊法鼓度脫一切衆生老病死海度諸衆生出生死海是故求佛道者以是之故凡求道者見有受持是經典人見有持此法華經者應當如是生恭敬心應當如上生心致敬說是藥王菩薩本事品時佛說是時八萬四千菩薩得解一切衆生語言陀羅尼了一切句即是一句一句者何妙法華是得此解者名陀羅尼多寶如來於寶塔中因宿王華多寶未去讚宿王華菩薩言善哉善哉宿王華美其善問難行苦行足勸時心所以讚善汝成就不可思議功德汝發此問功德難思乃能問釋迦牟尼佛如此之事即是如上苦行之事利益無量一切衆生衆生聞者見賢思齊利益何窮無有限量妙法蓮華經妙音菩薩品第二十四以前諸品次第相由各有起盡自囑纍後因宿王華問於藥王說本事品讚揚苦行化他流通此妙音品因佛放光妙音遠至宿以音樂供雲雷音今得此號如下廣說爾時釋迦牟尼佛放大人相肉髻光明佛頂之上有一肉團如髻之狀即三十二相中之一從肉髻上放光明者表最上乘第一之法及放眉間白毫相光兩眉中間印堂之處有一白毫長一丈五尺色如珂雪宛轉眉間外有八稜中空如筒凡放光明從中間出兩眉表於空有二諦中間白毫即表中道第一義諦遍照東方百八萬億那由他恆河沙等諸佛世界東方震位為動之土百八萬億表十八界過是數已有世界名淨光莊嚴楞嚴云十方諸佛於十八界一一修習皆得圓通超過十八則是諸佛淨光莊嚴其國有佛號淨華宿王智經云如蓮華在水清淨而質直故曰淨華如月天子星宿中王智慧成就如月之明故曰宿王智如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如序品解為無量無邊菩薩大衆恭敬圍繞而為說法衆敬圍繞佛為說法釋迦牟尼佛釋迦此云能仁牟尼此云寂默白毫光明遍照其國釋迦毫光照淨嚴國爾時一切淨光莊嚴國中有一菩薩名曰妙音久已植衆德本久已修行種佛善根供養親近無量百千萬億諸佛已曾近事衆多諸佛而悉成就甚深智慧甚深智慧即佛慧也得妙幢相三昧三昧此云正定得深妙定安住不動名妙幢相法華三昧心法圓明清淨離染如蓮華王映水開敷淨德三昧離一切相修習諸善名為淨德宿王戲三昧心明無礙遊畢竟空如星宿王之所遊戲無緣三昧如來大慈凡有三種一衆生緣慈緣衆生境起於慈心二法緣慈觀一切法悉皆空寂不見有礙起大慈心三無緣慈無心緣念一切衆生有感即應無往不通如淨月輪影含萬水智印三昧以真實智印一切法即妄而真解一切衆生語言三昧衆生之類所說不同菩薩定智悉能解了集一切功德三昧能於正定聚集一切無邊功德清淨三昧了性本空遠塵離垢神通遊戲三昧以神通力現種種相遍遊法界化諸有情慧炬三昧得大慧明如炬除暗莊嚴王三昧以佛莊嚴而自莊嚴淨光明三昧以淨妙光照明一切淨藏三昧淨心住於如來密藏不共三昧不共三乘佛之三昧日旋三昧淨智明了如日旋轉得如是等三昧名多故且略指百千萬億恆河沙等諸大三昧言此菩薩所證甚深釋迦牟尼佛光照其身佛光遠照彼菩薩身即白淨華宿王智佛言因見光照遂往白佛世尊我當往詣娑婆世界欲從彼土來至此方禮拜親近供養釋迦牟尼佛所來之意為欲親近禮事釋迦及見文殊師利法王子菩薩如序品解藥王菩薩如前品解勇施菩薩菩薩善能勇猛行施宿王華菩薩宿王即月華喻淨心上行意菩薩發大道心修無上行莊嚴王菩薩以佛功德諸王三昧而自莊嚴藥上菩薩以上妙藥施一切人如來印為藥上菩薩爾時淨華宿王智佛告妙音菩薩妙音將行彼佛囑付汝莫輕彼國生下劣想汝今欲往莫於娑婆作下劣想善男子彼娑婆世界高下不平人心不等地亦如然楞嚴云當平心地則世界地自然平正土石諸山以執妄故我人嶽立穢惡充滿內則四大色身雜穢充遍外則地獄餓鬼畜生盈滿佛身卑小佛隨人量劣應丈六諸菩薩衆其形亦小菩薩助化隨佛大小而汝身四萬二千由旬四萬二千者表四萬二千福河常澍如律所明我身六百八十萬由旬六百者表六波羅蜜八十萬者表於八正汝身第一端正百千萬福戒定功德光明殊妙智慧功德是故汝往莫輕彼國結上誡意若佛菩薩及國土生下劣想彼佛現淨攝受上流釋迦現穢折伏下愚依正之相悉不如彼妙音菩薩白其佛言因佛告誡菩薩答之世尊我今詣娑婆世界我今所往彼堪忍土皆是如來之力皆承如來慈善根力如來神通遊戲皆以如來神通遊化如來功德智慧莊嚴皆以如來所行之處檀等五度功德莊嚴甚深般若智慧莊嚴我心如是願勿有慮於是妙音菩薩不起于座不起彼中淨光國座身不動搖而入三昧欲現神通故先入定以三昧力於耆闍崛山此云靈鷲去法座不遠去釋迦佛說法之座而不甚遠化作八萬四千表破此數塵勞煩惱衆寶蓮華轉惑為智成菩提道閻浮檀金為莖金為莖梗表中道智白銀為葉銀為蓮葉表諸梵行金剛為鬚細密中智如蓮華鬚甄叔迦寶以為其臺甄叔迦此云赤色華蓮臺赤色如甄迦爾時文殊師利法王子見是蓮華而白佛言見蓮華現問佛所以世尊是何因緣先現此瑞為何因緣先現瑞相有若干千萬蓮華閻浮檀金為莖白銀為葉金剛為鬚甄叔迦寶以為其臺具述衆眼所見之相爾時釋迦牟尼佛告文殊師利是妙音菩薩摩訶薩佛告文殊是妙音現欲從淨華宿王智佛國言所來處與八萬四千菩薩圍繞言同行衆而來至此娑婆世界欲來此處供養親近禮拜於我意為供佛亦欲供養聽法華經兼為供衆及以聽經文殊師利白佛言復欲問佛知其所修世尊是菩薩種何善本問宿善根修何功德問所修德而能有是大神通力指所現事行何三昧行何正定通因定發故問三昧願為我等說是三昧名字求問定名我等亦欲勤修行之見賢思齊行此三昧乃能見是菩薩色相大小威儀進止得彼三昧則知其身惟願世尊以神通力願承佛力彼菩薩來令我得見得見妙音爾時釋迦牟尼佛告文殊師利語文殊知此久滅度多寶如來當為汝等而現其相委在多寶時多寶佛告彼菩薩善男子來因釋迦委故語妙音文殊師利法王子欲見汝身因為文殊欲見相故于時妙音菩薩於彼國沒先是現通今動身至與八萬四千菩薩俱共發來一念動時衆念俱轉如一人動衆悉從之所經諸國六種震動菩薩行處地皆震動表破無明轉十八界皆悉雨於七寶蓮華雨七寶華表七善業百千天樂不鼓自鳴無心之說名為天樂由不作意所以謂之不鼓自鳴是菩薩目如廣大青蓮華葉廣大慈眼如紺青蓮正使和合百千萬月正使聚集百千萬億清淨月輪其面貌端正復過於此亦不足喻面貌端正身真金色無量百千功德莊嚴紫金身相皆是積劫功德莊嚴威德熾盛威勢德善三俱熾盛光明照耀身之光明照耀無量諸相具足百千相好皆悉具足如那羅延堅固之身那羅延即金剛力士喻菩薩身如是堅固入七寶臺入蓮華座上升虗空乘空而來去地七多羅樹與地相去高五丈許諸菩薩衆恭敬圍繞眷屬擁從而來詣此娑婆世界耆闍崛山詣靈鷲山到已下七寶臺從蓮華下以價直百千瓔珞執此瓔珞以為贄見持至釋迦牟尼佛所到於佛前頭面禮足進見之禮奉上瓔珞瓔珞之具寶珠結成猷瓔珞者表以智珠而相見也而白佛言具禮已畢然後傳信世尊淨華宿王智佛問訊世尊少病少惱是問應身少有病惱起居輕利動靜輕快安樂行不身心安樂所行易不四大調和不四大色身皆調順不世事可忍不處世行事可忍耐不衆生易度不衆生之類易度脫不無多貪欲嗔恚愚癡嫉妬慳慢不貪嗔癡即三毒嫉妬於他慳吝傲慢則難可教化衆生未免但得無多足可授道無不孝父母父母至親不孝其親如何入道不敬沙門邪見不不敬沙門則有邪見此非道器無是等不善心不有念善心為道之本攝五情不常途說有六情今別問心次問五情皆能攝不世尊衆生能降伏諸魔怨不內則五陰魔煩惱魔死魔外則天魔為能降伏令不作不久滅度多寶如來在七寶塔中來聽法不多寶宿願在處聽經故有此問妙音之來因多寶喚善男子來云何今者更問來不此是妙音傳彼本師淨華智佛因妙音至問訊釋迦又問訊多寶如來安隱少惱多寶已滅問寂定身堪忍久住不堪耐世情在寶塔中能久住不世尊我今欲見多寶佛身囑纍品前釋迦起身多寶塔閇今妙音來故欲見之惟願世尊示我令見願以佛力顯示令見爾時釋迦牟尼佛語多寶佛是妙音菩薩欲得相見為引進也時多寶佛告妙音言善哉善哉歎美之辭汝能為供養釋迦牟尼佛及聽法華經并見文殊師利等故來至此妙音此行凡有三意一為供佛二為聽經三為見諸菩薩所以多寶歎言善哉爾時華德菩薩義約如華之妙明德馨香故名華德白佛言前文殊問多寶如來得見其相猶未得聞善根功德故此再問世尊是妙音菩薩種何善根修何功德問彼菩薩修種兩端有是神力神力廣大變現如是所證必深佛告華德菩薩過去有佛名雲雷音王應身如雲覆三千界慈音如雷普震一切為法中王多陀阿伽度此云如來阿羅訶此云應供三藐三佛陀此云正等正覺國名現一切世間一切世間所有之事悉於中現劫名喜見時世升平人所喜見妙音菩薩於萬二千歲以十萬種伎樂經是許時以衆伎樂供養雲雷音王佛為於佛故修此供養并奉上八萬四千七寶鉢八萬四千表法門也七寶為鉢寶喻七善鉢可盛貯喻衆善願以是因緣果報善心是因猷樂奉鉢是其善緣今得勝報即是善果今生淨華宿王智佛國有是神力是答華德修種之問華德於汝意云何爾時雲雷音王佛所妙音菩薩伎樂供養奉上寶器者豈異人乎今此妙音菩薩摩訶薩是指今妙音即是昔者華德是妙音菩薩已曾供養親近無量諸佛久植德本久曾種植德善根本又值恆河沙等百千萬億那由他佛積德之深華德汝但見妙音菩薩其身在此謂但見此莫知其他而是菩薩現種種身即無邊身處處為諸衆生說是經典隨所應度現形說法或現梵王身為離欲者現梵天身或現帝釋身為十善者現欲天身或現自在天身為以福業受自在者即為示現化樂天身或現大自在天身為有福德現成受用得大自在者現他化自在天身或現天大將軍身即諸天王勇猛大將如散脂天及毗紐等或現毗沙門天王身即是北方多聞天王欲護世者為現此身或現轉輪聖王身欲作輪王統國土者為現此身或現諸小王身諸小國土人王之身或現長者身其人長者九事厚重為現此身或現居士身無心汗祿清淨自居為現此身或現宰官身欲為宰官剖斷曲直為現此身或現婆羅門身於俗流中行淨之者為現此身或現比丘比丘尼男欲為僧女欲為尼為現此身優婆塞優婆夷身男女欲持五八戒者為現此身或現長者居士婦女身欲作長者居士之妻為現此身或現宰官婦女身為宰官婦現婦女身或現婆羅門婦女身為化此類又見其身或現童男童女身或為男子不壞男根為現童男或為女子不壞女根為現童女或現天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等身即八部衆如序品解而說是經如上所現蓋欲為彼說經之故諸有地獄餓鬼畜生諸有即是通指三界遊戲地獄大悲代苦現作餓鬼出乳濟飢化作畜生教與智慧及衆難處應是一切患難之處皆能救濟三塗八難皆能救之乃至於王後宮變為女身而說是經應以后妃婦女之身而得度者即為現之華德是妙音菩薩能救護娑婆世界諸衆生者妙音所以能救此土諸衆生者是妙音菩薩如是種種變化現身以能如是隨緣應現在此娑婆國土為諸衆生說是經典如是現相皆為說經於神通變化智慧無所損減神通變化即是定力智慧即是般若之力以智化化如燈分燈始自一燈傳至無量本燈不失故無損減是菩薩以若干智慧明照娑婆世界為世明燈破衆生暗令一切衆生各得所知各隨根性令得開解於十方恆河沙世界中亦復如是非特化此十方亦然若應以聲聞形得度者現聲聞形而為說法如富樓那本是大權內祕大行外現聲聞應以辟支佛形得度者現辟支佛形而為說法即現緣覺獨覺之身應以菩薩形得度者現菩薩形而為說法為大根者現菩薩相應以佛形得度者即現佛形而為說法登住已去有神通力能現佛形隨機應化如是種種隨所應度而為現形但應現者即皆現之乃至應以滅度而得度者示現滅度唱言入滅令生敬慕華德妙音菩薩摩訶薩成就大神通智慧之力其事如是結括答意以告華德爾時華德菩薩白佛言已聞化事未知所住神通三昧名為何等世尊是妙音菩薩深種善根如上所說世尊是菩薩住何三昧安住何等正定之中而能如是在所變現度脫衆生善解如是變現度生佛告華德菩薩善男子其三昧名現一切色身一切色身悉能應現妙音菩薩住是三昧中住此正定能如是饒益無量衆生在處現形為說妙法令得開悟即名饒益說是妙音菩薩品時與妙音菩薩俱來者八萬四千人同行之衆皆得現一切色身三昧亦同妙音證此三昧此娑婆世界無量菩薩亦得是三昧此界菩薩聞說妙音所住三昧亦同證入及陀羅尼即是善解一切衆生語言三昧爾時妙音菩薩摩訶薩供養釋迦牟尼佛及多寶佛塔已供佛聽經其事已畢還歸本土復還淨華宿王智佛所所經諸國六種震動表對六番破無明惑雨寶蓮華表行善因作百千萬億種種伎樂表得無量禪悅法喜既到本國與八萬四千菩薩圍繞至淨華宿王智佛所白佛言至佛座下告以歸意世尊我到娑婆世界饒益衆生到娑婆者為益衆生見釋迦牟尼佛得見釋迦及見多寶佛塔次見寶塔禮拜供養禮事奉供二大世尊又見文殊師利法王子菩薩及見藥王菩薩得勤精進力菩薩勇施菩薩等及以得見諸大菩薩亦令是八萬四千菩薩得現一切色身三昧述往還處利益之事以告世尊說是妙音菩薩來往品時釋迦佛說妙音來往饒益事時四萬二千天子得無生法忍諸天聞法得入聖位住無生忍華德菩薩得法華三昧華德聞已即時證得法華三昧了性本空不染世間法如蓮華在水
