body:
  text: 妙法蓮華經句解錢塘霍山廣照沙門釋聞達夫讀經者須善佛意得佛意已然後起修如明目人善知方詣不得意者徒自疲勞終不能知佛之境界如經所説智慧方便譬喻因緣三一圓融種種義趣當知悉是唯心所現只為昏迷生死無際豁然啓悟業障本空要得無事一切放下是非俱遣垢淨雙忘忘心亦泯真覺圓明正恁麼時雖不作意露逈逈底常自現前若尋故紙何日出頭所以道諸法實相不可言宣唯有智者乃能知之論至於此直須向釋迦老子未開口時便知落處分明薦取免被他瞞退身三步何妨踏著不勞彈指見本自心了辦無始大事因緣誠不難也若夫原始要終提綱振紐具如序解及指掌圖今釋字義為彼初機如端伎藝先加弄引幸勿泥此宜自著鞭時宋景定辛酉如來誕日序法華經句解目次卷第一自序弘傳序解序品第一方便品第二卷第二譬喻品第三信解品第四卷第三藥草喻品第五授記品第六化城喻品第七卷第四五百弟子品第八人記品第九法師品第十寶塔品第十一卷第五提婆達多品第十二勸持品第十三安樂行品第十四涌出品第十五卷第六壽量品第十六分別功德品第十七隨喜功德品第十八法師功德品第十九卷第七不輕品第二十神力品第二十一囑纍品第二十二藥王品第二十三妙音品第十四卷第八普門品第二十五陀羅尼品第二十六本事品第二十七勸發品第二十八法華經要解目次終
